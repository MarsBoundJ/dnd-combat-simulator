# c_monk — Monk (DEX/WIS martial, non-caster)
# Source: SRD CC v5.2.1 (PHB 2024)
#
# First non-caster of the 4 missing classes. Core combat identity:
#   - Martial Arts (L1): unarmed strikes use DEX + a Martial Arts die
#     (1d6→1d12 by level); bonus-action unarmed strike.
#   - Unarmored Defense (L1): base AC = 10 + DEX + WIS (no armor/shield).
#   - Monk's Focus (L2): Focus Points (= Monk level, L2+) fuel Flurry of
#     Blows / Patient Defense / Step of the Wind; save DC = 8 + WIS + PB.
#   - Flurry of Blows (L2): 1 Focus Point → two bonus-action unarmed
#     strikes.
#   - Extra Attack (L5): two attacks on the Attack action.
#
# Build-time effects (Unarmored Defense AC, Martial Arts unarmed-strike
# action + Flurry + Extra Attack) live in pc_schema. Focus Points +
# Martial Arts die read from class_resources.
#
# Deferred (follow-on increment): Stunning Strike (L5 on-hit CON-save
# stun rider), Empowered Strikes (L6 force-damage option), Deflect
# Attacks, Evasion, Unarmored Movement (+speed), Uncanny Metabolism,
# and the rest of the high-level features. Subclass (Warrior of the
# Open Hand) lands with the follow-on.

id: c_monk
name: Monk
source: srd_5.2.1

core_traits:
  primary_abilities: [dexterity, wisdom]
  hit_die: d8
  save_proficiencies: [strength, dexterity]
  skill_proficiencies:
    choose: 2
    from: [acrobatics, athletics, history, insight, religion, stealth]
  weapon_proficiencies: [simple, martial_light]
  armor_training: []
  tool_proficiencies: []

multiclass_entry:
  traits_gained: [simple_weapons]
  features_gained: [f_martial_arts]
  multiclass_slot_contribution: none

level_table:
