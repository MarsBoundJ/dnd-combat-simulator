# c_fighter — Fighter
# Source: SRD CC v5.2.1 p47

id: c_fighter
name: Fighter
source: srd_5.2.1

core_traits:
  primary_abilities: [strength, dexterity]
  hit_die: d10
  save_proficiencies: [strength, constitution]
  skill_proficiencies:
    choose: 2
    from: [acrobatics, animal_handling, athletics, history, insight,
           intimidation, persuasion, perception, survival]
  weapon_proficiencies: [simple, martial]
  armor_training: [light, medium, heavy, shields]
  tool_proficiencies: []

starting_equipment:
  options:
    - id: a
      items: [chain_mail, greatsword, flail, "8x javelin", dungeoneers_pack]
      gold: 4
    - id: b
      items: [studded_leather, scimitar, shortsword, longbow, "20x arrow",
              quiver, dungeoneers_pack]
      gold: 11
    - id: c
      items: []
      gold: 155

multiclass_entry:
  traits_gained: [hit_die, martial_weapons, light_armor, medium_armor, shields]
  features_gained: [f_fighting_style, f_second_wind, f_weapon_mastery]
  multiclass_slot_contribution: none

# Spellcasting is null for base Fighter (Eldritch Knight subclass adds it as
# third_caster — handled at subclass layer, not here).

level_table:
  - level: 1
    proficiency_bonus: 2
    features: [f_fighting_style, f_second_wind, f_weapon_mastery]
    class_resources: { second_wind_uses: 2, weapon_mastery_count: 3 }
  - level: 2
    proficiency_bonus: 2
    features: [f_action_surge_one_use, f_tactical_mind]
    class_resources: { second_wind_uses: 2, weapon_mastery_count: 3 }
  - level: 3
    proficiency_bonus: 2
    features: [grant_subclass]
    class_resources: { second_wind_uses: 2, weapon_mastery_count: 3 }
  - level: 4
    proficiency_bonus: 2
    features: [grant_asi_or_feat]
    class_resources: { second_wind_uses: 3, weapon_mastery_count: 4 }
  - level: 5
    proficiency_bonus: 3
    features: [f_extra_attack, f_tactical_shift]
    class_resources: { second_wind_uses: 3, weapon_mastery_count: 4 }
  - level: 6
    proficiency_bonus: 3
    features: [grant_asi_or_feat]
    class_resources: { second_wind_uses: 3, weapon_mastery_count: 4 }
  - level: 7
    proficiency_bonus: 3
    features: [grant_subclass_feature]
    class_resources: { second_wind_uses: 3, weapon_mastery_count: 4 }
  - level: 8
    proficiency_bonus: 3
    features: [grant_asi_or_feat]
    class_resources: { second_wind_uses: 3, weapon_mastery_count: 4 }
  - level: 9
    proficiency_bonus: 4
    features: [f_indomitable_one_use, f_tactical_master]
    class_resources: { second_wind_uses: 3, weapon_mastery_count: 4 }
  - level: 10
    proficiency_bonus: 4
    features: [grant_subclass_feature]
    class_resources: { second_wind_uses: 4, weapon_mastery_count: 5 }
  - level: 11
    proficiency_bonus: 4
    features: [f_two_extra_attacks]
    class_resources: { second_wind_uses: 4, weapon_mastery_count: 5 }
  - level: 12
    proficiency_bonus: 4
    features: [grant_asi_or_feat]
    class_resources: { second_wind_uses: 4, weapon_mastery_count: 5 }
  - level: 13
    proficiency_bonus: 5
    features: [f_indomitable_two_uses, f_studied_attacks]
    class_resources: { second_wind_uses: 4, weapon_mastery_count: 5 }
  - level: 14
    proficiency_bonus: 5
    features: [grant_asi_or_feat]
    class_resources: { second_wind_uses: 4, weapon_mastery_count: 5 }
  - level: 15
    proficiency_bonus: 5
    features: [grant_subclass_feature]
    class_resources: { second_wind_uses: 4, weapon_mastery_count: 5 }
  - level: 16
    proficiency_bonus: 5
    features: [grant_asi_or_feat]
    class_resources: { second_wind_uses: 4, weapon_mastery_count: 6 }
  - level: 17
    proficiency_bonus: 6
    features: [f_action_surge_two_uses, f_indomitable_three_uses]
    class_resources: { second_wind_uses: 4, weapon_mastery_count: 6 }
  - level: 18
    proficiency_bonus: 6
    features: [grant_subclass_feature]
    class_resources: { second_wind_uses: 4, weapon_mastery_count: 6 }
  - level: 19
    proficiency_bonus: 6
    features: [grant_epic_boon]
    class_resources: { second_wind_uses: 4, weapon_mastery_count: 6 }
  - level: 20
    proficiency_bonus: 6
    features: [f_three_extra_attacks]
    class_resources: { second_wind_uses: 4, weapon_mastery_count: 6 }

subclass_grant_level: 3
