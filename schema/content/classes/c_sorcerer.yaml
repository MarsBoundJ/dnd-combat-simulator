# c_sorcerer — Sorcerer (CHA full-caster)
# Source: SRD CC v5.2.1 (PHB 2024)
#
# CHA full-caster (d6). Same casting chassis as the Bard; the signature
# systems are Sorcery Points (Font of Magic) + Metamagic.
#
# **Sorcery Points (Font of Magic, L2):** a pool equal to the Sorcerer's
# level (L2+), capped at 20, regained on a long rest. Drives Metamagic
# and slot<->SP conversion. Derived in pc_schema from class_resources.
#
# **Metamagic (L2):** 2 options known (3 at L10, 4 at L17). The
# SP-spend-during-cast framework lives in engine.core.metamagic +
# pipeline (apply_metamagic pre-cast hook). All 10 SRD options modeled.
#
# **Innate Sorcery (L1):** BA, 1 min self-buff (+1 spell save DC +
# advantage on Sorcerer spell attacks), 2/long rest.
#
# **Spells wired (v1):** built Sorcerer-list spells — Fire Bolt / Ray of
# Frost / Shocking Grasp / Sorcerous Burst / Chill Touch (cantrips),
# Burning Hands / Chromatic Orb / Magic Missile (L1), Scorching Ray (L2,
# at sorcerer L3), Fireball / Lightning Bolt (L3, at sorcerer L5), Cone
# of Cold (L5, at sorcerer L9). The auto-attach + pc_builder paths key
# off features_known, so these wire regardless of their granted_by.
#
# Deferred class features: Sorcerous Restoration (L5 short-rest SP),
# Sorcery Incarnate (L7), Arcane Apotheosis (L20) — SP-economy/economy.

id: c_sorcerer
name: Sorcerer
source: srd_5.2.1

core_traits:
  primary_abilities: [charisma]
  hit_die: d6
  save_proficiencies: [constitution, charisma]
  skill_proficiencies:
    choose: 2
    from: [arcana, deception, insight, intimidation, persuasion, religion]
  weapon_proficiencies: [simple]
  armor_training: []
  tool_proficiencies: []

multiclass_entry:
  traits_gained: [simple_weapons]
  features_gained: []
  multiclass_slot_contribution: full_caster

spellcasting:
  enabled: true
  ability: charisma
  save_dc_formula: "8 + actor.cha_mod + actor.proficiency_bonus"
  attack_mod_formula: "actor.cha_mod + actor.proficiency_bonus"
  preparation_model: prepared_from_class_list
  preparation_change_trigger: long_rest
  slots_progression: full_caster

level_table:
  - level: 1
    proficiency_bonus: 2
    features: [f_innate_sorcery, f_fire_bolt, f_ray_of_frost,
                f_shocking_grasp, f_sorcerous_burst, f_chill_touch,
                f_burning_hands, f_chromatic_orb, f_magic_missile]
    class_resources:
      spell_slots: { 1: 2 }
  - level: 2
    proficiency_bonus: 2
    features: [f_font_of_magic, f_metamagic]
    class_resources:
      spell_slots: { 1: 3 }
      sorcery_points: 2
      metamagic_known: 2
  - level: 3
    proficiency_bonus: 2
    features: [grant_subclass, f_scorching_ray, f_web]
    class_resources:
