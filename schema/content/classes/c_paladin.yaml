# c_paladin — Paladin (Divine Smite + Weapon Mastery v1)
# Source: SRD CC v5.2.1 (PHB 2024)
#
# Extended in PR #73 to wire **Divine Smite** as the class-defining
# damage rider, alongside Weapon Mastery (PR #64). Level table now
# goes to L20.
#
# **Spellcasting note:** Paladin is a half-caster. PHB 2024 spell
# slots progress as: L2(2/0/0/0/0), L3(3), L4(3), L5(4/2), L6(4/2),
# L7(4/3), L8(4/3), L9(4/3/2), L10(4/3/2), L11(4/3/3), L12(4/3/3),
# L13(4/3/3/1), L14(4/3/3/1), L15(4/3/3/2), L16(4/3/3/2),
# L17(4/3/3/3/1), L18(4/3/3/3/1), L19(4/3/3/3/2), L20(4/3/3/3/2).
# pc_schema reads `spell_slots` from the level table at PC-build
# time and stamps them onto the actor template — Divine Smite has
# slots to consume immediately. v1 wires slots ONLY for the smite
# damage rider; non-smite Paladin spellcasting (preparing + casting
# Bless, Shield of Faith, etc.) waits for a follow-on PR.
#
# Tracked class_resources:
#   - weapon_mastery_count: 2 at L1, 3 at L11
#   - spell_slots: half-caster progression (see above)
#
# Features wired by pc_schema at PC-build time:
#   - f_weapon_mastery (L1) → masteries baked onto weapon specs
#   - f_divine_smite (L2) → no auto-generated action (smite fires
#     passively on qualifying melee weapon hits via the _damage
#     primitive rider; AI heuristic decides whether to spend a slot)
#
# Still deferred (each becomes a follow-on PR):
#   - Lay on Hands (HP pool that heals via touch)
#   - Divine Sense (detect celestials / fiends / undead)
#   - Fighting Style (choose at L2; shares the f_fighting_style infra)
#   - Aura of Protection (CHA bonus to saves for nearby allies)
#   - Full Paladin spellcasting (preparing + casting Bless / Shield
#     of Faith / Bless / Heroism etc.)
#   - Subclass oaths (Devotion / Ancients / Vengeance / Glory)

id: c_paladin
name: Paladin
source: srd_5.2.1

core_traits:
  primary_abilities: [strength, charisma]
  hit_die: d10
  save_proficiencies: [wisdom, charisma]
  skill_proficiencies:
    choose: 2
    from: [athletics, insight, intimidation, medicine,
            persuasion, religion]
  weapon_proficiencies: [simple, martial]
  armor_training: [light, medium, heavy, shields]
  tool_proficiencies: []

multiclass_entry:
  traits_gained: [martial_weapons, light_armor, medium_armor, shields]
  features_gained: [f_weapon_mastery]
  multiclass_slot_contribution: half

# Paladin is a CHA half-caster (PR #104 added this block so the spell
# save DC for save-based Paladin spells — Compelled Duel's WIS save —
# resolves with CHA, not the INT default. pc_schema stamps
# template.spellcasting_ability from `ability` below; _resolve_dc
# reads it.) Slot progression stays driven by the per-row
# class_resources.spell_slots table (Divine Smite shipped that in
# PR #73); slots_progression here is descriptive.
spellcasting:
  enabled: true
  ability: charisma
  save_dc_formula: "8 + actor.cha_mod + actor.proficiency_bonus"
  attack_mod_formula: "actor.cha_mod + actor.proficiency_bonus"
  slots_progression: half_caster

level_table:
  - level: 1
    proficiency_bonus: 2
    features: [f_weapon_mastery, f_lay_on_hands]
    class_resources:
      weapon_mastery_count: 2
    # Lay on Hands pool: 5 × paladin_level. pc_schema derives this
    # directly from template.levels.paladin rather than via per-row
    # class_resources (formula is uniform across all levels, so
    # repeating it 13 times would be noise).
  - level: 2
    proficiency_bonus: 2
    features: [f_divine_smite, f_bless, f_shield_of_faith,
                f_divine_favor, f_protection_from_evil_and_good,
                f_searing_smite, f_wrathful_smite, f_heroism,
                f_compelled_duel]
    class_resources:
      weapon_mastery_count: 2
      spell_slots: { 1: 2 }
  - level: 3
    proficiency_bonus: 2
    features: [grant_subclass]
    class_resources:
      weapon_mastery_count: 2
      spell_slots: { 1: 3 }
  - level: 4
    proficiency_bonus: 2
    features: [grant_asi_or_feat]
    class_resources:
      weapon_mastery_count: 2
      spell_slots: { 1: 3 }
  - level: 5
    proficiency_bonus: 3
    features: []
    class_resources:
      weapon_mastery_count: 2
      spell_slots: { 1: 4, 2: 2 }
  - level: 7
    proficiency_bonus: 3
    features: []
    class_resources:
      weapon_mastery_count: 2
      spell_slots: { 1: 4, 2: 3 }
  - level: 9
    proficiency_bonus: 4
    features: [f_blinding_smite]
    class_resources:
      weapon_mastery_count: 2
      spell_slots: { 1: 4, 2: 3, 3: 2 }
  - level: 11
    proficiency_bonus: 4
    features: []
    class_resources:
      weapon_mastery_count: 3
      spell_slots: { 1: 4, 2: 3, 3: 3 }
  - level: 13
    proficiency_bonus: 5
    features: []
    class_resources:
      weapon_mastery_count: 3
      spell_slots: { 1: 4, 2: 3, 3: 3, 4: 1 }
  - level: 15
    proficiency_bonus: 5
    features: []
    class_resources:
      weapon_mastery_count: 3
      spell_slots: { 1: 4, 2: 3, 3: 3, 4: 2 }
  - level: 17
    proficiency_bonus: 6
    features: []
    class_resources:
      weapon_mastery_count: 3
      spell_slots: { 1: 4, 2: 3, 3: 3, 4: 3, 5: 1 }
  - level: 19
    proficiency_bonus: 6
    features: []
    class_resources:
      weapon_mastery_count: 3
      spell_slots: { 1: 4, 2: 3, 3: 3, 4: 3, 5: 2 }
  - level: 20
    proficiency_bonus: 6
    features: []
    class_resources:
      weapon_mastery_count: 3
      spell_slots: { 1: 4, 2: 3, 3: 3, 4: 3, 5: 2 }

subclass_grant_level: 3
