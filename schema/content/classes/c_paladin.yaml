# c_paladin — Paladin (minimal v1)
# Source: SRD CC v5.2.1 (PHB 2024)
#
# **Minimal class definition** (PR #64). Only Weapon Mastery
# wiring shipped; other features (Lay on Hands, Divine Sense,
# Divine Smite, Fighting Style, Aura of Protection, etc.) wait
# for follow-on PRs.
#
# Weapon Mastery RAW (Paladin): 2 at L1, 3 at L11.

id: c_paladin
name: Paladin
source: srd_5.2.1

core_traits:
  primary_abilities: [strength, charisma]
  hit_die: d10
  save_proficiencies: [wisdom, charisma]
  skill_proficiencies:
    choose: 2
    from: [athletics, insight, intimidation, medicine,
            persuasion, religion]
  weapon_proficiencies: [simple, martial]
  armor_training: [light, medium, heavy, shields]
  tool_proficiencies: []

multiclass_entry:
  traits_gained: [martial_weapons, light_armor, medium_armor, shields]
  features_gained: [f_weapon_mastery]
  multiclass_slot_contribution: half

# Spellcasting RAW: half-caster, starts at L2 (1st-level slots).
# Not yet wired in this minimal class def.

level_table:
  - level: 1
    proficiency_bonus: 2
    features: [f_weapon_mastery]
    class_resources: { weapon_mastery_count: 2 }
  - level: 2
    proficiency_bonus: 2
    features: []
    class_resources: { weapon_mastery_count: 2 }
  - level: 3
    proficiency_bonus: 2
    features: [grant_subclass]
    class_resources: { weapon_mastery_count: 2 }
  - level: 4
    proficiency_bonus: 2
    features: [grant_asi_or_feat]
    class_resources: { weapon_mastery_count: 2 }
  - level: 5
    proficiency_bonus: 3
    features: []
    class_resources: { weapon_mastery_count: 2 }
  - level: 11
    proficiency_bonus: 4
    features: []
    class_resources: { weapon_mastery_count: 3 }

subclass_grant_level: 3

# Deferred class features:
#   - Lay on Hands (HP pool that heals via touch)
#   - Divine Sense (detect celestials / fiends / undead)
#   - Fighting Style (choose at L2; shares the f_fighting_style infra)
#   - Divine Smite (spend slot on hit for radiant damage)
#   - Aura of Protection (CHA bonus to saves for nearby allies)
#   - Spellcasting (half-caster slot table)
#   - Subclass oaths (Devotion / Ancients / Vengeance / Glory)
