# c_ranger — Ranger (minimal v1)
# Source: SRD CC v5.2.1 (PHB 2024)
#
# **Minimal class definition** (PR #64). Only Weapon Mastery
# wiring shipped; other features (Favored Enemy / Hunter's Mark
# replacement, Deft Explorer, Fighting Style, Extra Attack,
# Tireless, etc.) wait for follow-on PRs.
#
# Weapon Mastery RAW (Ranger): 2 at L1, 3 at L9.

id: c_ranger
name: Ranger
source: srd_5.2.1

core_traits:
  primary_abilities: [dexterity, wisdom]
  hit_die: d10
  save_proficiencies: [strength, dexterity]
  skill_proficiencies:
    choose: 3
    from: [animal_handling, athletics, insight, investigation,
            nature, perception, stealth, survival]
  weapon_proficiencies: [simple, martial]
  armor_training: [light, medium, shields]
  tool_proficiencies: []

multiclass_entry:
  traits_gained: [martial_weapons, light_armor, medium_armor, shields]
  features_gained: [f_weapon_mastery]
  multiclass_slot_contribution: half

# Spellcasting RAW: half-caster, starts at L1 in 2024 (Hunter's
# Mark auto-prepared). Not yet wired in this minimal class def.

level_table:
  - level: 1
    proficiency_bonus: 2
    features: [f_weapon_mastery]
    class_resources: { weapon_mastery_count: 2 }
  - level: 2
    proficiency_bonus: 2
    features: []
    class_resources: { weapon_mastery_count: 2 }
  - level: 3
    proficiency_bonus: 2
    features: [grant_subclass]
    class_resources: { weapon_mastery_count: 2 }
  - level: 4
    proficiency_bonus: 2
    features: [grant_asi_or_feat]
    class_resources: { weapon_mastery_count: 2 }
  - level: 5
    proficiency_bonus: 3
    features: []
    class_resources: { weapon_mastery_count: 2 }
  - level: 9
    proficiency_bonus: 4
    features: []
    class_resources: { weapon_mastery_count: 3 }

subclass_grant_level: 3

# Deferred class features:
#   - Favored Enemy / Hunter's Mark auto-prep (2024 PHB shape)
#   - Deft Explorer (L1: expertise + extra languages)
#   - Fighting Style (L2; shares f_fighting_style infra)
#   - Extra Attack (L5)
#   - Roving (L6)
#   - Tireless (L10)
#   - Spellcasting (half-caster slot table)
#   - Subclasses (Hunter / Beast Master / Gloom Stalker / Fey Wanderer)
