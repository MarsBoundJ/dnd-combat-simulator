# c_rogue — Rogue (Sneak Attack + Weapon Mastery v1)
# Source: SRD CC v5.2.1 (PHB 2024)
#
# Extended in PR #72 to wire **Sneak Attack** as the class-defining
# feature alongside Weapon Mastery (PR #64). Level table now goes to
# L20.
#
# Tracked class_resources:
#   - weapon_mastery_count: 1 at L1, 2 at L9
#   - sneak_attack_dice: 1d6 at L1 → 10d6 at L19 (one extra d6 at
#     every odd level — see engine/core/sneak_attack.py for the
#     full table)
#
# Features wired by pc_schema at PC-build time:
#   - f_weapon_mastery (L1) → masteries baked onto weapon specs
#   - f_sneak_attack (L1) → no auto-generated action (SA fires
#     passively on qualifying hits via the _damage primitive rider)
#
# Still deferred (each becomes a follow-on PR):
#   - Expertise auto-emission from class table (PR #62 wired the
#     mechanic; fixtures can declare skill_expertise directly)
#   - Cunning Action (Dash / Disengage / Hide as Bonus Action) —
#     next per-class PR
#   - Cunning Strike (2024 PHB; trade SA dice for effects)
#   - Steady Aim (BA: advantage on next attack if didn't move)
#   - Uncanny Dodge / Evasion / Reliable Talent
#   - Subclasses (Thief / Assassin / Arcane Trickster / Soulknife)

id: c_rogue
name: Rogue
source: srd_5.2.1

core_traits:
  primary_abilities: [dexterity]
  hit_die: d8
  save_proficiencies: [dexterity, intelligence]
  skill_proficiencies:
    choose: 4
    from: [acrobatics, athletics, deception, insight,
            intimidation, investigation, perception, performance,
            persuasion, sleight_of_hand, stealth]
  weapon_proficiencies: [simple, martial]    # 2024 PHB: full martial
  armor_training: [light]
  tool_proficiencies: [thieves_tools]

multiclass_entry:
  traits_gained: [light_armor, thieves_tools]
  features_gained: [f_weapon_mastery]
  multiclass_slot_contribution: none

# No spellcasting at the base class. Arcane Trickster subclass adds
# third-caster spell access at L3; not yet wired.

level_table:
  - level: 1
    proficiency_bonus: 2
    features: [f_weapon_mastery, f_sneak_attack]
    class_resources:
      weapon_mastery_count: 1
      sneak_attack_dice: 1
  - level: 2
    proficiency_bonus: 2
    features: [f_cunning_action]
    class_resources:
      weapon_mastery_count: 1
      sneak_attack_dice: 1
  - level: 3
    proficiency_bonus: 2
    features: [grant_subclass, f_steady_aim]
    class_resources:
      weapon_mastery_count: 1
      sneak_attack_dice: 2
  - level: 4
    proficiency_bonus: 2
    features: [grant_asi_or_feat]
    class_resources:
      weapon_mastery_count: 1
      sneak_attack_dice: 2
  - level: 5
    proficiency_bonus: 3
    features: [f_cunning_strike]
    class_resources:
      weapon_mastery_count: 1
      sneak_attack_dice: 3
  - level: 7
    proficiency_bonus: 3
    features: [f_evasion]
    class_resources:
      weapon_mastery_count: 1
      sneak_attack_dice: 4
  - level: 9
    proficiency_bonus: 4
    features: []
    class_resources:
      weapon_mastery_count: 2
      sneak_attack_dice: 5
  - level: 11
    proficiency_bonus: 4
    features: []
    class_resources:
      weapon_mastery_count: 2
      sneak_attack_dice: 6
  - level: 13
    proficiency_bonus: 5
    features: []
    class_resources:
      weapon_mastery_count: 2
      sneak_attack_dice: 7
  - level: 15
    proficiency_bonus: 5
    features: []
    class_resources:
      weapon_mastery_count: 2
      sneak_attack_dice: 8
  - level: 17
    proficiency_bonus: 6
    features: []
    class_resources:
      weapon_mastery_count: 2
      sneak_attack_dice: 9
  - level: 19
    proficiency_bonus: 6
    features: []
    class_resources:
      weapon_mastery_count: 2
      sneak_attack_dice: 10
  - level: 20
    proficiency_bonus: 6
    features: []
    class_resources:
      weapon_mastery_count: 2
      sneak_attack_dice: 10

subclass_grant_level: 3
