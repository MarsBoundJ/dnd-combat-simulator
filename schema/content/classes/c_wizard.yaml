    spellcasting: { cantrips_known: 4, prepared_spells: 11 }
    class_resources:
      spell_slots: { 1: 4, 2: 3, 3: 3, 4: 1 }
  - level: 8
    proficiency_bonus: 3
    features: [grant_asi_or_feat]
    spellcasting: { cantrips_known: 4, prepared_spells: 12 }
    class_resources:
      spell_slots: { 1: 4, 2: 3, 3: 3, 4: 2 }
  - level: 9
    proficiency_bonus: 4
    features: [f_cone_of_cold, f_hold_monster, f_cloudkill, f_wall_of_force,
                f_synaptic_static, f_bigbys_hand]
    spellcasting: { cantrips_known: 4, prepared_spells: 14 }
    class_resources:
