# c_wizard — Wizard
# Source: SRD CC v5.2.1 p77-79

id: c_wizard
name: Wizard
source: srd_5.2.1

core_traits:
  primary_abilities: [intelligence]
  hit_die: d6
  save_proficiencies: [intelligence, wisdom]
  skill_proficiencies:
    choose: 2
    from: [arcana, history, insight, investigation, medicine, nature, religion]
  weapon_proficiencies: [simple]
  armor_training: []
  tool_proficiencies: []

starting_equipment:
  options:
    - id: a
      items: ["2x dagger", arcane_focus_quarterstaff, robe, spellbook, scholars_pack]
      gold: 5
    - id: b
      items: []
      gold: 55

multiclass_entry:
  traits_gained: [hit_die]
  features_gained: [f_spellcasting_wizard, f_ritual_adept, f_arcane_recovery]
  multiclass_slot_contribution: full_caster

spellcasting:
  enabled: true
  ability: intelligence
  save_dc_formula: "8 + actor.int_mod + actor.proficiency_bonus"
  attack_mod_formula: "actor.int_mod + actor.proficiency_bonus"
  focus_types: [arcane_focus, spellbook]
  preparation_model: prepared_from_known_list
  known_list_source: spellbook
  preparation_change_trigger: long_rest
  slots_progression: full_caster
  ritual_casting:
    enabled: true
    style: ritual_adept           # any spellbook ritual, no prep required
    extra_time: "minutes:10"
    consumes_slot: false

spellbook:
  starting_spells: { count: 6, level: 1 }
  spells_per_level_gained: 2
  copy_from_source:
    time_per_spell_level: "hours:2"
    gp_cost_per_spell_level: 50
  copy_own_book:
    time_per_spell_level: "hours:1"
    gp_cost_per_spell_level: 10

level_table:
  - level: 1
    proficiency_bonus: 2
    features: [f_spellcasting_wizard, f_ritual_adept, f_arcane_recovery]
    spellcasting: { cantrips_known: 3, prepared_spells: 4 }
  - level: 2
    proficiency_bonus: 2
    features: [f_scholar]
    spellcasting: { cantrips_known: 3, prepared_spells: 5 }
  - level: 3
    proficiency_bonus: 2
    features: [grant_subclass]
    spellcasting: { cantrips_known: 3, prepared_spells: 6 }
  - level: 4
    proficiency_bonus: 2
    features: [grant_asi_or_feat]
    spellcasting: { cantrips_known: 4, prepared_spells: 7 }
  - level: 5
    proficiency_bonus: 3
    features: [f_memorize_spell]
    spellcasting: { cantrips_known: 4, prepared_spells: 9 }
  - level: 6
    proficiency_bonus: 3
    features: [grant_subclass_feature]
    spellcasting: { cantrips_known: 4, prepared_spells: 10 }
  - level: 7
    proficiency_bonus: 3
    features: []
    spellcasting: { cantrips_known: 4, prepared_spells: 11 }
  - level: 8
    proficiency_bonus: 3
    features: [grant_asi_or_feat]
    spellcasting: { cantrips_known: 4, prepared_spells: 12 }
  - level: 9
    proficiency_bonus: 4
    features: []
    spellcasting: { cantrips_known: 4, prepared_spells: 14 }
  - level: 10
    proficiency_bonus: 4
    features: [grant_subclass_feature]
    spellcasting: { cantrips_known: 5, prepared_spells: 15 }
  - level: 11
    proficiency_bonus: 4
    features: []
    spellcasting: { cantrips_known: 5, prepared_spells: 16 }
  - level: 12
    proficiency_bonus: 4
    features: [grant_asi_or_feat]
    spellcasting: { cantrips_known: 5, prepared_spells: 16 }
  - level: 13
    proficiency_bonus: 5
    features: []
    spellcasting: { cantrips_known: 5, prepared_spells: 17 }
  - level: 14
    proficiency_bonus: 5
    features: [grant_subclass_feature]
    spellcasting: { cantrips_known: 5, prepared_spells: 18 }
  - level: 15
    proficiency_bonus: 5
    features: []
    spellcasting: { cantrips_known: 5, prepared_spells: 19 }
  - level: 16
    proficiency_bonus: 5
    features: [grant_asi_or_feat]
    spellcasting: { cantrips_known: 5, prepared_spells: 21 }
  - level: 17
    proficiency_bonus: 6
    features: []
    spellcasting: { cantrips_known: 5, prepared_spells: 22 }
  - level: 18
    proficiency_bonus: 6
    features: [f_spell_mastery]
    spellcasting: { cantrips_known: 5, prepared_spells: 23 }
  - level: 19
    proficiency_bonus: 6
    features: [grant_epic_boon]
    spellcasting: { cantrips_known: 5, prepared_spells: 24 }
  - level: 20
