# c_druid — Druid (WIS full-caster)
# Source: SRD CC v5.2.1 (PHB 2024)
#
# The fourth and final missing class, and the first consumer of the form
# system (Wild Shape rides engine.core.forms via the wild_shape merge
# policy). WIS full-caster: pc_schema stamps spellcasting_ability =
# wisdom; slots from the per-row full-caster table.
#
# **Wild Shape (L2):** BA transform into a known Beast form (CR <= 1/4,
# no fly speed at L2). Rides forms.assume_form with the "wild_shape"
# policy (physical replaced, mental kept, reverts at 0 form-HP to the
# druid's prior HP). Beast forms reference the monster bestiary by id
# (e.g. m_wolf, m_panther). Uses: 2 (regain 1 on short rest, all on
# long); per-level use scaling is a documented v1 simplification.
#
# **Spells wired (v1):** built Druid-list content — Produce Flame /
# Starry Wisp (cantrips), Cure Wounds / Faerie Fire / Entangle / Fog
# Cloud (L1), Moonbeam / Flaming Sphere (L2 @ druid L3), Call Lightning /
# Sleet Storm (L3 @ L5), Ice Storm (L4 @ L7), Sunbeam (L6 @ L11).
#
# Deferred class features: Druidic, Primal Order, Wild Companion, Wild
# Resurgence, Elemental Fury — utility / economy.

id: c_druid
name: Druid
source: srd_5.2.1

core_traits:
  primary_abilities: [wisdom]
  hit_die: d8
  save_proficiencies: [intelligence, wisdom]
  skill_proficiencies:
    choose: 2
    from: [animal_handling, arcana, insight, medicine, nature,
            perception, religion, survival]
  weapon_proficiencies: [simple]
  armor_training: [light, shields]
  tool_proficiencies: [herbalism_kit]

multiclass_entry:
  traits_gained: [light_armor, shields, simple_weapons]
  features_gained: []
  multiclass_slot_contribution: full_caster

spellcasting:
  enabled: true
  ability: wisdom
  save_dc_formula: "8 + actor.wis_mod + actor.proficiency_bonus"
  attack_mod_formula: "actor.wis_mod + actor.proficiency_bonus"
  preparation_model: prepared_from_class_list
  preparation_change_trigger: long_rest
  slots_progression: full_caster

level_table:
  - level: 1
    proficiency_bonus: 2
    features: [f_charm_person, f_cure_wounds, f_entangle, f_faerie_fire,
                f_fog_cloud, f_healing_word, f_poison_spray, f_produce_flame,
                f_protection_from_evil_and_good, f_starry_wisp, f_thorn_whip,
                f_thunderclap, f_thunderwave]
    class_resources:
      spell_slots: { 1: 2 }
  - level: 2
    proficiency_bonus: 2
    features: [f_wild_shape, f_wild_shape_revert]
    class_resources:
      spell_slots: { 1: 3 }
      wild_shape_uses: 2
  - level: 3
    proficiency_bonus: 2
    features: [grant_subclass, f_aid, f_flaming_sphere, f_gust_of_wind,
                f_hold_person, f_moonbeam, f_summon_beast]
    class_resources:
      spell_slots: { 1: 4, 2: 2 }
      wild_shape_uses: 2
  - level: 4
