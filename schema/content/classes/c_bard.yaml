# c_bard — Bard (CHA full-caster)
# Source: SRD CC v5.2.1 (PHB 2024)
#
# Fourth full-caster in the engine (after Wizard/INT, Cleric/WIS, and
# the half-casters). CHA full-caster: pc_schema stamps
# template.spellcasting_ability = charisma so save-based Bard spells
# resolve their DC with CHA. Slots come from the per-row
# class_resources.spell_slots full-caster table (same mechanism
# Cleric uses; the top-level slots_progression is descriptive).
#
# **Signature mechanic — Bardic Inspiration (L1):** grant an ally a
# Bardic Inspiration die (d6→d8→d10→d12 by level) they can add to a
# failed d20 Test. Uses = CHA modifier (min 1), regained on long rest
# (short+long at L5 via Font of Inspiration). The die mechanic +
# CHA-mod-derived resource are wired in engine.core.bardic_inspiration
# + pc_schema; the die size per level lives in class_resources.bardic_die.
#
# **Spells wired (v1):** the already-built Bard-list spells —
# Cure Wounds / Healing Word / Heroism (L1), Hold Person / Aid /
# Suggestion (L2, available once 2nd-level slots arrive at L3). The
# auto-attach pass (PR #82) keys off features_known + action_template,
# NOT granted_by, so listing these in the Bard table wires their
# actions even though their YAML carries a different granted_by class.
# Coverage expands as the spell lane lands more Bard-list spells
# (Vicious Mockery, Dissonant Whispers, Faerie Fire, etc.).
#
# Class-feature wiring status:
#   - Bardic Inspiration (L1) — WIRED (die grant + holder add + CHA-mod
#     uses); rest refresh now wired in rest.py (long rest L1+, short rest
#     L5+ via Font of Inspiration).
#   - Expertise (L2/L9) — MARKER (build-config; skill-check pillar consumes
#     the PC-spec expertise list). No combat eHP model.
#   - Jack of All Trades (L2) — WIRED (half PB to initiative; general
#     skill-check bonus deferred to the skill-check pillar).
#   - Font of Inspiration (L5) — WIRED (Short + Long rest BI refresh;
#     slot→use conversion deferred, low single-encounter signal).
#   - Countercharm (L7) — WIRED (reaction reroll vs Charmed/Frightened with
#     Advantage; inline _forced_save hook, engine.core.countercharm).
#   - Magical Secrets (L10) — MARKER (build-config; widens legal spell picks
#     to Bard/Cleric/Druid/Wizard).
#   - Superior Inspiration (L18) — WIRED (top BI up to 2 on initiative).
#   - Words of Creation (L20) — MARKER (needs Power Word Heal/Kill spells).
#   - Subclasses: College of Lore wired; others as the lane lands.

id: c_bard
name: Bard
source: srd_5.2.1

core_traits:
  primary_abilities: [charisma]
  hit_die: d8
  save_proficiencies: [dexterity, charisma]
  skill_proficiencies:
    choose: 3
    from: [acrobatics, animal_handling, arcana, athletics, deception,
            history, insight, intimidation, investigation, medicine,
            nature, perception, performance, persuasion, religion,
            sleight_of_hand, stealth, survival]
  weapon_proficiencies: [simple]
  armor_training: [light]
  tool_proficiencies: [musical_instrument]

multiclass_entry:
  traits_gained: [light_armor, simple_weapons]
  features_gained: []
  multiclass_slot_contribution: full_caster

spellcasting:
  enabled: true
  ability: charisma
  save_dc_formula: "8 + actor.cha_mod + actor.proficiency_bonus"
  attack_mod_formula: "actor.cha_mod + actor.proficiency_bonus"
  preparation_model: prepared_from_class_list
  preparation_change_trigger: long_rest
  slots_progression: full_caster

level_table:
  - level: 1
    proficiency_bonus: 2
    features: [f_bardic_inspiration, f_cure_wounds, f_healing_word,
                f_heroism, f_vicious_mockery]
    class_resources:
      bardic_die: d6
      spell_slots: { 1: 2 }
  - level: 2
    proficiency_bonus: 2
    features: [f_expertise, f_jack_of_all_trades]
    class_resources:
      bardic_die: d6
      spell_slots: { 1: 3 }
  - level: 3
    proficiency_bonus: 2
    features: [grant_subclass, f_hold_person, f_aid, f_suggestion]
    class_resources:
      bardic_die: d6
      spell_slots: { 1: 4, 2: 2 }
  - level: 4
    proficiency_bonus: 2
    features: [grant_asi_or_feat]
    class_resources:
      bardic_die: d6
      spell_slots: { 1: 4, 2: 3 }
  - level: 5
    proficiency_bonus: 3
    features: [f_font_of_inspiration, f_hypnotic_pattern]
    class_resources:
      bardic_die: d8
      spell_slots: { 1: 4, 2: 3, 3: 2 }
  - level: 6
    proficiency_bonus: 3
