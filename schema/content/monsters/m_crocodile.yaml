id: m_crocodile
name: Crocodile
source: srd_5.2.1
size: large
creature_type: beast
alignment: unaligned
combat:
  armor_class: 12
  hit_points: { average: 13, dice: "2d10", con_contribution: 2 }
  speed: { walk: 20, swim: 30 }
  initiative: { modifier: 0, score: 10 }
abilities:
  str: { score: 15, save: 2 }
  dex: { score: 10, save: 0 }
  con: { score: 13, save: 3 }
  int: { score: 2, save: -4 }
  wis: { score: 10, save: 0 }
  cha: { score: 5, save: -3 }
skills: { stealth: 2 }
damage_resistances: []
damage_vulnerabilities: []
damage_immunities: []
condition_immunities: []
senses: { passive_perception: 10 }
languages: []
cr: { value: 0.5, xp: 100, proficiency_bonus: 2 }
traits: []
actions:
  - id: a_bite
    name: Bite
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 4, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d8", modifier: 2, type: piercing, average: 6 }
