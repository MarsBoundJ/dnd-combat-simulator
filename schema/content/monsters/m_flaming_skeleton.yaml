# m_flaming_skeleton — Flaming Skeleton
# Source: 2024 Monster Manual (MM-only; not in SRD 5.2.1)
# Triage: GREEN — Multiattack 2× [Flame Scepter (Bludgeoning + Fire) or Hurl
#   Flame (Fire ranged)].
#   DEFERRED: Death Burst (on-death 10-ft emanation; no on-death AoE in v1).

id: m_flaming_skeleton
name: Flaming Skeleton
source: mm_2024

size: medium
creature_type: undead
alignment: lawful evil

combat:
  armor_class: 15
  hit_points: { average: 65, dice: "10d8", con_contribution: 20 }
  speed: { walk: 30 }
  initiative: { modifier: 2, score: 12 }

abilities:
  str: { score: 10, save: 0 }
  dex: { score: 14, save: 2 }
  con: { score: 15, save: 2 }
  int: { score: 10, save: 0 }
  wis: { score: 15, save: 2 }
  cha: { score: 8, save: -1 }

damage_vulnerabilities: [bludgeoning]
damage_immunities: [fire, poison]
condition_immunities: [co_exhaustion, co_poisoned]

senses: { passive_perception: 12, special: { darkvision: 60 } }

cr: { value: 3, xp: 700, proficiency_bonus: 2 }

habitat: [shadowfell, underdark, urban]
treasure: none

traits:
  - id: t_death_burst
    name: Death Burst
    type: trait_passive
  - id: t_illumination
    name: Illumination
    type: trait_passive

actions:
  - id: a_multiattack
    name: Multiattack
    type: multiattack
    count: 2
    sub_actions: ["a_flame_scepter"]

  - id: a_flame_scepter
    name: Flame Scepter
    type: weapon_attack
    is_signature: true
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 4, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d6", modifier: 2, type: bludgeoning, average: 5 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: damage
        params: { dice: "1d6", modifier: 0, type: fire, average: 3 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

  - id: a_hurl_flame
    name: Hurl Flame
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: ranged, bonus: 4, reach_ft: 60 }
      - primitive: damage
        params: { dice: "1d10", modifier: 2, type: fire, average: 7 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

behavior_profile:
  archetype: artillery
  presets: { retreat: cowardly, ability_selection: default, targeting: weakest_target, action_economy: aggressive }
