# m_tiger — Tiger
# Source: SRD CC v5.2.1 p334
# Triage: GREEN — Rend knocks Prone (existing co_prone) on a hit; Nimble
# Escape bonus action (Disengage/Hide).
id: m_tiger
name: Tiger
source: srd_5.2.1
size: large
creature_type: beast
alignment: unaligned
combat:
  armor_class: 13
  hit_points: { average: 30, dice: "4d10", con_contribution: 8 }
  speed: { walk: 40 }
  initiative: { modifier: 3, score: 13 }
abilities:
  str: { score: 17, save: 3 }
  dex: { score: 16, save: 3 }
  con: { score: 14, save: 2 }
  int: { score: 3, save: -4 }
  wis: { score: 12, save: 1 }
  cha: { score: 8, save: -1 }
skills: { perception: 3, stealth: 7 }
damage_resistances: []
damage_vulnerabilities: []
damage_immunities: []
condition_immunities: []
senses: { passive_perception: 13, special: { darkvision: 60 } }
languages: []
cr: { value: 1, xp: 200, proficiency_bonus: 2 }
traits: []
actions:
  - id: a_rend
    name: Rend
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 5, reach_ft: 5 }
      - primitive: damage
        params: { dice: "2d6", modifier: 3, type: slashing, average: 10 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: apply_condition
        params: { condition_id: co_prone, duration: until_removed }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
bonus_actions:
  - id: ba_nimble_escape
    name: Nimble Escape
    type: choose_action
    options:
      - granted_action: disengage
      - granted_action: hide
behavior_profile:
  archetype: apex_predator
  presets: { retreat: ftd, ability_selection: default, targeting: weakest_target, action_economy: casual }
