# m_wyvern — Wyvern
# Source: SRD CC v5.2.1 p343
# Triage: GREEN — Multiattack (Bite + Sting); Sting applies the existing
# co_poisoned on a hit. No defer-trigger keywords. Fly 80 omitted (walk
# stand-in per the movement-approximation rule).

id: m_wyvern
name: Wyvern
source: srd_5.2.1

size: large
creature_type: dragon
alignment: unaligned

combat:
  armor_class: 14
  hit_points:
    average: 127
    dice: "15d10"
    con_contribution: 45
  speed:
    walk: 30
    fly: 80
  initiative:
    modifier: 0
    score: 10

abilities:
  str: { score: 19, save: 4 }
  dex: { score: 10, save: 0 }
  con: { score: 16, save: 3 }
  int: { score: 5, save: -3 }
  wis: { score: 12, save: 1 }
  cha: { score: 6, save: -2 }

skills:
  perception: 4
damage_resistances: []
damage_vulnerabilities: []
damage_immunities: []
condition_immunities: []

senses:
  passive_perception: 14
  special:
    darkvision: 120

languages: []

cr:
  value: 6
  xp: 2300
  proficiency_bonus: 3

traits: []

actions:
  - id: a_multiattack
    name: Multiattack
    type: multiattack
    count: 2
    sub_actions: [a_bite, a_sting]

  - id: a_bite
    name: Bite
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 7, reach_ft: 5 }
      - primitive: damage
        params: { dice: "2d8", modifier: 4, type: piercing, average: 13 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

  - id: a_sting
    name: Sting
    type: weapon_attack
    # On a hit, 2d6+4 piercing + 7d6 poison, and the target has the
    # Poisoned condition until the start of the wyvern's next turn.
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 7, reach_ft: 10 }
      - primitive: damage
        params: { dice: "2d6", modifier: 4, type: piercing, average: 11 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: damage
        params: { dice: "7d6", modifier: 0, type: poison, average: 24 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: apply_condition
        params: { condition_id: co_poisoned, duration: until_actor_next_turn_start }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

behavior_profile:
  archetype: apex_predator
  presets:
    retreat: ftd
    ability_selection: default
    targeting: weakest_target
    action_economy: casual
