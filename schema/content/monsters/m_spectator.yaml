# m_spectator — Spectator
# Source: 2024 Monster Manual (MM-only; not in SRD 5.2.1)
# Triage: GREEN — Wounding Ray modeled as forced-save (CON DC 12 → 3d10
#   Necrotic, half on success); Bite standalone melee.
#   DEFERRED: random ray selection (4 ray types; no random-pick primitive in v1);
#   Spell Reflection reaction (no reaction-trigger primitive in v1).

id: m_spectator
name: Spectator
source: mm_2024

size: medium
creature_type: aberration
alignment: lawful neutral

combat:
  armor_class: 14
  hit_points: { average: 45, dice: "7d8", con_contribution: 14 }
  speed: { walk: 5, fly: 30 }
  initiative: { modifier: 2, score: 12 }

abilities:
  str: { score: 8, save: -1 }
  dex: { score: 14, save: 2 }
  con: { score: 14, save: 2 }
  int: { score: 13, save: 1 }
  wis: { score: 14, save: 2 }
  cha: { score: 11, save: 0 }

skills: { perception: 6 }

condition_immunities: [co_exhaustion, co_prone]

senses: { passive_perception: 16, special: { darkvision: 120 } }
languages: ["Deep Speech", "Undercommon"]

cr: { value: 3, xp: 700, proficiency_bonus: 2 }

habitat: [underdark]
treasure: any

actions:
  - id: a_multiattack
    name: Multiattack
    type: multiattack
    count: 2
    sub_actions: ["a_wounding_ray"]

  - id: a_wounding_ray
    name: Wounding Ray
    type: save_effect
    is_signature: true
    pipeline:
      - primitive: forced_save
        params:
          ability: constitution
          dc: 12
          affected: current_target
          on_fail:
            - primitive: damage
              params: { dice: "3d10", modifier: 0, type: necrotic, average: 17 }
          on_success:
            - primitive: damage
              params: { dice: "3d10", modifier: 0, type: necrotic, average: 17, multiplier: 0.5 }

  - id: a_bite
    name: Bite
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 4, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d6", modifier: 2, type: piercing, average: 5 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

behavior_profile:
  archetype: artillery
  presets: { retreat: cowardly, ability_selection: default, targeting: weakest_target, action_economy: aggressive }
