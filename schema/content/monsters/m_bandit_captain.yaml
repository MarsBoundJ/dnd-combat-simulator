# m_bandit_captain — Bandit Captain
# Source: SRD CC v5.2.1 p262
# Triage: GREEN (core) — Multiattack of weapon attacks; no defer-trigger keywords.
# Built WITHOUT the "Parry" reaction (reactive AC bonus) — logged in
# MONSTERS_NEED_ENGINE_WORK.md under "Reaction abilities".

id: m_bandit_captain
name: Bandit Captain
source: srd_5.2.1

size: medium
creature_type: humanoid
alignment: neutral

combat:
  armor_class: 15
  hit_points:
    average: 52
    dice: "8d8"
    con_contribution: 16
  speed:
    walk: 30
  initiative:
    modifier: 3
    score: 13

abilities:
  str: { score: 15, save: 4 }
  dex: { score: 16, save: 5 }
  con: { score: 14, save: 2 }
  int: { score: 14, save: 2 }
  wis: { score: 11, save: 2 }
  cha: { score: 14, save: 2 }

skills:
  athletics: 4
  deception: 4
damage_resistances: []
damage_vulnerabilities: []
damage_immunities: []
condition_immunities: []

gear: [pistol, scimitar, studded_leather_armor]

senses:
  passive_perception: 10

languages: [common, thieves_cant]

cr:
  value: 2
  xp: 450
  proficiency_bonus: 2

traits: []

actions:
  - id: a_multiattack
    name: Multiattack
    type: multiattack
    count: 2
    sub_actions: [a_scimitar, a_pistol]

  - id: a_scimitar
    name: Scimitar
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 5, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d6", modifier: 3, type: slashing, average: 6 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

  - id: a_pistol
    name: Pistol
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: ranged, bonus: 5, range: [30, 90] }
      - primitive: damage
        params: { dice: "1d10", modifier: 3, type: piercing, average: 8 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

behavior_profile:
  archetype: cunning_tactician
  presets:
    retreat: default
    ability_selection: default
    targeting: weakest_target
    action_economy: skilled
