# m_adult_bronze_dragon — Adult Bronze Dragon
# Source: SRD CC v5.2.1 p269-270
# Triage: GREEN for core kit — Multiattack of Rend (+ lightning rider),
# recharge Lightning Breath (DEX-save line), at-will Repulsion Breath
# (STR-save cone → pushed + Prone), Legendary Resistance (3/Day),
# Legendary Actions (Thunderclap save + Pounce Rend).
# DEFERRED (see MONSTERS_NEED_ENGINE_WORK.md): **Guiding Bolt** (its
# at-will offensive spell — a spell-ATTACK marker feature with no
# action_template, so monster_spellcasting can't expand it; not built as a
# cast action); the utility/innate spells (Detect Magic, Thaumaturgy,
# Speak with Animals, Shapechange, 1/Day Detect Thoughts / Water Breathing
# — non-combat or unbuilt); the Guiding Light legendary action (casts
# Guiding Bolt). Thunderclap applies Deafened; Fly/Swim omitted (walk
# stand-in).
id: m_adult_bronze_dragon
name: Adult Bronze Dragon
source: srd_5.2.1
size: huge
creature_type: dragon
type_tags: [metallic]
alignment: lawful_good
combat:
  armor_class: 18
  hit_points: { average: 212, dice: "17d12", con_contribution: 102 }
  speed: { walk: 40 }
  initiative: { modifier: 10, score: 20 }
abilities:
  str: { score: 25, save: 7 }
  dex: { score: 10, save: 5 }
  con: { score: 23, save: 6 }
  int: { score: 16, save: 3 }
  wis: { score: 15, save: 7 }
  cha: { score: 20, save: 5 }
skills: { insight: 7, perception: 12, stealth: 5 }
damage_resistances: []
damage_vulnerabilities: []
damage_immunities: [lightning]
condition_immunities: []
senses: { passive_perception: 22, special: { blindsight: 60, darkvision: 120 } }
languages: [common, draconic]
cr: { value: 15, xp: 13000, proficiency_bonus: 5 }
legendary_resistance: { uses: 3 }
traits:
  - id: t_amphibious
    name: Amphibious
    type: trait_passive
actions:
  - id: a_multiattack
    name: Multiattack
    type: multiattack
    count: 3
    sub_actions: [a_rend]
  - id: a_rend
    name: Rend
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 12, reach_ft: 10 }
      - primitive: damage
        params: { dice: "2d8", modifier: 7, type: slashing, average: 16 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: damage
        params: { dice: "1d10", modifier: 0, type: lightning, average: 5 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
  - id: a_lightning_breath
    name: Lightning Breath
    type: aoe_attack
    recharge: "5-6"
    area: { shape: line, length_ft: 90, width_ft: 5 }
    pipeline:
      - primitive: forced_save
        params:
          ability: dexterity
          dc: 19
          affected: all_creatures_in_area
          on_fail:
            - primitive: damage
              params: { dice: "10d10", modifier: 0, type: lightning, average: 55 }
          on_success:
            - primitive: damage
              params: { dice: "10d10", modifier: 0, type: lightning, average: 55, multiplier: 0.5 }
  - id: a_repulsion_breath
    name: Repulsion Breath
    type: aoe_attack
    # at-will STR-save cone → pushed 60 ft + Prone.
    area: { shape: cone, length_ft: 30 }
    pipeline:
      - primitive: forced_save
        params:
          ability: strength
          dc: 19
          affected: all_creatures_in_area
          on_fail:
            - primitive: forced_movement
              params: { distance_ft: 60 }
            - primitive: apply_condition
              params: { condition_id: co_prone, duration: until_removed }
          on_success: []
legendary_actions:
  uses_per_round: 3
  options:
    - id: la_thunderclap
      name: Thunderclap
      type: aoe_attack
      # CON save DC 17, 20-ft-radius Sphere within 90 ft.
      area: { shape: sphere, radius_ft: 20, range_ft: 90 }
      pipeline:
        - primitive: forced_save
          params:
            ability: constitution
            dc: 17
            affected: all_creatures_in_area
            on_fail:
              - primitive: damage
                params: { dice: "3d6", modifier: 0, type: thunder, average: 10 }
              - primitive: apply_condition
                params: { condition_id: co_deafened, duration: until_actor_next_turn_start }
            on_success: []
    - id: la_pounce
      name: Pounce
      type: multiattack
      count: 1
      sub_actions: [a_rend]
behavior_profile:
  archetype: apex_predator
  presets: { retreat: ftd, ability_selection: default, targeting: weakest_target, action_economy: skilled }
