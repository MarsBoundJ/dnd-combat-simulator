# m_bugbear_stalker — Bugbear Stalker
# Source: SRD CC v5.2.1 p272
# Triage: GREEN — Multiattack of weapon attacks; Quick Grapple is a
# forced_save (DEX DC 13) applying the existing co_grappled. Abduct is a
# declarative trait. The Morningstar's "Advantage if Grappled" rider is
# noted but not enforced.

id: m_bugbear_stalker
name: Bugbear Stalker
source: srd_5.2.1

size: medium
creature_type: fey
type_tags: [goblinoid]
alignment: chaotic_evil

combat:
  armor_class: 15
  hit_points:
    average: 65
    dice: "10d8"
    con_contribution: 20
  speed:
    walk: 30
  initiative:
    modifier: 2
    score: 12

abilities:
  str: { score: 17, save: 3 }
  dex: { score: 14, save: 2 }
  con: { score: 14, save: 4 }
  int: { score: 11, save: 0 }
  wis: { score: 12, save: 3 }
  cha: { score: 11, save: 0 }

skills:
  stealth: 6
  survival: 3
damage_resistances: []
damage_vulnerabilities: []
damage_immunities: []
condition_immunities: []

gear: [chain_shirt, javelin, morningstar]

senses:
  passive_perception: 11
  special:
    darkvision: 60

languages: [common, goblin]

cr:
  value: 3
  xp: 700
  proficiency_bonus: 2

traits:
  - id: t_abduct
    name: Abduct
    type: trait_passive
    # Declarative: needn't spend extra movement to move a grappled creature.

actions:
  - id: a_multiattack
    name: Multiattack
    type: multiattack
    count: 2
    sub_actions: [a_morningstar, a_javelin]

  - id: a_javelin
    name: Javelin
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 5, reach_ft: 10, range: [30, 120] }
      - primitive: damage
        params: { dice: "3d6", modifier: 3, type: piercing, average: 13 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

  - id: a_morningstar
    name: Morningstar
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 5, reach_ft: 10 }
      - primitive: damage
        params: { dice: "2d8", modifier: 3, type: piercing, average: 12 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

bonus_actions:
  - id: ba_quick_grapple
    name: Quick Grapple
    type: save_effect
    # DEX save DC 13, one Medium-or-smaller creature within 10 ft; on a
    # fail it has the Grappled condition (escape DC 13).
    pipeline:
      - primitive: forced_save
        params:
          ability: dexterity
          dc: 13
          affected: current_target
          on_fail:
            - primitive: apply_condition
              params: { condition_id: co_grappled, duration: until_removed }
          on_success: []

behavior_profile:
  archetype: cunning_tactician
  presets:
    retreat: ftd
    ability_selection: default
    targeting: weakest_target
    action_economy: skilled
