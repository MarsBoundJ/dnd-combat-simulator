# m_swarm_of_larvae — Swarm of Larvae
# Source: 2024 Monster Manual (MM-only; not in SRD 5.2.1)
# Triage: GREEN — Bites (Necrotic). BPS resistances + broad condition immunity.
#   DEFERRED: bloodied half-damage (no bloodied state in v1).

id: m_swarm_of_larvae
name: Swarm of Larvae
source: mm_2024

size: medium
creature_type: fiend
alignment: chaotic evil

type_tags: [swarm]

combat:
  armor_class: 13
  hit_points: { average: 22, dice: "3d10", con_contribution: 6 }
  speed: { walk: 20 }
  initiative: { modifier: 2, score: 12 }

abilities:
  str: { score: 14, save: 2 }
  dex: { score: 14, save: 2 }
  con: { score: 14, save: 2 }
  int: { score: 1, save: -5 }
  wis: { score: 5, save: -3 }
  cha: { score: 1, save: -5 }

damage_resistances: [bludgeoning, piercing, slashing]
damage_immunities: [poison]
condition_immunities: [co_charmed, co_exhaustion, co_frightened, co_grappled, co_paralyzed, co_petrified, co_poisoned, co_prone, co_restrained, co_stunned]

senses: { passive_perception: 7 }

cr: { value: 1, xp: 200, proficiency_bonus: 2 }

habitat: [lower_planes]
treasure: none

actions:
  - id: a_bites
    name: Bites
    type: weapon_attack
    is_signature: true
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 4, reach_ft: 5 }
      - primitive: damage
        params: { dice: "2d6", modifier: 2, type: necrotic, average: 9 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

behavior_profile:
  archetype: brute
  presets: { retreat: never, ability_selection: default, targeting: closest_enemy, action_economy: aggressive }
