# m_adult_gold_dragon — Adult Gold Dragon
# Source: SRD CC v5.2.1 p290-291
# Triage: GREEN for core kit — Multiattack of Rend (+ fire rider), recharge
# Fire Breath (DEX-save cone), Legendary Resistance (3/Day), Legendary
# Actions (Banish save + Pounce Rend) and a 1/Day Flame Strike cast (via
# `casts: f_flame_strike` + recharge "daily:1").
# DEFERRED (see MONSTERS_NEED_ENGINE_WORK.md): **Weakening Breath**
# (STR-disadvantage + damage-penalty debuff → no primitive; known defer —
# Gold ships with NO secondary breath); **Guiding Bolt** (at-will offensive
# spell — a spell-ATTACK marker feature with no action_template, can't be
# expanded by monster_spellcasting); the utility/innate spells (Detect
# Magic, Shapechange, 1/Day Zone of Truth — non-combat or unbuilt); the
# Guiding Light legendary action (casts Guiding Bolt). Banish applies
# Incapacitated; its demiplane-teleport rider has no engine hook. Fly/Swim
# omitted (walk stand-in).
id: m_adult_gold_dragon
name: Adult Gold Dragon
source: srd_5.2.1
size: huge
creature_type: dragon
type_tags: [metallic]
alignment: lawful_good
combat:
  armor_class: 19
  hit_points: { average: 243, dice: "18d12", con_contribution: 126 }
  speed: { walk: 40 }
  initiative: { modifier: 14, score: 24 }
abilities:
  str: { score: 27, save: 8 }
  dex: { score: 14, save: 8 }
  con: { score: 25, save: 7 }
  int: { score: 16, save: 3 }
  wis: { score: 15, save: 8 }
  cha: { score: 24, save: 7 }
skills: { insight: 8, perception: 14, persuasion: 13, stealth: 8 }
damage_resistances: []
damage_vulnerabilities: []
damage_immunities: [fire]
condition_immunities: []
senses: { passive_perception: 24, special: { blindsight: 60, darkvision: 120 } }
languages: [common, draconic]
cr: { value: 17, xp: 18000, proficiency_bonus: 6 }
legendary_resistance: { uses: 3 }
spellcasting: { ability: charisma, save_dc: 21 }
traits:
  - id: t_amphibious
    name: Amphibious
    type: trait_passive
actions:
  - id: a_multiattack
    name: Multiattack
    type: multiattack
    count: 3
    sub_actions: [a_rend]
  - id: a_rend
    name: Rend
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 14, reach_ft: 10 }
      - primitive: damage
        params: { dice: "2d8", modifier: 8, type: slashing, average: 17 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: damage
        params: { dice: "1d8", modifier: 0, type: fire, average: 4 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
  - id: a_fire_breath
    name: Fire Breath
    type: aoe_attack
    recharge: "5-6"
    area: { shape: cone, length_ft: 60 }
    pipeline:
      - primitive: forced_save
        params:
          ability: dexterity
          dc: 21
          affected: all_creatures_in_area
          on_fail:
            - primitive: damage
              params: { dice: "12d10", modifier: 0, type: fire, average: 66 }
          on_success:
            - primitive: damage
              params: { dice: "12d10", modifier: 0, type: fire, average: 66, multiplier: 0.5 }
  - id: a_cast_flame_strike
    name: Flame Strike
    casts: f_flame_strike
    recharge: "daily:1"
legendary_actions:
  uses_per_round: 3
  options:
    - id: la_banish
      name: Banish
      type: save_effect
      # CHA save DC 21, one creature within 120 ft → Force damage +
      # Incapacitated (the harmless-demiplane teleport rider has no hook).
      pipeline:
        - primitive: forced_save
          params:
            ability: charisma
            dc: 21
            affected: current_target
            on_fail:
              - primitive: damage
                params: { dice: "3d6", modifier: 0, type: force, average: 10 }
              - primitive: apply_condition
                params: { condition_id: co_incapacitated, duration: until_actor_next_turn_start }
            on_success: []
    - id: la_pounce
      name: Pounce
      type: multiattack
      count: 1
      sub_actions: [a_rend]
behavior_profile:
  archetype: apex_predator
  presets: { retreat: ftd, ability_selection: default, targeting: weakest_target, action_economy: skilled }
