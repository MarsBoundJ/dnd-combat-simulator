# m_swarm_of_venomous_snakes — Swarm of Venomous Snakes
# Source: SRD CC v5.2.1
# Triage: GREEN — single Bites (piercing + poison). Swarm declarative; the half-damage-while-Bloodied clause is noted, not modeled. Swim via walk.

id: m_swarm_of_venomous_snakes
name: Swarm of Venomous Snakes
source: srd_5.2.1

size: medium
creature_type: beast
type_tags: [swarm]
alignment: unaligned

combat:
  armor_class: 14
  hit_points: { average: 36, dice: "8d8", con_contribution: 0 }
  speed: { walk: 30, swim: 30 }
  initiative: { modifier: 4, score: 14 }

abilities:
  str: { score: 8, save: -1 }
  dex: { score: 18, save: 4 }
  con: { score: 11, save: 0 }
  int: { score: 1, save: -5 }
  wis: { score: 10, save: 0 }
  cha: { score: 3, save: -4 }

skills: {}
damage_resistances: [bludgeoning, piercing, slashing]
damage_vulnerabilities: []
damage_immunities: []
condition_immunities: [co_charmed, co_frightened, co_grappled, co_paralyzed, co_petrified, co_prone, co_restrained, co_stunned]

senses: { passive_perception: 10, special: { blindsight: 10 } }
languages: []

cr: { value: 2, xp: 450, proficiency_bonus: 2 }

traits:
  - id: t_swarm
    name: Swarm
    type: trait_passive
    # Occupies/shares spaces; can't regain HP or gain temp HP.

actions:
  - id: a_bites
    name: Bites
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 6, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d8", modifier: 4, type: piercing, average: 8 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: damage
        params: { dice: "3d6", modifier: 0, type: poison, average: 10 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

behavior_profile:
  archetype: mindless_aggressor
  presets: { retreat: cowardly, ability_selection: default, targeting: closest_enemy, action_economy: casual }
