# m_kuo_toa — Kuo-toa
# Source: 2024 Monster Manual (MM-only; not in SRD 5.2.1)
# Triage: GREEN — Spear + Sticky Net (1/Day, DEX save → Restrained).
#   DEFERRED: Amphibious / Sunlight Sensitivity (declarative). Sticky Shield
#   reaction modeled as a simplified STR-save Grapple on a triggering miss.

id: m_kuo_toa
name: Kuo-toa
source: mm_2024

size: medium
creature_type: aberration
alignment: neutral evil

combat:
  armor_class: 13
  hit_points: { average: 18, dice: "4d8", con_contribution: 0 }
  speed: { walk: 30, swim: 30 }
  initiative: { modifier: 0, score: 10 }

abilities:
  str: { score: 13, save: 1 }
  dex: { score: 10, save: 0 }
  con: { score: 11, save: 0 }
  int: { score: 11, save: 0 }
  wis: { score: 10, save: 0 }
  cha: { score: 8, save: -1 }

skills: { perception: 4 }
gear: ["Spear"]

senses: { passive_perception: 14, special: { darkvision: 120, truesight: 30 } }
languages: ["Undercommon"]

cr: { value: 0.25, xp: 50, proficiency_bonus: 2 }

habitat: [coastal, underdark]
treasure: relics

traits:
  - id: t_amphibious
    name: Amphibious
    type: trait_passive
  - id: t_sunlight_sensitivity
    name: Sunlight Sensitivity
    type: trait_passive

actions:
  - id: a_spear
    name: Spear
    type: weapon_attack
    is_signature: true
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 3, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d8", modifier: 1, type: piercing, average: 5 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

  - id: a_sticky_net
    name: Sticky Net
    type: save_effect
    recharge: "daily:1"
    pipeline:
      - primitive: forced_save
        params:
          ability: dexterity
          dc: 10
          affected: current_target
          on_fail:
            - primitive: apply_condition
              params: { condition_id: co_restrained, duration: until_removed }
          on_success: []

reactions:
  - id: r_sticky_shield
    name: Sticky Shield
    type: save_effect
    is_reactive_trigger: true
    trigger: { event: attack_resolved, condition: "combat.attack_state == miss" }
    pipeline:
      - primitive: forced_save
        params:
          ability: strength
          dc: 11
          affected: current_target
          on_fail:
            - primitive: apply_condition
              params: { condition_id: co_grappled, duration: until_removed }
          on_success: []

behavior_profile:
  archetype: skirmisher
  presets: { retreat: cowardly, ability_selection: default, targeting: closest_enemy, action_economy: casual }
