# m_zombie — Zombie
# Source: SRD CC v5.2.1 p344
# Triage: GREEN (core) — single weapon attack; declarative immunities.
# Built WITHOUT the "Undead Fortitude" trait (drop-to-1-HP on a CON save
# when reduced to 0) — a triggered death-prevention effect logged in
# MONSTERS_NEED_ENGINE_WORK.md under "On-death / triggered effects".

id: m_zombie
name: Zombie
source: srd_5.2.1

size: medium
creature_type: undead
alignment: neutral_evil

combat:
  armor_class: 8
  hit_points:
    average: 15
    dice: "2d8"
    con_contribution: 6
  speed:
    walk: 20
  initiative:
    modifier: -2
    score: 8

abilities:
  str: { score: 13, save: 1 }
  dex: { score: 6, save: -2 }
  con: { score: 16, save: 3 }
  int: { score: 3, save: -4 }
  wis: { score: 6, save: 0 }
  cha: { score: 5, save: -3 }

skills: {}
damage_resistances: []
damage_vulnerabilities: []
damage_immunities: [poison]
condition_immunities: [co_exhaustion, co_poisoned]

senses:
  passive_perception: 8
  special:
    darkvision: 60

languages: [common]

cr:
  value: 0.25
  xp: 50
  proficiency_bonus: 2

traits: []

actions:
  - id: a_slam
    name: Slam
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 3, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d8", modifier: 1, type: bludgeoning, average: 5 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

behavior_profile:
  archetype: mindless_aggressor
  presets:
    retreat: ftd
    ability_selection: default
    targeting: closest_enemy
    action_economy: casual
