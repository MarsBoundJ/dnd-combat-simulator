# m_yuan_ti_infiltrator — Yuan-ti Infiltrator
# Source: 2024 Monster Manual (MM-only; not in SRD 5.2.1)
# Triage: GREEN — Multiattack 2× Scimitar (Slashing); Poison Ray (ranged Poison).
#   DEFERRED: spellcasting (Suggestion, Command not in library); Magic Resistance
#   (no magic-tracking in v1).

id: m_yuan_ti_infiltrator
name: Yuan-ti Infiltrator
source: mm_2024

size: medium
creature_type: monstrosity
alignment: neutral evil

combat:
  armor_class: 11
  hit_points: { average: 40, dice: "9d8", con_contribution: 0 }
  speed: { walk: 30 }
  initiative: { modifier: 1, score: 11 }

abilities:
  str: { score: 12, save: 1 }
  dex: { score: 12, save: 1 }
  con: { score: 11, save: 0 }
  int: { score: 14, save: 2 }
  wis: { score: 13, save: 1 }
  cha: { score: 14, save: 2 }

skills: { deception: 4, perception: 3, stealth: 3 }
damage_immunities: [poison]
condition_immunities: [co_poisoned]

senses: { passive_perception: 13, special: { darkvision: 60 } }
languages: ["Abyssal", "Common", "Draconic"]

cr: { value: 1, xp: 200, proficiency_bonus: 2 }

habitat: [desert, forest, swamp, urban]
treasure: relics

traits:
  - id: t_magic_resistance
    name: Magic Resistance
    type: trait_passive

actions:
  - id: a_multiattack
    name: Multiattack
    type: multiattack
    count: 2
    sub_actions: ["a_scimitar"]

  - id: a_scimitar
    name: Scimitar
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 3, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d6", modifier: 1, type: slashing, average: 4 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

  - id: a_poison_ray
    name: Poison Ray
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: ranged, bonus: 4, reach_ft: 120 }
      - primitive: damage
        params: { dice: "2d6", modifier: 2, type: poison, average: 9 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

behavior_profile:
  archetype: skirmisher
  presets: { retreat: cowardly, ability_selection: default, targeting: weakest_target, action_economy: casual }
