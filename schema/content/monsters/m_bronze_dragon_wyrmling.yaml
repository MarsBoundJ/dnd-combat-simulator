# m_bronze_dragon_wyrmling — Bronze Dragon Wyrmling
# Source: SRD CC v5.2.1 p270
# Triage: GREEN — Multiattack of Rend + recharge Lightning Breath
# (DEX-save line) + at-will Repulsion Breath (STR-save cone → pushed
# 30 ft + Prone). Lightning immunity + Amphibious declarative. Fly/Swim omitted.
id: m_bronze_dragon_wyrmling
name: Bronze Dragon Wyrmling
source: srd_5.2.1
size: medium
creature_type: dragon
type_tags: [metallic]
alignment: lawful_good
combat:
  armor_class: 15
  hit_points: { average: 39, dice: "6d8", con_contribution: 12 }
  speed: { walk: 30, fly: 60, swim: 30 }
  initiative: { modifier: 2, score: 12 }
abilities:
  str: { score: 17, save: 3 }
  dex: { score: 10, save: 2 }
  con: { score: 15, save: 2 }
  int: { score: 12, save: 1 }
  wis: { score: 11, save: 2 }
  cha: { score: 15, save: 2 }
skills: { perception: 4, stealth: 2 }
damage_resistances: []
damage_vulnerabilities: []
damage_immunities: [lightning]
condition_immunities: []
senses: { passive_perception: 14, special: { blindsight: 10, darkvision: 60 } }
languages: [draconic]
cr: { value: 2, xp: 450, proficiency_bonus: 2 }
traits: []
actions:
  - id: a_multiattack
    name: Multiattack
    type: multiattack
    count: 2
    sub_actions: [a_rend]
  - id: a_rend
    name: Rend
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 5, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d10", modifier: 3, type: slashing, average: 8 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
  - id: a_lightning_breath
    name: Lightning Breath
    type: aoe_attack
    recharge: "5-6"
    area: { shape: line, length_ft: 40, width_ft: 5 }
    pipeline:
      - primitive: forced_save
        params:
          ability: dexterity
          dc: 12
          affected: all_creatures_in_area
          on_fail:
            - primitive: damage
              params: { dice: "3d10", modifier: 0, type: lightning, average: 16 }
          on_success:
            - primitive: damage
              params: { dice: "3d10", modifier: 0, type: lightning, average: 16, multiplier: 0.5 }
  - id: a_repulsion_breath
    name: Repulsion Breath
    type: aoe_attack
    area: { shape: cone, length_ft: 30 }
    pipeline:
      - primitive: forced_save
        params:
          ability: strength
          dc: 12
          affected: all_creatures_in_area
          on_fail:
            - primitive: forced_movement
              params: { distance_ft: 30 }
            - primitive: apply_condition
              params: { condition_id: co_prone, duration: until_removed }
          on_success: []
behavior_profile:
  archetype: apex_predator
  presets: { retreat: ftd, ability_selection: default, targeting: weakest_target, action_economy: skilled }
