# m_cultist — Cultist
# Source: SRD CC v5.2.1 p277
# Triage: GREEN — single weapon attack, no traits, no spellcasting (the
# Cultist Fanatic has Spellcasting; the base Cultist does not).

id: m_cultist
name: Cultist
source: srd_5.2.1

size: medium
creature_type: humanoid
alignment: neutral

combat:
  armor_class: 12
  hit_points:
    average: 9
    dice: "2d8"
    con_contribution: 0
  speed:
    walk: 30
  initiative:
    modifier: 1
    score: 11

abilities:
  str: { score: 11, save: 0 }
  dex: { score: 12, save: 1 }
  con: { score: 10, save: 0 }
  int: { score: 10, save: 0 }
  wis: { score: 11, save: 2 }
  cha: { score: 10, save: 0 }

skills:
  deception: 2
  religion: 2
damage_resistances: []
damage_vulnerabilities: []
damage_immunities: []
condition_immunities: []

gear: [leather_armor, sickle]

senses:
  passive_perception: 10

languages: [common]

cr:
  value: 0.125
  xp: 25
  proficiency_bonus: 2

traits: []

actions:
  - id: a_ritual_sickle
    name: Ritual Sickle
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 3, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d4", modifier: 1, type: slashing, average: 3 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: damage
        params: { dice: "0", modifier: 1, type: necrotic, average: 1 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

behavior_profile:
  archetype: berserker_fanatic
  presets:
    retreat: ftd
    ability_selection: default
    targeting: closest_enemy
    action_economy: casual
