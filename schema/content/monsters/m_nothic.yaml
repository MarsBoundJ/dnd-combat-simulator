# m_nothic — Nothic
# Source: 2024 Monster Manual (MM-only; not in SRD 5.2.1)
# Triage: GREEN — Multiattack 2× Claw (Slashing); Rotting Gaze (CON DC 13 → 5d6
#   Necrotic, half on success).
#   DEFERRED: Weird Insight bonus action (information-gathering; no engine hook).

id: m_nothic
name: Nothic
source: mm_2024

size: medium
creature_type: aberration
alignment: neutral evil

combat:
  armor_class: 15
  hit_points: { average: 45, dice: "6d8", con_contribution: 18 }
  speed: { walk: 30 }
  initiative: { modifier: 3, score: 13 }

abilities:
  str: { score: 14, save: 2 }
  dex: { score: 16, save: 3 }
  con: { score: 16, save: 3 }
  int: { score: 13, save: 1 }
  wis: { score: 10, save: 0 }
  cha: { score: 8, save: -1 }

skills: { arcana: 3, insight: 4, perception: 4, stealth: 5 }

senses: { passive_perception: 14, special: { truesight: 120 } }
languages: ["Undercommon"]

cr: { value: 2, xp: 450, proficiency_bonus: 2 }

habitat: [underdark]
treasure: arcana

actions:
  - id: a_multiattack
    name: Multiattack
    type: multiattack
    count: 2
    sub_actions: ["a_claw"]

  - id: a_claw
    name: Claw
    type: weapon_attack
    is_signature: true
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 5, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d10", modifier: 3, type: slashing, average: 8 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

  - id: a_rotting_gaze
    name: Rotting Gaze
    type: save_effect
    pipeline:
      - primitive: forced_save
        params:
          ability: constitution
          dc: 13
          affected: current_target
          on_fail:
            - primitive: damage
              params: { dice: "5d6", modifier: 0, type: necrotic, average: 17 }
          on_success:
            - primitive: damage
              params: { dice: "5d6", modifier: 0, type: necrotic, average: 17, multiplier: 0.5 }

behavior_profile:
  archetype: skirmisher
  presets: { retreat: cowardly, ability_selection: default, targeting: weakest_target, action_economy: aggressive }
