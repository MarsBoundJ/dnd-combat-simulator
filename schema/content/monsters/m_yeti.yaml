# m_yeti — Yeti
# Source: 2024 Monster Manual (MM-only; not in SRD 5.2.1)
# Triage: GREEN — Multiattack [Chilling Gaze + 2× Claw]; standalone Ice Throw.
#   DEFERRED: Fear of Fire (disadvantage on attacks when fire is present; no
#   lighting/fire-presence primitive in v1); Chilling Gaze immunity-on-save-success
#   (requires per-condition immunity primitive).

id: m_yeti
name: Yeti
source: mm_2024

size: large
creature_type: monstrosity
alignment: unaligned

combat:
  armor_class: 12
  hit_points: { average: 51, dice: "6d10", con_contribution: 18 }
  speed: { walk: 40, climb: 40 }
  initiative: { modifier: 1, score: 11 }

abilities:
  str: { score: 18, save: 4 }
  dex: { score: 13, save: 1 }
  con: { score: 16, save: 3 }
  int: { score: 8, save: -1 }
  wis: { score: 12, save: 1 }
  cha: { score: 7, save: -2 }

skills: { perception: 5, stealth: 5 }

damage_immunities: [cold]

senses: { passive_perception: 15, special: { darkvision: 60 } }

cr: { value: 3, xp: 700, proficiency_bonus: 2 }

habitat: [arctic]
treasure: any

traits:
  - id: t_fear_of_fire
    name: Fear of Fire
    type: trait_passive

actions:
  - id: a_multiattack
    name: Multiattack
    type: multiattack
    count: 3
    sub_actions: ["a_chilling_gaze", "a_claw", "a_claw"]

  - id: a_chilling_gaze
    name: Chilling Gaze
    type: save_effect
    pipeline:
      - primitive: forced_save
        params:
          ability: constitution
          dc: 13
          affected: current_target
          on_fail:
            - primitive: damage
              params: { dice: "2d4", modifier: 0, type: cold, average: 5 }
            - primitive: apply_condition
              params: { condition_id: co_paralyzed, duration: until_actor_next_turn_start }
          on_success: []

  - id: a_claw
    name: Claw
    type: weapon_attack
    is_signature: true
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 6, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d6", modifier: 4, type: slashing, average: 7 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: damage
        params: { dice: "1d6", modifier: 0, type: cold, average: 3 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

  - id: a_ice_throw
    name: Ice Throw
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: ranged, bonus: 6, reach_ft: 30 }
      - primitive: damage
        params: { dice: "1d4", modifier: 4, type: bludgeoning, average: 6 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: damage
        params: { dice: "1d4", modifier: 0, type: cold, average: 2 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

behavior_profile:
  archetype: brute
  presets: { retreat: never, ability_selection: default, targeting: closest_enemy, action_economy: aggressive }
