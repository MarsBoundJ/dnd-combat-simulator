# m_myconid_sprout — Myconid Sprout
# Source: 2024 Monster Manual (MM-only; not in SRD 5.2.1)
# Triage: GREEN for Slam (dual Bludgeoning + Poison damage steps).
#   DEFERRED: Sun Sickness (disadvantage in sunlight), Rapport Spores (utility).

id: m_myconid_sprout
name: Myconid Sprout
source: mm_2024

size: small
creature_type: plant
alignment: lawful neutral

combat:
  armor_class: 10
  hit_points: { average: 3, dice: "1d6", con_contribution: 0 }
  speed: { walk: 10 }
  initiative: { modifier: 0, score: 10 }

abilities:
  str: { score: 8, save: -1 }
  dex: { score: 10, save: 0 }
  con: { score: 10, save: 0 }
  int: { score: 8, save: -1 }
  wis: { score: 11, save: 0 }
  cha: { score: 5, save: -3 }

senses: { passive_perception: 10, special: { darkvision: 120 } }
languages: []

cr: { value: 0, xp: 10, proficiency_bonus: 2 }

habitat: [underdark]
treasure: any

traits:
  - id: t_sun_sickness
    name: Sun Sickness
    type: trait_passive

actions:
  - id: a_slam
    name: Slam
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 1, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d4", modifier: -1, type: bludgeoning, average: 1 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: damage
        params: { dice: "1d4", modifier: 0, type: poison, average: 2 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

behavior_profile:
  archetype: mindless_aggressor
  presets: { retreat: cowardly, ability_selection: default, targeting: closest_enemy, action_economy: casual }
