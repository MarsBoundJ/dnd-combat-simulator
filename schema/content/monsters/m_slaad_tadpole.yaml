# m_slaad_tadpole — Slaad Tadpole
# Source: 2024 Monster Manual (MM-only; not in SRD 5.2.1)
# Triage: GREEN — single Bite; five damage resistances recorded.
#   DEFERRED: Magic Resistance (advantage on saves vs spells; no save-modifier primitive in v1).

id: m_slaad_tadpole
name: Slaad Tadpole
source: mm_2024

size: tiny
creature_type: aberration
alignment: chaotic neutral

combat:
  armor_class: 12
  hit_points: { average: 7, dice: "3d4", con_contribution: 0 }
  speed: { walk: 30, burrow: 10 }
  initiative: { modifier: 2, score: 12 }

abilities:
  str: { score: 7, save: -2 }
  dex: { score: 15, save: 2 }
  con: { score: 10, save: 0 }
  int: { score: 3, save: -4 }
  wis: { score: 5, save: -3 }
  cha: { score: 3, save: -4 }

skills: { stealth: 4 }
damage_resistances: [acid, cold, fire, lightning, thunder]

senses: { passive_perception: 7, special: { darkvision: 60 } }
languages: []

cr: { value: 0.125, xp: 25, proficiency_bonus: 2 }

habitat: [limbo]
treasure: any

traits:
  - id: t_magic_resistance
    name: Magic Resistance
    type: trait_passive

actions:
  - id: a_bite
    name: Bite
    type: weapon_attack
    is_signature: true
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 4, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d6", modifier: 2, type: piercing, average: 5 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

behavior_profile:
  archetype: mindless_aggressor
  presets: { retreat: never, ability_selection: default, targeting: closest_enemy, action_economy: casual }
