# m_brass_dragon_wyrmling — Brass Dragon Wyrmling
# Source: SRD CC v5.2.1 p268
# Triage: GREEN — single Rend + recharge Fire Breath (DEX-save line) +
# at-will Sleep Breath (CON-save cone → Incapacitated). Fire immunity
# declarative; the Sleep Breath's escalation to Unconscious on a repeated
# failure is deferred (first failure = Incapacitated). Burrow/Fly omitted.
id: m_brass_dragon_wyrmling
name: Brass Dragon Wyrmling
source: srd_5.2.1
size: medium
creature_type: dragon
type_tags: [metallic]
alignment: chaotic_good
combat:
  armor_class: 15
  hit_points: { average: 22, dice: "4d8", con_contribution: 4 }
  speed: { walk: 30, burrow: 15, fly: 60 }
  initiative: { modifier: 2, score: 12 }
abilities:
  str: { score: 15, save: 2 }
  dex: { score: 10, save: 2 }
  con: { score: 13, save: 1 }
  int: { score: 10, save: 0 }
  wis: { score: 11, save: 2 }
  cha: { score: 13, save: 1 }
skills: { perception: 4, stealth: 2 }
damage_resistances: []
damage_vulnerabilities: []
damage_immunities: [fire]
condition_immunities: []
senses: { passive_perception: 14, special: { blindsight: 10, darkvision: 60 } }
languages: [draconic]
cr: { value: 1, xp: 200, proficiency_bonus: 2 }
traits: []
actions:
  - id: a_rend
    name: Rend
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 4, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d10", modifier: 2, type: slashing, average: 7 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
  - id: a_fire_breath
    name: Fire Breath
    type: aoe_attack
    recharge: "5-6"
    area: { shape: line, length_ft: 20, width_ft: 5 }
    pipeline:
      - primitive: forced_save
        params:
          ability: dexterity
          dc: 11
          affected: all_creatures_in_area
          on_fail:
            - primitive: damage
              params: { dice: "4d6", modifier: 0, type: fire, average: 14 }
          on_success:
            - primitive: damage
              params: { dice: "4d6", modifier: 0, type: fire, average: 14, multiplier: 0.5 }
  - id: a_sleep_breath
    name: Sleep Breath
    type: aoe_attack
    area: { shape: cone, length_ft: 15 }
    pipeline:
      - primitive: forced_save
        params:
          ability: constitution
          dc: 11
          affected: all_creatures_in_area
          on_fail:
            - primitive: apply_condition
              params: { condition_id: co_incapacitated, duration: until_actor_next_turn_start }
          on_success: []
behavior_profile:
  archetype: apex_predator
  presets: { retreat: ftd, ability_selection: default, targeting: weakest_target, action_economy: skilled }
