# m_carrion_crawler — Carrion Crawler
# Source: 2024 Monster Manual (MM-only; not in SRD 5.2.1)
# Triage: GREEN — Multiattack (Paralyzing Tentacles + Bite). Paralyzing Tentacles
#   is a CON save → Poisoned (and while Poisoned, Paralyzed); modeled as applying
#   both co_poisoned and co_paralyzed on a failed save. Spider Climb declarative.

id: m_carrion_crawler
name: Carrion Crawler
source: mm_2024

size: large
creature_type: monstrosity
alignment: unaligned

combat:
  armor_class: 13
  hit_points: { average: 51, dice: "6d10", con_contribution: 18 }
  speed: { walk: 30, climb: 30 }
  initiative: { modifier: 1, score: 11 }

abilities:
  str: { score: 14, save: 2 }
  dex: { score: 13, save: 1 }
  con: { score: 16, save: 3 }
  int: { score: 1, save: -5 }
  wis: { score: 12, save: 1 }
  cha: { score: 5, save: -3 }

skills: { perception: 5 }

senses: { passive_perception: 15, special: { darkvision: 60 } }

cr: { value: 2, xp: 450, proficiency_bonus: 2 }

habitat: [underdark, urban]
treasure: none

traits:
  - id: t_spider_climb
    name: Spider Climb
    type: trait_passive

actions:
  - id: a_multiattack
    name: Multiattack
    type: multiattack
    count: 2
    sub_actions: ["a_paralyzing_tentacles", "a_bite"]

  - id: a_bite
    name: Bite
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 4, reach_ft: 5 }
      - primitive: damage
        params: { dice: "2d4", modifier: 2, type: piercing, average: 7 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: damage
        params: { dice: "1d6", modifier: 0, type: poison, average: 3 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

  - id: a_paralyzing_tentacles
    name: Paralyzing Tentacles
    type: save_effect
    pipeline:
      - primitive: forced_save
        params:
          ability: constitution
          dc: 12
          affected: current_target
          on_fail:
            - primitive: apply_condition
              params: { condition_id: co_poisoned, duration: until_actor_next_turn_start }
            - primitive: apply_condition
              params: { condition_id: co_paralyzed, duration: until_actor_next_turn_start }
          on_success: []

behavior_profile:
  archetype: brute
  presets: { retreat: never, ability_selection: default, targeting: closest_enemy, action_economy: aggressive }
