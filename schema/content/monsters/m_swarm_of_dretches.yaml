# m_swarm_of_dretches — Swarm of Dretches
# Source: 2024 Monster Manual (MM-only; not in SRD 5.2.1)
# Triage: GREEN — Multiattack 2× Rend (+4). Swarm damage scaling: 3d6+2
#   Slashing at full strength, 3d4+2 while Bloodied (two damage steps gated
#   on combat.attacker_not_bloodied / combat.attacker_bloodied).
#   DEFERRED: Fetid Aura (passive turn-start CON DC 12 emanation → Poisoned)
#   — no passive-aura emanation primitive in v1.

id: m_swarm_of_dretches
name: Swarm of Dretches
source: mm_2024

size: large
creature_type: fiend
alignment: chaotic evil

combat:
  armor_class: 12
  hit_points: { average: 45, dice: "6d10", con_contribution: 12 }
  speed: { walk: 40 }
  initiative: { modifier: 0, score: 10 }

abilities:
  str: { score: 14, save: 2 }
  dex: { score: 11, save: 0 }
  con: { score: 14, save: 2 }
  int: { score: 5,  save: -3 }
  wis: { score: 8,  save: -1 }
  cha: { score: 3,  save: -4 }

type_tags: [swarm]

damage_resistances: [bludgeoning, cold, fire, lightning, piercing, slashing]
damage_immunities: [poison]
condition_immunities: [co_charmed, co_frightened, co_grappled, co_paralyzed, co_petrified, co_poisoned, co_prone, co_restrained, co_stunned]

senses: { passive_perception: 9, special: { darkvision: 60 } }
languages: ["Abyssal"]

cr: { value: 4, xp: 1100, proficiency_bonus: 2 }

habitat: [planar_abyss]
treasure: none

traits:
  - id: t_fetid_aura
    name: Fetid Aura
    type: trait_passive
  - id: t_swarm
    name: Swarm
    type: trait_passive

actions:
  - id: a_multiattack
    name: Multiattack
    type: multiattack
    count: 2
    sub_actions: ["a_rend"]

  - id: a_rend
    name: Rend
    type: weapon_attack
    is_signature: true
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 4, reach_ft: 5 }
      - primitive: damage
        params: { dice: "3d6", modifier: 2, type: slashing, average: 12 }
        when: { event: damage_roll, condition: "combat.attack_state == hit AND combat.attacker_not_bloodied" }
      - primitive: damage
        params: { dice: "3d4", modifier: 2, type: slashing, average: 9 }
        when: { event: damage_roll, condition: "combat.attack_state == hit AND combat.attacker_bloodied" }

behavior_profile:
  archetype: brute
  presets: { retreat: never, ability_selection: default, targeting: closest_enemy, action_economy: aggressive }
