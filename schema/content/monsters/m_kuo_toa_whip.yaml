# m_kuo_toa_whip — Kuo-toa Whip
# Source: 2024 Monster Manual (MM-only; not in SRD 5.2.1)
# Triage: GREEN — Pincer Staff (reach 10, Piercing + co_grappled); Conjure Slimy
#   Glob (ranged Acid).
#   DEFERRED: Shield of Faith bonus action (no spell-bonus-action system in v1).

id: m_kuo_toa_whip
name: Kuo-toa Whip
source: mm_2024

size: medium
creature_type: aberration
alignment: neutral evil

combat:
  armor_class: 11
  hit_points: { average: 45, dice: "7d8", con_contribution: 14 }
  speed: { walk: 30, swim: 30 }
  initiative: { modifier: 0, score: 10 }

abilities:
  str: { score: 14, save: 2 }
  dex: { score: 10, save: 0 }
  con: { score: 14, save: 2 }
  int: { score: 12, save: 1 }
  wis: { score: 14, save: 2 }
  cha: { score: 11, save: 0 }

skills: { perception: 6, religion: 4 }

senses: { passive_perception: 16, special: { darkvision: 120 } }
languages: ["Undercommon"]

cr: { value: 1, xp: 200, proficiency_bonus: 2 }

habitat: [coastal, underdark]
treasure: relics

traits:
  - id: t_amphibious
    name: Amphibious
    type: trait_passive
  - id: t_slippery
    name: Slippery
    type: trait_passive
  - id: t_sunlight_sensitivity
    name: Sunlight Sensitivity
    type: trait_passive

actions:
  - id: a_pincer_staff
    name: Pincer Staff
    type: weapon_attack
    is_signature: true
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 4, reach_ft: 10 }
      - primitive: damage
        params: { dice: "2d6", modifier: 2, type: piercing, average: 9 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: apply_condition
        params: { condition_id: co_grappled, duration: until_removed }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

  - id: a_conjure_slimy_glob
    name: Conjure Slimy Glob
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: ranged, bonus: 4, reach_ft: 60 }
      - primitive: damage
        params: { dice: "3d4", modifier: 2, type: acid, average: 9 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

behavior_profile:
  archetype: support
  presets: { retreat: cowardly, ability_selection: default, targeting: closest_enemy, action_economy: casual }
