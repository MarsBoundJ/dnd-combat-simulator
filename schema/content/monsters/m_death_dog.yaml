# m_death_dog — Death Dog
# Source: SRD CC v5.2.1 p283
# Triage: GREEN (core) — Multiattack of Bite. The Bite's disease (CON
# save → HP-max decay over failures) is deferred — needs a debuff
# mechanic with no primitive; logged under "On-death / triggered effects".
# Condition immunities declarative.
id: m_death_dog
name: Death Dog
source: srd_5.2.1
size: medium
creature_type: monstrosity
alignment: neutral_evil
combat:
  armor_class: 12
  hit_points: { average: 39, dice: "6d8", con_contribution: 12 }
  speed: { walk: 40 }
  initiative: { modifier: 2, score: 12 }
abilities:
  str: { score: 15, save: 2 }
  dex: { score: 14, save: 2 }
  con: { score: 14, save: 2 }
  int: { score: 3, save: -4 }
  wis: { score: 13, save: 1 }
  cha: { score: 6, save: -2 }
skills: { perception: 5, stealth: 4 }
damage_resistances: []
damage_vulnerabilities: []
damage_immunities: []
condition_immunities: [co_blinded, co_charmed, co_deafened, co_frightened, co_stunned, co_unconscious]
senses: { passive_perception: 15, special: { darkvision: 120 } }
languages: []
cr: { value: 1, xp: 200, proficiency_bonus: 2 }
traits: []
actions:
  - id: a_multiattack
    name: Multiattack
    type: multiattack
    count: 2
    sub_actions: [a_bite]
  - id: a_bite
    name: Bite
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 4, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d4", modifier: 2, type: piercing, average: 4 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
behavior_profile:
  archetype: pack_hunter
  presets: { retreat: ftd, ability_selection: default, targeting: weakest_target, action_economy: casual }
