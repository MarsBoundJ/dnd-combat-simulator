# m_spider — Spider
# Source: SRD CC v5.2.1
# Triage: GREEN — single flat Bite + poison damage. Spider Climb / Web Walker declarative.

id: m_spider
name: Spider
source: srd_5.2.1

size: tiny
creature_type: beast
alignment: unaligned

combat:
  armor_class: 12
  hit_points: { average: 1, dice: "1d4", con_contribution: -1 }
  speed: { walk: 20, climb: 20 }
  initiative: { modifier: 2, score: 12 }

abilities:
  str: { score: 2, save: -4 }
  dex: { score: 14, save: 2 }
  con: { score: 8, save: -1 }
  int: { score: 1, save: -5 }
  wis: { score: 10, save: 0 }
  cha: { score: 2, save: -4 }

skills: { stealth: 4 }
damage_resistances: []
damage_vulnerabilities: []
damage_immunities: []
condition_immunities: []

senses: { passive_perception: 10, special: { darkvision: 30 } }
languages: []

cr: { value: 0, xp: 10, proficiency_bonus: 2 }

traits:
  - id: t_spider_climb
    name: Spider Climb
    type: trait_passive
  - id: t_web_walker
    name: Web Walker
    type: trait_passive

actions:
  - id: a_bite
    name: Bite
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 4, reach_ft: 5 }
      - primitive: damage
        params: { dice: "", modifier: 1, type: piercing, average: 1 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: damage
        params: { dice: "1d4", modifier: 0, type: poison, average: 2 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

behavior_profile:
  archetype: mindless_aggressor
  presets: { retreat: cowardly, ability_selection: default, targeting: closest_enemy, action_economy: casual }
