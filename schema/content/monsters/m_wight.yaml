# m_wight — Wight
# Source: SRD CC v5.2.1 p341
# Triage: GREEN (core) — Multiattack of Necrotic Sword / Necrotic Bow.
# Built WITHOUT the "Life Drain" action (CON save → HP-max reduction) —
# no HP-max-debuff primitive, logged under "On-death / triggered
# effects". Sunlight Sensitivity is a declarative trait.

id: m_wight
name: Wight
source: srd_5.2.1

size: medium
creature_type: undead
alignment: neutral_evil

combat:
  armor_class: 14
  hit_points: { average: 82, dice: "11d8", con_contribution: 33 }
  speed: { walk: 30 }
  initiative: { modifier: 4, score: 14 }

abilities:
  str: { score: 15, save: 2 }
  dex: { score: 14, save: 2 }
  con: { score: 16, save: 3 }
  int: { score: 10, save: 0 }
  wis: { score: 13, save: 1 }
  cha: { score: 15, save: 2 }

skills: { perception: 3, stealth: 4 }
damage_resistances: [necrotic]
damage_vulnerabilities: []
damage_immunities: [poison]
condition_immunities: [co_exhaustion, co_poisoned]

gear: [studded_leather_armor]

senses: { passive_perception: 13, special: { darkvision: 60 } }
languages: [common]

cr: { value: 3, xp: 700, proficiency_bonus: 2 }

traits:
  - id: t_sunlight_sensitivity
    name: Sunlight Sensitivity
    type: trait_passive
    # Declarative: Disadvantage on attacks + checks in sunlight. Not enforced.

actions:
  - id: a_multiattack
    name: Multiattack
    type: multiattack
    count: 2
    sub_actions: [a_necrotic_sword, a_necrotic_bow]

  - id: a_necrotic_sword
    name: Necrotic Sword
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 4, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d8", modifier: 2, type: slashing, average: 6 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: damage
        params: { dice: "1d8", modifier: 0, type: necrotic, average: 4 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

  - id: a_necrotic_bow
    name: Necrotic Bow
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: ranged, bonus: 4, range: [150, 600] }
      - primitive: damage
        params: { dice: "1d8", modifier: 2, type: piercing, average: 6 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: damage
        params: { dice: "1d8", modifier: 0, type: necrotic, average: 4 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

behavior_profile:
  archetype: cunning_tactician
  presets: { retreat: ftd, ability_selection: default, targeting: weakest_target, action_economy: skilled }
