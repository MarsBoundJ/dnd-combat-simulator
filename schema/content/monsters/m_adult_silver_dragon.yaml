# m_adult_silver_dragon — Adult Silver Dragon
# Source: SRD CC v5.2.1 p323-324
# Triage: GREEN for core kit — Multiattack of Rend (+ cold rider), recharge
# Cold Breath (CON-save cone), at-will Paralyzing Breath (CON-save cone →
# Incapacitated), Legendary Resistance (3/Day), Legendary Actions (Cold
# Gale save + Pounce Rend), an at-will Hold Monster cast and a 1/Day Ice
# Storm cast (via `casts:` + recharge "daily:1").
# DEFERRED (see MONSTERS_NEED_ENGINE_WORK.md): **Ice Knife** (at-will spell
# — NOT yet built; omitted from the cast list); the utility/innate spells
# (Detect Magic, Shapechange, 1/Day Zone of Truth — non-combat or unbuilt);
# the Chill legendary action (casts Hold Monster — `casts` not expanded in
# LA option position; spell available as a normal action instead).
# Paralyzing Breath's escalation to Paralyzed on a repeated failed save has
# no engine hook (first-stage Incapacitated modeled). Fly omitted (walk).
id: m_adult_silver_dragon
name: Adult Silver Dragon
source: srd_5.2.1
size: huge
creature_type: dragon
type_tags: [metallic]
alignment: lawful_good
combat:
  armor_class: 19
  hit_points: { average: 216, dice: "16d12", con_contribution: 112 }
  speed: { walk: 40 }
  initiative: { modifier: 10, score: 20 }
abilities:
  str: { score: 27, save: 8 }
  dex: { score: 10, save: 5 }
  con: { score: 25, save: 7 }
  int: { score: 16, save: 3 }
  wis: { score: 13, save: 6 }
  cha: { score: 22, save: 6 }
skills: { history: 8, perception: 11, stealth: 5 }
damage_resistances: []
damage_vulnerabilities: []
damage_immunities: [cold]
condition_immunities: []
senses: { passive_perception: 21, special: { blindsight: 60, darkvision: 120 } }
languages: [common, draconic]
cr: { value: 16, xp: 15000, proficiency_bonus: 5 }
legendary_resistance: { uses: 3 }
spellcasting: { ability: charisma, save_dc: 19 }
traits: []
actions:
  - id: a_multiattack
    name: Multiattack
    type: multiattack
    count: 3
    sub_actions: [a_rend]
  - id: a_rend
    name: Rend
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 13, reach_ft: 10 }
      - primitive: damage
        params: { dice: "2d8", modifier: 8, type: slashing, average: 17 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: damage
        params: { dice: "1d8", modifier: 0, type: cold, average: 4 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
  - id: a_cold_breath
    name: Cold Breath
    type: aoe_attack
    recharge: "5-6"
    area: { shape: cone, length_ft: 60 }
    pipeline:
      - primitive: forced_save
        params:
          ability: constitution
          dc: 20
          affected: all_creatures_in_area
          on_fail:
            - primitive: damage
              params: { dice: "12d8", modifier: 0, type: cold, average: 54 }
          on_success:
            - primitive: damage
              params: { dice: "12d8", modifier: 0, type: cold, average: 54, multiplier: 0.5 }
  - id: a_paralyzing_breath
    name: Paralyzing Breath
    type: aoe_attack
    # at-will CON-save cone → Incapacitated (escalation to Paralyzed on a
    # repeated failed save has no engine hook; first-stage modeled).
    area: { shape: cone, length_ft: 60 }
    pipeline:
      - primitive: forced_save
        params:
          ability: constitution
          dc: 20
          affected: all_creatures_in_area
          on_fail:
            - primitive: apply_condition
              params: { condition_id: co_incapacitated, duration: until_actor_next_turn_start }
          on_success: []
  - id: a_cast_hold_monster
    name: Hold Monster
    casts: f_hold_monster
  - id: a_cast_ice_storm
    name: Ice Storm
    casts: f_ice_storm
    recharge: "daily:1"
legendary_actions:
  uses_per_round: 3
  options:
    - id: la_cold_gale
      name: Cold Gale
      type: aoe_attack
      # DEX save DC 19, 60-ft-long 10-ft-wide line; half damage on success,
      # pushed 30 ft on a failure.
      area: { shape: line, length_ft: 60, width_ft: 10 }
      pipeline:
        - primitive: forced_save
          params:
            ability: dexterity
            dc: 19
            affected: all_creatures_in_area
            on_fail:
              - primitive: damage
                params: { dice: "4d6", modifier: 0, type: cold, average: 14 }
              - primitive: forced_movement
                params: { distance_ft: 30 }
            on_success:
              - primitive: damage
                params: { dice: "4d6", modifier: 0, type: cold, average: 14, multiplier: 0.5 }
    - id: la_pounce
      name: Pounce
      type: multiattack
      count: 1
      sub_actions: [a_rend]
behavior_profile:
  archetype: apex_predator
  presets: { retreat: ftd, ability_selection: default, targeting: weakest_target, action_economy: skilled }
