# m_lion — Lion
# Source: SRD CC v5.2.1 p357
# Triage: GREEN — Multiattack of Rend + Roar (WIS save DC 11 → existing
# co_frightened). Pack Tactics / Running Leap are declarative traits.
id: m_lion
name: Lion
source: srd_5.2.1
size: large
creature_type: beast
alignment: unaligned
combat:
  armor_class: 12
  hit_points: { average: 22, dice: "4d10", con_contribution: 0 }
  speed: { walk: 50 }
  initiative: { modifier: 2, score: 12 }
abilities:
  str: { score: 17, save: 3 }
  dex: { score: 15, save: 2 }
  con: { score: 11, save: 0 }
  int: { score: 3, save: -4 }
  wis: { score: 12, save: 1 }
  cha: { score: 8, save: -1 }
skills: { perception: 3, stealth: 4 }
damage_resistances: []
damage_vulnerabilities: []
damage_immunities: []
condition_immunities: []
senses: { passive_perception: 13, special: { darkvision: 60 } }
languages: []
cr: { value: 1, xp: 200, proficiency_bonus: 2 }
traits:
  - id: t_pack_tactics
    name: Pack Tactics
    type: trait_passive
actions:
  - id: a_multiattack
    name: Multiattack
    type: multiattack
    count: 2
    sub_actions: [a_rend]
  - id: a_rend
    name: Rend
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 5, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d8", modifier: 3, type: slashing, average: 7 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
  - id: a_roar
    name: Roar
    type: save_effect
    pipeline:
      - primitive: forced_save
        params:
          ability: wisdom
          dc: 11
          affected: current_target
          on_fail:
            - primitive: apply_condition
              params: { condition_id: co_frightened, duration: until_actor_next_turn_start }
          on_success: []
behavior_profile:
  archetype: pack_hunter
  presets: { retreat: ftd, ability_selection: default, targeting: weakest_target, action_economy: casual }
