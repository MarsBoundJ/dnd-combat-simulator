# m_pirate_captain — Pirate Captain
# Source: SRD CC v5.2.1 p322
# Triage: GREEN (core) — Multiattack of Rapier / Pistol; Captain's Charm
# bonus action (WIS save DC 14 → existing co_charmed). Built WITHOUT the
# "Parry" reaction — logged under "Reaction abilities". Rapier's
# advantage-on-next-attack rider noted, not enforced.
id: m_pirate_captain
name: Pirate Captain
source: srd_5.2.1
size: medium
creature_type: humanoid
alignment: neutral
combat:
  armor_class: 17
  hit_points: { average: 84, dice: "13d8", con_contribution: 26 }
  speed: { walk: 30 }
  initiative: { modifier: 7, score: 17 }
abilities:
  str: { score: 10, save: 3 }
  dex: { score: 18, save: 7 }
  con: { score: 14, save: 2 }
  int: { score: 10, save: 0 }
  wis: { score: 14, save: 5 }
  cha: { score: 17, save: 6 }
skills: { acrobatics: 7, perception: 5 }
damage_resistances: []
damage_vulnerabilities: []
damage_immunities: []
condition_immunities: []
gear: [pistol, rapier]
senses: { passive_perception: 15 }
languages: [common]
cr: { value: 6, xp: 2300, proficiency_bonus: 3 }
traits: []
actions:
  - id: a_multiattack
    name: Multiattack
    type: multiattack
    count: 3
    sub_actions: [a_rapier, a_pistol]
  - id: a_rapier
    name: Rapier
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 7, reach_ft: 5 }
      - primitive: damage
        params: { dice: "2d8", modifier: 4, type: piercing, average: 13 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
  - id: a_pistol
    name: Pistol
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: ranged, bonus: 7, range: [30, 90] }
      - primitive: damage
        params: { dice: "2d10", modifier: 4, type: piercing, average: 15 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
bonus_actions:
  - id: ba_captains_charm
    name: Captain's Charm
    type: save_effect
    pipeline:
      - primitive: forced_save
        params:
          ability: wisdom
          dc: 14
          affected: current_target
          on_fail:
            - primitive: apply_condition
              params: { condition_id: co_charmed, duration: until_actor_next_turn_start }
          on_success: []
behavior_profile:
  archetype: cunning_tactician
  presets: { retreat: default, ability_selection: default, targeting: weakest_target, action_economy: skilled }
