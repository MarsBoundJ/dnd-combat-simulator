# m_bullywug_bog_sage — Bullywug Bog Sage
# Source: Monster Manual (2024) — NOT in SRD 5.2.1. Mechanics-only
# clean-room re-expression (no flavor prose) per schema-design.md §1.
# Triage: GREEN for core kit — Multiattack of Bog Staff, plus Spellcasting
# `casts:` actions for Ray of Sickness (At-Will, expands from its
# spell_attack pc_builder at the monster's +5 spell attack) and Vitriolic
# Sphere (1/Day), both built spells at WIS DC 13.
# Approximations / DEFERRED (see MONSTERS_NEED_ENGINE_WORK.md):
#   - RAW Multiattack "can replace any attack with a Ray of Sickness cast"
#     is now modeled by folding the at-will single-target cast into the
#     multiattack (sub_actions: [a_bog_staff, a_cast_ray_of_sickness] →
#     one staff + one Ray per turn). a_cast_ray_of_sickness also remains a
#     standalone candidate.
#   - Ray of Sickness's Poisoned-on-hit rider is deferred at the FEATURE
#     level (the spell_attack builder emits attack + damage only — see
#     f_ray_of_sickness.yaml).
#   - Bonus action Leap (30-ft jump for 10 ft of movement): movement
#     utility, omitted.
#   - At-will Dancing Lights / Druidcraft and 1/Day Speak with Plants:
#     non-combat, omitted.
#   - Amphibious / Speak with Frogs and Toads: declarative, non-combat.
#   - Swim 30 omitted (walk 30 is the stand-in).
id: m_bullywug_bog_sage
name: Bullywug Bog Sage
source: mm_2024
size: medium
creature_type: fey
alignment: neutral
combat:
  armor_class: 16
  hit_points: { average: 52, dice: "8d8", con_contribution: 16 }
  speed: { walk: 30 }
  initiative: { modifier: 3, score: 13 }
abilities:
  str: { score: 8, save: -1 }
  dex: { score: 16, save: 3 }
  con: { score: 14, save: 4 }
  int: { score: 10, save: 0 }
  wis: { score: 16, save: 5 }
  cha: { score: 12, save: 3 }
skills: { nature: 4, stealth: 5 }
damage_resistances: []
damage_vulnerabilities: []
damage_immunities: []
condition_immunities: []
gear: [component_pouch]
senses: { passive_perception: 13 }
languages: [bullywug, common]
cr: { value: 4, xp: 1100, proficiency_bonus: 2 }
spellcasting: { ability: wisdom, save_dc: 13, attack_bonus: 5 }
traits: []
actions:
  - id: a_multiattack
    name: Multiattack
    type: multiattack
    count: 2
    # RAW: "two Bog Staff attacks. It can replace any attack with a use of
    # Spellcasting to cast Ray of Sickness." Modeled as one staff + one Ray
    # (round-robin), folding the at-will single-target cast into the
    # multiattack — same shape as the Bone Naga's Serpentine Gaze. The
    # expanded a_cast_ray_of_sickness action (a single-target spell attack)
    # is resolved by id from the template at execution time.
    sub_actions: [a_bog_staff, a_cast_ray_of_sickness]
  - id: a_bog_staff
    name: Bog Staff
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 5, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d8", modifier: 3, type: bludgeoning, average: 7 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: damage
        params: { dice: "3d6", modifier: 0, type: poison, average: 10 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
  - id: a_cast_ray_of_sickness
    name: Ray of Sickness
    casts: f_ray_of_sickness
  - id: a_cast_vitriolic_sphere
    name: Vitriolic Sphere
    casts: f_vitriolic_sphere
    recharge: "daily:1"
behavior_profile:
  archetype: cowardly_skirmisher
  presets: { retreat: cowardly, ability_selection: default, targeting: weakest_target, action_economy: skilled }
