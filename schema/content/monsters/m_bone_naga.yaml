# m_bone_naga — Bone Naga
# Source: Monster Manual (2024) — NOT in SRD 5.2.1 (the SRD has Spirit /
# Guardian Naga only). Mechanics-only clean-room re-expression (no flavor
# prose) per schema-design.md §1.
# Triage: GREEN — Multiattack of Bite + Serpentine Gaze (the
# save_effect-in-multiattack shape), plus Spellcasting `casts:` actions
# for Command and Lightning Bolt (both built, 1/Day each, INT DC 13).
# Approximations / DEFERRED (see MONSTERS_NEED_ENGINE_WORK.md):
#   - RAW Multiattack is "two Bite attacks, can replace ANY attack with
#     Serpentine Gaze" — modeled as one Bite + one Gaze per round
#     (round-robin; Giant Constrictor Snake precedent), not an AI choice.
#   - At-will utility cantrips Mage Hand / Thaumaturgy and 1/Day Detect
#     Thoughts: non-combat, omitted.
#   - Languages: RAW "Common plus one other language".
id: m_bone_naga
name: Bone Naga
source: mm_2024
size: large
creature_type: undead
alignment: neutral_evil
combat:
  armor_class: 15
  hit_points: { average: 65, dice: "10d10", con_contribution: 10 }
  speed: { walk: 40 }
  initiative: { modifier: 3, score: 13 }
abilities:
  str: { score: 15, save: 2 }
  dex: { score: 16, save: 3 }
  con: { score: 12, save: 1 }
  int: { score: 16, save: 3 }
  wis: { score: 15, save: 2 }
  cha: { score: 15, save: 2 }
skills: {}
damage_resistances: []
damage_vulnerabilities: []
damage_immunities: [poison]
condition_immunities: [co_charmed, co_exhaustion, co_paralyzed, co_poisoned]
senses: { passive_perception: 12, special: { darkvision: 60 } }
languages: [common]
cr: { value: 4, xp: 1100, proficiency_bonus: 2 }
spellcasting: { ability: intelligence, save_dc: 13 }
traits: []
actions:
  - id: a_multiattack
    name: Multiattack
    type: multiattack
    count: 2
    sub_actions: [a_bite, a_serpentine_gaze]
  - id: a_bite
    name: Bite
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 5, reach_ft: 10 }
      - primitive: damage
        params: { dice: "2d6", modifier: 3, type: piercing, average: 10 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: damage
        params: { dice: "2d6", modifier: 0, type: necrotic, average: 7 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
  - id: a_serpentine_gaze
    name: Serpentine Gaze
    type: save_effect
    range_ft: 60
    pipeline:
      - primitive: forced_save
        params:
          ability: wisdom
          dc: 13
          affected: current_target
          on_fail:
            - primitive: damage
              params: { dice: "3d6", modifier: 3, type: psychic, average: 13 }
            - primitive: apply_condition
              params: { condition_id: co_charmed, duration: until_actor_next_turn_start }
          on_success: []
  - id: a_cast_command
    name: Command
    casts: f_command
    recharge: "daily:1"
  - id: a_cast_lightning_bolt
    name: Lightning Bolt
    casts: f_lightning_bolt
    recharge: "daily:1"
behavior_profile:
  archetype: cunning_tactician
  presets: { retreat: default, ability_selection: default, targeting: weakest_target }
