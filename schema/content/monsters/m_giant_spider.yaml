# m_giant_spider — Giant Spider
# Source: SRD CC v5.2.1 p354
# Triage: GREEN (core) — Bite weapon attack (+ poison damage). Spider
# Climb / Web Walker are declarative traits. Built WITHOUT "Web (Recharge
# 5–6)" — a Recharge ability logged in MONSTERS_NEED_ENGINE_WORK.md under
# "Recharge abilities". Climb 30 omitted (walk stand-in).

id: m_giant_spider
name: Giant Spider
source: srd_5.2.1

size: large
creature_type: beast
alignment: unaligned

combat:
  armor_class: 14
  hit_points:
    average: 26
    dice: "4d10"
    con_contribution: 4
  speed:
    walk: 30
  initiative:
    modifier: 3
    score: 13

abilities:
  str: { score: 14, save: 2 }
  dex: { score: 16, save: 3 }
  con: { score: 12, save: 1 }
  int: { score: 2, save: -4 }
  wis: { score: 11, save: 0 }
  cha: { score: 4, save: -3 }

skills:
  perception: 4
  stealth: 7
damage_resistances: []
damage_vulnerabilities: []
damage_immunities: []
condition_immunities: []

senses:
  passive_perception: 14
  special:
    darkvision: 60

languages: []

cr:
  value: 1
  xp: 200
  proficiency_bonus: 2

traits:
  - id: t_spider_climb
    name: Spider Climb
    type: trait_passive
    # Declarative: can climb difficult surfaces / ceilings without a check.
  - id: t_web_walker
    name: Web Walker
    type: trait_passive
    # Declarative: ignores movement restrictions from webs.

actions:
  - id: a_bite
    name: Bite
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 5, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d8", modifier: 3, type: piercing, average: 7 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: damage
        params: { dice: "2d6", modifier: 0, type: poison, average: 7 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

behavior_profile:
  archetype: apex_predator
  presets:
    retreat: ftd
    ability_selection: default
    targeting: weakest_target
    action_economy: casual
