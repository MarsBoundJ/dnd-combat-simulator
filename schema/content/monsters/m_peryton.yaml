# m_peryton — Peryton
# Source: 2024 Monster Manual (MM-only; not in SRD 5.2.1)
# Triage: GREEN — Multiattack (Gore + Talons), both Piercing. Flyby declarative.
#   DEFERRED: Gore charge bonus damage (positional 30-ft straight-line rider);
#   Talons heart-removal kill rider (cosmetic, no mechanical hook).

id: m_peryton
name: Peryton
source: mm_2024

size: medium
creature_type: monstrosity
alignment: chaotic evil

combat:
  armor_class: 13
  hit_points: { average: 33, dice: "6d8", con_contribution: 6 }
  speed: { walk: 20, fly: 60 }
  initiative: { modifier: 3, score: 13 }

abilities:
  str: { score: 16, save: 3 }
  dex: { score: 12, save: 1 }
  con: { score: 13, save: 1 }
  int: { score: 9, save: -1 }
  wis: { score: 12, save: 1 }
  cha: { score: 10, save: 0 }

skills: { perception: 5, stealth: 3 }

senses: { passive_perception: 15 }

cr: { value: 2, xp: 450, proficiency_bonus: 2 }

habitat: [hill, mountain]
treasure: armaments

traits:
  - id: t_flyby
    name: Flyby
    type: trait_passive

actions:
  - id: a_multiattack
    name: Multiattack
    type: multiattack
    count: 2
    sub_actions: ["a_gore", "a_talons"]

  - id: a_gore
    name: Gore
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 5, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d8", modifier: 3, type: piercing, average: 7 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

  - id: a_talons
    name: Talons
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 5, reach_ft: 5 }
      - primitive: damage
        params: { dice: "2d4", modifier: 3, type: piercing, average: 8 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

behavior_profile:
  archetype: skirmisher
  presets: { retreat: cowardly, ability_selection: default, targeting: weakest_target, action_economy: aggressive }
