# m_jackalwere — Jackalwere
# Source: 2024 Monster Manual (MM-only; not in SRD 5.2.1)
# Triage: GREEN — Multiattack 2× Rend; Sleep Gaze (Recharge 5-6, WIS DC 10 →
#   co_incapacitated). DEFERRED: nonmagical-weapon immunity (no magic tracking
#   in v1); shapechanger form.

id: m_jackalwere
name: Jackalwere
source: mm_2024

size: medium
creature_type: fey
alignment: chaotic evil

combat:
  armor_class: 12
  hit_points: { average: 18, dice: "4d6", con_contribution: 4 }
  speed: { walk: 40 }
  initiative: { modifier: 2, score: 12 }

abilities:
  str: { score: 11, save: 0 }
  dex: { score: 15, save: 2 }
  con: { score: 13, save: 1 }
  int: { score: 13, save: 1 }
  wis: { score: 11, save: 0 }
  cha: { score: 8, save: -1 }

skills: { deception: 3, perception: 2, stealth: 4 }

senses: { passive_perception: 12 }
languages: ["Common"]

cr: { value: 0.5, xp: 100, proficiency_bonus: 2 }

habitat: [desert, grassland]
treasure: implements

traits:
  - id: t_keen_hearing_smell
    name: Keen Hearing and Smell
    type: trait_passive

actions:
  - id: a_multiattack
    name: Multiattack
    type: multiattack
    count: 2
    sub_actions: ["a_rend"]

  - id: a_rend
    name: Rend
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 4, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d6", modifier: 2, type: piercing, average: 5 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

  - id: a_sleep_gaze
    name: Sleep Gaze
    type: save_effect
    recharge: "5-6"
    pipeline:
      - primitive: forced_save
        params:
          ability: wisdom
          dc: 10
          affected: current_target
          on_fail:
            - primitive: apply_condition
              params: { condition_id: co_incapacitated, duration: until_actor_next_turn_start }
          on_success: []

behavior_profile:
  archetype: skirmisher
  presets: { retreat: cowardly, ability_selection: default, targeting: weakest_target, action_economy: casual }
