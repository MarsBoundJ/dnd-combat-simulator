# m_cockatrice — Cockatrice
# Source: SRD CC v5.2.1 p276
# Triage: GREEN (core) — Petrifying Bite: damage + CON save (DC 11), first
# failure → existing co_restrained. The petrify-on-repeated-failures
# escalation is deferred (no failure-counter). Petrified immunity
# declarative. Fly 40 omitted (walk stand-in).
id: m_cockatrice
name: Cockatrice
source: srd_5.2.1
size: small
creature_type: monstrosity
alignment: unaligned
combat:
  armor_class: 11
  hit_points: { average: 22, dice: "5d6", con_contribution: 5 }
  speed: { walk: 20 }
  initiative: { modifier: 1, score: 11 }
abilities:
  str: { score: 6, save: -2 }
  dex: { score: 12, save: 1 }
  con: { score: 12, save: 1 }
  int: { score: 2, save: -4 }
  wis: { score: 13, save: 1 }
  cha: { score: 5, save: -3 }
skills: {}
damage_resistances: []
damage_vulnerabilities: []
damage_immunities: []
condition_immunities: [co_petrified]
senses: { passive_perception: 11, special: { darkvision: 60 } }
languages: []
cr: { value: 0.5, xp: 100, proficiency_bonus: 2 }
traits: []
actions:
  - id: a_petrifying_bite
    name: Petrifying Bite
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 3, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d4", modifier: 1, type: piercing, average: 3 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: forced_save
        params:
          ability: constitution
          dc: 11
          affected: current_target
          on_fail:
            - primitive: apply_condition
              params: { condition_id: co_restrained, duration: until_removed }
          on_success: []
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
behavior_profile:
  archetype: pack_hunter
  presets: { retreat: cowardly, ability_selection: default, targeting: weakest_target, action_economy: casual }
