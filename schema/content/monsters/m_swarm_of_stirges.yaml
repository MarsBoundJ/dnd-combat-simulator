# m_swarm_of_stirges — Swarm of Stirges
# Source: 2024 Monster Manual (MM-only; not in SRD 5.2.1)
# Triage: GREEN — Swarm of Proboscises (Piercing + co_grappled on Medium-or-
#   smaller). Swarm BPS resistance + broad condition immunity.
#   DEFERRED: bloodied damage reduction; ongoing Necrotic-while-grappled tick.

id: m_swarm_of_stirges
name: Swarm of Stirges
source: mm_2024

size: medium
creature_type: monstrosity
alignment: unaligned

type_tags: [swarm]

combat:
  armor_class: 14
  hit_points: { average: 36, dice: "8d8", con_contribution: 0 }
  speed: { walk: 10, fly: 40 }
  initiative: { modifier: 3, score: 13 }

abilities:
  str: { score: 4, save: -3 }
  dex: { score: 16, save: 3 }
  con: { score: 11, save: 0 }
  int: { score: 2, save: -4 }
  wis: { score: 8, save: -1 }
  cha: { score: 6, save: -2 }

damage_resistances: [bludgeoning, piercing, slashing]
condition_immunities: [co_charmed, co_frightened, co_grappled, co_paralyzed, co_petrified, co_prone, co_restrained, co_stunned]

senses: { passive_perception: 9, special: { darkvision: 60 } }

cr: { value: 2, xp: 450, proficiency_bonus: 2 }

habitat: [desert, forest, grassland, hill, mountain, swamp, underdark, urban]
treasure: none

traits:
  - id: t_swarm
    name: Swarm
    type: trait_passive

actions:
  - id: a_swarm_of_proboscises
    name: Swarm of Proboscises
    type: weapon_attack
    is_signature: true
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 5, reach_ft: 5 }
      - primitive: damage
        params: { dice: "2d10", modifier: 3, type: piercing, average: 14 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: apply_condition
        params: { condition_id: co_grappled, duration: until_removed }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

behavior_profile:
  archetype: brute
  presets: { retreat: never, ability_selection: default, targeting: weakest_target, action_economy: aggressive }
