# m_bullywug_warrior — Bullywug Warrior
# Source: 2024 Monster Manual (MM-only; not in SRD 5.2.1)
# Triage: GREEN — Insectile Rapier (Piercing + Poison dual damage).
#   DEFERRED: Amphibious, Speak with Frogs (declarative), Leap bonus action (movement).

id: m_bullywug_warrior
name: Bullywug Warrior
source: mm_2024

size: medium
creature_type: fey
alignment: neutral

combat:
  armor_class: 15
  hit_points: { average: 11, dice: "2d8", con_contribution: 2 }
  speed: { walk: 30, swim: 30 }
  initiative: { modifier: 2, score: 12 }

abilities:
  str: { score: 12, save: 1 }
  dex: { score: 14, save: 2 }
  con: { score: 13, save: 1 }
  int: { score: 7, save: -2 }
  wis: { score: 10, save: 0 }
  cha: { score: 7, save: -2 }

skills: { stealth: 4 }

senses: { passive_perception: 10 }
languages: ["Bullywug", "Common"]

cr: { value: 0.25, xp: 50, proficiency_bonus: 2 }

habitat: [swamp]

traits:
  - id: t_amphibious
    name: Amphibious
    type: trait_passive
  - id: t_speak_with_frogs_and_toads
    name: Speak with Frogs and Toads
    type: trait_passive

actions:
  - id: a_insectile_rapier
    name: Insectile Rapier
    type: weapon_attack
    is_signature: true
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 4, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d8", modifier: 2, type: piercing, average: 6 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: damage
        params: { dice: "1d4", modifier: 0, type: poison, average: 2 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

bonus_actions:
  - id: ba_leap
    name: Leap
    type: trait_passive

behavior_profile:
  archetype: skirmisher
  presets: { retreat: cowardly, ability_selection: default, targeting: closest_enemy, action_economy: casual }
