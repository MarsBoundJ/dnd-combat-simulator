# m_ghoul — Ghoul
# Source: SRD CC v5.2.1 p288
# Triage: GREEN — Multiattack of weapon attacks; the Claw's paralysis is a
# forced_save (CON DC 10) applying the existing co_paralyzed condition.

id: m_ghoul
name: Ghoul
source: srd_5.2.1

size: medium
creature_type: undead
alignment: chaotic_evil

combat:
  armor_class: 12
  hit_points:
    average: 22
    dice: "5d8"
    con_contribution: 0
  speed:
    walk: 30
  initiative:
    modifier: 2
    score: 12

abilities:
  str: { score: 13, save: 1 }
  dex: { score: 15, save: 2 }
  con: { score: 10, save: 0 }
  int: { score: 7, save: -2 }
  wis: { score: 10, save: 0 }
  cha: { score: 6, save: -2 }

skills: {}
damage_resistances: []
damage_vulnerabilities: []
damage_immunities: [poison]
condition_immunities: [co_charmed, co_exhaustion, co_poisoned]

senses:
  passive_perception: 10
  special:
    darkvision: 60

languages: [common]

cr:
  value: 1
  xp: 200
  proficiency_bonus: 2

traits: []

actions:
  - id: a_multiattack
    name: Multiattack
    type: multiattack
    count: 2
    sub_actions: [a_bite]

  - id: a_bite
    name: Bite
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 4, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d6", modifier: 2, type: piercing, average: 5 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: damage
        params: { dice: "1d6", modifier: 0, type: necrotic, average: 3 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

  - id: a_claw
    name: Claw
    type: weapon_attack
    # On a hit, a non-Undead / non-elf target makes a CON save (DC 10) or
    # is Paralyzed until the end of its next turn. The not-Undead/elf gate
    # is noted but not enforced (no creature-type filter in v1).
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 4, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d4", modifier: 2, type: slashing, average: 4 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: forced_save
        params:
          ability: constitution
          dc: 10
          affected: current_target
          on_fail:
            - primitive: apply_condition
              params: { condition_id: co_paralyzed, duration: until_actor_next_turn_start }
          on_success: []
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

behavior_profile:
  archetype: pack_hunter
  presets:
    retreat: ftd
    ability_selection: default
    targeting: weakest_target
    action_economy: casual
