# m_giant_toad — Giant Toad
# Source: SRD CC v5.2.1 p354
# Triage: GREEN (core) — Bite (+ poison) grapples (co_grappled) a Medium-
# or-smaller target. Amphibious / Standing Leap declarative. Built
# WITHOUT the Swallow follow-up — logged under "Engulf / swallow".
id: m_giant_toad
name: Giant Toad
source: srd_5.2.1
size: large
creature_type: beast
alignment: unaligned
combat:
  armor_class: 11
  hit_points: { average: 39, dice: "6d10", con_contribution: 6 }
  speed: { walk: 30 }
  initiative: { modifier: 1, score: 11 }
abilities:
  str: { score: 15, save: 2 }
  dex: { score: 13, save: 1 }
  con: { score: 13, save: 1 }
  int: { score: 2, save: -4 }
  wis: { score: 10, save: 0 }
  cha: { score: 3, save: -4 }
skills: {}
damage_resistances: []
damage_vulnerabilities: []
damage_immunities: []
condition_immunities: []
senses: { passive_perception: 10, special: { darkvision: 60 } }
languages: []
cr: { value: 1, xp: 200, proficiency_bonus: 2 }
traits: []
actions:
  - id: a_bite
    name: Bite
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 4, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d6", modifier: 2, type: piercing, average: 5 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: damage
        params: { dice: "2d4", modifier: 0, type: poison, average: 5 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: apply_condition
        params: { condition_id: co_grappled, duration: until_removed }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
behavior_profile:
  archetype: apex_predator
  presets: { retreat: ftd, ability_selection: default, targeting: weakest_target, action_economy: casual }
