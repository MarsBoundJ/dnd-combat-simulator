# m_hobgoblin_warrior — Hobgoblin Warrior
# Source: SRD CC v5.2.1 p299
# Triage: GREEN — weapon attacks. Pack Tactics is a declarative trait
# (not enforced in v1). The Longbow's extra poison is a second damage step.

id: m_hobgoblin_warrior
name: Hobgoblin Warrior
source: srd_5.2.1

size: medium
creature_type: fey
type_tags: [goblinoid]
alignment: lawful_evil

combat:
  armor_class: 18
  hit_points:
    average: 11
    dice: "2d8"
    con_contribution: 2
  speed:
    walk: 30
  initiative:
    modifier: 3
    score: 13

abilities:
  str: { score: 13, save: 1 }
  dex: { score: 12, save: 1 }
  con: { score: 12, save: 1 }
  int: { score: 10, save: 0 }
  wis: { score: 10, save: 0 }
  cha: { score: 9, save: -1 }

skills: {}
damage_resistances: []
damage_vulnerabilities: []
damage_immunities: []
condition_immunities: []

gear: [half_plate_armor, longbow, longsword, shield]

senses:
  passive_perception: 10
  special:
    darkvision: 60

languages: [common, goblin]

cr:
  value: 0.5
  xp: 100
  proficiency_bonus: 2

traits:
  - id: t_pack_tactics
    name: Pack Tactics
    type: trait_passive
    # Declarative: Advantage on attacks vs a creature with an ally within
    # 5 ft of it. Not enforced in v1.

actions:
  - id: a_longsword
    name: Longsword
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 3, reach_ft: 5 }
      - primitive: damage
        params: { dice: "2d10", modifier: 1, type: slashing, average: 12 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

  - id: a_longbow
    name: Longbow
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: ranged, bonus: 3, range: [150, 600] }
      - primitive: damage
        params: { dice: "1d8", modifier: 1, type: piercing, average: 5 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: damage
        params: { dice: "3d4", modifier: 0, type: poison, average: 7 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

behavior_profile:
  archetype: cunning_tactician
  presets:
    retreat: ftd
    ability_selection: default
    targeting: weakest_target
    action_economy: skilled
