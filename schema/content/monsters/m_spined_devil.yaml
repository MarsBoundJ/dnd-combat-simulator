# m_spined_devil — Spined Devil
# Source: 2024 Monster Manual (MM-only; not in SRD 5.2.1)
# Triage: GREEN — Multiattack 2× Infernal Fork / Tail Spine (Piercing + Fire dual).
#   Flyby and Magic Resistance declarative.

id: m_spined_devil
name: Spined Devil
source: mm_2024

size: small
creature_type: fiend
alignment: lawful evil

combat:
  armor_class: 13
  hit_points: { average: 45, dice: "10d6", con_contribution: 10 }
  speed: { walk: 20, fly: 40 }
  initiative: { modifier: 2, score: 12 }

abilities:
  str: { score: 10, save: 0 }
  dex: { score: 15, save: 2 }
  con: { score: 12, save: 1 }
  int: { score: 11, save: 0 }
  wis: { score: 14, save: 2 }
  cha: { score: 8, save: -1 }

damage_resistances: [cold]
damage_immunities: [fire, poison]
condition_immunities: [co_poisoned]

senses: { passive_perception: 12, special: { darkvision: 120 } }
languages: ["Infernal"]

cr: { value: 2, xp: 450, proficiency_bonus: 2 }

habitat: [nine_hells]
treasure: none

traits:
  - id: t_flyby
    name: Flyby
    type: trait_passive
  - id: t_magic_resistance
    name: Magic Resistance
    type: trait_passive

actions:
  - id: a_multiattack
    name: Multiattack
    type: multiattack
    count: 2
    sub_actions: ["a_infernal_fork"]

  - id: a_infernal_fork
    name: Infernal Fork
    type: weapon_attack
    is_signature: true
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 4, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d6", modifier: 2, type: piercing, average: 5 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: damage
        params: { dice: "1d6", modifier: 0, type: fire, average: 3 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

  - id: a_tail_spine
    name: Tail Spine
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: ranged, bonus: 4, reach_ft: 20 }
      - primitive: damage
        params: { dice: "1d4", modifier: 2, type: piercing, average: 4 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: damage
        params: { dice: "1d6", modifier: 0, type: fire, average: 3 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

behavior_profile:
  archetype: artillery
  presets: { retreat: cowardly, ability_selection: default, targeting: weakest_target, action_economy: aggressive }
