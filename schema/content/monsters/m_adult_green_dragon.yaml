# m_adult_green_dragon — Adult Green Dragon
# Source: SRD CC v5.2.1 p294
# Triage: GREEN for core kit — Multiattack of Rend (+ poison rider),
# recharge Poison Breath (CON-save cone), Legendary Resistance (3/Day),
# and Legendary Actions (Noxious Miasma save + Pounce Rend).
# DEFERRED (see MONSTERS_NEED_ENGINE_WORK.md): innate Spellcasting and the
# "replace one attack with Spellcasting" Multiattack option; the Mind
# Invasion legendary action (casts Mind Spike via Spellcasting). Noxious
# Miasma's -2 AC rider is omitted (no engine hook); damage modeled.
# Fly/Swim omitted (walk stand-in). Pounce's half-Speed move omitted.
id: m_adult_green_dragon
name: Adult Green Dragon
source: srd_5.2.1
size: huge
creature_type: dragon
type_tags: [chromatic]
alignment: lawful_evil
combat:
  armor_class: 19
  hit_points: { average: 207, dice: "18d12", con_contribution: 90 }
  speed: { walk: 40, fly: 80, swim: 40 }
  initiative: { modifier: 11, score: 21 }
abilities:
  str: { score: 23, save: 6 }
  dex: { score: 12, save: 6 }
  con: { score: 21, save: 5 }
  int: { score: 18, save: 4 }
  wis: { score: 15, save: 7 }
  cha: { score: 18, save: 4 }
skills: { deception: 9, perception: 12, persuasion: 9, stealth: 6 }
damage_resistances: []
damage_vulnerabilities: []
damage_immunities: [poison]
condition_immunities: [co_poisoned]
senses: { passive_perception: 22, special: { blindsight: 60, darkvision: 120 } }
languages: [common, draconic]
cr: { value: 15, xp: 13000, proficiency_bonus: 5 }
legendary_resistance: { uses: 3 }
traits:
  - id: t_amphibious
    name: Amphibious
    type: trait_passive
actions:
  - id: a_multiattack
    name: Multiattack
    type: multiattack
    count: 3
    sub_actions: [a_rend]
  - id: a_rend
    name: Rend
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 11, reach_ft: 10 }
      - primitive: damage
        params: { dice: "2d8", modifier: 6, type: slashing, average: 15 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: damage
        params: { dice: "2d6", modifier: 0, type: poison, average: 7 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
  - id: a_poison_breath
    name: Poison Breath
    type: aoe_attack
    recharge: "5-6"
    area: { shape: cone, length_ft: 60 }
    pipeline:
      - primitive: forced_save
        params:
          ability: constitution
          dc: 18
          affected: all_creatures_in_area
          on_fail:
            - primitive: damage
              params: { dice: "16d6", modifier: 0, type: poison, average: 56 }
          on_success:
            - primitive: damage
              params: { dice: "16d6", modifier: 0, type: poison, average: 56, multiplier: 0.5 }
legendary_actions:
  uses_per_round: 3
  options:
    - id: la_noxious_miasma
      name: Noxious Miasma
      type: aoe_attack
      # CON save DC 17, 20-ft-radius Sphere within 90 ft. The -2 AC rider is
      # omitted (no engine hook); poison damage modeled.
      area: { shape: sphere, radius_ft: 20, range_ft: 90 }
      pipeline:
        - primitive: forced_save
          params:
            ability: constitution
            dc: 17
            affected: all_creatures_in_area
            on_fail:
              - primitive: damage
                params: { dice: "2d6", modifier: 0, type: poison, average: 7 }
            on_success: []
    - id: la_pounce
      name: Pounce
      type: multiattack
      count: 1
      sub_actions: [a_rend]
behavior_profile:
  archetype: apex_predator
  presets: { retreat: ftd, ability_selection: default, targeting: weakest_target, action_economy: skilled }
