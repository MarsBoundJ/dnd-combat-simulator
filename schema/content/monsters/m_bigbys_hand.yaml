# m_bigbys_hand — Bigby's Hand (the conjured Large hand of force)
# Source: SRD CC v5.2.1 — the creature half of the Bigby's Hand spell
# (f_bigbys_hand). Summoned by the spell's `summon` primitive; lives only
# while the Wizard concentrates (Stage 2a lifecycle dismisses it on
# concentration end).
#
# Triage: GREEN (spell-summon). Models the Clenched Fist form only — a melee
# spell attack for 5d8 Force. This is the load-bearing damage form; the
# control forms (Forceful / Grasping / Interposing Hand) are deferred.
#
# v1 proxies (documented, not RAW-exact — a static stat block can't read the
# caster at summon time):
#   - HP RAW = "equal to your hit point maximum." Static proxy: a flat value.
#     The hand's HP rarely matters (AC 20 makes it hard to drop) and the
#     summon scorer reads DPR, not HP.
#   - Clenched Fist attack bonus RAW = the caster's spell attack modifier.
#     Static proxy: +9 (a representative high-level Wizard's spell attack;
#     the spell comes online at character level 9). The summon doesn't
#     inherit the caster's exact bonus — a known summon-system simplification.
#   - Upcast (RAW: +2d8 Force per slot above 5th) is deferred; base 5d8 is
#     the load-bearing effect.

id: m_bigbys_hand
name: Bigby's Hand
source: srd_5.2.1

size: large
creature_type: construct
alignment: unaligned

combat:
  armor_class: 20
  hit_points: { average: 40, dice: "0d0", con_contribution: 0 }
  speed: { walk: 60 }
  initiative: { modifier: 0, score: 10 }

abilities:
  str: { score: 26, save: 8 }
  dex: { score: 10, save: 0 }
  con: { score: 10, save: 0 }
  int: { score: 1, save: -5 }
  wis: { score: 1, save: -5 }
  cha: { score: 1, save: -5 }

skills: {}
damage_resistances: []
damage_vulnerabilities: []
damage_immunities: [poison, psychic]
condition_immunities: [co_blinded, co_charmed, co_deafened, co_exhaustion, co_frightened, co_grappled, co_paralyzed, co_petrified, co_poisoned, co_prone, co_restrained, co_unconscious]

senses: { passive_perception: 10, special: { blindsight: 60 } }
languages: []

cr: { value: 5, xp: 1800, proficiency_bonus: 3 }

actions:
  - id: a_clenched_fist
    name: Clenched Fist
    type: weapon_attack
    # Melee spell attack, 5d8 Force. Attack bonus is a static proxy for the
    # caster's spell attack modifier (see header).
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 9, reach_ft: 5 }
      - primitive: damage
        params: { dice: "5d8", modifier: 0, type: force, average: 22 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

behavior_profile:
  archetype: apex_predator
  presets: { retreat: never, ability_selection: default, targeting: lowest_hp_target, action_economy: signature }
