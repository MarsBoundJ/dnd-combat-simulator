# m_modron_quadrone — Modron Quadrone
# Source: 2024 Monster Manual (MM-only; not in SRD 5.2.1)
# Triage: GREEN — Multiattack 4× Slam (Force melee); Gears Launcher (Force
#   ranged, same stats).

id: m_modron_quadrone
name: Modron Quadrone
source: mm_2024

size: medium
creature_type: construct
alignment: lawful neutral

combat:
  armor_class: 16
  hit_points: { average: 22, dice: "4d8", con_contribution: 4 }
  speed: { walk: 30, fly: 30 }
  initiative: { modifier: 1, score: 11 }

abilities:
  str: { score: 14, save: 2 }
  dex: { score: 12, save: 1 }
  con: { score: 13, save: 1 }
  int: { score: 10, save: 0 }
  wis: { score: 10, save: 0 }
  cha: { score: 9, save: -1 }

damage_immunities: [poison]
condition_immunities: [co_charmed, co_frightened, co_poisoned]

senses: { passive_perception: 10 }
languages: ["Modron"]

cr: { value: 1, xp: 200, proficiency_bonus: 2 }

habitat: [mechanus]
treasure: none

actions:
  - id: a_multiattack
    name: Multiattack
    type: multiattack
    count: 4
    sub_actions: ["a_slam"]

  - id: a_slam
    name: Slam
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 4, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d4", modifier: 2, type: force, average: 4 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

  - id: a_gears_launcher
    name: Gears Launcher
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: ranged, bonus: 4, reach_ft: 320 }
      - primitive: damage
        params: { dice: "1d4", modifier: 2, type: force, average: 4 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

behavior_profile:
  archetype: brute
  presets: { retreat: never, ability_selection: default, targeting: closest_enemy, action_economy: aggressive }
