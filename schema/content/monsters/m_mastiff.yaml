# m_mastiff — Mastiff
# Source: SRD CC v5.2.1
# Triage: GREEN — single Bite; knocks Prone (existing co_prone) on a hit vs a Medium-or-smaller creature.

id: m_mastiff
name: Mastiff
source: srd_5.2.1

size: medium
creature_type: beast
alignment: unaligned

combat:
  armor_class: 12
  hit_points: { average: 5, dice: "1d8", con_contribution: 1 }
  speed: { walk: 40 }
  initiative: { modifier: 2, score: 12 }

abilities:
  str: { score: 13, save: 1 }
  dex: { score: 14, save: 2 }
  con: { score: 12, save: 1 }
  int: { score: 3, save: -4 }
  wis: { score: 12, save: 3 }
  cha: { score: 7, save: -2 }

skills: { perception: 5 }
damage_resistances: []
damage_vulnerabilities: []
damage_immunities: []
condition_immunities: []

senses: { passive_perception: 15, special: { darkvision: 60 } }
languages: []

cr: { value: 0.125, xp: 25, proficiency_bonus: 2 }

traits: []

actions:
  - id: a_bite
    name: Bite
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 3, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d6", modifier: 1, type: piercing, average: 4 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: apply_condition
        params: { condition_id: co_prone, duration: until_removed }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

behavior_profile:
  archetype: pack_hunter
  presets: { retreat: cowardly, ability_selection: default, targeting: closest_enemy, action_economy: casual }
