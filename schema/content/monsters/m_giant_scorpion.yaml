# m_giant_scorpion — Giant Scorpion
# Source: SRD CC v5.2.1 p353
# Triage: GREEN — Multiattack (2 Claw + Sting); Claw grapples (existing
# co_grappled) on a hit, Sting adds poison damage.
id: m_giant_scorpion
name: Giant Scorpion
source: srd_5.2.1
size: large
creature_type: beast
alignment: unaligned
combat:
  armor_class: 15
  hit_points: { average: 52, dice: "7d10", con_contribution: 14 }
  speed: { walk: 40 }
  initiative: { modifier: 1, score: 11 }
abilities:
  str: { score: 16, save: 3 }
  dex: { score: 13, save: 1 }
  con: { score: 15, save: 2 }
  int: { score: 1, save: -5 }
  wis: { score: 9, save: -1 }
  cha: { score: 3, save: -4 }
skills: {}
damage_resistances: []
damage_vulnerabilities: []
damage_immunities: []
condition_immunities: []
senses: { passive_perception: 9, special: { blindsight: 60 } }
languages: []
cr: { value: 3, xp: 700, proficiency_bonus: 2 }
traits: []
actions:
  - id: a_multiattack
    name: Multiattack
    type: multiattack
    count: 3
    sub_actions: [a_claw, a_claw, a_sting]
  - id: a_claw
    name: Claw
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 5, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d6", modifier: 3, type: bludgeoning, average: 6 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: apply_condition
        params: { condition_id: co_grappled, duration: until_removed }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
  - id: a_sting
    name: Sting
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 5, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d8", modifier: 3, type: piercing, average: 7 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: damage
        params: { dice: "2d10", modifier: 0, type: poison, average: 11 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
behavior_profile:
  archetype: apex_predator
  presets: { retreat: ftd, ability_selection: default, targeting: weakest_target, action_economy: casual }
