# m_mud_mephit — Mud Mephit
# Source: 2024 Monster Manual (MM-only; not in SRD 5.2.1)
# Triage: GREEN — Slam + Mud Breath (Recharge 6, DEX save → Restrained).
#   DEFERRED: Death Burst (death-triggered 5-ft emanation; no on-death AoE
#   primitive in v1).

id: m_mud_mephit
name: Mud Mephit
source: mm_2024

size: small
creature_type: elemental
alignment: neutral evil

combat:
  armor_class: 11
  hit_points: { average: 13, dice: "3d6", con_contribution: 3 }
  speed: { walk: 20, fly: 20, swim: 20 }
  initiative: { modifier: 1, score: 11 }

abilities:
  str: { score: 8, save: -1 }
  dex: { score: 12, save: 1 }
  con: { score: 12, save: 1 }
  int: { score: 9, save: -1 }
  wis: { score: 11, save: 0 }
  cha: { score: 7, save: -2 }

skills: { stealth: 3 }
damage_immunities: [poison]
condition_immunities: [co_exhaustion, co_poisoned]

senses: { passive_perception: 10, special: { darkvision: 60 } }
languages: ["Primordial (Aquan, Terran)"]

cr: { value: 0.25, xp: 50, proficiency_bonus: 2 }

habitat: [elemental_planes]
treasure: none

traits:
  - id: t_death_burst
    name: Death Burst
    type: trait_passive

actions:
  - id: a_slam
    name: Slam
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 3, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d6", modifier: 1, type: bludgeoning, average: 4 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

  - id: a_mud_breath
    name: Mud Breath
    type: save_effect
    recharge: "6-6"
    pipeline:
      - primitive: forced_save
        params:
          ability: dexterity
          dc: 11
          affected: current_target
          on_fail:
            - primitive: apply_condition
              params: { condition_id: co_restrained, duration: until_actor_next_turn_start }
          on_success: []

behavior_profile:
  archetype: skirmisher
  presets: { retreat: cowardly, ability_selection: default, targeting: closest_enemy, action_economy: casual }
