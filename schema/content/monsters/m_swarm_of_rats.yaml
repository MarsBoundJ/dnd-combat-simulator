# m_swarm_of_rats — Swarm of Rats
# Source: SRD CC v5.2.1 p333
# Triage: GREEN — single Bites attack. Swarm is a declarative trait. The
# "half damage while Bloodied" clause is a conditional damage step
# (noted, not modeled — v1 uses the full 2d4). Climb 30 omitted.

id: m_swarm_of_rats
name: Swarm of Rats
source: srd_5.2.1

size: medium
creature_type: beast
type_tags: [swarm]
alignment: unaligned

combat:
  armor_class: 10
  hit_points: { average: 14, dice: "4d8", con_contribution: -4 }
  speed: { walk: 30 }
  initiative: { modifier: 0, score: 10 }

abilities:
  str: { score: 9, save: -1 }
  dex: { score: 11, save: 2 }
  con: { score: 9, save: -1 }
  int: { score: 2, save: -4 }
  wis: { score: 10, save: 0 }
  cha: { score: 3, save: -4 }

skills: {}
damage_resistances: [bludgeoning, piercing, slashing]
damage_vulnerabilities: []
damage_immunities: []
condition_immunities: [co_charmed, co_frightened, co_grappled, co_paralyzed, co_petrified, co_prone, co_restrained, co_stunned]

senses: { passive_perception: 10, special: { darkvision: 30 } }
languages: []

cr: { value: 0.25, xp: 50, proficiency_bonus: 2 }

traits:
  - id: t_swarm
    name: Swarm
    type: trait_passive
    # Declarative: occupies/shares spaces, can't regain HP or gain temp HP.

actions:
  - id: a_bites
    name: Bites
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 2, reach_ft: 5 }
      - primitive: damage
        params: { dice: "2d4", modifier: 0, type: piercing, average: 5 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

behavior_profile:
  archetype: mindless_aggressor
  presets: { retreat: ftd, ability_selection: default, targeting: closest_enemy, action_economy: casual }
