# m_harpy — Harpy
# Source: SRD CC v5.2.1 p298
# Triage: GREEN (core) — Claw weapon attack. Built WITHOUT "Luring Song"
# (a 300-ft Concentration emanation: WIS save → Charmed + Incapacitated +
# forced approach) — an aura/charm-emanation ability logged under "Aura
# traits". Fly 40 omitted (walk stand-in).

id: m_harpy
name: Harpy
source: srd_5.2.1

size: medium
creature_type: monstrosity
alignment: chaotic_evil

combat:
  armor_class: 11
  hit_points: { average: 38, dice: "7d8", con_contribution: 7 }
  speed: { walk: 20, fly: 40 }
  initiative: { modifier: 1, score: 11 }

abilities:
  str: { score: 12, save: 1 }
  dex: { score: 13, save: 1 }
  con: { score: 12, save: 1 }
  int: { score: 7, save: -2 }
  wis: { score: 10, save: 0 }
  cha: { score: 13, save: 1 }

skills: {}
damage_resistances: []
damage_vulnerabilities: []
damage_immunities: []
condition_immunities: []

senses: { passive_perception: 10 }
languages: [common]

cr: { value: 1, xp: 200, proficiency_bonus: 2 }

traits: []

actions:
  - id: a_claw
    name: Claw
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 3, reach_ft: 5 }
      - primitive: damage
        params: { dice: "2d4", modifier: 1, type: slashing, average: 6 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

behavior_profile:
  archetype: cowardly_skirmisher
  presets: { retreat: cowardly, ability_selection: default, targeting: weakest_target, action_economy: casual }
