# m_adult_brass_dragon — Adult Brass Dragon
# Source: SRD CC v5.2.1 p268
# Triage: GREEN for core kit — Multiattack of Rend (+ fire rider), recharge
# Fire Breath (DEX-save line), at-will Sleep Breath (CON-save cone →
# Incapacitated), Legendary Resistance (3/Day), Legendary Actions
# (Scorching Sands save + Pounce Rend).
# DEFERRED (see MONSTERS_NEED_ENGINE_WORK.md): **Scorching Ray** (its
# at-will offensive spell — a spell-ATTACK marker feature with no
# action_template, so monster_spellcasting can't expand it; not built as a
# cast action); the utility/innate spells (Detect Magic, Minor Illusion,
# Speak with Animals, Shapechange, 1/Day Detect Thoughts / Control Weather
# — non-combat or unbuilt); the Blazing Light legendary action (casts
# Scorching Ray). Sleep Breath's escalation to Unconscious and Scorching
# Sands' Speed-halved rider have no engine hook. Fly/Burrow omitted (walk
# stand-in).
id: m_adult_brass_dragon
name: Adult Brass Dragon
source: srd_5.2.1
size: huge
creature_type: dragon
type_tags: [metallic]
alignment: chaotic_good
combat:
  armor_class: 18
  hit_points: { average: 172, dice: "15d12", con_contribution: 75 }
  speed: { walk: 40, burrow: 30, fly: 80 }
  initiative: { modifier: 10, score: 20 }
abilities:
  str: { score: 23, save: 6 }
  dex: { score: 10, save: 5 }
  con: { score: 21, save: 5 }
  int: { score: 14, save: 2 }
  wis: { score: 13, save: 6 }
  cha: { score: 17, save: 3 }
skills: { history: 7, perception: 11, persuasion: 8, stealth: 5 }
damage_resistances: []
damage_vulnerabilities: []
damage_immunities: [fire]
condition_immunities: []
senses: { passive_perception: 21, special: { blindsight: 60, darkvision: 120 } }
languages: [common, draconic]
cr: { value: 13, xp: 10000, proficiency_bonus: 5 }
legendary_resistance: { uses: 3 }
spellcasting: { ability: charisma, save_dc: 16 }
traits: []
actions:
  - id: a_multiattack
    name: Multiattack
    type: multiattack
    count: 3
    sub_actions: [a_rend]
  - id: a_rend
    name: Rend
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 11, reach_ft: 10 }
      - primitive: damage
        params: { dice: "2d10", modifier: 6, type: slashing, average: 17 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: damage
        params: { dice: "1d8", modifier: 0, type: fire, average: 4 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
  - id: a_fire_breath
    name: Fire Breath
    type: aoe_attack
    recharge: "5-6"
    area: { shape: line, length_ft: 60, width_ft: 5 }
    pipeline:
      - primitive: forced_save
        params:
          ability: dexterity
          dc: 18
          affected: all_creatures_in_area
          on_fail:
            - primitive: damage
              params: { dice: "10d8", modifier: 0, type: fire, average: 45 }
          on_success:
            - primitive: damage
              params: { dice: "10d8", modifier: 0, type: fire, average: 45, multiplier: 0.5 }
  - id: a_sleep_breath
    name: Sleep Breath
    type: aoe_attack
    # at-will CON-save cone → Incapacitated (escalation to Unconscious on a
    # repeated failed save has no engine hook; first-stage Incapacitated modeled).
    area: { shape: cone, length_ft: 60 }
    pipeline:
      - primitive: forced_save
        params:
          ability: constitution
          dc: 18
          affected: all_creatures_in_area
          on_fail:
            - primitive: apply_condition
              params: { condition_id: co_incapacitated, duration: until_actor_next_turn_start }
          on_success: []
legendary_actions:
  uses_per_round: 3
  options:
    - id: la_blazing_light
      name: Blazing Light
      # "The dragon uses Spellcasting to cast Scorching Ray." No per-turn
      # limit in the stat block → no recharge gate. casts expands via the
      # spell-attack pc_builder using the dragon's spell attack bonus.
      casts: f_scorching_ray
      cost: 1
    - id: la_scorching_sands
      name: Scorching Sands
      type: save_effect
      # DEX save DC 16, one creature within 120 ft (Speed-halved rider omitted).
      pipeline:
        - primitive: forced_save
          params:
            ability: dexterity
            dc: 16
            affected: current_target
            on_fail:
              - primitive: damage
                params: { dice: "6d8", modifier: 0, type: fire, average: 27 }
            on_success: []
    - id: la_pounce
      name: Pounce
      type: multiattack
      count: 1
      sub_actions: [a_rend]
behavior_profile:
  archetype: apex_predator
  presets: { retreat: ftd, ability_selection: default, targeting: weakest_target, action_economy: skilled }
