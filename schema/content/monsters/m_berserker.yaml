# m_berserker — Berserker
# Source: SRD CC v5.2.1 p263
# Triage: GREEN — single weapon attack. Bloodied Frenzy (Advantage on
# attacks/saves while Bloodied) is a declarative conditional trait,
# recorded but not enforced (no bloodied-state attack modifier in v1).

id: m_berserker
name: Berserker
source: srd_5.2.1

size: medium
creature_type: humanoid
alignment: neutral

combat:
  armor_class: 13
  hit_points: { average: 67, dice: "9d8", con_contribution: 27 }
  speed: { walk: 30 }
  initiative: { modifier: 1, score: 11 }

abilities:
  str: { score: 16, save: 3 }
  dex: { score: 12, save: 1 }
  con: { score: 17, save: 3 }
  int: { score: 9, save: -1 }
  wis: { score: 11, save: 0 }
  cha: { score: 9, save: -1 }

skills: {}
damage_resistances: []
damage_vulnerabilities: []
damage_immunities: []
condition_immunities: []

gear: [greataxe, hide_armor]

senses: { passive_perception: 10 }
languages: [common]

cr: { value: 2, xp: 450, proficiency_bonus: 2 }

traits:
  - id: t_bloodied_frenzy
    name: Bloodied Frenzy
    type: trait_passive
    # Declarative: Advantage on attacks + saves while Bloodied. Not enforced.

actions:
  - id: a_greataxe
    name: Greataxe
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 5, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d12", modifier: 3, type: slashing, average: 9 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

behavior_profile:
  archetype: berserker_fanatic
  presets: { retreat: ftd, ability_selection: default, targeting: closest_enemy, action_economy: casual }
