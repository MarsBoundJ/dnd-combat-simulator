# m_myconid_spore_servant — Myconid Spore Servant
# Source: 2024 Monster Manual (MM-only; not in SRD 5.2.1)
# Triage: GREEN — Slam (Bludgeoning + Poison dual). Broad condition immunity
#   list (fungal undead-like construct).

id: m_myconid_spore_servant
name: Myconid Spore Servant
source: mm_2024

size: medium
creature_type: plant
alignment: unaligned

combat:
  armor_class: 13
  hit_points: { average: 37, dice: "5d8", con_contribution: 15 }
  speed: { walk: 20 }
  initiative: { modifier: 1, score: 11 }

abilities:
  str: { score: 16, save: 3 }
  dex: { score: 12, save: 1 }
  con: { score: 16, save: 3 }
  int: { score: 2, save: -4 }
  wis: { score: 6, save: -2 }
  cha: { score: 1, save: -5 }

damage_immunities: [poison]
condition_immunities: [co_blinded, co_charmed, co_deafened, co_exhaustion, co_frightened, co_poisoned]

senses: { passive_perception: 8, special: { blindsight: 30 } }

cr: { value: 1, xp: 200, proficiency_bonus: 2 }

habitat: [underdark]
treasure: any

actions:
  - id: a_slam
    name: Slam
    type: weapon_attack
    is_signature: true
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 5, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d6", modifier: 3, type: bludgeoning, average: 6 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: damage
        params: { dice: "1d4", modifier: 0, type: poison, average: 2 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

behavior_profile:
  archetype: brute
  presets: { retreat: never, ability_selection: default, targeting: closest_enemy, action_economy: aggressive }
