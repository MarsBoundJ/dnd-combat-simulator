# m_giant_crocodile — Giant Crocodile
# Source: SRD CC v5.2.1 p351
# Triage: GREEN — Multiattack (Bite + Tail); Bite grapples (co_grappled),
# Tail knocks Prone (co_prone) a Large-or-smaller target. Swim omitted.
id: m_giant_crocodile
name: Giant Crocodile
source: srd_5.2.1
size: huge
creature_type: beast
alignment: unaligned
combat:
  armor_class: 14
  hit_points: { average: 85, dice: "9d12", con_contribution: 27 }
  speed: { walk: 30 }
  initiative: { modifier: -1, score: 9 }
abilities:
  str: { score: 21, save: 5 }
  dex: { score: 9, save: -1 }
  con: { score: 17, save: 3 }
  int: { score: 2, save: -4 }
  wis: { score: 10, save: 0 }
  cha: { score: 7, save: -2 }
skills: { stealth: 5 }
damage_resistances: []
damage_vulnerabilities: []
damage_immunities: []
condition_immunities: []
senses: { passive_perception: 10 }
languages: []
cr: { value: 5, xp: 1800, proficiency_bonus: 3 }
traits:
  - id: t_hold_breath
    name: Hold Breath
    type: trait_passive
actions:
  - id: a_multiattack
    name: Multiattack
    type: multiattack
    count: 2
    sub_actions: [a_bite, a_tail]
  - id: a_bite
    name: Bite
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 8, reach_ft: 5 }
      - primitive: damage
        params: { dice: "3d10", modifier: 5, type: piercing, average: 21 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: apply_condition
        params: { condition_id: co_grappled, duration: until_removed }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
  - id: a_tail
    name: Tail
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 8, reach_ft: 10 }
      - primitive: damage
        params: { dice: "3d8", modifier: 5, type: bludgeoning, average: 18 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: apply_condition
        params: { condition_id: co_prone, duration: until_removed }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
behavior_profile:
  archetype: apex_predator
  presets: { retreat: ftd, ability_selection: default, targeting: weakest_target, action_economy: casual }
