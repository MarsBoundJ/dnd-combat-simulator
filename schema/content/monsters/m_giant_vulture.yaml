# m_giant_vulture — Giant Vulture
# Source: SRD CC v5.2.1 p354
# Triage: GREEN — single Gouge that poisons (existing co_poisoned) on a
# hit; Pack Tactics + Necrotic resistance declarative. Fly 60 omitted.
id: m_giant_vulture
name: Giant Vulture
source: srd_5.2.1
size: large
creature_type: monstrosity
alignment: neutral_evil
combat:
  armor_class: 10
  hit_points: { average: 25, dice: "3d10", con_contribution: 9 }
  speed: { walk: 10, fly: 60 }
  initiative: { modifier: 0, score: 10 }
abilities:
  str: { score: 15, save: 2 }
  dex: { score: 10, save: 0 }
  con: { score: 16, save: 3 }
  int: { score: 6, save: -2 }
  wis: { score: 12, save: 1 }
  cha: { score: 7, save: -2 }
skills: { perception: 3 }
damage_resistances: [necrotic]
damage_vulnerabilities: []
damage_immunities: []
condition_immunities: []
senses: { passive_perception: 13, special: { darkvision: 60 } }
languages: []
cr: { value: 1, xp: 200, proficiency_bonus: 2 }
traits:
  - id: t_pack_tactics
    name: Pack Tactics
    type: trait_passive
actions:
  - id: a_gouge
    name: Gouge
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 4, reach_ft: 5 }
      - primitive: damage
        params: { dice: "2d6", modifier: 2, type: piercing, average: 9 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: apply_condition
        params: { condition_id: co_poisoned, duration: until_actor_next_turn_start }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
behavior_profile:
  archetype: pack_hunter
  presets: { retreat: cowardly, ability_selection: default, targeting: weakest_target, action_economy: casual }
