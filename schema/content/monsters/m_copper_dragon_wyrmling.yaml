# m_copper_dragon_wyrmling — Copper Dragon Wyrmling
# Source: SRD CC v5.2.1 p276
# Triage: GREEN — single Rend + recharge Acid Breath (DEX-save line) +
# at-will Slowing Breath (CON-save cone → the existing co_slowed). Acid
# immunity declarative. Climb/Fly omitted.
id: m_copper_dragon_wyrmling
name: Copper Dragon Wyrmling
source: srd_5.2.1
size: medium
creature_type: dragon
type_tags: [metallic]
alignment: chaotic_good
combat:
  armor_class: 16
  hit_points: { average: 22, dice: "4d8", con_contribution: 4 }
  speed: { walk: 30 }
  initiative: { modifier: 3, score: 13 }
abilities:
  str: { score: 15, save: 2 }
  dex: { score: 12, save: 3 }
  con: { score: 13, save: 1 }
  int: { score: 14, save: 2 }
  wis: { score: 11, save: 2 }
  cha: { score: 13, save: 1 }
skills: { perception: 4, stealth: 3 }
damage_resistances: []
damage_vulnerabilities: []
damage_immunities: [acid]
condition_immunities: []
senses: { passive_perception: 14, special: { blindsight: 10, darkvision: 60 } }
languages: [draconic]
cr: { value: 1, xp: 200, proficiency_bonus: 2 }
traits: []
actions:
  - id: a_rend
    name: Rend
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 4, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d10", modifier: 2, type: slashing, average: 7 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
  - id: a_acid_breath
    name: Acid Breath
    type: aoe_attack
    recharge: "5-6"
    area: { shape: line, length_ft: 20, width_ft: 5 }
    pipeline:
      - primitive: forced_save
        params:
          ability: dexterity
          dc: 11
          affected: all_creatures_in_area
          on_fail:
            - primitive: damage
              params: { dice: "4d8", modifier: 0, type: acid, average: 18 }
          on_success:
            - primitive: damage
              params: { dice: "4d8", modifier: 0, type: acid, average: 18, multiplier: 0.5 }
  - id: a_slowing_breath
    name: Slowing Breath
    type: aoe_attack
    area: { shape: cone, length_ft: 15 }
    pipeline:
      - primitive: forced_save
        params:
          ability: constitution
          dc: 11
          affected: all_creatures_in_area
          on_fail:
            - primitive: apply_condition
              params: { condition_id: co_slowed, duration: until_actor_next_turn_start }
          on_success: []
behavior_profile:
  archetype: apex_predator
  presets: { retreat: ftd, ability_selection: default, targeting: weakest_target, action_economy: skilled }
