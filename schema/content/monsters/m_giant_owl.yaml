# m_giant_owl — Giant Owl
# Source: SRD CC v5.2.1
# Triage: GREEN core — Talons + Flyby. DEFERS innate Spellcasting (Detect Evil and Good / Detect Magic / Clairvoyance) → Monster Spellcasting bucket. Fly via walk.

id: m_giant_owl
name: Giant Owl
source: srd_5.2.1

size: large
creature_type: celestial
alignment: neutral

combat:
  armor_class: 12
  hit_points: { average: 19, dice: "3d10", con_contribution: 3 }
  speed: { walk: 5, fly: 60 }
  initiative: { modifier: 2, score: 12 }

abilities:
  str: { score: 13, save: 1 }
  dex: { score: 15, save: 2 }
  con: { score: 12, save: 1 }
  int: { score: 10, save: 0 }
  wis: { score: 14, save: 4 }
  cha: { score: 10, save: 0 }

skills: { perception: 6, stealth: 6 }
damage_resistances: [necrotic, radiant]
damage_vulnerabilities: []
damage_immunities: []
condition_immunities: []

senses: { passive_perception: 16, special: { darkvision: 120 } }
languages: [celestial]

cr: { value: 0.25, xp: 50, proficiency_bonus: 2 }

traits:
  - id: t_flyby
    name: Flyby
    type: trait_passive

actions:
  - id: a_talons
    name: Talons
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 4, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d10", modifier: 2, type: slashing, average: 7 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

behavior_profile:
  archetype: mindless_aggressor
  presets: { retreat: cowardly, ability_selection: default, targeting: closest_enemy, action_economy: casual }
