# m_mage — Mage
# Source: SRD CC v5.2.1 p305  (NOTE: the 2024 SRD lists the Mage at CR 6,
# not CR 9 — built to the PDF.)
# Triage: GREEN for its combat kit — Multiattack of Arcane Burst (its
# baseline ranged force attack) plus a Spellcasting action that casts the
# buildable damage spells Fireball (2/Day) and Cone of Cold (1/Day). Both
# casts expand from built spell features at the mage's spell save DC (INT,
# DC 14).
# DEFERRED (see MONSTERS_NEED_ENGINE_WORK.md → Monster Spellcasting):
#   - At-will utility cantrips Detect Magic / Light / Mage Hand /
#     Prestidigitation (non-combat) and Mage Armor (already baked into AC
#     15, "included in AC" — re-casting would double-count).
#   - Invisibility (2/Day) and Fly (1/Day): utility, not combat-modelable.
#   - Bonus action **Misty Step** (3/Day): spell not built (f_misty_step
#     missing).
#   - Reaction **Protective Magic** (3/Day, Counterspell / Shield): a
#     spell-trigger reaction — no monster reactive-cast path yet.
# Fireball is RAW 2/Day; the recharge system gates one cast per encounter
# (daily:1), so the second daily use is a v1 under-representation.
id: m_mage
name: Mage
source: srd_5.2.1
size: medium
creature_type: humanoid
alignment: neutral
combat:
  armor_class: 15
  hit_points: { average: 81, dice: "18d8", con_contribution: 0 }
  speed: { walk: 30 }
  initiative: { modifier: 2, score: 12 }
abilities:
  str: { score: 9, save: -1 }
  dex: { score: 14, save: 2 }
  con: { score: 11, save: 0 }
  int: { score: 17, save: 6 }
  wis: { score: 12, save: 4 }
  cha: { score: 11, save: 0 }
skills: { arcana: 6, history: 6, perception: 4 }
damage_resistances: []
damage_vulnerabilities: []
damage_immunities: []
condition_immunities: []
senses: { passive_perception: 14 }
languages: [common]
gear: [wand]
cr: { value: 6, xp: 2300, proficiency_bonus: 3 }
spellcasting: { ability: intelligence, save_dc: 14 }
traits: []
actions:
  - id: a_multiattack
    name: Multiattack
    type: multiattack
    count: 3
    sub_actions: [a_arcane_burst]
  - id: a_arcane_burst
    name: Arcane Burst
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: ranged, bonus: 6, range_ft: 120 }
      - primitive: damage
        params: { dice: "3d8", modifier: 3, type: force, average: 16 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
  - id: a_cast_fireball
    name: Fireball
    casts: f_fireball
    recharge: "daily:1"
  - id: a_cast_cone_of_cold
    name: Cone of Cold
    casts: f_cone_of_cold
    recharge: "daily:1"
behavior_profile:
  archetype: cowardly_skirmisher
  presets: { retreat: cowardly, ability_selection: default, targeting: weakest_target, action_economy: skilled }
