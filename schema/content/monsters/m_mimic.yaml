# m_mimic — Mimic
# Source: SRD CC v5.2.1 p309
# Triage: GREEN (core) — Bite + Pseudopod weapon attacks; Pseudopod
# applies the existing co_grappled on a hit. Adhesive is a declarative
# (object-form) trait. Built WITHOUT the "Shape-Shift" bonus action — a
# form change logged in MONSTERS_NEED_ENGINE_WORK.md under "Form change".
# The Bite's "extra damage if target Grappled" rider is noted, not enforced.

id: m_mimic
name: Mimic
source: srd_5.2.1

size: medium
creature_type: monstrosity
alignment: neutral

combat:
  armor_class: 12
  hit_points:
    average: 58
    dice: "9d8"
    con_contribution: 18
  speed:
    walk: 20
  initiative:
    modifier: 3
    score: 13

abilities:
  str: { score: 17, save: 3 }
  dex: { score: 12, save: 1 }
  con: { score: 15, save: 2 }
  int: { score: 5, save: -3 }
  wis: { score: 13, save: 1 }
  cha: { score: 8, save: -1 }

skills:
  stealth: 5
damage_resistances: []
damage_vulnerabilities: []
damage_immunities: [acid]
condition_immunities: [co_prone]

senses:
  passive_perception: 11
  special:
    darkvision: 60

languages: []

cr:
  value: 2
  xp: 450
  proficiency_bonus: 2

traits:
  - id: t_adhesive
    name: Adhesive (Object Form Only)
    type: trait_passive
    # Declarative: adheres to creatures that touch it (Grappled, escape
    # DC 13). Object-form ambush trait; not enforced in v1.

actions:
  - id: a_bite
    name: Bite
    type: weapon_attack
    # 1d8+3 piercing (2d8+3 if the target is Grappled — extra noted, not
    # enforced) plus 1d8 acid.
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 5, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d8", modifier: 3, type: piercing, average: 7 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: damage
        params: { dice: "1d8", modifier: 0, type: acid, average: 4 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

  - id: a_pseudopod
    name: Pseudopod
    type: weapon_attack
    # On a hit vs a Large-or-smaller creature, it has the Grappled
    # condition (escape DC 13).
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 5, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d8", modifier: 3, type: bludgeoning, average: 7 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: damage
        params: { dice: "1d8", modifier: 0, type: acid, average: 4 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: apply_condition
        params: { condition_id: co_grappled, duration: until_removed }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

behavior_profile:
  archetype: apex_predator
  presets:
    retreat: ftd
    ability_selection: default
    targeting: closest_enemy
    action_economy: casual
