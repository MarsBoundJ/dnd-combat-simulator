# m_psychic_gray_ooze — Psychic Gray Ooze
# Source: 2024 Monster Manual (MM-only; not in SRD 5.2.1)
# Triage: GREEN — Pseudopod (Acid); Psychic Crush (INT DC 10 → 3d8 Psychic).
#   DEFERRED: Mind Corrosion reaction (no reaction-counter-damage in v1);
#   Amorphous, Spider Climb declarative.

id: m_psychic_gray_ooze
name: Psychic Gray Ooze
source: mm_2024

size: medium
creature_type: ooze
alignment: unaligned

combat:
  armor_class: 9
  hit_points: { average: 37, dice: "5d8", con_contribution: 15 }
  speed: { walk: 10, climb: 10 }
  initiative: { modifier: -1, score: 9 }

abilities:
  str: { score: 12, save: 1 }
  dex: { score: 8, save: -1 }
  con: { score: 16, save: 3 }
  int: { score: 14, save: 2 }
  wis: { score: 10, save: 0 }
  cha: { score: 5, save: -3 }

damage_resistances: [acid, cold, fire, psychic]
condition_immunities: [co_blinded, co_charmed, co_deafened, co_exhaustion, co_frightened, co_prone]

senses: { passive_perception: 10, special: { blindsight: 60 } }

cr: { value: 1, xp: 200, proficiency_bonus: 2 }

habitat: [underdark]
treasure: none

traits:
  - id: t_amorphous
    name: Amorphous
    type: trait_passive
  - id: t_spider_climb
    name: Spider Climb
    type: trait_passive

actions:
  - id: a_pseudopod
    name: Pseudopod
    type: weapon_attack
    is_signature: true
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 3, reach_ft: 5 }
      - primitive: damage
        params: { dice: "3d6", modifier: 1, type: acid, average: 11 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

  - id: a_psychic_crush
    name: Psychic Crush
    type: save_effect
    pipeline:
      - primitive: forced_save
        params:
          ability: intelligence
          dc: 10
          affected: current_target
          on_fail:
            - primitive: damage
              params: { dice: "3d8", modifier: 0, type: psychic, average: 13 }
          on_success: []

behavior_profile:
  archetype: ambusher
  presets: { retreat: never, ability_selection: default, targeting: closest_enemy, action_economy: aggressive }
