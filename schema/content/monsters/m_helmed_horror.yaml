# m_helmed_horror — Helmed Horror
# Source: 2024 Monster Manual (MM-only; not in SRD 5.2.1)
# Triage: GREEN — Multiattack 2× Arcane Sword (Slashing + Force dual).
#   Magic Resistance modeled declaratively (t_magic_resistance).
#   DEFERRED: Spell Immunity (immunity to 3 creator-chosen spells) — no
#   spell-specific immunity primitive in v1; modeled declaratively.

id: m_helmed_horror
name: Helmed Horror
source: mm_2024

size: medium
creature_type: construct
alignment: neutral

combat:
  armor_class: 20
  hit_points: { average: 67, dice: "9d8", con_contribution: 27 }
  speed: { walk: 30, fly: 30 }
  initiative: { modifier: 3, score: 13 }

abilities:
  str: { score: 18, save: 4 }
  dex: { score: 13, save: 1 }
  con: { score: 16, save: 3 }
  int: { score: 10, save: 0 }
  wis: { score: 10, save: 0 }
  cha: { score: 10, save: 0 }

skills: { perception: 4 }

damage_immunities: [necrotic, poison]
condition_immunities: [co_blinded, co_charmed, co_deafened, co_exhaustion, co_frightened, co_paralyzed, co_petrified, co_poisoned, co_stunned]

senses: { passive_perception: 14, special: { blindsight: 60 } }
languages: ["Common"]

cr: { value: 4, xp: 1100, proficiency_bonus: 2 }

habitat: [any]
treasure: armaments

traits:
  - id: t_magic_resistance
    name: Magic Resistance
    type: trait_passive
  - id: t_spell_immunity
    name: Spell Immunity
    type: trait_passive

actions:
  - id: a_multiattack
    name: Multiattack
    type: multiattack
    count: 2
    sub_actions: ["a_arcane_sword"]

  - id: a_arcane_sword
    name: Arcane Sword
    type: weapon_attack
    is_signature: true
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 6, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d8", modifier: 4, type: slashing, average: 8 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: damage
        params: { dice: "1d10", modifier: 0, type: force, average: 5 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

behavior_profile:
  archetype: brute
  presets: { retreat: never, ability_selection: default, targeting: closest_enemy, action_economy: aggressive }
