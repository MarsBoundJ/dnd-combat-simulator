# m_owlbear — Owlbear
# Source: SRD CC v5.2.1 p320
# Triage: GREEN — Multiattack of Rend weapon attacks; no traits, no
# defer-trigger keywords. Climb 40 omitted (positional walk stand-in).

id: m_owlbear
name: Owlbear
source: srd_5.2.1

size: large
creature_type: monstrosity
alignment: unaligned

combat:
  armor_class: 13
  hit_points:
    average: 59
    dice: "7d10"
    con_contribution: 21
  speed:
    walk: 40
  initiative:
    modifier: 1
    score: 11

abilities:
  str: { score: 20, save: 5 }
  dex: { score: 12, save: 1 }
  con: { score: 17, save: 3 }
  int: { score: 3, save: -4 }
  wis: { score: 12, save: 1 }
  cha: { score: 7, save: -2 }

skills:
  perception: 5
damage_resistances: []
damage_vulnerabilities: []
damage_immunities: []
condition_immunities: []

senses:
  passive_perception: 15
  special:
    darkvision: 60

languages: []

cr:
  value: 3
  xp: 700
  proficiency_bonus: 2

traits: []

actions:
  - id: a_multiattack
    name: Multiattack
    type: multiattack
    count: 2
    sub_actions: [a_rend]

  - id: a_rend
    name: Rend
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 7, reach_ft: 5 }
      - primitive: damage
        params: { dice: "2d8", modifier: 5, type: slashing, average: 14 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

behavior_profile:
  archetype: apex_predator
  presets:
    retreat: ftd
    ability_selection: default
    targeting: weakest_target
    action_economy: casual
