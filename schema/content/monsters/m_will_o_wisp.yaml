# m_will_o_wisp — Will-o'-Wisp
# Source: SRD CC v5.2.1 p342
# Triage: GREEN (core) — Shock weapon (spell) attack. Built WITHOUT
# "Consume Life" (bonus action: kill a 0-HP creature + self-heal →
# "On-death / triggered effects") and "Vanish" (Concentration
# invisibility → "Reaction abilities"/utility). Ephemeral / Illumination /
# Incorporeal Movement are declarative traits. Fly 50 hover omitted.

id: m_will_o_wisp
name: Will-o'-Wisp
source: srd_5.2.1

size: tiny
creature_type: undead
alignment: chaotic_evil

combat:
  armor_class: 19
  hit_points: { average: 27, dice: "11d4", con_contribution: 0 }
  speed: { walk: 5 }
  initiative: { modifier: 9, score: 19 }

abilities:
  str: { score: 1, save: -5 }
  dex: { score: 28, save: 9 }
  con: { score: 10, save: 0 }
  int: { score: 13, save: 1 }
  wis: { score: 14, save: 2 }
  cha: { score: 11, save: 0 }

skills: {}
damage_resistances: [acid, bludgeoning, cold, fire, necrotic, piercing, slashing]
damage_vulnerabilities: []
damage_immunities: [lightning, poison]
condition_immunities: [co_exhaustion, co_grappled, co_paralyzed, co_petrified, co_poisoned, co_prone, co_restrained, co_unconscious]

senses: { passive_perception: 12, special: { darkvision: 120 } }
languages: [common]

cr: { value: 2, xp: 450, proficiency_bonus: 2 }

traits:
  - id: t_incorporeal_movement
    name: Incorporeal Movement
    type: trait_passive
  - id: t_illumination
    name: Illumination
    type: trait_passive
    # Declarative: sheds Bright Light 20 ft / Dim Light 20 ft beyond.

actions:
  - id: a_shock
    name: Shock
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 4, reach_ft: 5 }
      - primitive: damage
        params: { dice: "2d8", modifier: 2, type: lightning, average: 11 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

behavior_profile:
  archetype: cowardly_skirmisher
  presets: { retreat: cowardly, ability_selection: default, targeting: weakest_target, action_economy: skilled }
