# m_piranha — Piranha (also covers the 2014 MM "Quipper" stat block)
# Source: SRD CC v5.2.1
# Triage: GREEN — single Bite; Water Breathing declarative.
#   DEFERRED: Advantage when target not at full HP.

id: m_piranha
name: Piranha
source: srd_5.2.1

size: tiny
creature_type: beast
alignment: unaligned

combat:
  armor_class: 13
  hit_points: { average: 1, dice: "1d4", con_contribution: -1 }
  speed: { walk: 5, swim: 40 }
  initiative: { modifier: 3, score: 13 }

abilities:
  str: { score: 2, save: -4 }
  dex: { score: 16, save: 3 }
  con: { score: 9, save: -1 }
  int: { score: 1, save: -5 }
  wis: { score: 7, save: -2 }
  cha: { score: 2, save: -4 }

senses: { passive_perception: 8, special: { darkvision: 60 } }
languages: []

cr: { value: 0, xp: 10, proficiency_bonus: 2 }

habitat: [underwater]

traits:
  - id: t_water_breathing
    name: Water Breathing
    type: trait_passive

actions:
  - id: a_bite
    name: Bite
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 5, reach_ft: 5 }
      - primitive: damage
        params: { dice: "", modifier: 1, type: piercing, average: 1 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

behavior_profile:
  archetype: pack_hunter
  presets: { retreat: never, ability_selection: default, targeting: weakest_target, action_economy: casual }
