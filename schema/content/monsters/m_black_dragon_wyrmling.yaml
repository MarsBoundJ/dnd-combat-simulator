# m_black_dragon_wyrmling — Black Dragon Wyrmling
# Source: SRD CC v5.2.1 p264
# Triage: GREEN — Multiattack of Rend (+ acid rider) and a recharge Acid
# Breath (DEX-save line). Amphibious + Acid immunity declarative. Fly/Swim
# omitted (walk stand-in). No Legendary Actions at this tier.
id: m_black_dragon_wyrmling
name: Black Dragon Wyrmling
source: srd_5.2.1
size: medium
creature_type: dragon
type_tags: [chromatic]
alignment: chaotic_evil
combat:
  armor_class: 17
  hit_points: { average: 33, dice: "6d8", con_contribution: 6 }
  speed: { walk: 30, fly: 60, swim: 30 }
  initiative: { modifier: 4, score: 14 }
abilities:
  str: { score: 15, save: 2 }
  dex: { score: 14, save: 4 }
  con: { score: 13, save: 1 }
  int: { score: 10, save: 0 }
  wis: { score: 11, save: 2 }
  cha: { score: 13, save: 1 }
skills: { perception: 4, stealth: 4 }
damage_resistances: []
damage_vulnerabilities: []
damage_immunities: [acid]
condition_immunities: []
senses: { passive_perception: 14, special: { blindsight: 10, darkvision: 60 } }
languages: [draconic]
cr: { value: 2, xp: 450, proficiency_bonus: 2 }
traits: []
actions:
  - id: a_multiattack
    name: Multiattack
    type: multiattack
    count: 2
    sub_actions: [a_rend]
  - id: a_rend
    name: Rend
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 4, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d6", modifier: 2, type: slashing, average: 5 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: damage
        params: { dice: "1d4", modifier: 0, type: acid, average: 2 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
  - id: a_acid_breath
    name: Acid Breath
    type: aoe_attack
    recharge: "5-6"
    area: { shape: line, length_ft: 15, width_ft: 5 }
    pipeline:
      - primitive: forced_save
        params:
          ability: dexterity
          dc: 11
          affected: all_creatures_in_area
          on_fail:
            - primitive: damage
              params: { dice: "5d8", modifier: 0, type: acid, average: 22 }
          on_success:
            - primitive: damage
              params: { dice: "5d8", modifier: 0, type: acid, average: 22, multiplier: 0.5 }
behavior_profile:
  archetype: apex_predator
  presets: { retreat: ftd, ability_selection: default, targeting: weakest_target, action_economy: skilled }
