# m_adult_copper_dragon — Adult Copper Dragon
# Source: SRD CC v5.2.1 p276
# Triage: GREEN for core kit — Multiattack of Rend (+ acid rider), recharge
# Acid Breath (DEX-save line), at-will Slowing Breath (CON-save cone →
# co_slowed), Legendary Resistance (3/Day), Legendary Actions (Giggling
# Magic save + Pounce Rend), and an at-will Mind Spike cast (via
# `casts: f_mind_spike`).
# DEFERRED (see MONSTERS_NEED_ENGINE_WORK.md): the utility/innate spells
# (Detect Magic, Minor Illusion, Shapechange, 1/Day Greater Restoration /
# Major Image — non-combat or unbuilt); the Mind Jolt legendary action
# (casts Mind Spike — `casts` not expanded in LA option position; spell
# available as a normal action instead). Giggling Magic's d6 D20-Test
# penalty rider has no engine hook. Fly/Climb omitted (walk stand-in).
id: m_adult_copper_dragon
name: Adult Copper Dragon
source: srd_5.2.1
size: huge
creature_type: dragon
type_tags: [metallic]
alignment: chaotic_good
combat:
  armor_class: 18
  hit_points: { average: 184, dice: "16d12", con_contribution: 80 }
  speed: { walk: 40 }
  initiative: { modifier: 11, score: 21 }
abilities:
  str: { score: 23, save: 6 }
  dex: { score: 12, save: 6 }
  con: { score: 21, save: 5 }
  int: { score: 18, save: 4 }
  wis: { score: 15, save: 7 }
  cha: { score: 18, save: 4 }
skills: { deception: 9, perception: 12, stealth: 6 }
damage_resistances: []
damage_vulnerabilities: []
damage_immunities: [acid]
condition_immunities: []
senses: { passive_perception: 22, special: { blindsight: 60, darkvision: 120 } }
languages: [common, draconic]
cr: { value: 14, xp: 11500, proficiency_bonus: 5 }
legendary_resistance: { uses: 3 }
spellcasting: { ability: charisma, save_dc: 17 }
traits: []
actions:
  - id: a_multiattack
    name: Multiattack
    type: multiattack
    count: 3
    sub_actions: [a_rend]
  - id: a_rend
    name: Rend
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 11, reach_ft: 10 }
      - primitive: damage
        params: { dice: "2d10", modifier: 6, type: slashing, average: 17 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: damage
        params: { dice: "1d8", modifier: 0, type: acid, average: 4 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
  - id: a_acid_breath
    name: Acid Breath
    type: aoe_attack
    recharge: "5-6"
    area: { shape: line, length_ft: 60, width_ft: 5 }
    pipeline:
      - primitive: forced_save
        params:
          ability: dexterity
          dc: 18
          affected: all_creatures_in_area
          on_fail:
            - primitive: damage
              params: { dice: "12d8", modifier: 0, type: acid, average: 54 }
          on_success:
            - primitive: damage
              params: { dice: "12d8", modifier: 0, type: acid, average: 54, multiplier: 0.5 }
  - id: a_slowing_breath
    name: Slowing Breath
    type: aoe_attack
    # at-will CON-save cone → the existing co_slowed (RAW: no Reactions,
    # halved Speed, one action OR bonus action — co_slowed is the stand-in).
    area: { shape: cone, length_ft: 60 }
    pipeline:
      - primitive: forced_save
        params:
          ability: constitution
          dc: 18
          affected: all_creatures_in_area
          on_fail:
            - primitive: apply_condition
              params: { condition_id: co_slowed, duration: until_actor_next_turn_start }
          on_success: []
  - id: a_cast_mind_spike
    name: Mind Spike
    casts: f_mind_spike
legendary_actions:
  uses_per_round: 3
  options:
    - id: la_giggling_magic
      name: Giggling Magic
      type: save_effect
      # CHA save DC 17, one creature within 90 ft (the d6 D20-Test penalty
      # rider is omitted — no engine hook; psychic damage modeled).
      pipeline:
        - primitive: forced_save
          params:
            ability: charisma
            dc: 17
            affected: current_target
            on_fail:
              - primitive: damage
                params: { dice: "7d6", modifier: 0, type: psychic, average: 24 }
            on_success: []
    - id: la_pounce
      name: Pounce
      type: multiattack
      count: 1
      sub_actions: [a_rend]
behavior_profile:
  archetype: apex_predator
  presets: { retreat: ftd, ability_selection: default, targeting: weakest_target, action_economy: skilled }
