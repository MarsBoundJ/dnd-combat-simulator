# m_modron_duodrone — Modron Duodrone
# Source: 2024 Monster Manual (MM-only; not in SRD 5.2.1)
# Triage: GREEN — Multiattack of two Clockwork Blade (Force).
#   DEFERRED: Disintegration on death (flavor; no death-trigger primitive in v1).

id: m_modron_duodrone
name: Modron Duodrone
source: mm_2024

size: medium
creature_type: construct
alignment: lawful neutral

combat:
  armor_class: 15
  hit_points: { average: 11, dice: "2d8", con_contribution: 2 }
  speed: { walk: 30 }
  initiative: { modifier: 1, score: 11 }

abilities:
  str: { score: 11, save: 0 }
  dex: { score: 13, save: 1 }
  con: { score: 12, save: 1 }
  int: { score: 6, save: -2 }
  wis: { score: 10, save: 0 }
  cha: { score: 7, save: -2 }

condition_immunities: [co_charmed]

senses: { passive_perception: 10, special: { truesight: 120 } }
languages: ["Modron"]

cr: { value: 0.25, xp: 50, proficiency_bonus: 2 }

habitat: [mechanus]
treasure: none

traits:
  - id: t_disintegration
    name: Disintegration
    type: trait_passive

actions:
  - id: a_multiattack
    name: Multiattack
    type: multiattack
    count: 2
    sub_actions: [a_clockwork_blade]
  - id: a_clockwork_blade
    name: Clockwork Blade
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 3, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d6", modifier: 1, type: force, average: 4 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

behavior_profile:
  archetype: soldier
  presets: { retreat: never, ability_selection: default, targeting: closest_enemy, action_economy: casual }
