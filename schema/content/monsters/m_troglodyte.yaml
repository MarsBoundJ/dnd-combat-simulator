# m_troglodyte — Troglodyte
# Source: 2024 Monster Manual (MM-only; not in SRD 5.2.1)
# Triage: GREEN — Rend + Stench aura (CON save → Poisoned, immune-on-success).
#   DEFERRED: Sunlight Sensitivity (declarative).

id: m_troglodyte
name: Troglodyte
source: mm_2024

size: medium
creature_type: monstrosity
alignment: chaotic evil

combat:
  armor_class: 11
  hit_points: { average: 13, dice: "2d8", con_contribution: 4 }
  speed: { walk: 30, climb: 30 }
  initiative: { modifier: 0, score: 10 }

abilities:
  str: { score: 14, save: 2 }
  dex: { score: 10, save: 0 }
  con: { score: 14, save: 2 }
  int: { score: 6, save: -2 }
  wis: { score: 10, save: 0 }
  cha: { score: 6, save: -2 }

skills: { stealth: 4 }

senses: { passive_perception: 10, special: { darkvision: 60 } }
languages: ["Troglodyte"]

cr: { value: 0.25, xp: 50, proficiency_bonus: 2 }

habitat: [underdark]
treasure: armaments

traits:
  - id: t_sunlight_sensitivity
    name: Sunlight Sensitivity
    type: trait_passive

auras:
  - id: aura_stench
    name: Stench
    range_ft: 5
    save: { ability: constitution, dc: 12 }
    on_fail:
      - primitive: apply_condition
        params: { condition_id: co_poisoned, duration: until_actor_next_turn_start }
    on_success: []
    affected: enemies
    immune_on_success: true

actions:
  - id: a_rend
    name: Rend
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 4, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d6", modifier: 2, type: slashing, average: 5 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

behavior_profile:
  archetype: skirmisher
  presets: { retreat: cowardly, ability_selection: default, targeting: closest_enemy, action_economy: casual }
