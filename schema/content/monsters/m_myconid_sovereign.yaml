# m_myconid_sovereign — Myconid Sovereign
# Source: 2024 Monster Manual (MM-only; not in SRD 5.2.1)
# Triage: GREEN — Multiattack (Slam + Pacifying Spores). Slam (Bludgeoning +
#   Poison dual); Pacifying Spores (CON DC 12 → co_stunned).
#   DEFERRED: Animating Spores, Rapport Spores (utility); Sun Sickness declarative.

id: m_myconid_sovereign
name: Myconid Sovereign
source: mm_2024

size: large
creature_type: plant
alignment: lawful neutral

combat:
  armor_class: 13
  hit_points: { average: 45, dice: "6d10", con_contribution: 12 }
  speed: { walk: 30 }
  initiative: { modifier: 0, score: 10 }

abilities:
  str: { score: 12, save: 1 }
  dex: { score: 10, save: 0 }
  con: { score: 14, save: 2 }
  int: { score: 13, save: 1 }
  wis: { score: 15, save: 2 }
  cha: { score: 10, save: 0 }

senses: { passive_perception: 12, special: { darkvision: 120 } }

cr: { value: 2, xp: 450, proficiency_bonus: 2 }

habitat: [underdark]
treasure: any

traits:
  - id: t_sun_sickness
    name: Sun Sickness
    type: trait_passive

actions:
  - id: a_multiattack
    name: Multiattack
    type: multiattack
    count: 2
    sub_actions: ["a_slam", "a_pacifying_spores"]

  - id: a_slam
    name: Slam
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 3, reach_ft: 5 }
      - primitive: damage
        params: { dice: "2d4", modifier: 1, type: bludgeoning, average: 6 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: damage
        params: { dice: "2d4", modifier: 0, type: poison, average: 5 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

  - id: a_pacifying_spores
    name: Pacifying Spores
    type: save_effect
    pipeline:
      - primitive: forced_save
        params:
          ability: constitution
          dc: 12
          affected: current_target
          on_fail:
            - primitive: apply_condition
              params: { condition_id: co_stunned, duration: until_actor_next_turn_start }
          on_success: []

behavior_profile:
  archetype: support
  presets: { retreat: cowardly, ability_selection: default, targeting: closest_enemy, action_economy: casual }
