# m_performer — Performer
# Source: 2024 Monster Manual (MM-only; not in SRD 5.2.1)
# Triage: GREEN — Shortsword (+5, 1d6+3 Piercing).
#   DEFERRED: Uncanny Dodge reaction (no half-damage reaction in v1).

id: m_performer
name: Performer
source: mm_2024

size: medium
creature_type: humanoid
alignment: any alignment

combat:
  armor_class: 13
  hit_points: { average: 27, dice: "5d8", con_contribution: 5 }
  speed: { walk: 35 }
  initiative: { modifier: 2, score: 12 }

abilities:
  str: { score: 10, save: 0 }
  dex: { score: 16, save: 3 }
  con: { score: 13, save: 1 }
  int: { score: 12, save: 1 }
  wis: { score: 11, save: 0 }
  cha: { score: 16, save: 3 }

skills: { performance: 5, persuasion: 5, acrobatics: 4 }

senses: { passive_perception: 10 }
languages: ["Common"]

cr: { value: 0.5, xp: 100, proficiency_bonus: 2 }

habitat: [any]
treasure: implements

actions:
  - id: a_shortsword
    name: Shortsword
    type: weapon_attack
    is_signature: true
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 5, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d6", modifier: 3, type: piercing, average: 6 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

behavior_profile:
  archetype: skirmisher
  presets: { retreat: cowardly, ability_selection: default, targeting: weakest_target, action_economy: casual }
