# m_green_dragon_wyrmling — Green Dragon Wyrmling
# Source: SRD CC v5.2.1 p267
# Triage: GREEN — Multiattack of Rend (+ poison rider) + recharge Poison
# Breath (CON-save cone). Poison immunity + Poisoned-condition immunity +
# Amphibious declarative. Fly/Swim omitted.
id: m_green_dragon_wyrmling
name: Green Dragon Wyrmling
source: srd_5.2.1
size: medium
creature_type: dragon
type_tags: [chromatic]
alignment: lawful_evil
combat:
  armor_class: 17
  hit_points: { average: 38, dice: "7d8", con_contribution: 7 }
  speed: { walk: 30, fly: 60, swim: 30 }
  initiative: { modifier: 3, score: 13 }
abilities:
  str: { score: 15, save: 2 }
  dex: { score: 12, save: 3 }
  con: { score: 13, save: 1 }
  int: { score: 14, save: 2 }
  wis: { score: 11, save: 2 }
  cha: { score: 13, save: 1 }
skills: { perception: 4, stealth: 3 }
damage_resistances: []
damage_vulnerabilities: []
damage_immunities: [poison]
condition_immunities: [co_poisoned]
senses: { passive_perception: 14, special: { blindsight: 10, darkvision: 60 } }
languages: [draconic]
cr: { value: 2, xp: 450, proficiency_bonus: 2 }
traits: []
actions:
  - id: a_multiattack
    name: Multiattack
    type: multiattack
    count: 2
    sub_actions: [a_rend]
  - id: a_rend
    name: Rend
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 4, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d10", modifier: 2, type: slashing, average: 7 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: damage
        params: { dice: "1d6", modifier: 0, type: poison, average: 3 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
  - id: a_poison_breath
    name: Poison Breath
    type: aoe_attack
    recharge: "5-6"
    area: { shape: cone, length_ft: 15 }
    pipeline:
      - primitive: forced_save
        params:
          ability: constitution
          dc: 11
          affected: all_creatures_in_area
          on_fail:
            - primitive: damage
              params: { dice: "6d6", modifier: 0, type: poison, average: 21 }
          on_success:
            - primitive: damage
              params: { dice: "6d6", modifier: 0, type: poison, average: 21, multiplier: 0.5 }
behavior_profile:
  archetype: apex_predator
  presets: { retreat: ftd, ability_selection: default, targeting: weakest_target, action_economy: skilled }
