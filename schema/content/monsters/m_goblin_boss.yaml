# m_goblin_boss — Goblin Boss
# Source: SRD CC v5.2.1 p289
# Triage: GREEN (core) — Multiattack of weapon attacks + Nimble Escape.
# Built WITHOUT the "Redirect Attack" reaction (swap places with an ally
# to make them the target) — logged in MONSTERS_NEED_ENGINE_WORK.md under
# "Reaction abilities".

id: m_goblin_boss
name: Goblin Boss
source: srd_5.2.1

size: small
creature_type: fey
type_tags: [goblinoid]
alignment: chaotic_neutral

combat:
  armor_class: 17
  hit_points:
    average: 21
    dice: "6d6"
    con_contribution: 0
  speed:
    walk: 30
  initiative:
    modifier: 2
    score: 12

abilities:
  str: { score: 10, save: 0 }
  dex: { score: 15, save: 2 }
  con: { score: 10, save: 0 }
  int: { score: 10, save: 0 }
  wis: { score: 8, save: -1 }
  cha: { score: 10, save: 0 }

skills:
  stealth: 6
damage_resistances: []
damage_vulnerabilities: []
damage_immunities: []
condition_immunities: []

gear: [chain_shirt, scimitar, shield, shortbow]

senses:
  passive_perception: 9
  special:
    darkvision: 60

languages: [common, goblin]

cr:
  value: 1
  xp: 200
  proficiency_bonus: 2

traits: []

actions:
  - id: a_multiattack
    name: Multiattack
    type: multiattack
    count: 2
    sub_actions: [a_scimitar, a_shortbow]

  - id: a_scimitar
    name: Scimitar
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 4, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d6", modifier: 2, type: slashing, average: 5 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: damage
        params: { dice: "1d4", modifier: 0, type: slashing, average: 2 }
        when:
          event: damage_roll
          condition: "combat.attack_state == hit AND combat.attack_had_advantage"

  - id: a_shortbow
    name: Shortbow
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: ranged, bonus: 4, range: [80, 320] }
      - primitive: damage
        params: { dice: "1d6", modifier: 2, type: piercing, average: 5 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: damage
        params: { dice: "1d4", modifier: 0, type: piercing, average: 2 }
        when:
          event: damage_roll
          condition: "combat.attack_state == hit AND combat.attack_had_advantage"

bonus_actions:
  - id: ba_nimble_escape
    name: Nimble Escape
    type: choose_action
    is_signature: true
    options:
      - granted_action: disengage
      - granted_action: hide

behavior_profile:
  archetype: cunning_tactician
  presets:
    retreat: cowardly
    ability_selection: default
    targeting: weakest_target
    action_economy: skilled
