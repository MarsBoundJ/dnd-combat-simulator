# m_thri_kreen_marauder — Thri-kreen Marauder
# Source: 2024 Monster Manual (MM-only; not in SRD 5.2.1)
# Triage: GREEN — Multiattack 2× Gythka (Slashing + Poison dual); Chatkcha
#   (ranged Slashing).

id: m_thri_kreen_marauder
name: Thri-kreen Marauder
source: mm_2024

size: medium
creature_type: monstrosity
alignment: chaotic neutral

combat:
  armor_class: 15
  hit_points: { average: 33, dice: "6d8", con_contribution: 6 }
  speed: { walk: 40 }
  initiative: { modifier: 2, score: 12 }

abilities:
  str: { score: 12, save: 1 }
  dex: { score: 14, save: 2 }
  con: { score: 13, save: 1 }
  int: { score: 8, save: -1 }
  wis: { score: 12, save: 1 }
  cha: { score: 8, save: -1 }

skills: { perception: 3, stealth: 4, survival: 3 }

senses: { passive_perception: 13, special: { darkvision: 60 } }
languages: ["Thri-kreen"]

cr: { value: 1, xp: 200, proficiency_bonus: 2 }

habitat: [desert, grassland]
treasure: armaments

actions:
  - id: a_multiattack
    name: Multiattack
    type: multiattack
    count: 2
    sub_actions: ["a_gythka"]

  - id: a_gythka
    name: Gythka
    type: weapon_attack
    is_signature: true
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 3, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d8", modifier: 1, type: slashing, average: 5 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: damage
        params: { dice: "1d4", modifier: 0, type: poison, average: 2 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

  - id: a_chatkcha
    name: Chatkcha
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: ranged, bonus: 4, reach_ft: 30 }
      - primitive: damage
        params: { dice: "1d6", modifier: 2, type: slashing, average: 5 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

behavior_profile:
  archetype: skirmisher
  presets: { retreat: cowardly, ability_selection: default, targeting: weakest_target, action_economy: casual }
