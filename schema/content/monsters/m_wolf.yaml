# m_wolf — Wolf
# Source: SRD CC v5.2.1 p347
# Triage: GREEN — single weapon attack that knocks Prone (existing
# co_prone) on a hit. Pack Tactics is a declarative trait (conditional
# attack advantage; recorded, not yet enforced — no positional-advantage
# modifier in v1). Speed 40 is walk.

id: m_wolf
name: Wolf
source: srd_5.2.1

size: medium
creature_type: beast
alignment: unaligned

combat:
  armor_class: 12
  hit_points:
    average: 11
    dice: "2d8"
    con_contribution: 2
  speed:
    walk: 40
  initiative:
    modifier: 2
    score: 12

abilities:
  str: { score: 14, save: 2 }
  dex: { score: 15, save: 2 }
  con: { score: 12, save: 1 }
  int: { score: 3, save: -4 }
  wis: { score: 12, save: 1 }
  cha: { score: 6, save: -2 }

skills:
  perception: 5
  stealth: 4
damage_resistances: []
damage_vulnerabilities: []
damage_immunities: []
condition_immunities: []

senses:
  passive_perception: 15
  special:
    darkvision: 60

languages: []

cr:
  value: 0.25
  xp: 50
  proficiency_bonus: 2

traits:
  - id: t_pack_tactics
    name: Pack Tactics
    type: trait_passive
    # Declarative: Advantage on attacks vs a creature with an ally within
    # 5 ft of it. Not enforced in v1 (no positional-advantage modifier).

actions:
  - id: a_bite
    name: Bite
    type: weapon_attack
    # On a hit vs a Large-or-smaller creature, the target is knocked Prone.
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 4, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d6", modifier: 2, type: piercing, average: 5 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: apply_condition
        params: { condition_id: co_prone, duration: until_removed }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

behavior_profile:
  archetype: pack_hunter
  presets:
    retreat: ftd
    ability_selection: default
    targeting: weakest_target
    action_economy: casual
