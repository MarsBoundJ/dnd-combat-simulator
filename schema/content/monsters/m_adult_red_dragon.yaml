# m_adult_red_dragon — Adult Red Dragon
# Source: 2024 Monster Manual / SRD CC v5.2.1 p317-318
# Full 2024 stat block: Multiattack (3× Rend with fire rider, or replace
# one with Scorching Ray), recharge Fire Breath (DEX-save 60-ft cone),
# At-Will Spellcasting (Command L2, Scorching Ray), 1/Day Fireball,
# Legendary Resistance (3/Day, 4 in lair), Legendary Actions
# (Commanding Presence, Fiery Rays, Pounce).
#
# DEFERRED:
#   - Multiattack "replace one Rend with Scorching Ray" option — modeled
#     as separate actions; the AI picks between 3×Rend vs Scorching Ray.
#   - Command L2 multi-target (upcast +1 creature) — single-target Halt.
#   - Per-round cooldowns for Bronze Dragon's Guiding Light (same
#     once_per_round field, just not tagged yet).
#   - Lair Actions (initiative-20 environmental effects).
#   - Pounce's half-Speed move; modeled as 1× Rend.
#   - Detect Magic (non-combat utility).
id: m_adult_red_dragon
name: Adult Red Dragon
source: srd_5.2.1
size: huge
creature_type: dragon
type_tags: [chromatic]
alignment: chaotic_evil
combat:
  armor_class: 19
  hit_points: { average: 256, dice: "19d12", con_contribution: 133 }
  speed: { walk: 40, climb: 40, fly: 80 }
  initiative: { modifier: 12, score: 22 }
abilities:
  str: { score: 27, save: 8 }
  dex: { score: 10, save: 6 }
  con: { score: 25, save: 7 }
  int: { score: 16, save: 3 }
  wis: { score: 13, save: 7 }
  cha: { score: 23, save: 6 }
skills: { perception: 13, stealth: 6 }
damage_resistances: []
damage_vulnerabilities: []
damage_immunities: [fire]
condition_immunities: []
senses: { passive_perception: 23, special: { blindsight: 60, darkvision: 120 } }
languages: [common, draconic]
cr: { value: 17, xp: 18000, proficiency_bonus: 6 }
legendary_resistance: { uses: 3 }
spellcasting: { ability: charisma, save_dc: 20, attack_bonus: 12 }
traits: []
actions:
  - id: a_multiattack
    name: Multiattack
    type: multiattack
    count: 3
    sub_actions: [a_rend]
  - id: a_rend
    name: Rend
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 14, reach_ft: 10 }
      - primitive: damage
        params: { dice: "1d10", modifier: 8, type: slashing, average: 13 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: damage
        params: { dice: "2d4", modifier: 0, type: fire, average: 5 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
  - id: a_fire_breath
    name: Fire Breath
    type: aoe_attack
    recharge: "5-6"
    area: { shape: cone, length_ft: 60 }
    pipeline:
      - primitive: forced_save
        params:
          ability: dexterity
          dc: 21
          affected: all_creatures_in_area
          on_fail:
            - primitive: damage
              params: { dice: "17d6", modifier: 0, type: fire, average: 59 }
          on_success:
            - primitive: damage
              params: { dice: "17d6", modifier: 0, type: fire, average: 59, multiplier: 0.5 }
  # At Will — Scorching Ray (3 rays, +12 to hit, 2d6 fire each, 120 ft)
  - id: a_scorching_ray
    name: Scorching Ray
    casts: f_scorching_ray
  # 1/Day — Fireball (20-ft sphere, DEX DC 20, 8d6 fire, 150 ft)
  - id: a_fireball
    name: Fireball
    casts: f_fireball
    recharge: "daily:1"
legendary_actions:
  uses_per_round: 3
  options:
    # Command (L2) — WIS DC 20 or waste next turn (Halt). At will,
    # but RAW "can't take this action again until start of next turn."
    - id: la_commanding_presence
      name: Commanding Presence
      casts: f_command
      cost: 1
      once_per_round: true
    # Scorching Ray — 3 rays +12 to hit, 2d6 fire each. At will,
    # but RAW "can't take this action again until start of next turn."
    - id: la_fiery_rays
      name: Fiery Rays
      casts: f_scorching_ray
      cost: 1
      once_per_round: true
    - id: la_pounce
      name: Pounce
      type: multiattack
      count: 1
      sub_actions: [a_rend]
behavior_profile:
  archetype: apex_predator
  presets: { retreat: ftd, ability_selection: default, targeting: weakest_target, action_economy: skilled }
