# m_gladiator — Gladiator
# Source: SRD CC v5.2.1 p288
# Triage: GREEN (core) — Multiattack of Spear attacks; Shield Bash is a
# forced_save (STR DC 15) dealing damage + applying the existing co_prone.
# Built WITHOUT the "Parry" reaction (+3 AC) — logged under "Reaction
# abilities".

id: m_gladiator
name: Gladiator
source: srd_5.2.1

size: medium
creature_type: humanoid
alignment: neutral

combat:
  armor_class: 16
  hit_points: { average: 112, dice: "15d8", con_contribution: 45 }
  speed: { walk: 30 }
  initiative: { modifier: 5, score: 15 }

abilities:
  str: { score: 18, save: 7 }
  dex: { score: 15, save: 5 }
  con: { score: 16, save: 6 }
  int: { score: 10, save: 0 }
  wis: { score: 12, save: 4 }
  cha: { score: 15, save: 2 }

skills: { athletics: 10, performance: 5 }
damage_resistances: []
damage_vulnerabilities: []
damage_immunities: []
condition_immunities: []

gear: [shield, spear, studded_leather_armor]

senses: { passive_perception: 11 }
languages: [common]

cr: { value: 5, xp: 1800, proficiency_bonus: 3 }

traits: []

actions:
  - id: a_multiattack
    name: Multiattack
    type: multiattack
    count: 3
    sub_actions: [a_spear]

  - id: a_spear
    name: Spear
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 7, reach_ft: 5, range: [20, 60] }
      - primitive: damage
        params: { dice: "2d6", modifier: 4, type: piercing, average: 11 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

  - id: a_shield_bash
    name: Shield Bash
    type: save_effect
    # STR save DC 15, one creature within 5 ft. On a fail: 2d4+4
    # bludgeoning, and a Medium-or-smaller target is knocked Prone.
    pipeline:
      - primitive: forced_save
        params:
          ability: strength
          dc: 15
          affected: current_target
          on_fail:
            - primitive: damage
              params: { dice: "2d4", modifier: 4, type: bludgeoning, average: 9 }
            - primitive: apply_condition
              params: { condition_id: co_prone, duration: until_removed }
          on_success: []

behavior_profile:
  archetype: apex_predator
  presets: { retreat: ftd, ability_selection: default, targeting: weakest_target, action_economy: skilled }
