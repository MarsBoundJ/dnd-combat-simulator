# m_brown_bear — Brown Bear
# Source: SRD CC v5.2.1 p271
# Triage: GREEN — Multiattack (Bite + Claw); Claw knocks Prone (existing
# co_prone) on a hit. Climb 30 omitted (walk stand-in).

id: m_brown_bear
name: Brown Bear
source: srd_5.2.1

size: large
creature_type: beast
alignment: unaligned

combat:
  armor_class: 11
  hit_points: { average: 22, dice: "3d10", con_contribution: 6 }
  speed: { walk: 40 }
  initiative: { modifier: 1, score: 11 }

abilities:
  str: { score: 17, save: 3 }
  dex: { score: 12, save: 1 }
  con: { score: 15, save: 2 }
  int: { score: 2, save: -4 }
  wis: { score: 13, save: 1 }
  cha: { score: 7, save: -2 }

skills: { perception: 3 }
damage_resistances: []
damage_vulnerabilities: []
damage_immunities: []
condition_immunities: []

senses: { passive_perception: 13, special: { darkvision: 60 } }
languages: []

cr: { value: 1, xp: 200, proficiency_bonus: 2 }

traits: []

actions:
  - id: a_multiattack
    name: Multiattack
    type: multiattack
    count: 2
    sub_actions: [a_bite, a_claw]

  - id: a_bite
    name: Bite
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 5, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d8", modifier: 3, type: piercing, average: 7 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

  - id: a_claw
    name: Claw
    type: weapon_attack
    # On a hit vs a Large-or-smaller creature, the target is knocked Prone.
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 5, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d4", modifier: 3, type: slashing, average: 5 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: apply_condition
        params: { condition_id: co_prone, duration: until_removed }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

behavior_profile:
  archetype: apex_predator
  presets: { retreat: ftd, ability_selection: default, targeting: closest_enemy, action_economy: casual }
