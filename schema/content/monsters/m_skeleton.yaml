# m_skeleton — Skeleton
# Source: SRD CC v5.2.1 p326
# Triage: GREEN — weapon attacks; declarative damage vuln/immunities +
# condition immunities; no defer-trigger keywords.

id: m_skeleton
name: Skeleton
source: srd_5.2.1

size: medium
creature_type: undead
alignment: lawful_evil

combat:
  armor_class: 14
  hit_points:
    average: 13
    dice: "2d8"
    con_contribution: 4
  speed:
    walk: 30
  initiative:
    modifier: 3
    score: 13

abilities:
  str: { score: 10, save: 0 }
  dex: { score: 16, save: 3 }
  con: { score: 15, save: 2 }
  int: { score: 6, save: -2 }
  wis: { score: 8, save: -1 }
  cha: { score: 5, save: -3 }

skills: {}
damage_resistances: []
damage_vulnerabilities: [bludgeoning]
damage_immunities: [poison]
condition_immunities: [co_exhaustion, co_poisoned]

gear: [shortbow, shortsword]

senses:
  passive_perception: 9
  special:
    darkvision: 60

languages: [common]

cr:
  value: 0.25
  xp: 50
  proficiency_bonus: 2

traits: []

actions:
  - id: a_shortsword
    name: Shortsword
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 5, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d6", modifier: 3, type: piercing, average: 6 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

  - id: a_shortbow
    name: Shortbow
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: ranged, bonus: 5, range: [80, 320] }
      - primitive: damage
        params: { dice: "1d6", modifier: 3, type: piercing, average: 6 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

behavior_profile:
  archetype: mindless_aggressor
  presets:
    retreat: ftd
    ability_selection: default
    targeting: closest_enemy
    action_economy: casual
