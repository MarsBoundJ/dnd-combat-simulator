# m_githzerai_monk — Githzerai Monk
# Source: 2024 Monster Manual (MM-only; not in SRD 5.2.1)
# Triage: GREEN — Multiattack 2× Psi Strike (Bludgeoning + Psychic dual).
#   DEFERRED: spellcasting, Psi-Powered Leap, Psionic Defense reaction (utility/
#   defensive; not in library).

id: m_githzerai_monk
name: Githzerai Monk
source: mm_2024

size: medium
creature_type: aberration
alignment: lawful neutral

combat:
  armor_class: 14
  hit_points: { average: 38, dice: "7d8", con_contribution: 7 }
  speed: { walk: 40 }
  initiative: { modifier: 4, score: 14 }

abilities:
  str: { score: 12, save: 3 }
  dex: { score: 15, save: 4 }
  con: { score: 12, save: 1 }
  int: { score: 13, save: 3 }
  wis: { score: 14, save: 4 }
  cha: { score: 10, save: 0 }

skills: { insight: 4, perception: 4 }

senses: { passive_perception: 14 }
languages: ["Common", "Gith"]

cr: { value: 2, xp: 450, proficiency_bonus: 2 }

habitat: [limbo]
treasure: [arcana, individual]

traits:
  - id: t_magic_resistance
    name: Magic Resistance
    type: trait_passive

actions:
  - id: a_multiattack
    name: Multiattack
    type: multiattack
    count: 2
    sub_actions: ["a_psi_strike"]

  - id: a_psi_strike
    name: Psi Strike
    type: weapon_attack
    is_signature: true
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 4, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d8", modifier: 2, type: bludgeoning, average: 6 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: damage
        params: { dice: "2d8", modifier: 0, type: psychic, average: 9 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

behavior_profile:
  archetype: skirmisher
  presets: { retreat: cowardly, ability_selection: default, targeting: weakest_target, action_economy: aggressive }
