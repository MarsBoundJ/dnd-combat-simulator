# m_griffon — Griffon
# Source: SRD CC v5.2.1 p296
# Triage: GREEN — Multiattack of Rend attacks; Rend grapples (existing
# co_grappled) a Medium-or-smaller target on a hit. Fly 80 omitted (walk
# stand-in).

id: m_griffon
name: Griffon
source: srd_5.2.1

size: large
creature_type: monstrosity
alignment: unaligned

combat:
  armor_class: 12
  hit_points: { average: 59, dice: "7d10", con_contribution: 21 }
  speed: { walk: 30, fly: 80 }
  initiative: { modifier: 2, score: 12 }

abilities:
  str: { score: 18, save: 4 }
  dex: { score: 15, save: 2 }
  con: { score: 16, save: 3 }
  int: { score: 2, save: -4 }
  wis: { score: 13, save: 1 }
  cha: { score: 8, save: -1 }

skills: { perception: 5 }
damage_resistances: []
damage_vulnerabilities: []
damage_immunities: []
condition_immunities: []

senses: { passive_perception: 15, special: { darkvision: 60 } }
languages: []

cr: { value: 2, xp: 450, proficiency_bonus: 2 }

traits: []

actions:
  - id: a_multiattack
    name: Multiattack
    type: multiattack
    count: 2
    sub_actions: [a_rend]

  - id: a_rend
    name: Rend
    type: weapon_attack
    # On a hit vs a Medium-or-smaller creature, it is Grappled (escape DC 14).
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 6, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d8", modifier: 4, type: piercing, average: 8 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: apply_condition
        params: { condition_id: co_grappled, duration: until_removed }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

behavior_profile:
  archetype: apex_predator
  presets: { retreat: ftd, ability_selection: default, targeting: weakest_target, action_economy: casual }
