# m_swarm_of_insects — Swarm of Insects
# Source: SRD CC v5.2.1
# Triage: GREEN — single Bites (poison). Swarm/Spider Climb declarative; the half-damage-while-Bloodied clause is noted, not modeled (v1 uses full 2d4+1). Climb/Fly via walk.

id: m_swarm_of_insects
name: Swarm of Insects
source: srd_5.2.1

size: medium
creature_type: beast
type_tags: [swarm]
alignment: unaligned

combat:
  armor_class: 11
  hit_points: { average: 19, dice: "3d8", con_contribution: 6 }
  speed: { walk: 20 }
  initiative: { modifier: 1, score: 11 }

abilities:
  str: { score: 3, save: -4 }
  dex: { score: 13, save: 1 }
  con: { score: 14, save: 2 }
  int: { score: 1, save: -5 }
  wis: { score: 7, save: -2 }
  cha: { score: 1, save: -5 }

skills: {}
damage_resistances: [bludgeoning, piercing, slashing]
damage_vulnerabilities: []
damage_immunities: []
condition_immunities: [co_charmed, co_frightened, co_grappled, co_paralyzed, co_petrified, co_prone, co_restrained, co_stunned]

senses: { passive_perception: 8, special: { blindsight: 30 } }
languages: []

cr: { value: 0.5, xp: 100, proficiency_bonus: 2 }

traits:
  - id: t_spider_climb
    name: Spider Climb
    type: trait_passive
  - id: t_swarm
    name: Swarm
    type: trait_passive
    # Occupies/shares spaces; can't regain HP or gain temp HP.

actions:
  - id: a_bites
    name: Bites
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 3, reach_ft: 5 }
      - primitive: damage
        params: { dice: "2d4", modifier: 1, type: poison, average: 6 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

behavior_profile:
  archetype: mindless_aggressor
  presets: { retreat: cowardly, ability_selection: default, targeting: closest_enemy, action_economy: casual }
