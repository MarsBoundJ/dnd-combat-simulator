# m_giant_centipede — Giant Centipede
# Source: SRD CC v5.2.1
# Triage: GREEN — single Bite + Poisoned on hit (no save; until start of its next turn). Climb via walk.

id: m_giant_centipede
name: Giant Centipede
source: srd_5.2.1

size: small
creature_type: beast
alignment: unaligned

combat:
  armor_class: 14
  hit_points: { average: 9, dice: "2d6", con_contribution: 2 }
  speed: { walk: 30, climb: 30 }
  initiative: { modifier: 2, score: 12 }

abilities:
  str: { score: 5, save: -3 }
  dex: { score: 14, save: 2 }
  con: { score: 12, save: 1 }
  int: { score: 1, save: -5 }
  wis: { score: 7, save: -2 }
  cha: { score: 3, save: -4 }

skills: {}
damage_resistances: []
damage_vulnerabilities: []
damage_immunities: []
condition_immunities: []

senses: { passive_perception: 8, special: { blindsight: 30 } }
languages: []

cr: { value: 0.25, xp: 50, proficiency_bonus: 2 }

traits: []

actions:
  - id: a_bite
    name: Bite
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 4, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d4", modifier: 2, type: piercing, average: 4 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: apply_condition
        params: { condition_id: co_poisoned, duration: until_actor_next_turn_start }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

behavior_profile:
  archetype: mindless_aggressor
  presets: { retreat: cowardly, ability_selection: default, targeting: closest_enemy, action_economy: casual }
