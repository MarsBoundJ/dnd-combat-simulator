# m_yuan_ti_malison_2 — Yuan-ti Malison (Type 2: Human body, snake arms)
# Source: 2024 Monster Manual (MM-only; not in SRD 5.2.1)
# Triage: GREEN — Multiattack 2× Bite (Piercing + Poison dual, reach 10).
#   DEFERRED: spellcasting (Suggestion); Magic Resistance modeled declaratively.

id: m_yuan_ti_malison_2
name: Yuan-ti Malison (Type 2)
source: mm_2024

size: medium
creature_type: monstrosity
alignment: neutral evil

combat:
  armor_class: 12
  hit_points: { average: 66, dice: "12d8", con_contribution: 12 }
  speed: { walk: 30, climb: 30 }
  initiative: { modifier: 2, score: 12 }

abilities:
  str: { score: 16, save: 3 }
  dex: { score: 14, save: 2 }
  con: { score: 13, save: 1 }
  int: { score: 14, save: 2 }
  wis: { score: 16, save: 3 }
  cha: { score: 12, save: 1 }

skills: { stealth: 4 }

damage_immunities: [poison]
condition_immunities: [co_poisoned]

senses: { passive_perception: 13, special: { darkvision: 60 } }
languages: ["Abyssal", "Common", "Draconic"]

cr: { value: 3, xp: 700, proficiency_bonus: 2 }

habitat: [desert, forest, swamp, urban]
treasure: relics

traits:
  - id: t_magic_resistance
    name: Magic Resistance
    type: trait_passive

actions:
  - id: a_multiattack
    name: Multiattack
    type: multiattack
    count: 2
    sub_actions: ["a_bite"]

  - id: a_bite
    name: Bite
    type: weapon_attack
    is_signature: true
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 5, reach_ft: 10 }
      - primitive: damage
        params: { dice: "1d8", modifier: 3, type: piercing, average: 7 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: damage
        params: { dice: "2d6", modifier: 0, type: poison, average: 7 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

behavior_profile:
  archetype: skirmisher
  presets: { retreat: cowardly, ability_selection: default, targeting: weakest_target, action_economy: aggressive }
