# m_modron_tridrone — Modron Tridrone
# Source: 2024 Monster Manual (MM-only; not in SRD 5.2.1)
# Triage: GREEN — Multiattack 3× Clockwork Spear (Force).

id: m_modron_tridrone
name: Modron Tridrone
source: mm_2024

size: medium
creature_type: construct
alignment: lawful neutral

combat:
  armor_class: 15
  hit_points: { average: 16, dice: "3d8", con_contribution: 3 }
  speed: { walk: 30 }
  initiative: { modifier: 1, score: 11 }

abilities:
  str: { score: 12, save: 1 }
  dex: { score: 12, save: 1 }
  con: { score: 13, save: 1 }
  int: { score: 9, save: -1 }
  wis: { score: 10, save: 0 }
  cha: { score: 9, save: -1 }

damage_immunities: [poison]
condition_immunities: [co_charmed, co_frightened, co_poisoned]

senses: { passive_perception: 10 }
languages: ["Modron"]

cr: { value: 0.5, xp: 100, proficiency_bonus: 2 }

habitat: [mechanus]
treasure: none

actions:
  - id: a_multiattack
    name: Multiattack
    type: multiattack
    count: 3
    sub_actions: ["a_clockwork_spear"]

  - id: a_clockwork_spear
    name: Clockwork Spear
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 3, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d6", modifier: 1, type: force, average: 4 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

behavior_profile:
  archetype: brute
  presets: { retreat: never, ability_selection: default, targeting: closest_enemy, action_economy: aggressive }
