# m_juvenile_shadow_dragon — Juvenile Shadow Dragon
# Source: 2024 Monster Manual (MM-only; not in SRD 5.2.1)
# Triage: GREEN — Multiattack 2× Rend (Slashing + Necrotic dual); Shadow
#   Breath modeled as single-target DEX save (5d6 Necrotic, half on success).
#   DEFERRED: Living Shadow (resistance to non-Force/Psychic/Radiant damage
#   while in Dim Light or Darkness) — no conditional light-level resistance
#   primitive in v1.
#   DEFERRED: Recharge (5–6) on Shadow Breath — no recharge primitive in v1.
#   DEFERRED: Shadow Breath "rise as Shadow" (Humanoid at 0 HP spawns Shadow)
#   — no on-death spawn primitive in v1.
#   DEFERRED: Sunlight Sensitivity / Shadow Stealth — no environmental
#   light-level primitive in v1.

id: m_juvenile_shadow_dragon
name: Juvenile Shadow Dragon
source: mm_2024

size: medium
creature_type: dragon
alignment: chaotic evil

combat:
  armor_class: 15
  hit_points: { average: 45, dice: "6d8", con_contribution: 18 }
  speed: { walk: 30, climb: 30, fly: 60 }
  initiative: { modifier: 4, score: 14 }

abilities:
  str: { score: 17, save: 3 }
  dex: { score: 14, save: 4 }
  con: { score: 17, save: 3 }
  int: { score: 12, save: 1 }
  wis: { score: 11, save: 0 }
  cha: { score: 15, save: 2 }

skills: { perception: 4, stealth: 6 }

damage_immunities: [necrotic]

senses: { passive_perception: 14, special: { blindsight: 10, darkvision: 60 } }
languages: ["Common", "Draconic"]

cr: { value: 4, xp: 1100, proficiency_bonus: 2 }

habitat: [planar_shadowfell, underdark]
treasure: any

traits:
  - id: t_living_shadow
    name: Living Shadow
    type: trait_passive
  - id: t_sunlight_sensitivity
    name: Sunlight Sensitivity
    type: trait_passive

actions:
  - id: a_multiattack
    name: Multiattack
    type: multiattack
    count: 2
    sub_actions: ["a_rend"]

  - id: a_rend
    name: Rend
    type: weapon_attack
    is_signature: true
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 5, reach_ft: 10 }
      - primitive: damage
        params: { dice: "1d8", modifier: 3, type: slashing, average: 7 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: damage
        params: { dice: "1d6", modifier: 0, type: necrotic, average: 3 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

  - id: a_shadow_breath
    name: Shadow Breath
    type: save_effect
    pipeline:
      - primitive: forced_save
        params:
          ability: dexterity
          dc: 13
          affected: current_target
          on_fail:
            - primitive: damage
              params: { dice: "5d6", modifier: 0, type: necrotic, average: 17 }
          on_success:
            - primitive: damage
              params: { dice: "5d6", modifier: 0, type: necrotic, average: 17, multiplier: 0.5 }

behavior_profile:
  archetype: ambusher
  presets: { retreat: cowardly, ability_selection: default, targeting: weakest_target, action_economy: aggressive }
