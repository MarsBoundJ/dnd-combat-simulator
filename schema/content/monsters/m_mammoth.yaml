# m_mammoth — Mammoth
# Source: SRD CC v5.2.1 p356
# Triage: GREEN — Multiattack of Gore; Trample bonus action (DEX save
# DC 18 → existing co_prone + damage). Gore charge rider movement-
# conditional (noted, not modeled).
id: m_mammoth
name: Mammoth
source: srd_5.2.1
size: huge
creature_type: beast
alignment: unaligned
combat:
  armor_class: 13
  hit_points: { average: 126, dice: "11d12", con_contribution: 55 }
  speed: { walk: 50 }
  initiative: { modifier: 2, score: 12 }
abilities:
  str: { score: 24, save: 10 }
  dex: { score: 9, save: -1 }
  con: { score: 21, save: 8 }
  int: { score: 3, save: -4 }
  wis: { score: 11, save: 0 }
  cha: { score: 6, save: -2 }
skills: {}
damage_resistances: []
damage_vulnerabilities: []
damage_immunities: []
condition_immunities: []
senses: { passive_perception: 10 }
languages: []
cr: { value: 6, xp: 2300, proficiency_bonus: 3 }
traits: []
actions:
  - id: a_multiattack
    name: Multiattack
    type: multiattack
    count: 2
    sub_actions: [a_gore]
  - id: a_gore
    name: Gore
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 10, reach_ft: 10 }
      - primitive: damage
        params: { dice: "2d10", modifier: 7, type: piercing, average: 18 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
bonus_actions:
  - id: ba_trample
    name: Trample
    type: save_effect
    pipeline:
      - primitive: forced_save
        params:
          ability: dexterity
          dc: 18
          affected: current_target
          on_fail:
            - primitive: damage
              params: { dice: "2d10", modifier: 7, type: bludgeoning, average: 18 }
            - primitive: apply_condition
              params: { condition_id: co_prone, duration: until_removed }
          on_success: []
behavior_profile:
  archetype: apex_predator
  presets: { retreat: ftd, ability_selection: default, targeting: closest_enemy, action_economy: casual }
