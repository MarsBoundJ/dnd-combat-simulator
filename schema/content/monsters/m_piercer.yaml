# m_piercer — Piercer
# Source: 2024 Monster Manual (MM-only; not in SRD 5.2.1)
# Triage: GREEN — Bite (melee +3); Drop (DEX DC 11 → 3d6 Piercing, save_effect).
#   Spider Climb and False Appearance are declarative.

id: m_piercer
name: Piercer
source: mm_2024

size: medium
creature_type: monstrosity
alignment: unaligned

combat:
  armor_class: 15
  hit_points: { average: 22, dice: "3d8", con_contribution: 9 }
  speed: { walk: 5, climb: 15 }
  initiative: { modifier: 0, score: 10 }

abilities:
  str: { score: 12, save: 1 }
  dex: { score: 11, save: 0 }
  con: { score: 16, save: 3 }
  int: { score: 1, save: -5 }
  wis: { score: 7, save: -2 }
  cha: { score: 3, save: -4 }

senses: { passive_perception: 8, special: { darkvision: 60, tremorsense: 30 } }

cr: { value: 0.5, xp: 100, proficiency_bonus: 2 }

habitat: [underdark]
treasure: individual

traits:
  - id: t_spider_climb
    name: Spider Climb
    type: trait_passive
  - id: t_false_appearance
    name: False Appearance
    type: trait_passive

actions:
  - id: a_bite
    name: Bite
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 3, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d8", modifier: 1, type: piercing, average: 5 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

  - id: a_drop
    name: Drop
    type: save_effect
    pipeline:
      - primitive: forced_save
        params:
          ability: dexterity
          dc: 11
          affected: current_target
          on_fail:
            - primitive: damage
              params: { dice: "3d6", modifier: 0, type: piercing, average: 10 }
          on_success: []

behavior_profile:
  archetype: ambusher
  presets: { retreat: never, ability_selection: default, targeting: closest_enemy, action_economy: casual }
