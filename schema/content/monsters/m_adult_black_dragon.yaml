# m_adult_black_dragon — Adult Black Dragon
# Source: SRD CC v5.2.1 p264
# Triage: GREEN for core kit — Multiattack of Rend (+ acid rider),
# recharge Acid Breath (DEX-save line), Legendary Resistance (3/Day),
# and Legendary Actions (Cloud of Insects save + Pounce Rend).
# DEFERRED (see MONSTERS_NEED_ENGINE_WORK.md): innate Spellcasting and the
# "replace one attack with Spellcasting" Multiattack option; the Frightful
# Presence legendary action (casts Fear via Spellcasting). Fly/Swim omitted
# (walk stand-in). Pounce's half-Speed move is omitted; modeled as one Rend.
id: m_adult_black_dragon
name: Adult Black Dragon
source: srd_5.2.1
size: huge
creature_type: dragon
type_tags: [chromatic]
alignment: chaotic_evil
combat:
  armor_class: 19
  hit_points: { average: 195, dice: "17d12", con_contribution: 85 }
  speed: { walk: 40 }
  initiative: { modifier: 12, score: 22 }
abilities:
  str: { score: 23, save: 6 }
  dex: { score: 14, save: 7 }
  con: { score: 21, save: 5 }
  int: { score: 14, save: 2 }
  wis: { score: 13, save: 6 }
  cha: { score: 19, save: 4 }
skills: { perception: 11, stealth: 7 }
damage_resistances: []
damage_vulnerabilities: []
damage_immunities: [acid]
condition_immunities: []
senses: { passive_perception: 21, special: { blindsight: 60, darkvision: 120 } }
languages: [common, draconic]
cr: { value: 14, xp: 11500, proficiency_bonus: 5 }
legendary_resistance: { uses: 3 }
traits:
  - id: t_amphibious
    name: Amphibious
    type: trait_passive
actions:
  - id: a_multiattack
    name: Multiattack
    type: multiattack
    count: 3
    sub_actions: [a_rend]
  - id: a_rend
    name: Rend
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 11, reach_ft: 10 }
      - primitive: damage
        params: { dice: "2d6", modifier: 6, type: slashing, average: 13 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: damage
        params: { dice: "1d8", modifier: 0, type: acid, average: 4 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
  - id: a_acid_breath
    name: Acid Breath
    type: aoe_attack
    recharge: "5-6"
    area: { shape: line, length_ft: 60, width_ft: 5 }
    pipeline:
      - primitive: forced_save
        params:
          ability: dexterity
          dc: 18
          affected: all_creatures_in_area
          on_fail:
            - primitive: damage
              params: { dice: "12d8", modifier: 0, type: acid, average: 54 }
          on_success:
            - primitive: damage
              params: { dice: "12d8", modifier: 0, type: acid, average: 54, multiplier: 0.5 }
legendary_actions:
  uses_per_round: 3
  options:
    - id: la_cloud_of_insects
      name: Cloud of Insects
      type: save_effect
      # DEX save DC 17, one creature within 120 ft. The Concentration
      # disadvantage rider is omitted (no engine hook); damage modeled.
      pipeline:
        - primitive: forced_save
          params:
            ability: dexterity
            dc: 17
            affected: current_target
            on_fail:
              - primitive: damage
                params: { dice: "4d10", modifier: 0, type: poison, average: 22 }
            on_success: []
    - id: la_pounce
      name: Pounce
      type: multiattack
      count: 1
      sub_actions: [a_rend]
behavior_profile:
  archetype: apex_predator
  presets: { retreat: ftd, ability_selection: default, targeting: weakest_target, action_economy: skilled }
