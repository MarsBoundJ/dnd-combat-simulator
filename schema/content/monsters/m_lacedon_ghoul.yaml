# m_lacedon_ghoul — Lacedon Ghoul
# Source: 2024 Monster Manual (MM-only; not in SRD 5.2.1)
# Triage: GREEN — Multiattack 2× Icy Bite (Cold); Claw (Slashing + CON DC 10 →
#   co_paralyzed).
#   DEFERRED: speed-reduction on Cold damage (no speed-reduction primitive in v1).

id: m_lacedon_ghoul
name: Lacedon Ghoul
source: mm_2024

size: medium
creature_type: undead
alignment: chaotic evil

combat:
  armor_class: 12
  hit_points: { average: 22, dice: "5d8", con_contribution: 0 }
  speed: { walk: 30, swim: 30 }
  initiative: { modifier: 2, score: 12 }

abilities:
  str: { score: 13, save: 1 }
  dex: { score: 15, save: 2 }
  con: { score: 10, save: 0 }
  int: { score: 7, save: -2 }
  wis: { score: 10, save: 0 }
  cha: { score: 6, save: -2 }

damage_immunities: [cold, poison]
condition_immunities: [co_charmed, co_exhaustion, co_poisoned]

senses: { passive_perception: 10, special: { darkvision: 60 } }
languages: ["Common"]

cr: { value: 1, xp: 200, proficiency_bonus: 2 }

habitat: [swamp, underdark, urban]
treasure: any

actions:
  - id: a_multiattack
    name: Multiattack
    type: multiattack
    count: 2
    sub_actions: ["a_icy_bite"]

  - id: a_icy_bite
    name: Icy Bite
    type: weapon_attack
    is_signature: true
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 4, reach_ft: 5 }
      - primitive: damage
        params: { dice: "2d6", modifier: 2, type: cold, average: 9 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

  - id: a_claw
    name: Claw
    type: weapon_attack
    pipeline:
      - primitive: attack_roll
        params: { kind: melee, bonus: 4, reach_ft: 5 }
      - primitive: damage
        params: { dice: "1d4", modifier: 2, type: slashing, average: 4 }
        when: { event: damage_roll, condition: "combat.attack_state == hit" }
      - primitive: forced_save
        params:
          ability: constitution
          dc: 10
          affected: current_target
          on_fail:
            - primitive: apply_condition
              params: { condition_id: co_paralyzed, duration: until_actor_next_turn_start }
          on_success: []
        when: { event: damage_roll, condition: "combat.attack_state == hit" }

behavior_profile:
  archetype: pack_hunter
  presets: { retreat: ftd, ability_selection: default, targeting: weakest_target, action_economy: casual }
