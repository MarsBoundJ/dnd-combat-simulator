# sc_diviner — Diviner (Wizard subclass)
# Source: PHB 2024 (non-SRD; clean-room mechanical summary)
#
# Fate-manipulation Wizard built around Portent — pre-rolled d20s that
# replace any visible D20 Test. Divination Savant (L3, free Divination
# spells in book), Portent (L3, 2 foretelling rolls/LR), Expert
# Divination (L6, slot refund on Divination casts), The Third Eye
# (L10, sensory utility menu), Greater Portent (L14, 3 foretelling
# rolls).
#
# Sim-relevant highlights: Portent is HIGH wireability and one of the
# most statistically interesting features in the game — known d20
# values banked at dawn, spendable to force an enemy save to fail or
# guarantee an ally's roll. The eHP/Shapley attribution of a banked
# natural 3 spent on an enemy's save vs Hold Person is a flagship
# analysis target. Expert Divination is a slot-economy engine.
# BLOCKED ON: spell library (Divination school tagging)

