# sc_assassin — Assassin (Rogue subclass)
# Source: PHB 2024 (non-SRD; clean-room mechanical summary)
#
# Alpha-strike specialist — Assassinate (L3) gives Initiative Advantage
# + first-round attack Advantage vs creatures that haven't acted +
# bonus weapon-type damage equal to Rogue level on Sneak Attack hits
# that round. Death Strike (L17) doubles the hit's damage on a failed
# CON save. Envenom Weapons (L13) adds 2d6 Poison to the Poison
# Cunning Strike option (ignores Poison Resistance).
#
# Sim-relevant highlights: Assassinate is the classic nova opener — HIGH
# wireability, rides initiative_roll + first_round_tracking. Death Strike
# is multiplicative with Sneak Attack (double ALL damage on failed save).
# Infiltration Expertise (L9) is largely non-combat (Roving Aim is
# notable: Steady Aim no longer zeroes Speed).

