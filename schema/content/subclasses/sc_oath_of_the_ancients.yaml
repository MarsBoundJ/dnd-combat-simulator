# sc_oath_of_the_ancients — Oath of the Ancients (Paladin subclass)
# Source: PHB 2024 (non-SRD; clean-room mechanical summary)
#
# The resilient nature-warden. Nature's Wrath (L3) is a Channel
# Divinity STR-save Restrain (control); Aura of Warding (L7) gives the
# party Necrotic/Psychic/Radiant resistance — one of the strongest
# defensive auras in the game; Undying Sentinel (L15) is a death-save;
# Elder Champion (L20) is a save-debuff + regen capstone. Durable
# protector with soft control. 2 features at L3.
#
# DEPENDS ON: Channel Divinity (deferred) gates Nature's Wrath. Aura of
# Protection (deferred) substrates Aura of Warding.

