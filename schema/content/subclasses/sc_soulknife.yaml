# sc_soulknife — Soulknife (Rogue subclass)
# Source: PHB 2024 (non-SRD; clean-room mechanical summary)
#
# Psionic Rogue — manifests Psychic Blades (1d6 Psychic, Finesse,
# Thrown 60/120, free Vex mastery) with a BA d4 offhand. Psionic Energy
# Dice (scaling d6→d12, 4→12 dice) fuel Psi-Bolstered Knack, Psychic
# Whispers, Homing Strikes, Psychic Teleportation, and Rend Mind.
#
# Sim-relevant highlights: Psychic Blades is HIGH wireability — always-
# available Finesse weapon with free Vex + BA attack (Psychic damage
# bypasses most resistances). Soul Blades/Homing Strikes (L9) is
# basically a miss-to-hit converter. Rend Mind (L17) is a Stunned
# condition on SA hit (WIS save, 1/LR or 3 dice). Psychic Veil (L13)
# is self-Invisibility for 1 hour.
#
# DEPENDS ON: Psionic Energy Dice resource system (same pattern as
# Psi Warrior but separate pool with different scaling table)

