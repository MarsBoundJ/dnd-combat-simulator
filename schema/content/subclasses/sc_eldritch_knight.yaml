    feature_ids: [f_eldritch_knight_spellcasting, f_war_bond]
  - level: 7
    feature_ids: [f_war_magic]
  - level: 10
    feature_ids: [f_eldritch_strike]
  - level: 15
    feature_ids: [f_arcane_charge]
  - level: 18
    feature_ids: [f_improved_war_magic]
