# sc_oath_of_vengeance — Oath of Vengeance (Paladin subclass)
# Source: PHB 2024 (non-SRD; clean-room mechanical summary)
#
# The relentless focus-fire hunter. Vow of Enmity (L3) grants Advantage
# on all attacks vs one target (Channel Divinity); Relentless Avenger
# (L7) locks down fleeing foes; Soul of Vengeance (L15) adds reaction
# strikes vs the Vow target; Avenging Angel (L20) is a flight + fear
# aura capstone. Single-target burst specialist. 2 features at L3.
#
# DEPENDS ON: Channel Divinity (deferred) gates Vow of Enmity. The Vow's
# advantage rider keys off a per-target tag.

