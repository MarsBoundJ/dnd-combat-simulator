# sc_war_domain — War Domain (Cleric subclass)
# Source: PHB 2024 (non-SRD; clean-room mechanical summary)
#
# The martial Cleric. War Priest (L3) is a bonus-action weapon attack
# (WIS mod uses/short rest); Guided Strike (L3) converts Channel
# Divinity into +10 on a missed attack (own, or ally via Reaction);
# War God's Blessing (L6) casts Shield of Faith / Spiritual Weapon via
# Channel Divinity WITHOUT concentration; Avatar of Battle (L17) is
# B/P/S resistance. Domain list is the martial-buff stack (Spiritual
# Weapon, Spirit Guardians, Shield of Faith).
#
# DEPENDS ON: Channel Divinity resource (Cleric L2, not yet built)
# gates Guided Strike + War God's Blessing. Shield of Faith and
# Spirit Guardians exist; Spiritual Weapon not yet built.

