# sc_fey_wanderer — Fey Wanderer (Ranger subclass)
# Source: PHB 2024 (non-SRD; clean-room mechanical summary)
#
# The fey trickster-striker. Dreadful Strikes (L3) is a once-per-turn
# psychic weapon rider (free — no resource); Beguiling Twist (L7)
# redirects resisted charm/fear onto a new target; Fey Reinforcements
# (L11) grants free (and concentration-less) Summon Fey; Misty Wanderer
# (L15) gives WIS-mod free Misty Steps that carry an ally. Gets 3
# features at L3.
#
# DEPENDS ON: Charm/fear conditions (exist). Summon Fey + Misty Step
# are spell-library dependencies; Summon Fey also needs the companion/
# summon actor system (shared with Beast Master).

id: sc_fey_wanderer
name: Fey Wanderer
source: phb_2024
parent_class: c_ranger

archetype_tags:
  behavior_archetype: cunning_tactician
  role: martial_striker           # INTERNAL-EVAL-ONLY per vocabulary firewall
  flavor_tags: [fey, mirthful, beguiling, otherworldly]

features_by_level:
  - level: 3
    feature_ids: [f_dreadful_strikes, f_fey_wanderer_spells,
                  f_otherworldly_glamour]
  - level: 7
    feature_ids: [f_beguiling_twist]
  - level: 11
    feature_ids: [f_fey_reinforcements]
  - level: 15
    feature_ids: [f_misty_wanderer]
