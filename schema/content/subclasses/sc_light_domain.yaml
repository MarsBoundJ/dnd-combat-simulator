# sc_light_domain — Light Domain (Cleric subclass)
# Source: PHB 2024 (non-SRD; clean-room mechanical summary)
#
# The radiant blaster-controller. Warding Flare (L3) is a reaction that
# imposes disadvantage on attacks — the defensive workhorse, same
# reaction lane as Cutting Words. Radiance of the Dawn (L3) is a
# Channel Divinity AoE burst. Domain list brings Fireball / Scorching
# Ray fire-blasting to the Cleric chassis.
#
# DEPENDS ON: Channel Divinity resource (Cleric L2, not yet built)
# gates Radiance of the Dawn. Fireball exists (sp_fireball); most other
# domain spells not yet built.

