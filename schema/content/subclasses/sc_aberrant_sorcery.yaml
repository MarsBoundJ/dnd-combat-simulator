# sc_aberrant_sorcery — Aberrant Sorcery (Sorcerer subclass)
# Source: PHB 2024 (non-SRD; clean-room mechanical summary)
#
# Psionic Sorcerer — alien-influence themed. Psionic Spells (L3,
# always-prepared psychic/aberrant list), Telepathic Speech (L3,
# non-combat), Psionic Sorcery (L6, cast Psionic Spells with Sorcery
# Points instead of slots — component-free), Psychic Defenses (L6,
# Psychic resistance + save advantage vs Charmed/Frightened),
# Revelation in Flesh (L14, body-warp utility), Warping Implosion
# (L18, teleport + 30-ft pull/damage AoE).
#
# Sim-relevant highlights: Psionic Sorcery is the economy engine —
# converts sorcery points directly into castings of Hunger of Hadar,
# Telekinesis, etc. Effectively extra spell slots for the psionic
# list. Note: Aberrant gets TWO features at L6.
#
# BLOCKED ON: spell library (psionic spell list)

