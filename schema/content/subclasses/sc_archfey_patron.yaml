# sc_archfey_patron — Archfey Patron (Warlock subclass)
# Source: PHB 2024 (non-SRD; clean-room mechanical summary)
#
# Fey-pact Warlock built around Misty Step as a core combat verb.
# Steps of the Fey (L3, free Misty Steps = CHA mod/LR + choice of
# Refreshing 1d10 THP or Taunting WIS-save taunt), Misty Escape (L6,
# Misty Step as reaction to taking damage + two new step modes),
# Beguiling Defenses (L10, Charmed immunity + damage-halving reaction
# with Psychic reflect), Bewitching Magic (L14, free Misty Step after
# Enchantment/Illusion spell cast).
#
# Sim-relevant highlights: the Misty Step economy is the subclass
# identity — CHA-mod free castings/LR, reaction casting on damage,
# and free casts after Enchantment/Illusion. Each step has a rider
# effect (THP, taunt, invisibility, or AoE psychic damage). Steps of
# the Fey is HIGH wireability.
# BLOCKED ON: spell library (Misty Step, archfey spell list)

