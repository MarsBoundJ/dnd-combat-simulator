# sc_illusionist — Illusionist (Wizard subclass)
# Source: PHB 2024 (non-SRD; clean-room mechanical summary)
#
# Deception Wizard. Illusion Savant (L3, free Illusion spells in
# book), Improved Illusions (L3, no Verbal components + +60 ft range
# + enhanced BA Minor Illusion), Phantasmal Creatures (L6, always-
# prepared Summon Beast/Fey castable as Illusion school, free cast
# 1/LR at half HP), Illusory Self (L10, reaction: auto-miss one
# attack, recharge on L2+ slot), Illusory Reality (L14, make an
# illusory object real).
#
# Sim-relevant highlights: Illusory Self is HIGH wireability — a
# guaranteed attack negation (better than Shield: auto-miss, not +5
# AC) with a slot-based recharge. Phantasmal Creatures is a free
# summon engine (half-HP spectral pet without a slot, 1/LR). Illusory
# Reality is mostly non-combat creativity (can't deal damage or apply
# conditions) — terrain manipulation like walls/bridges.
# BLOCKED ON: spell library (Illusion school tagging, Minor Illusion,
# Summon Beast/Fey), summon actor system

