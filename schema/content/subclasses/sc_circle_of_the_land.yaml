# sc_circle_of_the_land — Circle of the Land (Druid subclass)
# Source: SRD CC v5.2.1 (PHB 2024)
#
# The SRD Druid subclass. Combat-relevant feature shipped in v1:
#   - L3 Land's Aid (f_lands_aid): a Magic action that spends a Wild
#     Shape use to deal 2d6 necrotic (CON save for half) to enemies in a
#     10-ft sphere, plus heal one ally 2d6 (heal rider deferred — see
#     f_lands_aid). The subclass's standout combat option and a second
#     sink for the Wild Shape resource.
#
# Subclass features (now fully declared; mechanics deferred per notes
# in each feature file):
#   - L3 Land's Aid (f_lands_aid): WILD-SHAPE-fuelled 10-ft sphere,
#     2d6 necrotic CON-save-for-half + 2d6 heal. The standout combat
#     option (wired). The damage scales 3d6/4d6 at L10/L14.
#   - L3 Circle Spells: land-type (arid/polar/temperate/tropical)
#     always-prepared list. Needs a land-choice field + several spells.
#   - L6 Natural Recovery: free Circle-spell cast + short-rest slot
#     recovery. Resource economy.
#   - L10 Nature's Ward: Poisoned immunity + land-keyed resistance.
#   - L14 Nature's Sanctuary: movable 15-ft Half-Cover/Resistance aura.

id: sc_circle_of_the_land
