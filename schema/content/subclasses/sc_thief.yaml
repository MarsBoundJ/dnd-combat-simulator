# sc_thief — Thief (Rogue subclass)
# Source: SRD CC v5.2.1 (PHB 2024)
#
# The SRD Rogue subclass — classic burglar/treasure-hunter/explorer.
# Fast Hands (L3) turns Utilize/Use Magic Item into a BA. Second-Story
# Work (L3) gives Climb Speed + DEX-based jumps. Supreme Sneak (L9) adds
# the Stealth Attack Cunning Strike option. Use Magic Device (L13) gives
# extra attunement + scroll use. Thief's Reflexes (L17) is the iconic
# double-turn in round 1.
#
# Sim-relevant highlights: Thief's Reflexes is a massive first-round
# action-economy spike — essentially doubles Sneak Attack output on
# turn 1. Supreme Sneak enables sustained stealth sniping. Most other
# features are exploration/utility-tier.

