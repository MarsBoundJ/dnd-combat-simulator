# sc_oath_of_glory — Oath of Glory (Paladin subclass)
# Source: PHB 2024 (non-SRD; clean-room mechanical summary)
#
# The heroic team-buffer. Inspiring Smite (L3) converts a smite into
# party-wide temp HP; Aura of Alacrity (L7) hands out speed; Glorious
# Defense (L15) is a reaction AC-bump-plus-counterattack; Living Legend
# (L20) adds miss-to-hit conversion + save rerolls. Gets 3 features at
# L3. Buff-forward striker.
#
# DEPENDS ON: Channel Divinity (deferred) gates Inspiring Smite +
# Peerless Athlete. Aura of Protection (deferred) substrates Aura of
# Alacrity. Divine Smite exists (f_divine_smite).

id: sc_oath_of_glory
name: Oath of Glory
source: phb_2024
parent_class: c_paladin

