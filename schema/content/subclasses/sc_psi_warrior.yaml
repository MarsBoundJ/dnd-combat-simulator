# sc_psi_warrior — Psi Warrior (Fighter subclass)
# Source: PHB 2024
#
# The psionic Fighter. Everything runs off one resource: Psionic Energy
# Dice (4d6 at L3, scaling to 12d12 at L17; one die back per Short
# Rest, all on Long Rest). Three-way spend tension: Psionic Strike
# (damage rider), Protective Field (reaction damage reduction on self
# OR ally — a tank tool), Telekinetic Movement/Thrust (forced movement
# control). INT is the secondary stat for all rider math.

id: sc_psi_warrior
name: Psi Warrior
