#
# Mechanics: Gain THP whenever you use Magical Cunning or finish a
# Short/Long Rest. THP = Warlock level + CHA modifier. Also choose up
# to 5 visible creatures — each gains THP = half Warlock level (round
# down) + CHA modifier.
#
# Engine modeling (wireable at encounter start): party-wide THP buffer
# applied before combat. At L10 with +5 CHA: self gets 15 THP, up to
# 5 allies get 10 THP each = 65 total THP across the party. Resets on
# every Short Rest. This is a significant pre-combat defensive layer.
