# f_grease — Grease (Level 1 Conjuration, SRD CC v5.2.1)
#
# RAW summary (SRD 5.2.1, p136): grease covers a 10-ft square within
# 60 ft, making it Difficult Terrain for 1 minute. When it appears, and
# whenever a creature enters or ends its turn in the area, it must
# succeed on a Dexterity saving throw or have the Prone condition.
# (Sorcerer/Wizard.) NOT Concentration.
#
# Engine modeling: a point-anchored control zone — the persistent_aura
# archetype (10-ft cube). DEX save vs the caster's spell save DC at each
# creature's turn in the area; on a fail the creature is knocked Prone
# (co_prone, re-applied each turn while it stays in the grease). Not
# Concentration (1-minute duration).
#
# Deferred RAW bits:
#   - Difficult Terrain (no movement-cost modeling); the Prone control
#     is the load-bearing combat effect.
#   - Entry-trigger (turn-based only).
#
# source: srd_5.2.1

id: f_grease
name: Grease
source: srd_5.2.1
granted_by:
  class: c_wizard
  level: 1
type: active
spell:
  class: c_wizard
  level: 1

description: |
  10-ft square of grease within 60 ft. DEX save vs spell DC at each
  creature's turn in the area or knocked Prone. 1 minute (not
  Concentration).

action_template:
  id: a_grease
  name: Grease
  type: persistent_aura
  spell_slot_level: 1
  named_effect: grease
  area:
    shape: cube
    size_ft: 10
    range_ft: 60
  pipeline:
    - primitive: persistent_aura
      params:
        shape: cube
        size_ft: 10
        anchor: point
        trigger_event: target_turn_start_in_area
        affected: all_creatures
        ability: dexterity
        dc_source: caster_spell_save_dc
        on_fail:
          - primitive: apply_condition
            params:
              condition_id: co_prone
              duration: until_actor_next_turn_start
        on_success: []
