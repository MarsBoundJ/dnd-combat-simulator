# f_harm — Harm (Level 6 Necromancy, SRD CC v5.2.1)
#
# RAW summary (SRD 5.2.1, p138): 60 ft, one creature. It makes a
# Constitution saving throw; on a fail it takes 14d6 Necrotic damage and
# its Hit Point maximum is reduced by that amount (never below 1); on a
# success it takes half damage only. (Cleric.)
#
# Engine modeling: a single-target save-for-half nuke — a static
# `save_attack` action_template. forced_save CON vs the caster's spell
# save DC; 14d6 necrotic on a fail, half on a success.
#
# Deferred RAW bits:
#   - The Hit-Point-maximum reduction on a failed save (no HP-max-debuff
#     primitive in v1; hp_max_grant grants, not reduces). The 14d6
#     damage is the load-bearing effect.
#
# source: srd_5.2.1

id: f_harm
name: Harm
source: srd_5.2.1
granted_by:
  class: c_cleric
  level: 11            # Clerics gain 6th-level slots at L11
type: active
spell:
  class: c_cleric
  level: 6

description: |
  One creature within 60 ft makes a CON save vs spell DC: 14d6
  necrotic on a fail, half on a success. (HP-max reduction deferred.)

action_template:
  id: a_harm
  name: Harm
  type: save_attack
  spell_slot_level: 6
  named_effect: harm
  range_ft: 60
  save_ability: constitution
  save_dc_source: caster_spell_save_dc
  half_on_success: true
  pipeline:
    - primitive: forced_save
      params:
        ability: constitution
        dc_source: caster_spell_save_dc
        affected: current_target
        on_fail:
          - primitive: damage
            params: { dice: "14d6", modifier: 0, type: necrotic }
        on_success:
          - primitive: damage
            params: { dice: "14d6", modifier: 0, type: necrotic, multiplier: 0.5 }
