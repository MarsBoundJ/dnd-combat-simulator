# f_tandem_footwork — Tandem Footwork (College of Dance, Bard L6)
# Source: PHB 2024
#
# RAW: "When you roll Initiative, you can expend one use of your Bardic
# Inspiration if you don't have the Incapacitated condition. When you do so,
# roll your Bardic Inspiration die; you and each ally within 30 feet of you
# who can see or hear you gains a bonus to Initiative equal to the number
# rolled."
#
# Engine modeling: runner.roll_initiative calls
# college_of_dance.apply_tandem_footwork after the base initiative rolls. A
# Dance Bard with this feature and an available Bardic Inspiration use spends
# one, rolls its Bardic die, and adds the result to its own and each
# ally-within-30-ft's initiative (turn order is then sorted on the bumped
# values).
#
# Feature wiring status: FULLY WIRED.
#
# v1: always spends a use when available (going first is worth a die; Font of
# Inspiration refreshes BI on a short rest). "Can see or hear" → allies within
# 30 ft. Incapacitated isn't tracked at initiative time (no-op guard).

id: f_tandem_footwork
name: Tandem Footwork
source: phb_2024
granted_by:
  subclass: sc_college_of_dance
  level: 6
type: active

resource_cost:
  type: none

effect_primitives: []

contract:
  reads: [actor.template.features_known, actor.template.bardic_die,
           actor.resources.bardic_inspiration_uses_remaining, actor.position]
  writes: [combat.initiative,
           actor.resources.bardic_inspiration_uses_remaining]
  event: initiative_roll
  scope: per_use
