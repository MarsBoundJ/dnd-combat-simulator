# f_acid_arrow — Acid Arrow (Level 2 Evocation, SRD CC v5.2.1)
#
# RAW summary (SRD 5.2.1, p106): 90 ft. Make a ranged spell attack; on a
# hit the target takes 4d4 Acid damage immediately and 2d4 Acid at the
# end of its next turn. On a miss, half the initial damage only. Using a
# Higher-Level Spell Slot: both the initial and later damage increase by
# 1d4 per slot above 2nd. (Wizard.)
#
# Engine modeling: a leveled ranged spell attack — a MARKER feature built
# by pc_schema via the `spell_attack` pc_builder kind (attack bonus baked
# at PC-build time; 4d4 acid on a hit, +1d4/slot upcast).
#
# Deferred RAW bits:
#   - The delayed 2d4 acid at the end of the target's next turn (no
#     per-target delayed-damage trigger in v1).
#   - "Half the initial damage on a miss" (the spell_attack builder deals
#     0 on a miss); the on-hit 4d4 is the load-bearing effect.
#
# source: srd_5.2.1

id: f_acid_arrow
name: Acid Arrow
source: srd_5.2.1
granted_by:
  class: c_wizard
  level: 3             # Wizards gain 2nd-level slots at L3
type: passive
spell:
  class: c_wizard
  level: 2
pc_builder:
  kind: spell_attack
  action_id: a_acid_arrow
  name: Acid Arrow
  params:
    slot_level: 2
    range_ft: 90
    damage_dice: "4d4"
    damage_type: acid
    upcast_dice: "1d4"

description: |
  Ranged spell attack at 90 ft; on a hit deals 4d4 acid (+1d4/slot
  above 2nd). Delayed 2d4 + miss-half deferred.

contract:
  reads: [actor.spell_ability_mod, actor.proficiency_bonus]
  writes: [combat.attack_roll, combat.damage_total]
  event: passive
  scope: builds_spell_attack_action
