# f_dominate_beast — Dominate Beast (Level 4 Enchantment, SRD CC v5.2.1)
#
# RAW summary (SRD 5.2.1, p124): 60 ft, one Beast. It makes a Wisdom
# saving throw (Advantage if you/your allies are fighting it) or has the
# Charmed condition for the duration; whenever it takes damage it repeats
# the save, ending the spell on a success. A telepathic link lets you
# command it. Concentration, up to 1 minute. (Druid/Ranger/Sorcerer.)
#
# Engine modeling: the Beast-only sibling of Dominate Person/Monster —
# the same hard_control shape. forced_save WIS vs the caster's spell save
# DC, on_fail co_charmed (the dominated beast won't harm the caster) +
# a turn-end WIS re-save. Concentration.
#
# Deferred RAW bits:
#   - Full puppet control (no take-over-an-enemy's-turn mechanism); v1
#     models the Charmed combat effect only.
#   - Advantage-while-fighting + re-save-on-damage (v1 turn-end re-save);
#     Beast-only restriction.
#   - co_charmed isn't in the AI control-denial set, so the AI scores
#     this 0 (desktop-lane scoring owns Charmed weighting).
#
# source: srd_5.2.1

id: f_dominate_beast
name: Dominate Beast
source: srd_5.2.1
granted_by:
  class: c_druid
  level: 7             # Druids gain 4th-level slots at L7
type: active
spell:
  class: c_druid
  level: 4

description: |
  One Beast within 60 ft makes a WIS save or is Charmed (won't harm
  the caster); re-saves at turn-end. Concentration. Full control deferred.

action_template:
  id: a_dominate_beast
  name: Dominate Beast
  type: hard_control
  spell_slot_level: 4
  concentration: true
  named_effect: dominate_beast
  range_ft: 60
  pipeline:
    - primitive: forced_save
      params:
        ability: wisdom
        dc_source: caster_spell_save_dc
        affected: current_target
        on_fail:
          - primitive: apply_condition
            params: { condition_id: co_charmed, duration: until_spell_ends }
          - primitive: recurring_save
            params:
              ability: wisdom
              dc_source: caster_spell_save_dc
              trigger_event: target_turn_end
              on_success: end_spell_on_target
              condition_id: co_charmed
        on_success: []
