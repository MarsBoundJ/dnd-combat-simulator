# f_hold_monster — Hold Monster (Level 5 Enchantment, SRD CC v5.2.1)
#
# RAW summary (SRD 5.2.1, p139): 90 ft. Choose a creature (not just a
# Humanoid — the only difference from Hold Person). It makes a Wisdom
# saving throw or has the Paralyzed condition for the duration; at the
# end of each of its turns it repeats the save, ending the spell on a
# success. Concentration, up to 1 minute. Using a Higher-Level Spell
# Slot: one additional creature per slot above 5th. (Bard/Sorc/Lock/Wiz.)
#
# Engine modeling: a direct recolor of Hold Person at a longer range and
# without the Humanoid restriction. type hard_control; forced_save WIS
# vs the caster's spell save DC, on_fail applies co_paralyzed
# (until_spell_ends) + a turn-end WIS re-save (the SRD escape).
# Concentration.
#
# Deferred RAW bits:
#   - Upcast multi-target (+1 creature per slot above 5th).
#
# source: srd_5.2.1

id: f_hold_monster
name: Hold Monster
source: srd_5.2.1
granted_by:
  class: c_wizard
  level: 9             # Wizards gain 5th-level slots at L9
type: active
spell:
  class: c_wizard
  level: 5

description: |
  One creature within 90 ft makes a WIS save or is Paralyzed; re-saves
  at each turn-end. Concentration, 1 minute.

action_template:
  id: a_hold_monster
  name: Hold Monster
  type: hard_control
  spell_slot_level: 5
  concentration: true
  named_effect: hold_monster
  range_ft: 90
  pipeline:
    - primitive: forced_save
      params:
        ability: wisdom
        dc_source: caster_spell_save_dc
        affected: current_target
        on_fail:
          - primitive: apply_condition
            params: { condition_id: co_paralyzed, duration: until_spell_ends }
          - primitive: recurring_save
            params:
              ability: wisdom
              dc_source: caster_spell_save_dc
              trigger_event: target_turn_end
              on_success: end_spell_on_target
              condition_id: co_paralyzed
        on_success: []
