# f_summon_fey — Summon Fey (3rd-level Conjuration, PHB 2024 — NOT
# in SRD 5.2.1)
#
# RAW summary (own words, from owned PHB 2024): Action, V/S/M (gilded
# flower 300+ GP), 90 ft, Concentration up to 1 hour. Call a Fey
# spirit (Fey Spirit stat block; choose a mood — Fuming, Mirthful, or
# Tricksy — which sets its Fey Step rider). Ally; shares your
# initiative, acts after you, obeys verbal commands; vanishes at 0 HP
# or spell end. Upcast: the stat block uses the slot's level.
# Classes: Druid, Ranger, Warlock, Wizard (Fey Wanderer granted).
#
# Engine modeling: `summon` action_template riding the Stage 2a/2b
# lifecycle + scorer (Summon Beast/Celestial precedent). v1 summons
# m_fey_spirit modeled at the FUMING mood — a flying melee striker
# whose Fey Blade resolves from the caster's spell attack at summon
# time.
#
# Deferred RAW bits:
#   - Fey Step (BA 30-ft teleport + mood rider: Fuming advantage /
#     Mirthful charm / Tricksy darkness).
#   - Mood choice (Fuming only) + stat-block upcast scaling.

id: f_summon_fey
name: Summon Fey
source: user_authored
granted_by:
  class: c_druid
  level: 5                 # Druids gain 3rd-level slots at L5
type: active
spell:
  class: c_druid
  level: 3

description: |
  Summon a Fey Spirit within 90 ft for the duration (Concentration,
  1 hour). Flying melee striker attacking with your spell attack
  modifier. (Fey Step + moods + upcast deferred.)

action_template:
  id: a_summon_fey
  name: Summon Fey
  type: summon
  spell_slot_level: 3
  concentration: true
  named_effect: summon_fey
  range_ft: 90
  pipeline:
    - primitive: summon
      params:
        monster: m_fey_spirit
        count: 1
        max_total: 1
        # RAW: the Fey Blade uses the caster's spell attack modifier
        # (resolved at cast time; the stat block's +6 is a fallback).
        attack_bonus_from: caster_spell_attack
