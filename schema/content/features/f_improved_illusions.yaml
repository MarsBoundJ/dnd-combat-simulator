# Engine modeling (LOW-MEDIUM combat relevance): the range extension
# helps spells like Phantasmal Force (30→90 ft). No-Verbal casting is
# stealth/Silence-proofing. BA Minor Illusion is action-economy
# friendly but illusion cantrips need DM-adjudication mechanics that
# are hard to sim — treat as utility-tier.
