# f_charm_monster — Charm Monster (Level 4 Enchantment, SRD CC v5.2.1)
#
# RAW summary (SRD 5.2.1, p113): 30 ft, one creature (any type — the
# difference from Charm Person). It makes a Wisdom saving throw
# (Advantage if you/your allies are fighting it) or has the Charmed
# condition for 1 hour or until you/your allies damage it. NOT
# Concentration. Using a Higher-Level Spell Slot: one additional creature
# per slot above 4th. (Bard/Druid/Sorcerer/Warlock/Wizard.)
#
# Engine modeling: the any-creature version of Charm Person — same
# hard_control shape. forced_save WIS vs the caster's spell save DC,
# on_fail co_charmed + turn-end WIS re-save (v1 escape).
#
# Deferred RAW bits: Advantage-while-fighting; "ends when harmed" (v1
# turn-end re-save); upcast multi-target.
#
# source: srd_5.2.1

id: f_charm_monster
name: Charm Monster
source: srd_5.2.1
granted_by:
  class: c_wizard
  level: 7             # Wizards gain 4th-level slots at L7
type: active
spell:
  class: c_wizard
  level: 4

description: |
  One creature within 30 ft makes a WIS save or is Charmed (won't harm
  the caster); re-saves at turn-end. 1 hour (not Concentration).

action_template:
  id: a_charm_monster
  name: Charm Monster
  type: hard_control
  spell_slot_level: 4
  named_effect: charm_monster
  range_ft: 30
  pipeline:
    - primitive: forced_save
      params:
        ability: wisdom
        dc_source: caster_spell_save_dc
        affected: current_target
        on_fail:
          - primitive: apply_condition
            params: { condition_id: co_charmed, duration: until_spell_ends }
          - primitive: recurring_save
            params:
              ability: wisdom
              dc_source: caster_spell_save_dc
              trigger_event: target_turn_end
              on_success: end_spell_on_target
              condition_id: co_charmed
        on_success: []
