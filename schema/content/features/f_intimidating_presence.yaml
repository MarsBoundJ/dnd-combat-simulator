# f_intimidating_presence — Intimidating Presence (Path of the
# Berserker, Barbarian L14)
# Source: SRD CC v5.2.1 / PHB 2024 p.51
#
# RAW: "As a Bonus Action, you can strike terror into others... each
# creature of your choice in a 30-foot Emanation originating from you
# must make a Wisdom saving throw (DC 8 plus your Strength modifier and
# Proficiency Bonus). On a failed save, a creature has the Frightened
# condition for 1 minute. At the end of each of the Frightened
# creature's turns, the creature repeats the save, ending the effect on
# itself on a success. Once you use this feature, you can't use it again
# until you finish a Long Rest unless you expend a use of your Rage (no
# action required) to restore your use of it."
#
# Engine modeling: a Bonus-Action emanation save-or-Frighten, the same
# forced_save + recurring-save shape as f_fear, but (a) a self-centered
# Emanation (size 30, origin caster) instead of a cone and (b) a MARTIAL
# save DC — dc_source: martial_save_dc, dc_ability: strength → 8 + STR
# mod + PB (resolved by primitives._resolve_dc and scored ability-aware
# by defensive_ehp._resolve_dc_for_action). Usable 1×/Long Rest via the
# intimidating_presence_uses_remaining feature_use (seeded by pc_schema).

id: f_intimidating_presence
name: Intimidating Presence
source: srd_5.2.1
granted_by:
  subclass: sc_path_of_the_berserker
  level: 14
type: active

resource_cost:
  type: bonus_action

action_template:
  id: a_intimidating_presence
  name: Intimidating Presence
  type: hard_control
  slot: bonus_action
  feature_use: intimidating_presence_uses_remaining
  rage_refund: true
  named_effect: intimidating_presence
  range_ft: 30
  area:
    shape: emanation
    size_ft: 30
    origin: caster
  pipeline:
    - primitive: forced_save
      params:
        ability: wisdom
        dc_source: martial_save_dc
        dc_ability: strength
        affected: all_creatures_in_area
        on_fail:
          - primitive: apply_condition
            params: { condition_id: co_frightened, duration: until_spell_ends }
          - primitive: recurring_save
            params:
              ability: wisdom
              dc_source: martial_save_dc
              dc_ability: strength
              trigger_event: target_turn_end
              on_success: end_spell_on_target
              condition_id: co_frightened
        on_success: []

# Deferred RAW bits:
#   - "each creature of your CHOICE": v1 affects all enemies in the
#     emanation (the AI would choose enemies anyway); allies are spared
#     via the enemies-only target resolution. When no area_origin is
#     set by the candidate generator, the resolver falls back to all
#     living enemies — a slight over-range vs the 30-ft bound that the
#     emanation geometry tightens once origin is supplied.
#   - 1-minute duration cap: modeled as "until the target saves out"
#     via the turn-end WIS re-save (same simplification as f_fear).
