# f_heroic_warrior — Heroic Warrior (Champion L10)
# Source: SRD CC v5.2.1 p49
#
# RAW: "The thrill of battle fills you with heroic energy. At the start of
# each of your turns in combat, you gain the benefits of the Heroism spell
