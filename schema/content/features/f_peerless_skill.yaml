# f_peerless_skill — Peerless Skill (College of Lore L14)
# Source: SRD CC v5.2.1 / PHB 2024
#
# RAW: "When you make an ability check or attack roll and fail, you can expend
# one use of Bardic Inspiration; roll the Bardic Inspiration die, and add the
# number rolled to the d20, potentially turning a failure into a success. On a
# failure, the Bardic Inspiration isn't expended."
#
# Engine modeling: this is the SELF-targeted, retroactive version of the
# Bardic Inspiration die. Mechanically it mirrors College of Lore's Cutting
# Words inspiration-die hook (f_cutting_words) but applied to the Bard's OWN
# failed attack roll rather than an enemy's: after the Bard's attack roll
# comes up short, the Bard may spend a use, roll the Bardic die, and add it to
# the d20 — re-evaluating the hit. The "not expended on a failure" clause means
# the use is refunded if the boosted roll still misses.
#
# Feature wiring status: STUB (deferred). The combat path it would ride is the
# attack-roll-pending reaction hook in engine/primitives._attack_roll (the same
# substrate Combat Inspiration Defense and Cutting Words already use), plus a
# refund-on-still-fail of the Bardic Inspiration use. Documented here so the
# feature is countable in features_known and surfaced by the loader; no runtime
# hook is registered yet.

id: f_peerless_skill
