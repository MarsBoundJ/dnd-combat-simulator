# f_warrior_of_the_gods — Warrior of the Gods (Path of the Zealot,
# Barbarian L3)
# Source: SRD CC v5.2.1 / PHB 2024 p.53
#
# RAW: "You have a pool of four d12s that you can spend to heal yourself.
# As a Bonus Action, you can expend dice from the pool, roll them, and
# regain a number of Hit Points equal to the roll's total. Your pool
# regains all expended dice when you finish a Long Rest. The pool's
# maximum number of dice increases by one when you reach Barbarian
# levels 6 (5 dice), 12 (6 dice), and 17 (7 dice)."
#
# Engine modeling: a Bonus-Action self-heal from a d12 dice pool. The
# pool (warrior_of_the_gods_dice_remaining / _max) is seeded by
# pc_schema.derive_pc_resources at 4/5/6/7 by level and restored on a
# Long Rest by rest.apply_long_rest. The warrior_of_the_gods primitive
# spends the fewest dice that cover the actor's missing HP (>=1), rolls
# them, and heals the actor. Self-only ("heal yourself"), so the
# candidate generator emits a single self-target (target: self →
# is_self_targeted_heal) and defensive_ehp_healing scores it for the
# caster only.

id: f_warrior_of_the_gods
name: Warrior of the Gods
source: srd_5.2.1
granted_by:
  subclass: sc_path_of_the_zealot
  level: 3
type: active

resource_cost:
  type: bonus_action

action_template:
  id: a_warrior_of_the_gods
  name: Warrior of the Gods
  type: heal
  slot: bonus_action
  pipeline:
    - primitive: warrior_of_the_gods
      params:
        target: self

contract:
  reads: [actor.resources.warrior_of_the_gods_dice_remaining,
           actor.hp_current, actor.hp_max]
  writes: [actor.hp_current, actor.resources.warrior_of_the_gods_dice_remaining]
  event: actor_turn_bonus_action
  scope: per_use

# Deferred:
#   - Player-chosen dice count: RAW lets you expend any number of dice.
#     v1 spends the fewest dice that cover missing HP at the d12 average
#     (never overheals the pool below need); a "burst all dice" mode for
#     a desperate top-up is a thin follow-on.
