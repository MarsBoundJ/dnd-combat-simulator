# f_fear — Fear (Level 3 Illusion, SRD CC v5.2.1)
#
# RAW summary (SRD 5.2.1, p129): each creature in a 30-foot Cone makes a
# Wisdom saving throw or drops what it's holding and gains the Frightened
# condition. A Frightened creature Dashes away from you by the safest
# route each turn; if it ends its turn with no line of sight to you, it
# repeats the save, ending the spell on a success. Concentration, 1 min.
#
# Engine modeling: a cone-shaped AoE fear. type aoe_attack with a `cone`
# area (length 30); the candidate generator sets origin = caster +
# direction toward the chosen enemy, and forced_save resolves every
# living creature in the cone via actors_in_cone. forced_save WIS vs the
# caster's spell save DC; on_fail applies co_frightened (Disadvantage on
# attacks while the source is visible — partial control) plus a turn-end
# WIS re-save. Concentration.
#
# Deferred RAW bits:
#   - "Drops what it's holding" + the forced Dash-away movement (no
#     drop/flee modeling; co_frightened's attack disadvantage is the
#     load-bearing effect).
#   - The re-save is RAW gated on "ends turn with no line of sight"; v1
#     uses an unconditional turn-end WIS re-save as the escape.
#
# source: srd_5.2.1

id: f_fear
name: Fear
source: srd_5.2.1
granted_by:
  class: c_wizard
  level: 5             # Wizards gain 3rd-level slots at L5
type: active
spell:
  class: c_wizard
  level: 3

description: |
  30-ft cone. WIS save vs spell DC or Frightened (re-saves at
  turn-end). Concentration, 1 minute.

action_template:
  id: a_fear
  name: Fear
  type: aoe_attack
  spell_slot_level: 3
  concentration: true
  named_effect: fear
  range_ft: 30
  area:
    shape: cone
    length_ft: 30
  pipeline:
    - primitive: forced_save
      params:
        ability: wisdom
        dc_source: caster_spell_save_dc
        affected: all_creatures_in_area
        on_fail:
          - primitive: apply_condition
            params: { condition_id: co_frightened, duration: until_spell_ends }
          - primitive: recurring_save
            params:
              ability: wisdom
              dc_source: caster_spell_save_dc
              trigger_event: target_turn_end
              on_success: end_spell_on_target
              condition_id: co_frightened
        on_success: []
