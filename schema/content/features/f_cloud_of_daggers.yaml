# f_cloud_of_daggers — Cloud of Daggers (Wizard 2nd-level, PHB 2024 — NOT in SRD 5.2.1)
#
# RAW (PHB 2024, verified vs the owned book 2026-06-10): 5-foot Cube
# of spinning daggers centered on a point within 60 ft. A creature in
# the Cube takes 4d4 slashing — also when it enters the Cube, ends
# its turn there, or the Cube moves into its space; once per turn.
# NO save. On later turns the caster can take a Magic action to
# teleport the Cube up to 30 ft. Concentration, 1 minute.
# Upcast: +2d4 per slot above 2.
#
# Engine application:
#   - type: persistent_aura
#   - shape: cube, size_ft: 5
#   - anchor: point (placed at cast time, doesn't move)
#   - affected: all_creatures (friendly fire — RAW has no exclusion)
#   - ability: 'none' → no save, always damages on trigger
#   - on_fail: 4d4 slashing (+2d4/slot via upcast_scaling)
#   - Trigger: turn-start (2024's enter / end-turn / cube-moves
#     triggers are approximated at the same once-per-turn cadence)

id: f_cloud_of_daggers
name: Cloud of Daggers
source: user_authored   # PHB 2024 / XGE spell NOT in SRD 5.2.1 — own-words re-expression
granted_by:
  class: c_wizard
  level: 3                 # Wizards gain access to 2nd-level spells at L3
type: active
spell:
  class: c_wizard
  level: 2

description: |
  5-ft cube of whirling blades centered on a chosen point. Any
  creature that starts its turn in the area takes 4d4 slashing
  damage. No save. Concentration, 1 minute.

action_template:
  id: a_cloud_of_daggers
  name: Cloud of Daggers
  type: persistent_aura
  spell_slot_level: 2
  concentration: true
  named_effect: cloud_of_daggers
  area:
    shape: cube
    size_ft: 5
    range_ft: 60
  upcast_scaling:
    extra_dice_per_level: "2d4"
    damage_type: slashing
  pipeline:
    - primitive: persistent_aura
      params:
        shape: cube
        size_ft: 5
        anchor: point
        trigger_event: target_turn_start_in_area
        affected: all_creatures
        ability: none           # no-save: always damages
        on_fail:
          - primitive: damage
            params: { dice: "4d4", type: slashing }

deferred:
  - entry_on_move_trigger: "RAW 2024 fires on enter / end-turn / cube-moves-into-space (once per turn); v1 ticks at turn-start — same cadence."
  - magic_action_teleport: "RAW 2024 lets the caster take a Magic action to teleport the Cube up to 30 ft; v1's cube is static (same deferral family as Flaming Sphere's ram)."
