# f_disintegrate — Disintegrate (Level 6 Transmutation, SRD CC v5.2.1)
#
# RAW summary (SRD 5.2.1, p123): 60 ft, one target. The target makes a
# Dexterity saving throw. On a failed save it takes 10d6 + 40 Force
# damage (and is reduced to gray dust if this drops it to 0 HP). On a
# success it takes NO damage. Using a Higher-Level Spell Slot: +3d6 per
# slot above 6.
#
# Engine modeling: a single-target save-or-nothing nuke — a static
# `save_attack` action_template. forced_save DEX vs the caster's spell
# save DC: 10d6 + 40 force on a fail, nothing on a success
# (half_on_success false → empty on_success). upcast_scaling adds +3d6
# force per slot above 6th.
#
# Deferred RAW bits:
#   - "Disintegrated to dust at 0 HP / revivable only by True
#     Resurrection or Wish" — flavor/death-state nuance not modeled; the
#     10d6+40 damage is the load-bearing effect.
#   - Object/force-wall destruction (no object modeling).
#
# source: srd_5.2.1

id: f_disintegrate
name: Disintegrate
source: srd_5.2.1
granted_by:
  class: c_wizard
  level: 11            # Wizards gain 6th-level slots at L11
type: active
spell:
  class: c_wizard
  level: 6

description: |
  One target within 60 ft makes a DEX save vs spell DC: 10d6+40 force
  on a fail, nothing on a success. +3d6 per slot above 6th.

action_template:
  id: a_disintegrate
  name: Disintegrate
  type: save_attack
  spell_slot_level: 6
  named_effect: disintegrate
  range_ft: 60
  save_ability: dexterity
  save_dc_source: caster_spell_save_dc
  half_on_success: false
  upcast_scaling:
    extra_dice_per_level: "3d6"
    damage_type: force
  pipeline:
    - primitive: forced_save
      params:
        ability: dexterity
        dc_source: caster_spell_save_dc
        affected: current_target
        on_fail:
          - primitive: damage
            params: { dice: "10d6", modifier: 40, type: force }
        on_success: []
