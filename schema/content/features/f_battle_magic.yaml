# f_battle_magic — Battle Magic (College of Valor, Bard L14)
# Source: PHB 2024
#
# RAW: "After you cast a spell that has a casting time of an action, you
# can make one attack with a weapon as a Bonus Action."
#
# Engine modeling: FULLY WIRED.
#   - pipeline.execute() sets actor.actions_used_this_turn["battle_magic_triggered"]
#     = True whenever a Valor Bard with f_battle_magic completes a spell
#     action (spell_slot_level is not None, slot == "action", not cancelled).
#   - pc_schema._build_feature_actions adds an `a_battle_magic_attack`
#     bonus-action weapon attack (copy of primary weapon, tagged
#     requires_battle_magic: True) to the template.
#   - pipeline.generate_candidates() filters out requires_battle_magic
#     actions when battle_magic_triggered is not set.

id: f_battle_magic
name: Battle Magic
source: srd_5.2.1
granted_by:
  subclass: sc_college_of_valor
  level: 14
type: active

description: |
  After you cast a spell that has a casting time of an action, you can
  make one attack with a weapon as a Bonus Action.

contract:
  reads: [actor.template.features_known, actor.actions_used_this_turn]
  writes: [actor.actions_used_this_turn.battle_magic_triggered]
  event: post_spell_cast
  scope: self
