# f_disciple_of_life — Disciple of Life (Life Domain L3)
# Source: SRD CC v5.2.1
#
# RAW: When a spell you cast with a spell slot restores Hit Points to a
# creature, that creature regains additional Hit Points on the turn you
# cast the spell. The additional Hit Points equal 2 plus the spell
# slot's level.
#
# Engine modeling (deferred — needs a heal-amount hook): rider on the
# heal primitive when (a) cast via spell slot and (b) caster knows this
# feature: amount += 2 + slot_level. Cure Wounds / Healing Word already
# exist, so this is wireable once the heal pipeline exposes slot level
# to a modifier query (mirrors how damage riders query the attack
# context).

id: f_disciple_of_life
name: Disciple of Life
source: srd_5.2.1
granted_by:
  subclass: sc_life_domain
  level: 3
type: passive
is_signature: true

