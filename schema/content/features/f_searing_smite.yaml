# f_searing_smite — Searing Smite (1st-level Paladin spell, SRD CC v5.2.1)
#
# RAW summary (SRD 5.2.1 / PHB 2024): Bonus Action, V, Self, 1 minute
# (NOT Concentration). As you hit the target, it takes an extra 1d6
# Fire damage from the attack. At the start of each of its turns until
# the spell ends, the target takes 1d6 Fire damage and then makes a
# CON save — on success the spell ends, on failure the spell continues.
# At Higher Levels: ALL the damage increases by 1d6 per slot above 1st.
#
# Engine modeling:
#   - type: defensive_buff (self-targeted; the Paladin arms themselves)
#   - 1 Bonus Action cast time (RAW 2024)
#   - NOT Concentration (PHB 2024 change from 2014). Paladin can stack
#     Searing Smite with Bless / Shield of Faith / Divine Favor.
#   - Pipeline: `searing_smite_arm` primitive registers a one-shot
#     marker modifier on the caster. The _damage primitive checks the
#     marker on the caster's next melee weapon hit, rolls 1d6 fire
#     (+1d6 per upcast level, doubled on crit), and directly applies
#     co_ignited (no initial save — has_initial_save=False).
#   - co_ignited registers both a recurring_damage tick AND a
#     recurring_save (CON, target_turn_start) for save-to-end.
#   - Upcast: burn_scales_with_upcast=True → per-turn burn dice
#     are post-processed to match slot_level (e.g., 3d6 at slot 3).
#   - named_effect: "searing_smite" → cross-caster dedup
#
# source: srd_5.2.1
#
# Deferred RAW bits:
#   - Typed bonus damage: the +1d6 fire on the empowering attack
#     is applied as untyped to the existing damage step. Per RAW the
#     bonus is fire-typed (same shared gap as Divine Favor's +1d4).
#   - 1-minute duration expiry timer (spell currently ends only via
#     the save-to-end mechanic, not a hard round cap).

id: f_searing_smite
name: Searing Smite
source: srd_5.2.1
granted_by:
  class: c_paladin
  level: 2                   # Paladins gain 1st-level slots at L2
type: active
spell:
  class: c_paladin
  level: 1

description: |
  Self-buff. The Paladin's next melee weapon hit deals +1d6 fire
  damage and the target is Ignited (1d6 fire per turn, CON save
  to end). NOT concentration. 1 minute. BA cast.
  All damage scales with upcast (+1d6 per slot above 1st).

action_template:
  id: a_searing_smite
  name: Searing Smite
  type: defensive_buff
  spell_slot_level: 1
  slot: bonus_action
  named_effect: searing_smite
  range_ft: 0                # self-only
  pipeline:
    - primitive: searing_smite_arm
      params: {}
