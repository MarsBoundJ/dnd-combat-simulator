# f_dominate_monster — Dominate Monster (Level 8 Enchantment, SRD CC v5.2.1)
#
# RAW summary (SRD 5.2.1, p124): 60 ft, one creature (any type — the
# difference from Dominate Person). It makes a Wisdom saving throw (with
# Advantage if you/your allies are fighting it) or gains the Charmed
# condition for the duration; whenever it takes damage it repeats the
# save, ending the spell on a success. Concentration, up to 1 hour.
# (Bard/Sorcerer/Warlock/Wizard.)
#
# Engine modeling: the any-creature upgrade of Dominate Person — same
# hard_control shape. forced_save WIS vs the caster's spell save DC,
# on_fail co_charmed (won't harm the caster) + turn-end WIS re-save.
# Concentration.
#
# Deferred RAW bits: full puppet control; advantage-while-fighting +
# re-save-on-damage (v1 uses a turn-end re-save); co_charmed AI scoring
# weight — all as documented for Dominate Person.
#
# source: srd_5.2.1

id: f_dominate_monster
name: Dominate Monster
source: srd_5.2.1
granted_by:
  class: c_wizard
  level: 15            # Wizards gain 8th-level slots at L15
type: active
spell:
  class: c_wizard
  level: 8

description: |
  One creature within 60 ft makes a WIS save or is Charmed (won't harm
  the caster); re-saves at turn-end. Concentration. Full puppet
  control deferred.

action_template:
  id: a_dominate_monster
  name: Dominate Monster
  type: hard_control
  spell_slot_level: 8
  concentration: true
  named_effect: dominate_monster
  range_ft: 60
  pipeline:
    - primitive: forced_save
      params:
        ability: wisdom
        dc_source: caster_spell_save_dc
        affected: current_target
        on_fail:
          - primitive: apply_condition
            params: { condition_id: co_charmed, duration: until_spell_ends }
          - primitive: recurring_save
            params:
              ability: wisdom
              dc_source: caster_spell_save_dc
              trigger_event: target_turn_end
              on_success: end_spell_on_target
              condition_id: co_charmed
        on_success: []
