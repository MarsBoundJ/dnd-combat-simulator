# f_hold_person — Hold Person (Level 2 Enchantment, SRD CC v5.2.1)
#
# RAW summary (SRD 5.2.1, p140): choose a Humanoid within 60 ft. It must
# succeed on a Wisdom saving throw or have the Paralyzed condition for
# the duration. At the end of each of its turns it repeats the save,
# ending the spell on itself on a success. Concentration, up to 1 minute.
# Using a Higher-Level Spell Slot: one additional Humanoid per slot above
# 2nd.
#
# Engine modeling: the archetypal single-target save-or-lose lockdown.
#   - type: hard_control — the candidate generator emits one candidate
#     per in-range enemy; defensive_ehp_hard_control scores it as
#     enemy_DPR × p_fail × rounds × denial (Paralyzed = full denial 1.0).
#   - forced_save: WIS vs the caster's spell save DC, affected
#     current_target. on_fail applies co_paralyzed (until_spell_ends) and
#     registers a recurring_save (WIS at the target's turn-end) that ends
#     the spell on that creature on a success — exactly the SRD escape.
#   - Concentration.
#
# Deferred RAW bits:
#   - Humanoid-only restriction (no creature-type targeting filter in v1).
#   - Upcast multi-target (+1 Humanoid per slot above 2nd).
#
# source: srd_5.2.1

id: f_hold_person
name: Hold Person
source: srd_5.2.1
granted_by:
  class: c_cleric
  level: 3             # Clerics gain 2nd-level slots at L3
type: active
spell:
  class: c_cleric
  level: 2
  school: enchantment

description: |
  One creature within 60 ft makes a WIS save or is Paralyzed; it
  re-saves at the end of each of its turns to break free.
  Concentration, 1 minute.

action_template:
  id: a_hold_person
  name: Hold Person
  type: hard_control
  spell_slot_level: 2
  concentration: true
  # Hold Person only affects Humanoids — the candidate generator's
  # target-effectiveness gate drops it against any other creature type
  # (a dragon can never be held). Hold Monster is the any-creature version.
  target_creature_types: [humanoid]
  named_effect: hold_person
  range_ft: 60
  pipeline:
    - primitive: forced_save
      params:
        ability: wisdom
        dc_source: caster_spell_save_dc
        affected: current_target
        on_fail:
          - primitive: apply_condition
            params: { condition_id: co_paralyzed, duration: until_spell_ends }
          - primitive: recurring_save
            params:
              ability: wisdom
              dc_source: caster_spell_save_dc
              trigger_event: target_turn_end
              on_success: end_spell_on_target
              condition_id: co_paralyzed
        on_success: []
