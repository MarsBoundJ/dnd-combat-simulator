# f_retaliation — Retaliation (Path of the Berserker, Barbarian L10)
# Source: SRD CC v5.2.1 / PHB 2024 p.51
#
# RAW: "When you take damage from a creature that is within 5 feet of
# you, you can take a Reaction to make one melee attack against that
# creature, using a weapon or an Unarmed Strike."
#
# Engine modeling: a damage_taken reaction (same generic trigger system
# as Hellish Rebuke), gated by the `damaged_by_adjacent_creature`
# condition (reactor took the damage + a living enemy source within 5
# ft). The payload is the `melee_retaliation` primitive, which makes one
# melee weapon attack from the reactor against that attacker — routed
# through the reactor's REAL weapon attack so Rage damage and weapon
# masteries apply (engine/core/reactions.execute_retaliation_strike).
#
# The reaction slot is spent up front to bound mutual-Retaliation
# recursion (no spell-slot cost to self-limit, unlike Hellish Rebuke).

id: f_retaliation
name: Retaliation
source: srd_5.2.1
granted_by:
  subclass: sc_path_of_the_berserker
  level: 10
type: active

resource_cost:
  type: reaction

action_template:
  id: a_retaliation
  name: Retaliation
  type: weapon_attack
  slot: reaction
  trigger: damage_taken
  condition: damaged_by_adjacent_creature
  pipeline:
    - primitive: melee_retaliation

# Deferred:
#   - Unarmed Strike fallback: a reactor with no melee weapon attack
#     makes no swing (RAW allows an Unarmed Strike). Barbarians carry a
#     weapon in practice, so this is a thin edge.
#   - The swing uses the reactor's first melee weapon attack (matches
#     the opportunity-attack v1 choice); a "best melee" pick is a shared
#     follow-on with the OA path.
