#
# RAW summary (SRD 5.2.1, p156): 60 ft. Make a ranged spell attack; on a
# hit the target takes 1d8 Cold damage and its Speed is reduced by 10 ft
# until the start of your next turn. Cantrip Upgrade: +1d8 at levels 5
# (2d8), 11 (3d8), 17 (4d8).
#
# Engine modeling: a ranged-spell-attack cantrip — the cold sibling of
# Fire Bolt. MARKER feature built by pc_schema._build_attack_cantrip_action
# (Nd8 cold on hit, N scaling with character level; attack bonus = spell
# mod + PB).
#
# Deferred RAW bits:
#   - The −10 ft Speed reduction rider (no flat speed_modifier primitive
#     enforced yet — co_slowed-style spec only); the cold damage is the
#     load-bearing effect.
#
# source: srd_5.2.1

