# f_overchannel — Overchannel (Evoker L14)
# Source: SRD CC v5.2.1 (PHB 2024)
#
# Mechanics: When you cast a Wizard spell with a spell slot of levels
# 1-5 that deals damage, you can deal MAXIMUM damage with that spell
# on the turn you cast it.
#   - First use per Long Rest: no cost.
#   - Each later use before a Long Rest: take 2d12 Necrotic damage per
#     level of the slot immediately after casting (ignores Resistance
#     and Immunity), and the dice escalate by +1d12 per slot level for
#     every additional use.
#
# Engine modeling (HIGH wireability): maximize-dice modifier on one
# cast — a L5 Cone of Cold goes from 8d8 avg 36 to flat 64. The
# self-damage escalation is a textbook risk/reward curve for the AI
# (first use free; second at L5 = 10d12 ≈ 65 self-damage). Needs a
# max_damage flag on the damage roll + escalating self-damage tracker
# (overchannel_uses since Long Rest). Gap-fill for the pre-existing
# Evoker subclass (file was missing).

id: f_overchannel
name: Overchannel
source: srd_5.2.1
granted_by:
  subclass: sc_evoker
  level: 14
type: triggered_choice
is_signature: true

trigger:
  event: damage_spell_cast_with_slot
  chosen_by: actor

effect_primitives: []
