# f_superior_critical — Superior Critical (Champion L15)
# Source: SRD CC v5.2.1 p49
#
# RAW: "Your weapon and unarmed strike attack rolls score a Critical Hit
# on a roll of 18-20."
#
# Engine modeling: same pattern as f_improved_critical (new_threshold: 19)
# but lowers the crit range to 18-20. The crit_threshold_modifier
# effect_primitive is documented here as contract; query_crit_modifiers
# in engine/core/modifiers.py reads crit_threshold_modifier entries from
# active_modifiers and takes the minimum threshold found.

id: f_superior_critical
name: Superior Critical
source: srd_5.2.1
granted_by:
  subclass: sc_champion
  level: 15
type: passive

effect_primitives:
  - primitive: crit_threshold_modifier
    params:
      new_threshold: 18           # crit on 18-20

contract:
  reads: [combat.attack_roll]
  writes: [combat.crit_threshold]
  event: attack_roll_resolved
  scope: passive
