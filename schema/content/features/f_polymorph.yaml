# f_polymorph — Polymorph (4th-level Transmutation, SRD CC v5.2.1)
#
# RAW summary: one creature within 60 ft makes a WIS save (an unwilling
# target that succeeds is unaffected). On a failure it becomes a Beast of
# CR <= its own CR for the duration (Concentration, up to 1 hour). The
# new form has the beast's game stats + HP; when that HP drops to 0 the
# target reverts to its true form with any excess damage carrying over.
#
# Engine modeling: rides the form system's `polymorph` merge policy via
# the `polymorph_target` primitive (in the forced_save on_fail). The
# policy already handles: all-stats-replaced, HP = beast pool,
# carry_overflow (excess damage hits true HP on revert), revert at 0 form
# HP (the _damage death hook) and revert when the caster's Concentration
# ends (end_concentration). Legendary Resistance applies to the WIS save
# for free (via _forced_save). A single save on cast — no recurring save.
#
# Control value: a flagship REMOVAL effect — polymorph the boss into a
# low-threat Beast and it contributes 0 for the duration (the lockdown /
# control-eHP play). The default form here is m_giant_toad (a harmless
# "neutralize" pick); the caster's tactical form selection (and the RAW
# CR <= target cap) is AI-lane work, deferred.
#
# source: srd_5.2.1

id: f_polymorph
name: Polymorph
source: srd_5.2.1
granted_by:
  class: c_wizard
  level: 7                 # Wizards gain 4th-level slots at L7
type: active
spell:
  class: c_wizard
  level: 4

description: |
  One creature within 60 ft makes a WIS save or is transformed into a
  Beast (default: a harmless toad) for the duration — its own stats
  replaced by the beast's. Reverts at 0 form HP (excess carries over) or
  when concentration ends. Concentration.

action_template:
  id: a_polymorph
  name: Polymorph
  type: hard_control
  spell_slot_level: 4
  concentration: true
  named_effect: polymorph
  range_ft: 60
  pipeline:
    - primitive: forced_save
      params:
        ability: wisdom
        dc_source: caster_spell_save_dc
        affected: current_target
        on_fail:
          - primitive: polymorph_target
            params: { form: m_giant_toad }
        on_success: []
