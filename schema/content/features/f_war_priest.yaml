resource_cost:
  type: feature_use   # war_priest_uses = WIS mod per short/long rest

usage:
  uses_per: per_rest

action_template:
  id: a_war_priest
  name: War Priest
  type: weapon_attack
  slot: bonus_action
  pipeline: []        # weapon-attack routing deferred (see notes above)

