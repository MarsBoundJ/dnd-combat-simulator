# f_blight — Blight (Level 4 Necromancy, SRD CC v5.2.1)
#
# RAW summary (SRD 5.2.1, p112): 30 ft, one creature. It makes a
# Constitution saving throw, taking 8d8 Necrotic damage on a fail or
# half on a success. A Plant creature automatically fails. (A nonmagical
# plant simply withers.) Using a Higher-Level Spell Slot: +1d8 per slot
# above 4th. (Druid/Sorcerer/Warlock/Wizard.)
#
# Engine modeling: a single-target save-for-half nuke — a static
# `save_attack` action_template. forced_save CON vs the caster's spell
# save DC; 8d8 necrotic on a fail, half on a success. +1d8/slot upcast.
#
# Deferred RAW bits:
#   - Plant-creature auto-fail (no creature-type save override in v1).
#
# source: srd_5.2.1

id: f_blight
name: Blight
source: srd_5.2.1
granted_by:
  class: c_wizard
  level: 7             # Wizards gain 4th-level slots at L7
type: active
spell:
  class: c_wizard
  level: 4

description: |
  One creature within 30 ft makes a CON save vs spell DC: 8d8 necrotic
  on a fail, half on a success. +1d8 per slot above 4th.

action_template:
  id: a_blight
  name: Blight
  type: save_attack
  spell_slot_level: 4
  named_effect: blight
  range_ft: 30
  save_ability: constitution
  save_dc_source: caster_spell_save_dc
  half_on_success: true
  upcast_scaling:
    extra_dice_per_level: "1d8"
    damage_type: necrotic
  pipeline:
    - primitive: forced_save
      params:
        ability: constitution
        dc_source: caster_spell_save_dc
        affected: current_target
        on_fail:
          - primitive: damage
            params: { dice: "8d8", modifier: 0, type: necrotic }
        on_success:
          - primitive: damage
            params: { dice: "8d8", modifier: 0, type: necrotic, multiplier: 0.5 }
