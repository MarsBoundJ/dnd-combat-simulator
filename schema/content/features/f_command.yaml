# f_command — Command (Level 1 Enchantment, SRD CC v5.2.1)
#
# RAW summary (SRD 5.2.1, p115): 60 ft. The target makes a Wisdom saving
# throw or follows a one-word command on its next turn — Approach, Drop,
# Flee, Grovel, or Halt. Instantaneous. Using a Higher-Level Spell Slot:
# one additional creature per slot above 1st.
#
# Engine modeling: single-target save-or-lose-a-turn. type hard_control;
# forced_save WIS vs the caster's spell save DC, on_fail applies
# co_incapacitated for until_actor_next_turn_start — i.e. the "Halt"
# command (the target takes no action or Bonus Action on its next turn),
# the most universally combat-relevant of the five words. The condition
# expires on its own after one turn, so no recurring save is needed
# (Command is instantaneous, a single-turn effect).
#
# Deferred RAW bits:
#   - The other four command words (Approach / Drop / Flee / Grovel) —
#     v1 always models Halt (one-turn action denial). Grovel (Prone) and
#     Flee (forced move) are plausible future variants.
#   - Upcast multi-target (+1 creature per slot above 1st).
#
# source: srd_5.2.1

id: f_command
name: Command
source: srd_5.2.1
granted_by:
  class: c_cleric
  level: 1
type: active
spell:
  class: c_cleric
  level: 1

description: |
  One creature within 60 ft makes a WIS save or wastes its next turn
  (the "Halt" command, modeled as Incapacitated for one turn).

action_template:
  id: a_command
  name: Command
  type: hard_control
  spell_slot_level: 1
  named_effect: command
  range_ft: 60
  pipeline:
    - primitive: forced_save
      params:
        ability: wisdom
        dc_source: caster_spell_save_dc
        affected: current_target
        on_fail:
          - primitive: apply_condition
            params:
              condition_id: co_incapacitated
              duration: until_actor_next_turn_start
        on_success: []
