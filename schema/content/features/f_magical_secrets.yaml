# f_magical_secrets — Magical Secrets (Bard L10)
# Source: SRD CC v5.2.1 / PHB 2024
#
# RAW: "Whenever you reach a Bard level (including this level) and the
# Prepared Spells number increases, you can choose any of your new prepared
# spells from the Bard, Cleric, Druid, and Wizard spell lists, and the chosen
# spells count as Bard spells for you..."
#
# Engine modeling: BUILD-CONFIG / spell-selection. Magical Secrets widens the
# spell list the Bard may prepare from (Bard + Cleric + Druid + Wizard). In
# the sim a build already declares the spells it prepares; this feature
# marker records that a L10+ Bard's prepared spells MAY come from the expanded
# lists (so the build-validator doesn't reject a Cleric/Druid/Wizard pick).
# No direct combat mechanic of its own — its value is whatever expanded
# spells the build chooses, which ride their own wiring.
#
# Feature wiring status: MARKER (build-config; widens legal spell picks).

