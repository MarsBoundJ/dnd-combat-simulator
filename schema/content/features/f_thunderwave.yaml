# f_thunderwave — Thunderwave (Level 1 Evocation, SRD CC v5.2.1)
#
# RAW summary (SRD 5.2.1, p168): a wave of thunderous energy fills a
# 15-foot Cube originating from you. Each creature in the Cube makes a
# Constitution saving throw: on a fail, 2d8 Thunder damage and pushed
# 10 ft away from you; on a success, half damage and no push. Using a
# Higher-Level Spell Slot: +1d8 per slot above 1.
#
# Engine modeling: a self-centered burst. forced_save's AoE resolver
# supports sphere/cone/line (not cube), and the candidate generator
# places a sphere's origin near an enemy gated by `area.range_ft`. The
# 15-ft self-originating Cube is modeled as a 15-ft-radius Sphere with
# range_ft 5, so the origin can only be placed adjacent to the caster —
# i.e. effectively centered on the caster (a self-burst). CON save vs
# the spell save DC: 2d8 thunder + 10-ft push on a fail (forced_movement
# pushes each failing creature away from the caster), half damage / no
# push on a success. +1d8/slot upcast.
#
# Deferred RAW bits:
#   - Cube→sphere geometry; self-origin approximated via range_ft 5.
#   - Object displacement / 300-ft audible boom (flavor).
#
# source: srd_5.2.1

id: f_thunderwave
name: Thunderwave
source: srd_5.2.1
granted_by:
  class: c_wizard
  level: 1
type: active
spell:
  class: c_wizard
  level: 1

description: |
  15-ft cube from the caster (modeled as a 15-ft self-burst sphere).
  CON save vs spell DC: 2d8 thunder + 10-ft push on a fail, half /
  no push on a success. +1d8 per slot above 1st.

action_template:
  id: a_thunderwave
  name: Thunderwave
  type: aoe_attack
  spell_slot_level: 1
  named_effect: thunderwave
  range_ft: 5
  area:
    shape: sphere
    radius_ft: 15
    range_ft: 5          # origin placeable only adjacent to caster ≈ self-centered
  upcast_scaling:
    extra_dice_per_level: "1d8"
    damage_type: thunder
  pipeline:
    - primitive: forced_save
      params:
        ability: constitution
        dc_source: caster_spell_save_dc
        affected: all_creatures_in_area
        on_fail:
          - primitive: damage
            params: { dice: "2d8", modifier: 0, type: thunder }
          - primitive: forced_movement
            params: { distance_ft: 10 }
        on_success:
          - primitive: damage
            params: { dice: "2d8", modifier: 0, type: thunder, multiplier: 0.5 }
