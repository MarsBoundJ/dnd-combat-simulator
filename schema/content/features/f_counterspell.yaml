# f_counterspell — Counterspell (3rd-level Abjuration, SRD CC v5.2.1)
#
# RAW (SRD 5.2.1 / PHB 2024):
#   Reaction (when you see a creature within 60 ft casting a spell
#   with V/S/M components). The creature makes a Constitution saving
#   throw. On a failed save, the spell dissipates with no effect, and
#   the action/BA/reaction used to cast it is wasted. If that spell
#   was cast with a spell slot, the slot isn't expended.
#
# Engine modeling:
#   - trigger: spell_cast_initiated — fires BEFORE the target's
#     spell pipeline runs. The counterspell_resolve primitive rolls
#     the target caster's CON save vs the counterspeller's spell save
#     DC. On fail: state.cast_cancelled = True → pipeline.execute
#     skips the pipeline and refunds the slot.
#   - condition: enemy_casting_spell_within_60_ft — caster on
#     opposing side, not self, within 60 ft.
#
# v1 deferred:
#   - "you can see" gate (no vision system)
#   - Counterspell-of-Counterspell chains (reaction-cascade limit)

id: f_counterspell
name: Counterspell
source: srd_5.2.1
granted_by:
  class: c_wizard
  level: 5                 # Wizards gain access to 3rd-level spells at L5
type: active

action_template:
  id: a_counterspell
  name: Counterspell
  type: hard_control
  spell_slot_level: 3
  slot: reaction
  trigger: spell_cast_initiated
  condition: enemy_casting_spell_within_60_ft
  named_effect: counterspell
  pipeline:
    - primitive: counterspell_resolve
      params: {}
