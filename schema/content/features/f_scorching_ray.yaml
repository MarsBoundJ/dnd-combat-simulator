# f_scorching_ray — Scorching Ray (Level 2 Evocation, SRD CC v5.2.1)
#
# RAW summary (SRD 5.2.1, p158): 120 ft. You hurl three fiery rays at
# one or several targets. Make a ranged spell attack for EACH ray; on a
# hit a ray deals 2d6 Fire damage. Using a Higher-Level Spell Slot: one
# additional ray per slot above 2nd.
#
# Engine modeling: a ranged-spell-attack leveled spell with three rays —
# a MARKER feature built by pc_schema._build_leveled_spell_attack_action
# with ray_count=3 (three (attack_roll, damage-on-hit) pairs in one
# action). Each ray independently rolls to hit at the baked spell-attack
# bonus, dealing 2d6 fire. v1 focus-fires all three rays at one target
# (the Eldritch Blast / Magic Missile v1 convention).
#
# Deferred RAW bits:
#   - Splitting rays across multiple targets (v1 focus-fires one).
#   - Upcast adds a RAY per slot above 2nd; the engine's dice-only upcast
#     can't add an attack pair, so ray-count upcast is deferred.
#   - AI scoring: offensive_ehp_single_attack reads the first
#     attack_roll only, so it under-scores the 3-ray total — the desktop
#     lane's scorer owns multi-ray valuation. Loads + executes (all three
#     rays fire) meanwhile.
#
# source: srd_5.2.1

id: f_scorching_ray
name: Scorching Ray
source: srd_5.2.1
granted_by:
  class: c_wizard
  level: 3             # Wizards gain 2nd-level slots at L3
type: passive
spell:
  class: c_wizard
  level: 2

pc_builder:
  kind: spell_attack
  action_id: a_scorching_ray
  name: Scorching Ray
  params:
    slot_level: 2
    range_ft: 120
    damage_dice: "2d6"
    damage_type: fire
    ray_count: 3

description: |
  Three ranged spell attacks at 120 ft, 2d6 fire each (v1 focus-fires
  one target). Multi-target split + ray-count upcast deferred.

contract:
  reads: [actor.spell_ability_mod, actor.proficiency_bonus]
  writes: [combat.attack_roll, combat.damage_total]
  event: passive
  scope: builds_spell_attack_action
