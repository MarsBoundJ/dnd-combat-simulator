# f_flaming_sphere — Flaming Sphere (Level 2 Conjuration, SRD CC v5.2.1)
#
# RAW summary (SRD 5.2.1, p131): you create a 5-foot-diameter sphere of
# fire on the ground within 60 ft. Any creature that ends its turn
# within 5 ft of the sphere makes a Dexterity saving throw, taking 2d6
# Fire damage on a failed save or half on a success. As a Bonus Action
# you can move the sphere up to 30 ft (and ram a creature). Concentration,
# up to 1 minute. Using a Higher-Level Spell Slot: +1d6 per slot above 2.
#
# Engine modeling: a point-anchored damaging zone — the same archetype
# as Moonbeam. type persistent_aura, sphere radius 5, anchored at the
# chosen point; each creature's turn in the area makes a DEX save vs the
# caster's spell save DC for 2d6 fire (half on success). +1d6/slot
# upcast. Concentration.
#
# Deferred RAW bits:
#   - Bonus-action move/ram (v1 leaves the sphere where placed — same
#     deferral as Moonbeam's beam move).
#   - "Ends its turn within 5 ft" is modeled via the standard turn-based
#     in-area trigger.
#
# source: srd_5.2.1

id: f_flaming_sphere
name: Flaming Sphere
source: srd_5.2.1
granted_by:
  class: c_druid
  level: 3             # Druids gain 2nd-level slots at L3
type: active
spell:
  class: c_druid
  level: 2

description: |
  5-ft sphere of fire within 60 ft. DEX save vs spell DC at each
  creature's turn in the area: 2d6 fire on a fail, half on a success.
  +1d6/slot. Concentration, 1 minute.

action_template:
  id: a_flaming_sphere
  name: Flaming Sphere
  type: persistent_aura
  spell_slot_level: 2
  concentration: true
  named_effect: flaming_sphere
  area:
    shape: sphere
    radius_ft: 5
    range_ft: 60
  upcast_scaling:
    extra_dice_per_level: "1d6"
    damage_type: fire
  pipeline:
    - primitive: persistent_aura
      params:
        shape: sphere
        radius_ft: 5
        anchor: point
        trigger_event: target_turn_start_in_area
        affected: all_creatures
        ability: dexterity
        dc_source: caster_spell_save_dc
        on_fail:
          - primitive: damage
            params: { dice: "2d6", modifier: 0, type: fire }
        on_success:
          - primitive: damage
            params: { dice: "2d6", modifier: 0, type: fire, multiplier: 0.5 }
