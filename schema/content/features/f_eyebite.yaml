# f_eyebite — Eyebite (Level 6 Necromancy, SRD CC v5.2.1)
#
# RAW summary (SRD 5.2.1, p128): for the duration your eyes become an
# inky void. One creature within 60 ft makes a Wisdom saving throw or is
# afflicted (your choice) with Asleep (Unconscious), Panicked
# (Frightened + must flee), or Sickened (Disadvantage on attacks and
# ability checks). On each later turn you can take a Magic action to
# target another creature. Concentration, up to 1 minute.
# (Bard/Sorcerer/Warlock/Wizard.)
#
# Engine modeling: single-target save-or-fear (the Panicked option). type
# hard_control; forced_save WIS vs the caster's spell save DC, on_fail
# applies co_frightened + a turn-end WIS re-save. Concentration.
#
# Deferred RAW bits:
#   - The Asleep / Sickened options (v1 models Panicked → Frightened).
#   - The per-later-turn "target another creature" (recurring-caster-
#     action system); v1 afflicts the first target only.
#
# source: srd_5.2.1

id: f_eyebite
name: Eyebite
source: srd_5.2.1
granted_by:
  class: c_wizard
  level: 11            # Wizards gain 6th-level slots at L11
type: active
spell:
  class: c_wizard
  level: 6

description: |
  One creature within 60 ft makes a WIS save or is Frightened (the
  Panicked option); re-saves at turn-end. Concentration, 1 minute.

action_template:
  id: a_eyebite
  name: Eyebite
  type: hard_control
  spell_slot_level: 6
  concentration: true
  named_effect: eyebite
  range_ft: 60
  pipeline:
    - primitive: forced_save
      params:
        ability: wisdom
        dc_source: caster_spell_save_dc
        affected: current_target
        on_fail:
          - primitive: apply_condition
            params: { condition_id: co_frightened, duration: until_spell_ends }
          - primitive: recurring_save
            params:
              ability: wisdom
              dc_source: caster_spell_save_dc
              trigger_event: target_turn_end
              on_success: end_spell_on_target
              condition_id: co_frightened
        on_success: []
