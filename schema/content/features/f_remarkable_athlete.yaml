# f_remarkable_athlete — Remarkable Athlete (Champion)
# Source: SRD CC v5.2.1 p49
# Pattern: multi-effect feature (advantage on initiative + str-athletics, plus on-crit movement)

id: f_remarkable_athlete
name: Remarkable Athlete
source: srd_5.2.1
granted_by:
  subclass: sc_champion
  level: 3
type: passive

effect_primitives:
  - primitive: d20_test_modifier
    params:
      modifier: advantage
      applies_to: [initiative_roll, strength_athletics_check]

  - primitive: on_event_effect
    params:
      trigger_event: crit_landed_by_self
      effect:
        - primitive: granted_action
          params:
            kind: free_movement
            distance: speed_fraction
            fraction: 0.5
            no_opportunity_attacks: true
