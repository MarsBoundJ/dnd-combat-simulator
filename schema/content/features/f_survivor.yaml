# f_survivor — Survivor (Champion)
# Source: SRD CC v5.2.1 p49
# Pattern: compound feature with two named sub-features (Defy Death + Heroic Rally)

id: f_survivor
name: Survivor
source: srd_5.2.1
granted_by:
  subclass: sc_champion
  level: 18
type: compound

sub_features:
  - id: defy_death
    effect_primitives:
      - primitive: d20_test_modifier
        params:
          modifier: advantage
          applies_to: [death_saving_throws]
      - primitive: death_save_threshold_modifier
        params:
          range: [18, 20]
          count_as: 20

  - id: heroic_rally
    trigger:
      event: actor_turn_start
      conditions:
        - "actor.bloodied AND actor.hp > 0"
    effect_primitives:
      - primitive: heal
        params:
          target: self
          fixed: 5
          modifier_source: actor.con_mod
