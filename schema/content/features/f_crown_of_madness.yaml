# f_crown_of_madness — Crown of Madness (2nd-level Enchantment,
# PHB 2024 — NOT in SRD 5.2.1)
#
# RAW summary (own words, from owned PHB 2024): Action, V/S, 120 ft,
# Concentration up to 1 minute. One creature you can see makes a WIS
# save or is Charmed (auto-succeeds if not a Humanoid). The Charmed
# target must use its action, before moving, to melee-attack a
# creature YOU choose (it acts normally if you pick no one / no one
# is in reach). It repeats the save at the end of each of its turns,
# ending the spell on a success. You must take the Magic action on
# each of your later turns to maintain control, or the spell ends.
#
# Engine modeling: the Confusion altitude — hard_control, WIS save →
# co_incapacitated + end-of-turn re-save. The forced redirected melee
# attack is approximated as full action denial: from the enemy team's
# perspective a crowned creature's turn is spent NOT fighting the
# party, which the denial models; the extra upside (it also hits its
# own ally) and the caster's RAW maintain cost (a Magic action every
# turn!) are both deferred and lean opposite directions, so the v1
# valuation is roughly centered. Humanoid-only via the Hold Person
# target_creature_types gate.
#
# Deferred RAW bits:
#   - The redirected melee attack vs the target's own ally (needs a
#     forced-attack mechanism; Confusion's random-attack table has
#     the same deferral).
#   - The caster's per-turn Magic-action maintain cost (with it,
#     Crown is one of the weakest concentration controls in the PHB;
#     revisit when sustained-channel action-economy exists —
#     same engine item as Witch Bolt's BA tick).

id: f_crown_of_madness
name: Crown of Madness
source: user_authored
granted_by:
  class: c_sorcerer
  level: 3                 # Sorcerers gain 2nd-level slots at L3
type: active
spell:
  class: c_sorcerer
  level: 2

description: |
  One Humanoid makes a WIS save or is Charmed and spends its turns
  attacking its own allies at the caster's direction (v1: modeled as
  action denial), re-saving at the end of each of its turns.
  Concentration, 1 minute. Caster maintain cost deferred.

action_template:
  id: a_crown_of_madness
  name: Crown of Madness
  type: hard_control
  spell_slot_level: 2
  concentration: true
  named_effect: crown_of_madness
  range_ft: 120
  target_creature_types: [humanoid]
  pipeline:
    - primitive: forced_save
      params:
        ability: wisdom
        dc_source: caster_spell_save_dc
        affected: current_target
        on_fail:
          # Single denial condition (Confusion-identical shape). The
          # RAW Charmed tag is folded into the modeling note above —
          # a second tracked condition would dangle past the re-save.
          - primitive: apply_condition
            params: { condition_id: co_incapacitated, duration: until_spell_ends }
          - primitive: recurring_save
            params:
              ability: wisdom
              dc_source: caster_spell_save_dc
              trigger_event: target_turn_end
              on_success: end_spell_on_target
              condition_id: co_incapacitated
        on_success: []
