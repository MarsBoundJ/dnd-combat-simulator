# f_zealous_presence — Zealous Presence (Path of the Zealot, Barbarian
# L10)
# Source: SRD CC v5.2.1 / PHB 2024 p.53
#
# RAW: "As a Bonus Action, you unleash a battle cry infused with divine
# energy. Up to ten other creatures of your choice within 60 feet of you
# gain Advantage on attack rolls and saving throws until the start of
# your next turn. Once you use this feature, you can't use it again until
# you finish a Long Rest unless you expend a use of your Rage (no action
# required) to restore your use of it."
#
# Engine modeling: a Bonus-Action party buff granting Advantage on
# attacks + saves to up to ten allies within 60 ft for one round.
#
# **Wiring status: marker (DEFERRED).** Needs an ally-targeted
# advantage-granting buff that expires at the start of the caster's next
# turn (the existing buff layer grants bonus dice like Bless, not blanket
# Advantage), plus the 1/Long-Rest use with the Rage-restore refund
# (shared with Intimidating Presence's deferred refund). Party-offense
# value; shipped as a marker until the advantage-buff layer lands.

id: f_zealous_presence
