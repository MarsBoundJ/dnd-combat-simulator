# f_bane — Bane (Level 1 Enchantment, SRD CC v5.2.1)
#
# RAW summary (SRD 5.2.1, p111): up to three creatures within 30 ft each
# make a Charisma saving throw. While the spell lasts, a target that
# failed must subtract 1d4 from each attack roll and saving throw it
# makes. Concentration, up to 1 minute. Using a Higher-Level Spell Slot:
# one additional creature per slot above 1st. (Bard/Cleric/Warlock.)
#
# Engine modeling: the mirror image of Bless. type hard_control;
# forced_save CHA vs the caster's spell save DC, and on a failed save
# the enemy gets an attack_bonus of -2 (the flat average of -1d4, gated
# on attacker_is_self) plus a -2 save_modifier — the negatives of
# Bless's +2/+2. These are action-sourced modifiers, so end_concentration
# scrubs them when the caster drops the spell (no recurring save needed).
#
# Deferred RAW bits:
#   - Multi-target (up to three / +1 per upcast) — v1 applies to one
#     target per cast (the hard_control candidate shape).
#   - 1d4 modeled as its flat average (-2), matching Bless's +2 model.
#
# source: srd_5.2.1

id: f_bane
name: Bane
source: srd_5.2.1
granted_by:
  class: c_cleric
  level: 1
type: active
spell:
  class: c_cleric
  level: 1

description: |
  One creature within 30 ft makes a CHA save or takes -1d4 (modeled as
  -2) on its attack rolls and saving throws. Concentration, 1 minute.

action_template:
  id: a_bane
  name: Bane
  type: hard_control
  spell_slot_level: 1
  concentration: true
  named_effect: bane
  range_ft: 30
  pipeline:
    - primitive: forced_save
      params:
        ability: charisma
        dc_source: caster_spell_save_dc
        affected: current_target
        on_fail:
          - primitive: attack_modifier
            params:
              target: current_target
              when: attacker_is_self
              modifier: attack_bonus
              value: -2
              lifetime: until_short_rest
          - primitive: save_modifier
            params:
              target: current_target
              modifier: flat
              value: -2
              lifetime: until_short_rest
        on_success: []
