# f_cone_of_cold — Cone of Cold (Level 5 Evocation, SRD CC v5.2.1)
#
# RAW summary (SRD 5.2.1, p116): a 60-ft Cone from you. Each creature in
# it makes a Constitution saving throw, taking 8d8 Cold damage on a fail
# or half on a success. Using a Higher-Level Spell Slot: +1d8 per slot
# above 5th. (Druid/Sorcerer/Wizard.)
#
# Engine modeling: a large cone save-burst — same shape as Burning
# Hands. type aoe_attack, cone (length 60); CON save vs the caster's
# spell save DC, 8d8 cold on a fail, half on a success. +1d8/slot upcast.
#
# Deferred RAW bits:
#   - "A creature killed becomes a frozen statue" (flavor).
#
# source: srd_5.2.1

id: f_cone_of_cold
name: Cone of Cold
source: srd_5.2.1
granted_by:
  class: c_wizard
  level: 9             # Wizards gain 5th-level slots at L9
type: active
spell:
  class: c_wizard
  level: 5

description: |
  60-ft cone from the caster. CON save vs spell DC: 8d8 cold on a
  fail, half on a success. +1d8 per slot above 5th.

action_template:
  id: a_cone_of_cold
  name: Cone of Cold
  type: aoe_attack
  spell_slot_level: 5
  named_effect: cone_of_cold
  school: evocation
  range_ft: 60
  area:
    shape: cone
    length_ft: 60
  upcast_scaling:
    extra_dice_per_level: "1d8"
    damage_type: cold
  pipeline:
    - primitive: forced_save
      params:
        ability: constitution
        dc_source: caster_spell_save_dc
        affected: all_creatures_in_area
        on_fail:
          - primitive: damage
            params: { dice: "8d8", modifier: 0, type: cold }
        on_success:
          - primitive: damage
            params: { dice: "8d8", modifier: 0, type: cold, multiplier: 0.5 }
