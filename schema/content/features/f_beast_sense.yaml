# f_beast_sense — Beast Sense (2nd-level Divination, PHB 2024 — NOT
# in SRD 5.2.1)
#
# RAW summary (own words, from owned PHB 2024): Action (Ritual), S,
# Touch, Concentration up to 1 hour. Touch a willing Beast and
# perceive through its senses (including its special senses) for the
# duration. Classes: Druid, Ranger.
#
# STUB — deliberately not modeled (master-list tier D). A pure
# scouting/perception spell: the sim has no remote-sensing or
