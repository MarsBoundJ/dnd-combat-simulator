# f_branches_of_the_tree — Branches of the Tree (Path of the World Tree,
# Barbarian L6)
# Source: PHB 2024 p.52
#
# RAW: "Whenever a creature you can see starts its turn within 30 feet of you
# while your Rage is active, you can take a Reaction to summon spectral
# branches of the World Tree around it. The target must succeed on a Strength
# saving throw (DC 8 plus your Strength modifier and Proficiency Bonus) or be
# teleported to an unoccupied space you can see within 5 feet of yourself or
# in the nearest unoccupied space you can see. After the target teleports,
# you can reduce its Speed to 0 until the end of the current turn."
