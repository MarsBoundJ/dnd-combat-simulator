# f_irresistible_dance — Irresistible Dance (Level 6 Enchantment, SRD CC v5.2.1)
#
# RAW summary (SRD 5.2.1, p142): 30 ft, one creature. It makes a Wisdom
# saving throw. On a success it dances until the end of its next turn
# (wasting its movement). On a failure it has the Charmed condition for
# the duration and, while dancing: must spend all movement dancing in
# place, has Disadvantage on Dexterity saving throws and attack rolls,
# and attack rolls against it have Advantage. On each of its turns it can
# take an action to repeat the save, ending the spell on a success.
# Concentration, up to 1 minute. (Bard/Wizard.)
#
# Engine modeling: a single-target save-or-debuff. type hard_control;
# forced_save WIS vs the caster's spell save DC, on_fail applies
# co_dancing (the enforced combat facets: the target's attacks have
# Disadvantage, attacks against it have Advantage, DEX saves at
# Disadvantage) + a turn-end WIS re-save. Concentration.
#
# Deferred RAW bits:
#   - The successful-save "dance until end of next turn" minor effect
#     (v1 models only the failed-save debuff).
#   - The re-save is RAW an action the target spends; v1 uses a turn-end
#     re-save as the escape.
#   - co_dancing isn't in the AI control-denial set, so the AI scores
#     this 0 (it's an accuracy debuff, not full denial).
#
# source: srd_5.2.1

id: f_irresistible_dance
name: Irresistible Dance
source: srd_5.2.1
granted_by:
  class: c_bard
  level: 11            # Bards gain 6th-level slots at L11
type: active
spell:
  class: c_bard
  level: 6

description: |
  One creature within 30 ft makes a WIS save or is compelled to dance:
  Disadvantage on its attacks + DEX saves, attackers get Advantage;
  re-saves at turn-end. Concentration, 1 minute.

action_template:
  id: a_irresistible_dance
  name: Irresistible Dance
  type: hard_control
  spell_slot_level: 6
  concentration: true
  named_effect: irresistible_dance
  range_ft: 30
  pipeline:
    - primitive: forced_save
      params:
        ability: wisdom
        dc_source: caster_spell_save_dc
        affected: current_target
        on_fail:
          - primitive: apply_condition
            params: { condition_id: co_dancing, duration: until_spell_ends }
          - primitive: recurring_save
            params:
              ability: wisdom
              dc_source: caster_spell_save_dc
              trigger_event: target_turn_end
              on_success: end_spell_on_target
              condition_id: co_dancing
        on_success: []
