# f_fanatical_focus — Fanatical Focus (Path of the Zealot, Barbarian L6)
# Source: SRD CC v5.2.1 / PHB 2024 p.53
#
# RAW: "Once per active Rage, if you fail a saving throw, you can reroll
# it with a bonus equal to your Rage Damage bonus, and you must use the
# new roll."
#
# Engine modeling: a passive save-reroll hook in primitives._forced_save.
# After the initial roll yields "fail," `try_fanatical_focus_reroll`
# intercepts if the actor is raging, has f_fanatical_focus, and the
# once-per-Rage charge is available. The reroll adds the Rage Damage bonus
# (same as the melee damage bonus — 2 at L1, rising by level). The charge
# flag is reset at each new Rage entry via enter_rage → reset_for_new_rage.
#
# Feature wiring status: FULLY WIRED (fanatical_focus.py hook in _forced_save).

id: f_fanatical_focus
name: Fanatical Focus
source: phb_2024
granted_by:
  subclass: sc_path_of_the_zealot
  level: 6
type: passive

effect_primitives: []

contract:
  reads: [actor.template.features_known, actor.rage_active,
           actor.rage_damage_bonus]
  writes: [combat.save_result]
  event: save_failed
  scope: per_rage
