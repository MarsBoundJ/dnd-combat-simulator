# f_leading_evasion — Leading Evasion (College of Dance, Bard L14)
# Source: PHB 2024
#
# RAW: "When you are subjected to an effect that allows you to make a
# Dexterity saving throw to take only half damage, you instead take no damage
# if you succeed on the saving throw and only half damage if you fail. If any
# creatures within 5 feet of you are making the same Dexterity saving throw,
# you can share this benefit with them for that save. You can't use this
# feature if you have the Incapacitated condition."
#
# Engine modeling: rides the shared Evasion substrate (engine.core.evasion,
# hooked in primitives._forced_save). On a DEX save-for-half effect, the
# holder takes 0 on success and half on fail (success → damage ×0, fail →
# damage ×0.5). The sharing clause is wired too: a creature making the same
# DEX save within 5 ft of a Leading Evasion holder gets the same benefit
# (has_evasion checks for a Leading Evasion ally within 5 ft). No benefit
# while Incapacitated.
#
# Feature wiring status: FULLY WIRED (core Evasion + 5-ft sharing).

