# f_befuddlement — Befuddlement (Level 8 Enchantment, SRD CC v5.2.1)
#
# RAW summary (SRD 5.2.1, p111): 150 ft, one creature. It makes an
# Intelligence saving throw. On a failed save it takes 10d12 Psychic
# damage and can't cast spells or take the Magic action (recovering only
# after a 30-day repeat save, or via Greater Restoration / Heal / Wish).
# On a success it takes half damage only. (Bard/Druid/Warlock/Wizard.)
#
# Engine modeling: a single-target save-for-half psychic nuke — a static
# `save_attack` action_template. forced_save INT vs the caster's spell
# save DC; 10d12 psychic on a fail, half on a success.
#
# Deferred RAW bits:
#   - The "can't cast spells / take the Magic action" lockout — a
#     long-term debuff with no v1 primitive (no spell-suppression
#     condition); the 10d12 psychic damage is the load-bearing effect.
#   - No upcast (Befuddlement doesn't scale by slot).
#
# source: srd_5.2.1

id: f_befuddlement
name: Befuddlement
source: srd_5.2.1
granted_by:
  class: c_wizard
  level: 15            # Wizards gain 8th-level slots at L15
type: active
spell:
  class: c_wizard
  level: 8

description: |
  One creature within 150 ft makes an INT save vs spell DC: 10d12
  psychic on a fail, half on a success. Cast-lockout rider deferred.

action_template:
  id: a_befuddlement
  name: Befuddlement
  type: save_attack
  spell_slot_level: 8
  named_effect: befuddlement
  range_ft: 150
  save_ability: intelligence
  save_dc_source: caster_spell_save_dc
  half_on_success: true
  pipeline:
    - primitive: forced_save
      params:
        ability: intelligence
        dc_source: caster_spell_save_dc
        affected: current_target
        on_fail:
          - primitive: damage
            params: { dice: "10d12", modifier: 0, type: psychic }
        on_success:
          - primitive: damage
            params: { dice: "10d12", modifier: 0, type: psychic, multiplier: 0.5 }
