# f_aspect_of_the_wilds — Aspect of the Wilds (Path of the Wild Heart,
# Barbarian L6)
# Source: PHB 2024 p.52
#
# RAW: "You gain one of the following options of your choice. Whenever you
# finish a Short or Long Rest, you can change your choice.
#   Owl.    You have Darkvision with a range of 60 feet. If you already have
#           Darkvision, its range increases by 60 feet.
#   Panther. You have a Climb Speed equal to your Speed.
#   Salmon. You have a Swim Speed equal to your Speed."
#
# Wiring status: MARKER — DEFERRED TO STAGE 4 (AI DM). All three options are
# exploration-pillar (senses + climb/swim movement) with effectively no
# combat signal: Owl's darkvision has a faint edge in the vision system, but
# the climb/swim speeds are exploration-only, so the feature is deferred as
# a unit until the exploration-movement + light/vision-economy layer lands.
# See docs/deferred-noncombat-features.md.

