# f_flesh_to_stone — Flesh to Stone (Level 6 Transmutation, SRD CC v5.2.1)
#
# RAW summary (SRD 5.2.1, p132): 60 ft, one creature. It makes a
# Constitution saving throw; on a fail it is Restrained for the duration
# (on a success, its Speed is 0 until your next turn). A Restrained
# target re-saves CON at the end of each of its turns — on its third
# failed save it is Petrified; three successes end the spell.
# Concentration, up to 1 minute. (Druid/Sorcerer/Wizard.)
#
# Engine modeling: single-target save-or-restrain. type hard_control;
# forced_save CON vs the caster's spell save DC, on_fail co_restrained +
# a turn-end CON re-save (which ends the effect on a success — the SRD
# escape). Concentration.
#
# Deferred RAW bits:
#   - The escalation to Petrified after three failed re-saves (the
#     recurring_save only ends-on-success; no failure-counter); v1
#     keeps the target Restrained with a per-turn re-save.
#   - The successful-initial-save Speed-0 minor effect.
#
# source: srd_5.2.1

id: f_flesh_to_stone
name: Flesh to Stone
source: srd_5.2.1
granted_by:
  class: c_wizard
  level: 11            # Wizards gain 6th-level slots at L11
type: active
spell:
  class: c_wizard
  level: 6

description: |
  One creature within 60 ft makes a CON save or is Restrained;
  re-saves at turn-end. Concentration, 1 minute. (Petrify escalation
  deferred.)

action_template:
  id: a_flesh_to_stone
  name: Flesh to Stone
  type: hard_control
  spell_slot_level: 6
  concentration: true
  named_effect: flesh_to_stone
  range_ft: 60
  pipeline:
    - primitive: forced_save
      params:
        ability: constitution
        dc_source: caster_spell_save_dc
        affected: current_target
        on_fail:
          - primitive: apply_condition
            params: { condition_id: co_restrained, duration: until_spell_ends }
          - primitive: recurring_save
            params:
              ability: constitution
              dc_source: caster_spell_save_dc
              trigger_event: target_turn_end
              on_success: end_spell_on_target
              condition_id: co_restrained
        on_success: []
