# f_hideous_laughter — Tasha's Hideous Laughter (Level 1 Enchantment, SRD CC v5.2.1)
#
# RAW summary (SRD 5.2.1, p139): 30 ft, one creature. It makes a Wisdom
# saving throw or gains the Prone and Incapacitated conditions for the
# duration, unable to end the Prone on itself. At the end of each of its
# turns AND each time it takes damage it repeats the save (with Advantage
# if the save was triggered by damage), ending the spell on a success.
# Concentration, up to 1 minute. (Bard/Warlock/Wizard.)
#
# Engine modeling: single-target save-or-lose. type hard_control;
# forced_save WIS vs the caster's spell save DC, on_fail applies
# co_incapacitated (full action denial — the load-bearing effect) plus a
# turn-end WIS re-save. Concentration.
#
# Deferred RAW bits:
#   - The simultaneous Prone condition (v1 applies Incapacitated only;
#     Prone would need its own end-tracking alongside the re-save).
#   - The extra save-on-damage (with Advantage) — v1 uses the turn-end
#     re-save only.
#
# source: srd_5.2.1

id: f_hideous_laughter
name: Hideous Laughter
source: srd_5.2.1
granted_by:
  class: c_wizard
  level: 1
type: active
spell:
  class: c_wizard
  level: 1

description: |
  One creature within 30 ft makes a WIS save or is Incapacitated
  (laughing); re-saves at turn-end. Concentration, 1 minute.

action_template:
  id: a_hideous_laughter
  name: Hideous Laughter
  type: hard_control
  spell_slot_level: 1
  concentration: true
  named_effect: hideous_laughter
  range_ft: 30
  pipeline:
    - primitive: forced_save
      params:
        ability: wisdom
        dc_source: caster_spell_save_dc
        affected: current_target
        on_fail:
          - primitive: apply_condition
            params: { condition_id: co_incapacitated, duration: until_spell_ends }
          - primitive: recurring_save
            params:
              ability: wisdom
              dc_source: caster_spell_save_dc
              trigger_event: target_turn_end
              on_success: end_spell_on_target
              condition_id: co_incapacitated
        on_success: []
