# f_flurry_of_healing_and_harm — Flurry of Healing and Harm (Warrior of Mercy L11)
# Source: PHB 2024 (non-SRD; clean-room mechanical summary)
#
# Mechanics: When you use Flurry of Blows, you can replace each Unarmed
# Strike with a free Hand of Healing (no Focus Point). Also, a Flurry
# strike that deals damage can carry a free Hand of Harm (still once per
# turn). Uses = WIS modifier (min 1) per Long Rest.
#
# Engine modeling (deferred — rides Flurry + both hands): removes the
# Focus cost from the hands during Flurry, dramatically raising
# throughput (e.g., strike + free Hand of Harm, or multi-target healing
# burst). An economy multiplier on the L3 features.

