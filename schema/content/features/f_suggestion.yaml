# f_suggestion — Suggestion (Level 2 Enchantment, SRD CC v5.2.1)
#
# RAW summary (SRD 5.2.1, p165): you suggest a course of activity (≤ 25
# words) to one creature within 30 ft that can hear and understand you;
# the suggestion must sound achievable and not obviously harmful to the
# target or its allies. The target must succeed on a Wisdom saving throw
# or have the Charmed condition for the duration, pursuing the suggestion
# to the best of its ability. The effect ends if you or your allies deal
# damage to the target. Concentration, up to 8 hours.
#
# Engine modeling: a single-target social save-or-charm.
#   - type: hard_control — one candidate per in-range enemy.
#   - forced_save: WIS vs the caster's spell save DC. on_fail applies the
#     existing co_charmed condition (a Charmed creature "can't harm the
#     charmer" — the load-bearing combat effect: the suggested target
#     won't attack the caster) plus a recurring WIS save at turn-end to
#     break free (see "Deferred" — used as the v1 escape).
#   - Concentration.
#
# Deferred RAW bits:
#   - The free-text suggestion + "pursue to the best of its ability" —
#     v1 models only the Charmed combat effect (won't harm the caster).
#   - "Ends if you/your allies deal damage" — v1 substitutes a turn-end
#     WIS save as the escape mechanism (also guarantees the condition
#     lifts even though apply_condition isn't yet scrubbed on the
#     caster's concentration end — see NEEDS_ENGINE_WORK).
#   - AI scoring: co_charmed isn't in the AI's control-denial sets
#     (Charmed denies only attacks-on-the-charmer, not full action
#     economy), so defensive_ehp_hard_control scores it 0 until the
#     desktop lane assigns Charmed a partial-denial weight. Loads +
#     executes correctly meanwhile.
#
# source: srd_5.2.1

id: f_suggestion
name: Suggestion
source: srd_5.2.1
granted_by:
  class: c_wizard
  level: 3             # Wizards gain 2nd-level slots at L3
type: active
spell:
  class: c_wizard
  level: 2

description: |
  One creature within 30 ft makes a WIS save or is Charmed (won't harm
  the caster) for the duration. Concentration.

action_template:
  id: a_suggestion
  name: Suggestion
  type: hard_control
  spell_slot_level: 2
  concentration: true
  named_effect: suggestion
  range_ft: 30
  pipeline:
    - primitive: forced_save
      params:
        ability: wisdom
        dc_source: caster_spell_save_dc
        affected: current_target
        on_fail:
          - primitive: apply_condition
            params: { condition_id: co_charmed, duration: until_spell_ends }
          - primitive: recurring_save
            params:
              ability: wisdom
              dc_source: caster_spell_save_dc
              trigger_event: target_turn_end
              on_success: end_spell_on_target
              condition_id: co_charmed
        on_success: []
