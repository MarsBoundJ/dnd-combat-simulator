# f_blinding_smite — Blinding Smite (3rd-level Paladin spell)
#
# RAW summary (PHB 2024): Bonus Action, V, Self, Concentration up to
# 1 minute. The next time you hit a creature with a melee weapon
# attack, the attack deals an extra 3d8 radiant damage, and the target
# has the Blinded condition until the spell ends. At the end of each
# of its turns, the Blinded target makes a CON save, ending the spell
# on itself on a success.
# At Higher Levels: damage increases by 1d8 per slot above 3rd.
#
# Engine modeling: uses smite_rider core with has_initial_save=False —
# Blinded applies automatically on hit (no initial save).
#   - type: defensive_buff (self-targeted; the Paladin arms themselves)
#   - 1 Bonus Action cast time
#   - Concentration — competes with Bless / Shield of Faith / Searing
#     Smite / etc. for the Paladin's single concentration slot.
#   - Pipeline: `blinding_smite_arm` primitive registers a one-shot
#     marker modifier on the caster. The _damage primitive checks the
#     marker on the caster's next melee weapon hit, rolls 3d8 radiant
#     (+1d8 per upcast level above 3rd, doubled on crit), and directly
#     applies co_blinded (no forced_save).
#   - named_effect: "blinding_smite"
#
# source: user_authored
#
# Deferred RAW bits:
#   - End-of-turn CON save to end the spell. v1 ends Blinded only
#     when the caster drops concentration.

id: f_blinding_smite
name: Blinding Smite
source: user_authored
granted_by:
  class: c_paladin
  level: 9                   # Paladins gain 3rd-level slots at L9
type: active
spell:
  class: c_paladin
  level: 3

description: |
  Self-buff. The Paladin's next melee weapon hit deals +3d8 radiant
  damage and the target is Blinded until the spell ends (no initial
  save). Concentration, 1 minute. BA cast.

action_template:
  id: a_blinding_smite
  name: Blinding Smite
  type: defensive_buff
  spell_slot_level: 3
  slot: bonus_action
  concentration: true
  named_effect: blinding_smite
  range_ft: 0                # self-only
  pipeline:
    - primitive: blinding_smite_arm
      params: {}
