# f_blinding_smite — Blinding Smite (3rd-level Paladin spell)
#
# RAW summary (PHB 2024, verified vs the owned book 2026-06-10):
# Bonus Action taken immediately after hitting with a melee weapon or
# Unarmed Strike; V, Self, 1 minute — NOT concentration (the 2024
# redesign dropped it). The hit deals an extra 3d8 radiant damage and
# the target is Blinded until the spell ends; at the end of each of
# its turns it makes a CON save, ending the effect on a success.
# At Higher Levels: damage increases by 1d8 per slot above 3rd.
#
# Engine modeling: uses smite_rider core with has_initial_save=False —
# Blinded applies automatically on hit (no initial save).
#   - type: defensive_buff (self-targeted; the Paladin arms themselves)
#   - 1 Bonus Action cast time; NO concentration (2024)
#   - Pipeline: `blinding_smite_arm` primitive registers a one-shot
#     marker modifier on the caster. The _damage primitive checks the
#     marker on the caster's next melee weapon hit, rolls 3d8 radiant
#     (+1d8 per upcast level above 3rd, doubled on crit), directly
#     applies co_blinded, and registers the end-of-turn CON re-save
#     that ends the effect on a success (spec repeat_save_to_end).
#   - named_effect: "blinding_smite"
#
# source: user_authored
#
# Deferred RAW bits:
#   - Arm-before-hit vs RAW cast-after-hit (shared smite_rider
#     approximation); 1-minute cap modeled as "until the target
#     saves out".

id: f_blinding_smite
name: Blinding Smite
source: user_authored
granted_by:
  class: c_paladin
  level: 9                   # Paladins gain 3rd-level slots at L9
type: active
spell:
  class: c_paladin
  level: 3

description: |
  Self-buff. The Paladin's next melee weapon hit deals +3d8 radiant
  damage and the target is Blinded (no initial save), re-saving CON
  at the end of each of its turns. 1 minute, NOT concentration. BA cast.

action_template:
  id: a_blinding_smite
  name: Blinding Smite
  type: defensive_buff
  spell_slot_level: 3
  slot: bonus_action
  named_effect: blinding_smite
  range_ft: 0                # self-only
  pipeline:
    - primitive: blinding_smite_arm
      params: {}
