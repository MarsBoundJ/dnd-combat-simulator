# f_fs_two_weapon_fighting — Two-Weapon Fighting Style
# Source: user_authored (NOT in SRD CC v5.2.1; codified in PHB 2024).
#
# RAW 2024: "When you engage in two-weapon fighting (see chapter 1),
# you can add your ability modifier to the damage of the second
# attack."
#
# Engine application (PR #53): the off-hand action generated by
# pc_schema._build_weapon_action(weapon, ..., off_hand=True) reads
# the chosen Fighting Style. If `two_weapon_fighting`, the off-hand
# damage step adds the actor's ability modifier (matching the main-
# hand damage). Without TWF, the off-hand damage step uses
# damage_modifier=0 (or the ability modifier if it's negative — RAW
# notes that negative ability mods always apply, even to off-hand).
#
# Notes / deferrals:
#   - This style does NOT change the main-hand attack or the
#     bonus-action requirement. RAW already gives the off-hand
#     attack as a Bonus Action; TWF only changes the damage math.
#   - Dueling explicitly does NOT stack with dual-wielding: RAW
#     Dueling requires "no other weapons," which a dual-wielder
#     violates. pc_schema enforces this — a TWF + Dueling fighter
#     gets neither bonus on the main hand.
#   - The "Nick" weapon mastery (PR #54+, deferred) lets the off-
#     hand attack happen as part of the Attack action, freeing
#     the bonus action. TWF stacks with Nick when both land.
#   - PC schemas validate the off-hand weapon is `light: true` AND
#     melee AND that the primary `weapons:` list contains at least
#     one Light melee weapon, per RAW.

id: f_fs_two_weapon_fighting
name: Two-Weapon Fighting
source: user_authored
granted_by:
  class: c_fighter
  level: 1
  parent_feature: f_fighting_style
type: passive

description: "Add ability modifier to the off-hand attack's damage."

mechanic:
  kind: off_hand_damage_ability_mod
  value: ability_mod
  requires: off_hand_weapon
