# f_unbreakable_majesty — Unbreakable Majesty (College of Glamour, Bard L14)
# Source: PHB 2024
#
# RAW: "As a Bonus Action, you can assume a magically majestic presence for 1
# minute or until you have the Incapacitated condition. For the duration,
# whenever any creature hits you with an attack roll for the first time on a
# turn, the attacker must succeed on a Charisma saving throw against your
# spell save DC, or the attack misses instead. Once per Short or Long Rest."
#
# Engine modeling: a Bonus Action (feature_use: unbreakable_majesty_uses_
# remaining, 1/short-or-long rest) that sets actor.unbreakable_majesty_active.
# While active, primitives._attack_roll calls college_of_glamour.majesty_
# negates_hit on a hit against the Bard: the first hit each turn forces the
# attacker's CHA save vs the Bard spell DC, and on a failure the attack
# becomes a miss. The per-turn dedup resets at every turn start (runner). The
# presence ends if the Bard is Incapacitated.
#
# Feature wiring status: FULLY WIRED.

id: f_unbreakable_majesty
name: Unbreakable Majesty
source: srd_5.2.1
granted_by:
  subclass: sc_college_of_glamour
  level: 14
type: active

resource_cost:
  type: bonus_action

action_template:
  id: a_unbreakable_majesty
  name: Unbreakable Majesty
  type: defensive_buff
  slot: bonus_action
  feature_use: unbreakable_majesty_uses_remaining
  pipeline:
    - primitive: unbreakable_majesty_activate
      params: {}

contract:
  reads: [actor.template.features_known,
           actor.resources.unbreakable_majesty_uses_remaining]
  writes: [actor.unbreakable_majesty_active, combat.attack_state]
  event: actor_turn_bonus_action
  scope: per_use
