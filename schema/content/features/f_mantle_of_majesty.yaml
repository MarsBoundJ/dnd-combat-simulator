# f_mantle_of_majesty — Mantle of Majesty (College of Glamour, Bard L6)
# Source: PHB 2024
#
# RAW: "You always have the Command spell prepared. As a Bonus Action, you
# cast Command without expending a spell slot, and you take on an unearthly
# appearance for 1 minute or until your Concentration ends. During this time,
# you can cast Command as a Bonus Action without expending a spell slot. Any
# creature Charmed by you automatically fails its saving throw against the
# Command you cast with this feature. Once per Long Rest; restore by expending
# a level 3+ spell slot."
#
# Engine modeling (college_of_glamour):
#   - Activation (a_mantle_of_majesty, BA, feature_use: mantle_of_majesty_
#     uses_remaining, 1/long rest): sets mantle_of_majesty_active + casts
#     Command free at the best enemy within 60 ft.
#   - Sustained (a_mantle_of_majesty_command, BA, requires_mantle_active):
#     while active, cast Command free each turn — no use consumed.
#   - Command effect = the engine's Command (WIS save → co_incapacitated for
#     one turn); a target Charmed by THIS Bard auto-fails (synergy with
#     Beguiling Magic).
#
# Feature wiring status: FULLY WIRED. The L3+-slot refund of the use is
# deferred (low single-encounter signal); the unearthly appearance is modeled
# as a flag (no concentration object — it persists for the encounter).

id: f_mantle_of_majesty
name: Mantle of Majesty
source: srd_5.2.1
granted_by:
  subclass: sc_college_of_glamour
  level: 6
type: active

resource_cost:
  type: bonus_action

action_template:
  id: a_mantle_of_majesty
  name: Mantle of Majesty (Command)
  type: hard_control
  slot: bonus_action
  feature_use: mantle_of_majesty_uses_remaining
  pipeline:
    - primitive: mantle_of_majesty_activate
      params: {}
# The sustained free-Command BA (a_mantle_of_majesty_command, gated on
# requires_mantle_active) is generated by pc_schema for a Glamour Bard.

contract:
  reads: [actor.template.features_known,
           actor.resources.mantle_of_majesty_uses_remaining,
           actor.mantle_of_majesty_active, actor.position]
  writes: [actor.mantle_of_majesty_active, target.applied_conditions,
           actor.resources.mantle_of_majesty_uses_remaining]
  event: actor_turn_bonus_action
  scope: per_use
