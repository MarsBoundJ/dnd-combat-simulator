# f_rage_of_the_gods — Rage of the Gods (Path of the Zealot, Barbarian L14)
# Source: SRD CC v5.2.1 / PHB 2024 p.53
#
# RAW: "When you activate your Rage, you can assume the form of a divine
# warrior. This form lasts for 1 minute or until you drop to 0 Hit Points.
# Once you use this feature, you can't do so again until you finish a Long
# Rest. While in this form, you gain:
#   Flight. You have a Fly Speed equal to your Speed and can hover.
#   Resistance. You have Resistance to Necrotic, Psychic, and Radiant.
#   Revivification. When a creature within 30 feet of you would drop to
#     0 Hit Points, you can take a Reaction to expend a use of your Rage
#     to instead change the target's Hit Points to a number equal to
#     your Barbarian level."
#
# Engine modeling: 1/long rest (rage_of_the_gods_uses_remaining / _max).
#   - Flight: try_activate_rage_of_the_gods (called from enter_rage) sets
#     actor.speed["fly"] = actor.speed["walk"]. Cleared in end_rage via
#     deactivate_rage_of_the_gods.
#   - Resistance: applies_resistance (rage_of_the_gods.py) checked in
#     primitives._damage for Necrotic, Psychic, Radiant. Active while
#     actor.rage_of_the_gods_active is True.
#   - Revivification: creature_would_drop_to_zero trigger fires in
#     primitives._damage at the 0-HP check; condition
#     revivification_would_save in reactions.py gates it; the
#     revivification_save primitive executes it (spends Rage use, sets HP
#     to Barbarian level). actor.rage_of_the_gods_active required.
#
# Feature wiring status: WIRED (Flight + N/P/R Resistance + Revivification
#   reaction fully implemented). 1/long-rest resource seeded by
#   pc_schema.derive_pc_resources; restored by apply_long_rest.

id: f_rage_of_the_gods
name: Rage of the Gods
source: srd_5.2.1
granted_by:
  subclass: sc_path_of_the_zealot
  level: 14
type: active

action_template:
  id: a_revivification
  name: Revivification
  type: heal
  slot: reaction
  trigger: creature_would_drop_to_zero
  condition: revivification_would_save
  pipeline:
    - primitive: revivification_save
      params: {}

contract:
  reads: [actor.template.features_known, actor.rage_active,
           actor.resources.rage_of_the_gods_uses_remaining,
           actor.template.levels.barbarian]
  writes: [actor.speed, actor.rage_of_the_gods_active, ally.hp_current,
           actor.resources.rage_uses_remaining]
  event: rage_activated
  scope: per_long_rest
