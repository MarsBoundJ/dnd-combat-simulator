# f_sleep — Sleep (Level 1 Enchantment, SRD CC v5.2.1)
#
# RAW summary (SRD 5.2.1, p162): each creature of your choice in a
# 5-foot-radius Sphere within range makes a Wisdom saving throw or gains
# the Incapacitated condition until the end of its next turn, when it
# repeats the save; on a second failure it gains the Unconscious
# condition for the duration. The spell ends on a target that takes
# damage or is shaken awake. Creatures that don't sleep or are immune to
# Exhaustion auto-succeed. Concentration, up to 1 minute. (Bard/Sorc/Wiz.)
#
# Engine modeling: a small AoE save-or-incapacitate. type aoe_attack,
# sphere radius 5; forced_save WIS vs the caster's spell save DC,
# all_creatures_in_area; on_fail applies co_incapacitated + a turn-end
# WIS re-save (the SRD's repeat-save). Concentration.
#
# Deferred RAW bits:
#   - The Incapacitated→Unconscious escalation on a second failed save
#     (v1 keeps Incapacitated with a per-turn re-save — comparable
#     action denial without the deeper Unconscious state).
#   - Auto-success for non-sleeping / Exhaustion-immune creatures
#     (no creature-trait save-immunity filter).
#   - "Ends on damage" — v1 uses the turn-end re-save as the escape.
#
# source: srd_5.2.1

id: f_sleep
name: Sleep
source: srd_5.2.1
granted_by:
  class: c_wizard
  level: 1
type: active
spell:
  class: c_wizard
  level: 1

description: |
  5-ft radius sphere. WIS save or Incapacitated; re-saves at turn-end.
  Concentration, 1 minute.

action_template:
  id: a_sleep
  name: Sleep
  type: aoe_attack
  spell_slot_level: 1
  concentration: true
  named_effect: sleep
  range_ft: 90
  area:
    shape: sphere
    radius_ft: 5
    range_ft: 90
  pipeline:
    - primitive: forced_save
      params:
        ability: wisdom
        dc_source: caster_spell_save_dc
        affected: all_creatures_in_area
        on_fail:
          - primitive: apply_condition
            params: { condition_id: co_incapacitated, duration: until_spell_ends }
          - primitive: recurring_save
            params:
              ability: wisdom
              dc_source: caster_spell_save_dc
              trigger_event: target_turn_end
              on_success: end_spell_on_target
              condition_id: co_incapacitated
        on_success: []
