# f_wholeness_of_body — Wholeness of Body (Warrior of the Open Hand L6)
#
# RAW (SRD 5.2.1): As a Bonus Action, roll your Martial Arts die and
# regain HP equal to the roll + your WIS modifier (min 1). Usable a
# number of times equal to your WIS modifier (min 1) per long rest.
#
# Engine modeling (now WIRED): a pc_builder heal — Bonus Action,
# self-only (range_ft 0), Martial Arts die + WIS modifier. The "martial_
# arts" dice sentinel resolves to the Monk's level-scaled die (d6→d12)
# in _build_heal_action; the heal +modifier is the spellcasting-ability
# modifier, which defaults to WIS for the Monk (not in
# _SPELL_ABILITY_BY_CLASS). The WIS-mod (min 1) use count is stamped as
# wholeness_of_body_uses_remaining by derive_pc_resources and gated +
# decremented via the feature_use machinery; rest.apply_long_rest
# refreshes it (Monk block). See tests/test_wholeness_of_body.py.
#
# source: srd_5.2.1

id: f_wholeness_of_body
name: Wholeness of Body
source: srd_5.2.1
granted_by:
  subclass: sc_warrior_of_the_open_hand
  level: 6
type: passive

pc_builder:
  kind: heal
  action_id: a_wholeness_of_body
  name: Wholeness of Body
  params:
    slot: bonus_action
    slot_level: 0               # not slot-cast; gated by feature_use
    range_ft: 0                 # self-only
    target: self
    dice: martial_arts          # → Monk level-scaled die (d6..d12)
    feature_use: wholeness_of_body_uses_remaining

contract:
  reads: [actor.wis_mod, actor.hp_current,
           actor.resources.wholeness_of_body_uses_remaining]
  writes: [actor.hp_current,
            actor.resources.wholeness_of_body_uses_remaining]
  event: passive
  scope: builds_heal_action
