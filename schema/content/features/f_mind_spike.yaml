# f_mind_spike — Mind Spike (Level 2 Divination, SRD CC v5.2.1)
#
# RAW summary (SRD 5.2.1, p148): 120 ft, one creature. It makes a Wisdom
# saving throw, taking 3d8 Psychic damage on a fail or half on a success.
# On a failed save you also know the target's location for the duration
# (same plane). Concentration, up to 1 hour. Using a Higher-Level Spell
# Slot: +1d8 per slot above 2nd. (Sorcerer/Warlock/Wizard.)
#
# Engine modeling: a single-target save-for-half psychic nuke — a static
# `save_attack` action_template. forced_save WIS vs the caster's spell
# save DC; 3d8 psychic on a fail, half on a success. +1d8/slot upcast.
# Concentration is declared (the spell is Concentration) though its only
# ongoing effect — knowing the target's location — isn't modeled.
#
# Deferred RAW bits:
#   - The location-tracking knowledge (no scrying/awareness model).
#
# source: srd_5.2.1

id: f_mind_spike
name: Mind Spike
source: srd_5.2.1
granted_by:
  class: c_wizard
  level: 3             # Wizards gain 2nd-level slots at L3
type: active
spell:
  class: c_wizard
  level: 2

description: |
  One creature within 120 ft makes a WIS save vs spell DC: 3d8 psychic
  on a fail, half on a success. +1d8 per slot above 2nd. Concentration.

action_template:
  id: a_mind_spike
  name: Mind Spike
  type: save_attack
  spell_slot_level: 2
  concentration: true
  named_effect: mind_spike
  range_ft: 120
  save_ability: wisdom
  save_dc_source: caster_spell_save_dc
  half_on_success: true
  upcast_scaling:
    extra_dice_per_level: "1d8"
    damage_type: psychic
  pipeline:
    - primitive: forced_save
      params:
        ability: wisdom
        dc_source: caster_spell_save_dc
        affected: current_target
        on_fail:
          - primitive: damage
            params: { dice: "3d8", modifier: 0, type: psychic }
        on_success:
          - primitive: damage
            params: { dice: "3d8", modifier: 0, type: psychic, multiplier: 0.5 }
