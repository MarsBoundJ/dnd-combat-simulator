# f_spell_resistance — Spell Resistance (Abjurer L14)
# Source: PHB 2024 (non-SRD; clean-room mechanical summary)
#
# Mechanics: Advantage on saving throws against spells. Resistance to
# the damage of spells.
#
# Engine modeling (wireable at build time): two stamps — save
# advantage conditioned on source being a spell, and damage resistance
