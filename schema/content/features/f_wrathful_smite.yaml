# f_wrathful_smite — Wrathful Smite (1st-level Paladin spell)
#
# RAW summary (PHB 2024): Bonus Action, V, Self, Concentration up to
# 1 minute. The next time you hit with a melee weapon attack during
# the spell's duration, the attack deals an extra 1d6 necrotic damage.
# The target must succeed on a Wisdom saving throw or be Frightened of
# you until the spell ends.
# At Higher Levels: damage increases by 1d6 per slot above 1st.
#
# Engine modeling: structural twin of Searing Smite — "arm a one-shot
# rider on the next melee weapon hit" via smite_rider core.
#   - type: defensive_buff (self-targeted; the Paladin arms themselves)
#   - 1 Bonus Action cast time
#   - Concentration — competes with Bless / Shield of Faith / Searing
#     Smite / etc. for the Paladin's single concentration slot.
#   - Pipeline: `wrathful_smite_arm` primitive registers a one-shot
#     marker modifier on the caster. The _damage primitive checks the
#     marker on the caster's next melee weapon hit, rolls 1d6 necrotic
#     (+1d6 per upcast level, doubled on crit), fires a WIS forced_save
#     on the target, and on fail applies co_frightened.
#   - named_effect: "wrathful_smite"
#
# source: user_authored
#
# Deferred RAW bits:
#   - Target's action to repeat the WIS check to end the effect.
#     v1 ends Frightened only when the caster drops concentration.
#   - co_frightened's movement restriction and line-of-sight-based
#     disadvantage are declared in the condition YAML but not yet
#     enforced by the engine's movement/positioning system.

id: f_wrathful_smite
name: Wrathful Smite
source: user_authored
granted_by:
  class: c_paladin
  level: 2                   # Paladins gain 1st-level slots at L2
type: active
spell:
  class: c_paladin
  level: 1

description: |
  Self-buff. The Paladin's next melee weapon hit deals +1d6 necrotic
  damage; target makes a WIS save or is Frightened until concentration
  ends. Concentration, 1 minute. BA cast.

action_template:
  id: a_wrathful_smite
  name: Wrathful Smite
  type: defensive_buff
  spell_slot_level: 1
  slot: bonus_action
  concentration: true
  named_effect: wrathful_smite
  range_ft: 0                # self-only
  pipeline:
    - primitive: wrathful_smite_arm
      params: {}
