# f_enthrall — Enthrall (Level 2 Enchantment, SRD CC v5.2.1)
#
# RAW summary (SRD 5.2.1, p127): 60 ft. Creatures of your choice make a
# Wisdom saving throw (any creature you/your companions are fighting
# automatically succeeds). On a failed save, a target has a -10 penalty
# to Wisdom (Perception) checks and Passive Perception until the spell
# ends. Concentration, up to 1 minute. (Bard/Warlock.)
#
# Engine modeling: a single-target (per the hard_control candidate shape)
# save-or-distract. forced_save WIS vs the caster's spell save DC, on a
# failed save applies co_enthralled (the -10 Perception penalty — a
# DESCRIPTIVE facet; see co_enthralled). Concentration.
#
# Deferred RAW bits:
#   - The Perception penalty is descriptive (no perception-modifier
#     primitive); the spell loads + fires the save + applies the marker.
#   - "Creatures you're fighting auto-succeed" — no in-combat targeting
#     filter (v1 just rolls the save).
#   - No turn-end re-save (RAW has none); the marker is inert in combat,
#     so the apply_condition/concentration-cleanup gap is harmless here.
#
# source: srd_5.2.1

id: f_enthrall
name: Enthrall
source: srd_5.2.1
granted_by:
  class: c_bard
  level: 3             # Bards gain 2nd-level slots at L3
type: active
spell:
  class: c_bard
  level: 2

description: |
  One creature within 60 ft makes a WIS save or is Enthralled (-10
  Perception, descriptive). Concentration, 1 minute.

action_template:
  id: a_enthrall
  name: Enthrall
  type: hard_control
  spell_slot_level: 2
  concentration: true
  named_effect: enthrall
  range_ft: 60
  pipeline:
    - primitive: forced_save
      params:
        ability: wisdom
        dc_source: caster_spell_save_dc
        affected: current_target
        on_fail:
          - primitive: apply_condition
            params: { condition_id: co_enthralled, duration: until_spell_ends }
        on_success: []
