# f_ice_storm — Ice Storm (Level 4 Evocation, SRD CC v5.2.1)
#
# RAW summary (SRD 5.2.1, p140): hail falls in a 20-ft-radius, 40-ft-high
# Cylinder within 300 ft. Each creature in it makes a Dexterity saving
# throw, taking 2d10 Bludgeoning + 4d6 Cold damage on a fail or half on
# a success. The ground becomes Difficult Terrain until the end of your
# next turn. (Druid/Sorcerer/Wizard.)
#
# Engine modeling: a two-damage-type sphere save-burst. type aoe_attack,
# sphere radius 20 (the cylinder approximated as a sphere). DEX save vs
# the caster's spell save DC; on a fail 2d10 bludgeoning + 4d6 cold (two
# damage steps), on a success both halved.
#
# Deferred RAW bits:
#   - Difficult-Terrain aftermath (no movement-cost modeling).
#   - No upcast (Ice Storm doesn't scale by slot in 2024).
#
# source: srd_5.2.1

id: f_ice_storm
name: Ice Storm
source: srd_5.2.1
granted_by:
  class: c_wizard
  level: 7             # Wizards gain 4th-level slots at L7
type: active
spell:
  class: c_wizard
  level: 4

description: |
  20-ft radius hail within 300 ft. DEX save vs spell DC: 2d10
  bludgeoning + 4d6 cold on a fail, half on a success.

action_template:
  id: a_ice_storm
  name: Ice Storm
  type: aoe_attack
  spell_slot_level: 4
  named_effect: ice_storm
  range_ft: 300
  area:
    shape: sphere
    radius_ft: 20
    range_ft: 300
  pipeline:
    - primitive: forced_save
      params:
        ability: dexterity
        dc_source: caster_spell_save_dc
        affected: all_creatures_in_area
        on_fail:
          - primitive: damage
            params: { dice: "2d10", modifier: 0, type: bludgeoning }
          - primitive: damage
            params: { dice: "4d6", modifier: 0, type: cold }
        on_success:
          - primitive: damage
            params: { dice: "2d10", modifier: 0, type: bludgeoning, multiplier: 0.5 }
          - primitive: damage
            params: { dice: "4d6", modifier: 0, type: cold, multiplier: 0.5 }
