# f_sculpt_spells — Sculpt Spells (Evoker)
# Source: SRD CC v5.2.1 p82
# Pattern: triggered_choice — caster designates protected creatures at cast time

id: f_sculpt_spells
name: Sculpt Spells
source: srd_5.2.1
granted_by:
  subclass: sc_evoker
  level: 6
type: triggered_choice

trigger:
  event: spell_cast
  conditions:
    - "spell.school == evocation"
    - "spell.affects_multiple_creatures"
    - "actor.can_see(at_least_one_affected)"
  chosen_by: actor

effect_primitives:
  - primitive: designate_protected
    params:
      max_count: "1 + spell.level"
      chosen_at: cast_time
      outcome_on_save: auto_succeed
      outcome_on_damage: zero_even_on_half

contract:
  reads: [spell.school, spell.targets, actor.line_of_sight]
  writes: [spell.designated_protected]
  event: spell_cast
  scope: per_cast
