# co_ignited — Ignited condition (Searing Smite, SRD 5.2.1)
#
# RAW (SRD 5.2.1 / PHB 2024): "At the start of each of its turns
# until the spell ends, the target takes 1d6 Fire damage and then
# makes a Constitution saving throw. On a failed save, the spell
# continues. On a successful save, the spell ends."
#
# Engine modeling:
#   - scope: source_referencing — the burn is tied to the caster's
#     spell. Effects reference the source spell for cleanup.
#   - effects.recurring_damage: per-turn fire damage at turn-start.
#     Dice may be post-processed by smite_rider for upcast scaling
#     (burn_scales_with_upcast → e.g., "3d6" at slot 3).
#   - effects.recurring_save: CON save at turn-start (AFTER the
#     damage tick). On success, the spell ends (condition + burn
#     removed). DC is captured from the caster's spell save DC at
#     application time via dc_source: caster_spell_save_dc.
#
# Note: NOT tied to concentration (PHB 2024 removed concentration
# from Searing Smite). The burn ends via the save-to-end mechanic
# or the 1-minute duration (duration timer deferred).

id: co_ignited
name: Ignited
source: srd_5.2.1
category: condition
scope: source_referencing

inherits_conditions: []

stacking:
  type: none

effects:
  - id: e_ignited_burn
    primitive: recurring_damage
    params:
      dice: "1d6"
      type: fire
      trigger_event: target_turn_start
      condition_id: co_ignited

  - id: e_ignited_save
    primitive: recurring_save
    params:
      ability: constitution
      dc_source: caster_spell_save_dc
      trigger_event: target_turn_start
      on_success: end_spell_on_target
      condition_id: co_ignited
