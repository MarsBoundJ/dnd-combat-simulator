# co_incapacitated — Incapacitated condition
# Source: SRD CC v5.2.1 p184
#
# Enforcement: the `inactive` effect (cannot_take action/bonus_action/
# reaction) is enforced by the runner's incapacitation gate — a creature
# with any incapacitating condition (this, or Stunned/Paralyzed/Unconscious/
# Petrified which inherit it) has its turn SKIPPED in
# EncounterRunner._run_actor_turn. "Lose one turn" applications (duration:
# until_actor_next_turn_start — Command, ghoul/ghast, dragons) then expire at
# the end of the denied turn. See engine/core/runner.py.

id: co_incapacitated
name: Incapacitated
source: srd_5.2.1
category: condition
scope: absolute

effects:
  - id: inactive
    primitive: action_restriction
    params:
      cannot_take: [action, bonus_action, reaction]

  - id: no_concentration
    primitive: concentration_break
    params:
      breaks_existing_concentration: true

  - id: speechless
    primitive: action_restriction
    params:
      cannot_take: [speak]

  - id: initiative_disadvantage
    primitive: d20_test_modifier
    params:
      modifier: disadvantage
      applies_to: [initiative_roll]
      when: "condition_applied_before_initiative_roll"
