# co_unconscious — Unconscious condition
# Source: SRD CC v5.2.1 p191

id: co_unconscious
name: Unconscious
source: srd_5.2.1
category: condition
scope: absolute

inherits_conditions: [co_incapacitated, co_prone]

effects:
  - id: inert_drop_held
    primitive: action_restriction
    params:
      drops_held_items: true
      remains_prone_when_condition_ends: true

  - id: speed_zero
    primitive: speed_modifier
    params:
      mode: override
      new_speed: 0
      prevents_increase: true

  - id: attacks_vs_you_advantage
    primitive: attack_modifier
    params:
      when: target_is_self
      modifier: advantage_for_attacker

  - id: auto_fail_str_dex_saves
    primitive: save_modifier
    params:
      when: "save_ability IN [strength, dexterity]"
      outcome: auto_fail

  - id: auto_crit_within_5ft
    primitive: crit_modifier
    params:
      when: "target_is_self AND attacker_within_ft(5) AND attack_hits"
      outcome: auto_crit

  - id: unaware
    primitive: awareness_state
    params:
      state: unaware_of_surroundings
