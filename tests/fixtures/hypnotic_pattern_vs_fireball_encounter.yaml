        initiative: { modifier: -1, score: 8 }
      abilities:
        str: { score: 19, save: 4 }
        dex: { score: 8, save: -1 }
        con: { score: 16, save: 3 }
        int: { score: 5, save: -3 }
        wis: { score: 7, save: -2 }
        cha: { score: 7, save: -2 }
      cr: { value: 5.0, xp: 1800, proficiency_bonus: 3 }
      behavior_profile:
        presets:
          retreat: ftd
      actions:
        - id: a_greatclub
          name: Greatclub
          type: weapon_attack
          pipeline:
            - primitive: attack_roll
              params: { kind: melee, bonus: 7, reach_ft: 5 }
            - primitive: damage
              params: { dice: "4d12", modifier: 5, type: bludgeoning }
              when: { event: damage_roll, condition: "combat.attack_state == hit" }

  - instance_id: ogre_c
    name: Ogre C
    side: enemy
    position: [11, 0]
    template:
      id: m_ogre_demo_c
      name: Ogre C
      source: user_authored
      combat:
        armor_class: 11
        hit_points: { average: 200, dice: "8d10", con_contribution: 60 }
        speed: { walk: 40 }
        initiative: { modifier: -1, score: 8 }
      abilities:
        str: { score: 19, save: 4 }
        dex: { score: 8, save: -1 }
        con: { score: 16, save: 3 }
        int: { score: 5, save: -3 }
        wis: { score: 7, save: -2 }
        cha: { score: 7, save: -2 }
      cr: { value: 5.0, xp: 1800, proficiency_bonus: 3 }
      behavior_profile:
        presets:
          retreat: ftd
      actions:
        - id: a_greatclub
