# Hypnotic Pattern vs Fireball — the canonical eHP trade-off demo.
#
# Per ehp-action-framework.md §"Worked Example: Hypnotic Pattern vs.
# Fireball": when enemies have low HP, Fireball wins (high damage drops
# them outright). When enemies are TOO BEEFY to drop in one Fireball,
# Hypnotic Pattern's persistent control eHP outpaces — each target's
# DPR × p_fail × 2.5 rounds × 1.0 denial wins over Fireball's
# overkill-capped damage.
#
# Setup (beefy-enemies case, HP wins):
#   - Wizard with both spells (3rd-level slot each)
#   - 3 brute goblins: 60 HP each (high), WIS save -1 (low), ~6 DPR
#
# Expected math at seed 1:
#   - Fireball candidate at cluster: 8d6 = 28 avg, DC 15 vs DEX +2
#     (need 13+ on d20 = 0.40 fail rate). Per-target expected =
#     0.6 × 28 + 0.4 × 14 = 16.8 + 5.6 = 22.4 dmg. Capped at 60 HP
#     (not capping). 3 targets × 22.4 = 67.2 eHP. Minus 3rd-level
#     slot cost (~1.5 mid-day): ~65.7.
#   - Hypnotic Pattern candidate: per target = 6 DPR × 0.6 p_fail ×
#     2.5 × 1.0 denial = 9.0 eHP. 3 targets × 9.0 = 27.0 eHP. Minus
#     slot cost: ~25.5.
#
# Hmm Fireball wins this math. Let me adjust: REALLY beefy enemies.
# 200 HP, ~25 DPR each. Then Fireball capped at 28 dmg per target;
# 3 × 28 = 84 eHP. Hypnotic Pattern: 25 DPR × 0.6 × 2.5 × 1.0 =
# 37.5 per target. 3 × 37.5 = 112.5 eHP. Hypnotic Pattern WINS.
#
# Configured below: 3 ogres (200 HP, 25 DPR).

id: hypnotic_pattern_vs_fireball_encounter

environment:
  template: open_battlefield

actors:
  - instance_id: wizard_pc
    name: Evocation Wizard L5
    side: pc
    position: [0, 0]
    spell_slots: { 3: 2 }              # 2× 3rd-level slots
    template:
      id: pc_wizard_L5_hp_demo
      name: Evocation Wizard L5
      source: user_authored
      combat:
        armor_class: 13
        hit_points:
          average: 35
          dice: "5d6"
          con_contribution: 10
        speed:
          walk: 30
        initiative:
          modifier: 25                 # forced first for demo clarity
          score: 40
      abilities:
        str: { score: 8, save: -1 }
        dex: { score: 14, save: 2 }
        con: { score: 14, save: 2 }
        int: { score: 18, save: 7 }    # +4 mod + PB 3 (L5)
        wis: { score: 12, save: 1 }
        cha: { score: 10, save: 0 }
      cr: { value: 4.0, xp: 1100, proficiency_bonus: 3 }
      behavior_profile:
        presets:
          retreat: ftd
      actions:
        - id: a_dart
          name: Magic Dart
          type: weapon_attack
          pipeline:
            - primitive: attack_roll
              params: { kind: ranged, bonus: 6, range_ft: 60 }
            - primitive: damage
              params: { dice: "1d4", modifier: 4, type: force }
              when: { event: damage_roll, condition: "combat.attack_state == hit" }

        # Fireball — 3rd-level, 8d6 fire, DEX save, 20-ft sphere
        - id: a_fireball
          name: Fireball
          type: aoe_attack
          spell_slot_level: 3
          area:
            shape: sphere
            radius_ft: 20
            range_ft: 150
          pipeline:
            - primitive: forced_save
              params:
                ability: dexterity
                dc: 15
                affected: all_creatures_in_area
                on_fail:
                  - primitive: damage
                    params: { dice: "8d6", type: fire }
                on_success:
                  - primitive: damage
                    params: { dice: "8d6", type: fire, multiplier: 0.5 }

        # Hypnotic Pattern — 3rd-level, 30-ft cube (sphere radius 15
        # approximation), WIS save, Incapacitated on fail, concentration
        - id: a_hypnotic_pattern
          name: Hypnotic Pattern
          type: aoe_attack
          spell_slot_level: 3
          concentration: true
          area:
            shape: sphere               # approximating 30-ft cube
            radius_ft: 15
            range_ft: 120
          pipeline:
            - primitive: forced_save
              params:
                ability: wisdom
                dc: 15
                affected: all_creatures_in_area
                on_fail:
                  - primitive: apply_condition
                    params:
                      condition_id: co_incapacitated
                      duration: until_spell_ends
                  # PR #35: each held creature gets a WIS save at end
                  # of their turn to break free per RAW. forced_save's
                  # per-target loop sets state.current_attack.target to
                  # the current iteration's creature, so this registers
                  # ONE recurring_save entry per failed creature with
                  # the right target_id.
                  - primitive: recurring_save
                    params:
                      ability: wisdom
                      dc: 15
                      trigger_event: target_turn_end
                      on_success: end_spell_on_target
                      condition_id: co_incapacitated

  # 3 beefy "ogres" in a tight cluster — too tanky for Fireball to drop,
  # high DPR (HP's per-target control eHP outpaces Fireball's capped
  # damage)
  - instance_id: ogre_a
    name: Ogre A
    side: enemy
    position: [10, 0]
    template:
      id: m_ogre_demo
      name: Ogre A
      source: user_authored
      combat:
        armor_class: 11
        hit_points: { average: 200, dice: "8d10", con_contribution: 60 }
        speed: { walk: 40 }
        initiative: { modifier: -1, score: 8 }
      abilities:
        str: { score: 19, save: 4 }
        dex: { score: 8, save: -1 }    # low DEX save (Fireball)
        con: { score: 16, save: 3 }
        int: { score: 5, save: -3 }
        wis: { score: 7, save: -2 }    # low WIS save (HP)
        cha: { score: 7, save: -2 }
      cr: { value: 5.0, xp: 1800, proficiency_bonus: 3 }
      behavior_profile:
        presets:
          retreat: ftd
      actions:
        # Big greatclub for ~25 DPR (raises HP eHP scoring)
        - id: a_greatclub
          name: Greatclub
          type: weapon_attack
          pipeline:
            - primitive: attack_roll
              params: { kind: melee, bonus: 7, reach_ft: 5 }
            - primitive: damage
              params: { dice: "4d12", modifier: 5, type: bludgeoning }
              when: { event: damage_roll, condition: "combat.attack_state == hit" }

  - instance_id: ogre_b
    name: Ogre B
    side: enemy
    position: [10, 1]
    template:
      id: m_ogre_demo_b
      name: Ogre B
      source: user_authored
      combat:
        armor_class: 11
