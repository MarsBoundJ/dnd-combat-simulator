# Weapon Mastery showcase — four L1 Fighters, each knowing all four
# v1 masteries (Vex, Sap, Topple, Graze) but wielding a different
# weapon so only ONE mastery fires per fighter. Each faces an
# identical training dummy.
#
# Setup:
#   - fighter_vex     : Rapier (mastery: vex). On hit, gains advantage
#                          on next attack against the target. Demonstrates
#                          the advantage_for_self modifier registration.
#   - fighter_sap     : Mace (mastery: sap). On hit, the target has
#                          disadvantage on its next attack. Demonstrates
#                          the disadvantage_for_self modifier on target.
#   - fighter_topple  : Maul (mastery: topple). On hit, target CON save
#                          vs DC 14 (8 + STR +3 + PB +3). On fail,
#                          Prone is applied. Demonstrates the save +
#                          condition application path.
#   - fighter_graze   : Greatsword (mastery: graze). On MISS, deal
#                          STR +3 slashing damage. Demonstrates the
#                          new on-miss mastery hook.
#
# All four fighters DECLARE all four masteries known (over the L1 cap
# of 3 — v1 doesn't enforce the class-level cap; tracked as a future
# tightening). Each fighter only triggers their respective weapon's
# mastery, but the cross-knowledge means the fixture also exercises
# the actor_knows_mastery gate.
#
# The training dummies have low CON saves (con 4 → save -3) so
# Topple has a high chance of landing for the demo.

id: weapon_mastery_showcase_encounter

environment:
  template: open_battlefield

actors:
  - instance_id: fighter_vex
    name: Vex Fighter L1
    side: pc
    position: [0, 0]
    pc:
      class: c_fighter
      level: 1
      ability_scores:
        str: 16
        dex: 14
        con: 14
        int: 10
        wis: 10
        cha: 10
      armor:
        base_ac: 16
        max_dex_bonus: 2
      weapon_masteries: [vex, sap, topple, graze]
      weapons:
        - id: a_rapier
          name: Rapier
          attack_ability: dex
          damage_dice: 1d8
          damage_type: piercing
          reach_ft: 5
          mastery: vex

  - instance_id: fighter_sap
    name: Sap Fighter L1
    side: pc
    position: [0, 1]
    pc:
      class: c_fighter
      level: 1
      ability_scores:
        str: 16
        dex: 14
        con: 14
        int: 10
        wis: 10
        cha: 10
      armor:
        base_ac: 16
        max_dex_bonus: 2
      weapon_masteries: [vex, sap, topple, graze]
      weapons:
        - id: a_mace
          name: Mace
          attack_ability: str
          damage_dice: 1d6
          damage_type: bludgeoning
          reach_ft: 5
          mastery: sap

  - instance_id: fighter_topple
    name: Topple Fighter L1
    side: pc
    position: [0, 2]
    pc:
      class: c_fighter
      level: 1
      ability_scores:
        str: 16
        dex: 14
        con: 14
        int: 10
        wis: 10
        cha: 10
      armor:
        base_ac: 16
        max_dex_bonus: 2
      weapon_masteries: [vex, sap, topple, graze]
      weapons:
        - id: a_maul
          name: Maul
          attack_ability: str
          damage_dice: 2d6
          damage_type: bludgeoning
          reach_ft: 5
          two_handed: true
          mastery: topple

  - instance_id: fighter_graze
    name: Graze Fighter L1
    side: pc
    position: [0, 3]
    pc:
      class: c_fighter
      level: 1
      ability_scores:
        str: 16
        dex: 14
        con: 14
        int: 10
        wis: 10
        cha: 10
      armor:
        base_ac: 16
        max_dex_bonus: 2
      weapon_masteries: [vex, sap, topple, graze]
      weapons:
        - id: a_greatsword
          name: Greatsword
          attack_ability: str
          damage_dice: 2d6
          damage_type: slashing
          reach_ft: 5
          two_handed: true
          mastery: graze

  # ----- Four identical training dummies (low CON save for Topple demo) -----
  - instance_id: dummy_a
    name: Training Dummy A
    side: enemy
    position: [10, 0]
    template:
      id: m_wmd_dummy_a
      name: Training Dummy
      source: user_authored
      combat:
        armor_class: 14
        hit_points: { average: 60, dice: "8d8", con_contribution: 24 }
        speed: { walk: 0 }
        initiative: { modifier: -5, score: 1 }
      abilities:
        str: { score: 10, save: 0 }
        dex: { score: 8, save: -1 }
        con: { score: 4, save: -3 }
        int: { score: 1, save: -5 }
        wis: { score: 1, save: -5 }
        cha: { score: 1, save: -5 }
      cr: { value: 1.0, xp: 200, proficiency_bonus: 2 }
      behavior_profile: { presets: { retreat: ftd } }
      actions:
        - id: a_swing
          name: Wooden Arm
          type: weapon_attack
          pipeline:
            - primitive: attack_roll
              params: { kind: melee, bonus: 0, reach_ft: 5 }
            - primitive: damage
              params: { dice: "1d4", modifier: 0, type: bludgeoning }
              when: { event: damage_roll, condition: "combat.attack_state == hit" }

