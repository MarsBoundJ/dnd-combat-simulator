# Smoke-test encounter: Fighter L3 vs Goblin Warrior
# Stripped-down encounter spec — proves the engine runs end-to-end.

id: smoke_encounter_goblin_vs_fighter

environment:
  template: open_battlefield

actors:
  # Goblin Warrior (loaded from schema/content/monsters/m_goblin_warrior.yaml)
  - instance_id: goblin_1
    name: Goblin Warrior
    side: enemy
    template_ref:
      entity_type: monster
      id: m_goblin_warrior

  # Test Fighter L3 — inline template (PC schema is post-MVP)
  # Equipment: chain mail + shield + longsword
  - instance_id: fighter_1
    name: Test Fighter L3
    side: pc
    template:
      id: pc_test_fighter_l3
      name: Test Fighter L3
      source: user_authored
      levels:
        fighter: 3
      combat:
        armor_class: 18              # chain mail (16) + shield (+2)
        hit_points:
          average: 28                # 3d10 + (CON +2 × 3) = (8+8+8) + 6 = simplified to 28
          dice: "3d10"
          con_contribution: 6
        speed:
          walk: 30
        initiative:
          modifier: 2
          score: 12
      abilities:
        str: { score: 16, save: 5 }  # STR primary + proficient save
        dex: { score: 14, save: 2 }
        con: { score: 14, save: 4 }  # proficient save
        int: { score: 10, save: 0 }
        wis: { score: 12, save: 1 }
        cha: { score: 10, save: 0 }
      damage_resistances: []
      damage_vulnerabilities: []
      damage_immunities: []
      condition_immunities: []
      gear: [chain_mail, shield, longsword]
      senses:
        passive_perception: 11
      languages: [common]
      cr:
        value: 0.0
        xp: 0
        proficiency_bonus: 2
      actions:
        - id: a_longsword
          name: Longsword
          type: weapon_attack
          pipeline:
            - primitive: attack_roll
              params:
                kind: melee
                bonus: 5             # STR +3 + Prof +2
                reach_ft: 5
            - primitive: damage
              params:
                dice: "1d8"
                modifier: 3
                type: slashing
              when:
                event: damage_roll
                condition: "combat.attack_state == hit"
      behavior_profile:
        archetype: pack_hunter       # simple "stay engaged, attack" archetype
        presets:
          retreat: default
          ability_selection: default
          targeting: closest_enemy
          action_economy: skilled
