# Cross-caster buff dedup demo — two clerics, one fighter, one ogre.
#
# RAW (PHB 2024 p.243): "The effects of the SAME spell cast multiple
# times don't combine ... the most potent effect ... applies while the
# durations of the effects overlap." Two Blesses on the same fighter
# don't stack.
#
# Setup:
#   - Cleric A (PC, has Bless w/ named_effect: bless) — forced first.
#   - Cleric B (PC, identical to A) — acts second.
#   - Fighter (PC, high-DPR greatsword) — natural Bless target for both.
#   - Ogre (enemy, AC 18, 100 HP) — tough target where Bless matters.
#
# Expected behavior round 1:
#   - Cleric A: Bless eHP on fighter > mace eHP → casts Bless on
#     fighter. Modifier attached with named_effect=bless.
#   - Cleric B: Bless eHP on fighter SCORES 0.0 because a Bless-tagged
#     modifier is already on the fighter (cross-caster dedup). Cleric B
#     falls back to attacking with their own weapon (or some other
#     bonus-slot action). The event log should NOT show a second
#     concentration_started for Bless on the fighter from cleric_b.
#
# Pre-PR #36 (legacy behavior): both clerics would cast Bless on the
# fighter, the fighter would carry two attack_modifier entries
# stacking to +4 attack bonus — wrong per RAW.

id: two_clerics_bless_dedup_encounter

environment:
  template: open_battlefield

actors:
  - instance_id: cleric_a
    name: Cleric A
    side: pc
    position: [0, 0]
    spell_slots: { 1: 3 }
    template:
      id: pc_cleric_a
      name: Cleric A
      source: user_authored
      combat:
        armor_class: 18
        hit_points:
          average: 22
          dice: "3d8"
          con_contribution: 3
        speed:
          walk: 25
        initiative:
          modifier: 30        # forced first
          score: 40
      abilities:
        str: { score: 10, save: 0 }
        dex: { score: 10, save: 0 }
        con: { score: 12, save: 1 }
        int: { score: 10, save: 0 }
        wis: { score: 16, save: 5 }
        cha: { score: 12, save: 1 }
      cr: { value: 1.0, xp: 200, proficiency_bonus: 2 }
      behavior_profile:
        presets:
          retreat: ftd
      actions:
        - id: a_mace
          name: Mace
          type: weapon_attack
          pipeline:
            - primitive: attack_roll
              params: { kind: melee, bonus: 3, reach_ft: 5 }
            - primitive: damage
              params: { dice: "1d6", modifier: 1, type: bludgeoning }
              when: { event: damage_roll, condition: "combat.attack_state == hit" }
        - id: a_bless
          name: Bless
          type: offensive_buff
          concentration: true
          spell_slot_level: 1
          named_effect: bless      # cross-caster dedup tag
          pipeline:
            - primitive: attack_modifier
              params:
                target: ally
                modifier: attack_bonus
                value: 8             # boosted (same as bless_buff_encounter)
                                      # so the buff beats the mace + preset
                                      # preference bonuses
                lifetime: until_short_rest

  - instance_id: cleric_b
    name: Cleric B
    side: pc
    position: [0, 2]
    spell_slots: { 1: 3 }
    template:
      id: pc_cleric_b
      name: Cleric B
      source: user_authored
      combat:
        armor_class: 18
        hit_points:
          average: 22
          dice: "3d8"
          con_contribution: 3
        speed:
          walk: 25
        initiative:
          modifier: 20        # second
          score: 30
      abilities:
        str: { score: 10, save: 0 }
        dex: { score: 10, save: 0 }
        con: { score: 12, save: 1 }
        int: { score: 10, save: 0 }
        wis: { score: 16, save: 5 }
        cha: { score: 12, save: 1 }
      cr: { value: 1.0, xp: 200, proficiency_bonus: 2 }
      behavior_profile:
        presets:
          retreat: ftd
      actions:
        - id: a_mace
          name: Mace
          type: weapon_attack
          pipeline:
            - primitive: attack_roll
              params: { kind: melee, bonus: 3, reach_ft: 5 }
            - primitive: damage
              params: { dice: "1d6", modifier: 1, type: bludgeoning }
              when: { event: damage_roll, condition: "combat.attack_state == hit" }
        - id: a_bless
          name: Bless
          type: offensive_buff
          concentration: true
          spell_slot_level: 1
          named_effect: bless      # same tag — share dedup identity
          pipeline:
            - primitive: attack_modifier
              params:
                target: ally
                modifier: attack_bonus
                value: 8
                lifetime: until_short_rest

  - instance_id: fighter_ally
    name: Fighter Champion
    side: pc
    position: [0, 1]
    template:
      id: pc_fighter_champion
      name: Fighter Champion
      source: user_authored
      combat:
        armor_class: 18
        hit_points:
          average: 40
          dice: "5d10"
          con_contribution: 10
        speed:
          walk: 30
        initiative:
          modifier: 10
          score: 20
      abilities:
        str: { score: 18, save: 6 }
        dex: { score: 12, save: 1 }
        con: { score: 16, save: 5 }
        int: { score: 10, save: 0 }
        wis: { score: 12, save: 1 }
        cha: { score: 10, save: 0 }
      cr: { value: 2.0, xp: 450, proficiency_bonus: 2 }
      behavior_profile:
        presets:
          retreat: ftd
      actions:
        - id: a_greatsword
          name: Greatsword
          type: weapon_attack
          pipeline:
            - primitive: attack_roll
              params: { kind: melee, bonus: 6, reach_ft: 5 }
            - primitive: damage
              params: { dice: "2d6", modifier: 4, type: slashing }
              when: { event: damage_roll, condition: "combat.attack_state == hit" }

  - instance_id: bruiser
    name: Bruiser
    side: enemy
    position: [1, 0]
    template:
      id: m_bruiser
      name: Bruiser
      source: user_authored
      combat:
        armor_class: 18
        hit_points:
          average: 100
          dice: "12d10"
          con_contribution: 30
        speed:
          walk: 30
        initiative:
          modifier: 0
          score: 5
      abilities:
        str: { score: 18, save: 6 }
        dex: { score: 12, save: 1 }
        con: { score: 16, save: 5 }
        int: { score: 8, save: -1 }
        wis: { score: 12, save: 1 }
        cha: { score: 10, save: 0 }
      cr: { value: 3.0, xp: 700, proficiency_bonus: 2 }
      behavior_profile:
        presets:
          retreat: ftd
      actions:
        - id: a_claws
          name: Claws
          type: weapon_attack
          pipeline:
            - primitive: attack_roll
              params: { kind: melee, bonus: 6, reach_ft: 5 }
            - primitive: damage
              params: { dice: "1d8", modifier: 4, type: slashing }
              when: { event: damage_roll, condition: "combat.attack_state == hit" }
