# Bless buff demo — cleric blesses fighter instead of swinging mace.
#
# Setup:
#   - Cleric (PC) with weak Mace (+3, 1d6+1) and Bless (+2 attack
#     bonus to ally for "until short rest").
#   - Fighter (PC) with high-DPR Greatsword (+8, 2d6+5).
#   - Bruiser (enemy, AC 18, 80 HP) — tough target where the buff
#     matters most.
#
# Expected behavior (round 1):
#   - Cleric goes first (forced init bonus).
#   - Cleric's candidate scores: mace eHP ≈ low (1d6+1, hit_prob ~50%
#     vs AC 18 = 0.35 × 4.5 ≈ 1.6 eHP). Bless on fighter ≈ fighter_DPR
#     × 0.10 × 2.5 rounds. Fighter DPR ≈ 0.7 × 12 = 8.4. Bless eHP ≈
#     8.4 × 0.10 × 2.5 = 2.1 eHP. Bless WINS.
#   - Event log: cleric casts Bless on fighter (attack_modifier
#     attached to fighter); on fighter's turn, the +2 bonus shows up
#     in the attack_roll's effective_bonus.

id: bless_buff_encounter

environment:
  template: open_battlefield

actors:
  - instance_id: cleric_caster
    name: Cleric of Bahamut
    side: pc
    position: [0, 0]
    template:
      id: pc_cleric_caster
      name: Cleric of Bahamut
      source: user_authored
      combat:
        armor_class: 18
        hit_points:
          average: 22
          dice: "3d8"
          con_contribution: 3
        speed:
          walk: 25
        initiative:
          modifier: 30        # force first for demo clarity
          score: 40
      abilities:
        str: { score: 10, save: 0 }
        dex: { score: 10, save: 0 }
        con: { score: 12, save: 1 }
        int: { score: 10, save: 0 }
        wis: { score: 16, save: 5 }
        cha: { score: 12, save: 1 }
      cr: { value: 1.0, xp: 200, proficiency_bonus: 2 }
      behavior_profile:
        presets:
          retreat: ftd
      actions:
        - id: a_mace
          name: Mace
          type: weapon_attack
          pipeline:
            - primitive: attack_roll
              params: { kind: melee, bonus: 3, reach_ft: 5 }
            - primitive: damage
              params: { dice: "1d6", modifier: 1, type: bludgeoning }
              when: { event: damage_roll, condition: "combat.attack_state == hit" }
        - id: a_bless
          name: Bless
          type: offensive_buff
          concentration: true       # RAW: Bless is a concentration spell
          pipeline:
            - primitive: attack_modifier
              params:
                target: ally
                modifier: attack_bonus
                value: 2            # mean of +1d4
                lifetime: until_short_rest

  - instance_id: fighter_ally
    name: Fighter Champion
    side: pc
    position: [0, 1]
    template:
      id: pc_fighter_champion
      name: Fighter Champion
      source: user_authored
      combat:
        armor_class: 18
        hit_points:
          average: 40
          dice: "5d10"
          con_contribution: 10
        speed:
          walk: 30
        initiative:
          modifier: 20            # acts second
          score: 30
      abilities:
        str: { score: 18, save: 6 }
        dex: { score: 12, save: 1 }
        con: { score: 16, save: 5 }
        int: { score: 10, save: 0 }
        wis: { score: 12, save: 1 }
        cha: { score: 10, save: 0 }
      cr: { value: 2.0, xp: 450, proficiency_bonus: 2 }
      behavior_profile:
        presets:
          retreat: ftd
      actions:
        - id: a_greatsword
          name: Greatsword
          type: weapon_attack
          pipeline:
            - primitive: attack_roll
              params: { kind: melee, bonus: 6, reach_ft: 5 }
            - primitive: damage
              params: { dice: "2d6", modifier: 4, type: slashing }
              when: { event: damage_roll, condition: "combat.attack_state == hit" }

  - instance_id: bruiser
    name: Bruiser
    side: enemy
    position: [1, 0]
    template:
      id: m_bruiser
      name: Bruiser
      source: user_authored
      combat:
        armor_class: 18
        hit_points:
          average: 80
          dice: "10d10"
          con_contribution: 20
        speed:
          walk: 30
        initiative:
          modifier: 0
          score: 5
      abilities:
        str: { score: 18, save: 6 }
        dex: { score: 12, save: 1 }
        con: { score: 16, save: 5 }
        int: { score: 8, save: -1 }
        wis: { score: 12, save: 1 }
        cha: { score: 10, save: 0 }
      cr: { value: 3.0, xp: 700, proficiency_bonus: 2 }
      behavior_profile:
        presets:
          retreat: ftd
      actions:
        - id: a_claws
          name: Claws
          type: weapon_attack
          pipeline:
            - primitive: attack_roll
              params: { kind: melee, bonus: 6, reach_ft: 5 }
            - primitive: damage
              params: { dice: "1d8", modifier: 4, type: slashing }
              when: { event: damage_roll, condition: "combat.attack_state == hit" }
