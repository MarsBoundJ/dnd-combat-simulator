# Counterspell mirror-match demo — wizard A casts Hypnotic Pattern,
# enemy wizard B counterspells it.
#
# Setup:
#   - Wizard A (PC, L5, 1× 3rd-level slot, Hypnotic Pattern prepped).
#     Forced first via initiative bonus.
#   - Wizard B (enemy, L5, 1× 3rd-level slot, Counterspell prepped).
#     Within 60 ft of A.
#   - Three target dummies in A's intended HP area.
#
# Expected behavior:
#   - Round 1: Wizard A's turn — casts Hypnotic Pattern centered on
#     the dummy cluster.
#     - Event: spell_cast_initiated fires (3rd-level)
#     - Wizard B's Counterspell reaction fires (enemy within 60 ft)
#     - counterspell_resolved with outcome=auto_cancel (target level 3)
#     - spell_cancelled event for Hypnotic Pattern
#     - Both wizards' 3rd-level slots consumed (RAW 2024)
#     - HP's forced_save / apply_condition pipeline does NOT execute
#     - A's concentration NOT engaged (cancelled before it would apply)
#
# Demonstrates: spell_cast_initiated event, Counterspell reaction
# infra, auto-cancel for level ≤ 3, RAW 2024 slot consumption on
# successful counter.

id: counterspell_mirror_match_encounter

environment:
  template: open_battlefield

actors:
  - instance_id: wizard_a
    name: Wizard A (caster)
    side: pc
    position: [0, 0]
    spell_slots: { 3: 1 }
    spell_slots_max: { 3: 1 }
    template:
      id: pc_wizard_a
      name: Wizard A
      source: user_authored
      combat:
        armor_class: 13
        hit_points: { average: 30, dice: "5d6", con_contribution: 10 }
        speed: { walk: 30 }
        initiative:
          modifier: 30
          score: 40
      abilities:
        str: { score: 8, save: -1 }
        dex: { score: 14, save: 2 }
        con: { score: 14, save: 2 }
        int: { score: 18, save: 7 }
        wis: { score: 12, save: 1 }
        cha: { score: 10, save: 0 }
      cr: { value: 4.0, xp: 1100, proficiency_bonus: 3 }
      behavior_profile:
        presets:
          retreat: ftd
      actions:
        - id: a_dart
          name: Magic Dart
          type: weapon_attack
          pipeline:
            - primitive: attack_roll
              params: { kind: ranged, bonus: 6, range_ft: 60 }
            - primitive: damage
              params: { dice: "1d4", modifier: 4, type: force }
              when: { event: damage_roll, condition: "combat.attack_state == hit" }
        - id: a_hypnotic_pattern
          name: Hypnotic Pattern
          type: aoe_attack
          spell_slot_level: 3
          concentration: true
          area:
            shape: sphere
            radius_ft: 15
            range_ft: 120
          pipeline:
            - primitive: forced_save
              params:
                ability: wisdom
                dc: 15
                affected: all_creatures_in_area
                on_fail:
                  - primitive: apply_condition
                    params:
                      condition_id: co_incapacitated
                      duration: until_spell_ends
                  - primitive: recurring_save
                    params:
                      ability: wisdom
                      dc: 15
                      trigger_event: target_turn_end
                      on_success: end_spell_on_target
                      condition_id: co_incapacitated

  - instance_id: wizard_b
    name: Wizard B (counterspeller)
    side: enemy
    position: [10, 0]            # 50 ft from A — well within 60-ft range
    spell_slots: { 3: 1 }
    spell_slots_max: { 3: 1 }
    template:
      id: m_wizard_b
      name: Wizard B
      source: user_authored
      combat:
        armor_class: 13
        hit_points: { average: 30, dice: "5d6", con_contribution: 10 }
        speed: { walk: 30 }
        initiative:
          modifier: 0
          score: 10
      abilities:
        str: { score: 8, save: -1 }
        dex: { score: 14, save: 2 }
        con: { score: 14, save: 2 }
        int: { score: 18, save: 7 }
        wis: { score: 12, save: 1 }
        cha: { score: 10, save: 0 }
      cr: { value: 4.0, xp: 1100, proficiency_bonus: 3 }
      behavior_profile:
        presets:
          retreat: ftd
      actions:
        - id: a_dart_b
          name: Magic Dart
          type: weapon_attack
          pipeline:
            - primitive: attack_roll
              params: { kind: ranged, bonus: 6, range_ft: 60 }
            - primitive: damage
              params: { dice: "1d4", modifier: 4, type: force }
              when: { event: damage_roll, condition: "combat.attack_state == hit" }
        - id: a_counterspell
          name: Counterspell
          type: hard_control
          spell_slot_level: 3
          slot: reaction
          trigger: spell_cast_initiated
          condition: enemy_casting_spell_within_60_ft
          named_effect: counterspell
          pipeline:
            - primitive: counterspell_resolve
              params: {}

  # Three target dummies — what Wizard A would have HPed if not for B
  - instance_id: dummy_a
    name: Dummy A
    side: enemy
    position: [10, 1]            # 5 ft from wizard_b — tight cluster
    template:
      id: m_dummy_a
      name: Dummy
      source: user_authored
      combat:
        armor_class: 10
        hit_points: { average: 50, dice: "8d8", con_contribution: 0 }
        speed: { walk: 0 }
        initiative: { modifier: -5, score: 0 }
      abilities:
        str: { score: 10, save: 0 }
        dex: { score: 8, save: -1 }
        con: { score: 10, save: 0 }
        int: { score: 1, save: -5 }
        wis: { score: 5, save: -3 }
        cha: { score: 1, save: -5 }
      cr: { value: 1.0, xp: 200, proficiency_bonus: 2 }
      behavior_profile:
        presets:
          retreat: ftd
      actions:
        - id: a_club
          name: Club
          type: weapon_attack
          pipeline:
            - primitive: attack_roll
              params: { kind: melee, bonus: 4, reach_ft: 5 }
            - primitive: damage
              params: { dice: "1d8", modifier: 2, type: bludgeoning }
              when: { event: damage_roll, condition: "combat.attack_state == hit" }

  - instance_id: dummy_b
    name: Dummy B
    side: enemy
    position: [11, 0]
    template:
      id: m_dummy_b
      name: Dummy
      source: user_authored
      combat:
        armor_class: 10
        hit_points: { average: 50, dice: "8d8", con_contribution: 0 }
        speed: { walk: 0 }
        initiative: { modifier: -5, score: 0 }
      abilities:
        str: { score: 10, save: 0 }
        dex: { score: 8, save: -1 }
        con: { score: 10, save: 0 }
        int: { score: 1, save: -5 }
        wis: { score: 5, save: -3 }
        cha: { score: 1, save: -5 }
      cr: { value: 1.0, xp: 200, proficiency_bonus: 2 }
      behavior_profile:
        presets:
          retreat: ftd
      actions:
        - id: a_club
          name: Club
          type: weapon_attack
          pipeline:
            - primitive: attack_roll
              params: { kind: melee, bonus: 4, reach_ft: 5 }
            - primitive: damage
              params: { dice: "1d8", modifier: 2, type: bludgeoning }
              when: { event: damage_roll, condition: "combat.attack_state == hit" }

  - instance_id: dummy_c
    name: Dummy C
    side: enemy
    position: [11, 1]
    template:
      id: m_dummy_c
      name: Dummy
      source: user_authored
      combat:
        armor_class: 10
        hit_points: { average: 50, dice: "8d8", con_contribution: 0 }
        speed: { walk: 0 }
        initiative: { modifier: -5, score: 0 }
      abilities:
        str: { score: 10, save: 0 }
        dex: { score: 8, save: -1 }
        con: { score: 10, save: 0 }
        int: { score: 1, save: -5 }
        wis: { score: 5, save: -3 }
        cha: { score: 1, save: -5 }
      cr: { value: 1.0, xp: 200, proficiency_bonus: 2 }
      behavior_profile:
        presets:
          retreat: ftd
      actions:
        - id: a_club
          name: Club
          type: weapon_attack
          pipeline:
            - primitive: attack_roll
              params: { kind: melee, bonus: 4, reach_ft: 5 }
            - primitive: damage
              params: { dice: "1d8", modifier: 2, type: bludgeoning }
              when: { event: damage_roll, condition: "combat.attack_state == hit" }
