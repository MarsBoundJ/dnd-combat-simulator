# Strict Pacifist PC — exercises RP Constraints (Hard Filter / Tier 1)
# AND the PR #27 §6.4 PC Dodge fallback.
#
# A pacifist PC with `pacifist_strict` is faced with an attacking goblin.
# The pacifist has ONLY weapon attacks in their action list, so the hard
# filter empties the candidate set every turn. Per §6.4 guaranteed-legal
# fallback ("PCs default to Dodge"), the runner now executes the built-in
# Dodge action instead of Pass-turning. Goblin attacks against the
# pacifist roll at disadvantage; she absorbs ~5× more damage before
# the retreat dial fires (8 rounds vs 7; ending HP 10/30 vs 2/30).
#
# Expected event log: each pacifist turn produces a `dodge_fallback`
# event with reason 'rp_hard_filter_empty_set' AND zero attack_roll
# events from the pacifist (RP constraint still prevents attacking).
# Goblin attack rolls against pacifist show `advantage_state: disadvantage`.

id: pacifist_encounter

environment:
  template: open_battlefield

actors:
  - instance_id: goblin_attacker
    name: Goblin Attacker
    side: enemy
    template_ref:
      entity_type: monster
      id: m_goblin_warrior

  - instance_id: pacifist_monk
    name: Pacifist Monk
    side: pc
    template:
      id: pc_pacifist_monk
      name: Pacifist Monk
      source: user_authored
      combat:
        armor_class: 17
        hit_points:
          average: 30
          dice: "5d8"
          con_contribution: 5
        speed:
          walk: 40
        initiative:
          modifier: 3
          score: 15
      abilities:
        str: { score: 12, save: 1 }
        dex: { score: 16, save: 3 }
        con: { score: 12, save: 1 }
        int: { score: 10, save: 0 }
        wis: { score: 14, save: 5 }    # high WIS — won't auto-retreat
        cha: { score: 10, save: 0 }
      cr: { value: 1.0, xp: 200, proficiency_bonus: 2 }
      behavior_profile:
        rp_constraints:
          - id: pacifist_strict
      actions:
        # Only attack actions in the action list — pacifist_strict will
        # filter them ALL, leaving an empty candidate set every turn.
        - id: a_unarmed
          name: Unarmed Strike
          type: weapon_attack
          pipeline:
            - primitive: attack_roll
              params: { kind: melee, bonus: 5, reach_ft: 5 }
            - primitive: damage
              params: { dice: "1d4", modifier: 3, type: bludgeoning }
              when: { event: damage_roll, condition: "combat.attack_state == hit" }
