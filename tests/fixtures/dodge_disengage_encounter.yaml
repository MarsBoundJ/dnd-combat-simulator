# Dodge + Disengage demo — defensive actions in action.
#
# Setup:
#   - Weak PC (Apprentice, low damage attack + Dodge available)
#     surrounded by 2 high-DPR brawlers.
#   - Both PC attacks (mace, +0 to hit, 1d4) and Dodge are available
#     each round.
#
# Expected behavior (seed 1):
#   - PC scores: mace eHP very low (low hit chance + low damage);
#     Dodge eHP = worst_enemy_DPR × 0.20 × 1 round (Dodge override)
#     = ~3 eHP per the math.
#   - Per round, mace likely scores even lower than Dodge under pressure,
#     so PC picks Dodge.
#   - Disadvantage on enemy attacks should be visible in the attack_roll
#     events (advantage_state = disadvantage).
#
# Proves: Dodge action attaches modifiers; AI picks it under pressure;
# disadvantage flows through to attack resolution.

id: dodge_disengage_encounter

environment:
  template: open_battlefield

actors:
  - instance_id: pc_apprentice
    name: Apprentice
    side: pc
    position: [0, 0]
    template:
      id: pc_apprentice
      name: Apprentice
      source: user_authored
      combat:
        armor_class: 13
        hit_points:
          average: 30
          dice: "5d8"
          con_contribution: 5
        speed:
          walk: 30
        initiative:
          modifier: 20             # forced first for demo
          score: 30
      abilities:
        str: { score: 10, save: 0 }
        dex: { score: 12, save: 1 }
        con: { score: 12, save: 1 }
        int: { score: 10, save: 0 }
        wis: { score: 12, save: 1 }
        cha: { score: 10, save: 0 }
      cr: { value: 1.0, xp: 200, proficiency_bonus: 2 }
      behavior_profile:
        presets:
          retreat: ftd
      actions:
        - id: a_mace
          name: Mace
          type: weapon_attack
          pipeline:
            - primitive: attack_roll
              params: { kind: melee, bonus: 0, reach_ft: 5 }
            - primitive: damage
              params: { dice: "1d4", modifier: 0, type: bludgeoning }
              when: { event: damage_roll, condition: "combat.attack_state == hit" }
        - id: a_dodge
          name: Dodge
          type: defensive_buff
          defensive_buff_rounds: 1     # Dodge only lasts until next turn
          pipeline:
            - primitive: attack_modifier
              params:
                target: self
                modifier: disadvantage_for_attacker
                lifetime: until_actor_next_turn_start
            - primitive: save_modifier
              params:
                target: self
                modifier: advantage
                when: "save_ability == dexterity"
                lifetime: until_actor_next_turn_start
        - id: a_disengage
          name: Disengage
          type: disengage
          pipeline: []                 # marker action; engine sets actor.disengaging

  - instance_id: brawler_a
    name: Brawler A
    side: enemy
    position: [1, 0]
    template:
      id: m_brawler_a
      name: Brawler A
      source: user_authored
      combat:
        armor_class: 14
        hit_points: { average: 40, dice: "5d10", con_contribution: 10 }
        speed: { walk: 30 }
        initiative: { modifier: 0, score: 5 }
      abilities:
        str: { score: 16, save: 5 }
        dex: { score: 12, save: 1 }
        con: { score: 14, save: 4 }
        int: { score: 8, save: -1 }
        wis: { score: 10, save: 0 }
        cha: { score: 8, save: -1 }
      cr: { value: 2.0, xp: 450, proficiency_bonus: 2 }
      behavior_profile:
        presets:
          retreat: ftd
      actions:
        - id: a_greatclub
          name: Greatclub
          type: weapon_attack
          pipeline:
            - primitive: attack_roll
              params: { kind: melee, bonus: 6, reach_ft: 5 }
            - primitive: damage
              params: { dice: "3d8", modifier: 5, type: bludgeoning }
              when: { event: damage_roll, condition: "combat.attack_state == hit" }

  - instance_id: brawler_b
    name: Brawler B
    side: enemy
    position: [0, 1]
    template:
      id: m_brawler_b
      name: Brawler B
      source: user_authored
      combat:
        armor_class: 14
        hit_points: { average: 40, dice: "5d10", con_contribution: 10 }
        speed: { walk: 30 }
        initiative: { modifier: 0, score: 5 }
      abilities:
        str: { score: 16, save: 5 }
        dex: { score: 12, save: 1 }
        con: { score: 14, save: 4 }
        int: { score: 8, save: -1 }
        wis: { score: 10, save: 0 }
        cha: { score: 8, save: -1 }
      cr: { value: 2.0, xp: 450, proficiency_bonus: 2 }
      behavior_profile:
        presets:
          retreat: ftd
      actions:
        - id: a_greatclub
          name: Greatclub
          type: weapon_attack
          pipeline:
            - primitive: attack_roll
              params: { kind: melee, bonus: 6, reach_ft: 5 }
            - primitive: damage
              params: { dice: "3d8", modifier: 5, type: bludgeoning }
              when: { event: damage_roll, condition: "combat.attack_state == hit" }
