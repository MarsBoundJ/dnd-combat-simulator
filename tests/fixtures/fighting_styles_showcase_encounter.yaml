        dex: { score: 8, save: -1 }
        con: { score: 16, save: 3 }
        int: { score: 1, save: -5 }
        wis: { score: 1, save: -5 }
        cha: { score: 1, save: -5 }
      cr: { value: 1.0, xp: 200, proficiency_bonus: 2 }
      behavior_profile:
