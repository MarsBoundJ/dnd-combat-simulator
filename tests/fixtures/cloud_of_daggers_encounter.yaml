# Cloud of Daggers demo — wizard cubes a chokepoint.
#
# Setup:
#   - Wizard (PC) with Cloud of Daggers (2nd-level slot,
#     concentration). Forced first via initiative bonus.
#   - 2 orcs at a chokepoint position. The wizard targets the cube
#     at one of them; that orc takes 4d4 slashing every turn-start.
#     NO SAVE — auto-damage on trigger.
#   - The other orc isn't in the cube so they don't take damage.
#
# Expected behavior:
#   - Round 1: Wizard casts CoD on the chokepoint orc. Event:
#     `persistent_aura_registered` with shape=cube, anchor=point.
#   - Round 1+ orc turns: orc on the cube's origin square takes
#     4d4 slashing at turn-start. Event:
#     `persistent_aura_no_save_trigger` (no forced_save event
#     since CoD has no save). The other orc is unaffected.
#
# Demonstrates: cube shape, no-save path, point-anchored,
# all_creatures friendly fire mode (no allies here but the mode is
# active).

id: cloud_of_daggers_encounter

environment:
  template: open_battlefield

actors:
  - instance_id: wizard
    name: Wizard
    side: pc
    position: [0, 0]
    spell_slots: { 2: 1 }
    spell_slots_max: { 2: 1 }
    template:
      id: pc_wizard_cod
      name: Wizard
      source: user_authored
      combat:
        armor_class: 13
        hit_points:
          average: 25
          dice: "5d6"
          con_contribution: 5
        speed:
          walk: 30
        initiative:
          modifier: 30
          score: 40
      abilities:
        str: { score: 8, save: -1 }
        dex: { score: 14, save: 2 }
        con: { score: 12, save: 1 }
        int: { score: 18, save: 7 }
        wis: { score: 12, save: 4 }
        cha: { score: 10, save: 0 }
      cr: { value: 4.0, xp: 1100, proficiency_bonus: 3 }
      behavior_profile:
        presets:
          retreat: ftd
      actions:
        - id: a_dart
          name: Magic Dart
          type: weapon_attack
          pipeline:
            - primitive: attack_roll
              params: { kind: ranged, bonus: 6, range_ft: 60 }
            - primitive: damage
              params: { dice: "1d4", modifier: 4, type: force }
              when: { event: damage_roll, condition: "combat.attack_state == hit" }
        - id: a_cloud_of_daggers
          name: Cloud of Daggers
          type: persistent_aura
          spell_slot_level: 2
          concentration: true
          named_effect: cloud_of_daggers
          area:
            shape: cube
            size_ft: 5
            range_ft: 60
          pipeline:
            - primitive: persistent_aura
              params:
                shape: cube
                size_ft: 5
                anchor: point
                trigger_event: target_turn_start_in_area
                affected: all_creatures
                ability: none
                on_fail:
                  - primitive: damage
                    params: { dice: "4d4", type: slashing }

  - instance_id: orc_a
    name: Orc A (in the chokepoint)
    side: enemy
    position: [5, 0]
    template:
      id: m_orc_cod_a
      name: Orc
      source: user_authored
      combat:
        armor_class: 13
        hit_points: { average: 30, dice: "4d8", con_contribution: 12 }
        speed: { walk: 30 }
        initiative: { modifier: 1, score: 10 }
      abilities:
        str: { score: 16, save: 3 }
        dex: { score: 12, save: 1 }
        con: { score: 16, save: 3 }
        int: { score: 7, save: -2 }
        wis: { score: 11, save: 0 }
        cha: { score: 10, save: 0 }
      cr: { value: 0.5, xp: 100, proficiency_bonus: 2 }
      behavior_profile:
        presets:
          retreat: ftd
      actions:
        - id: a_greataxe
          name: Greataxe
          type: weapon_attack
          pipeline:
            - primitive: attack_roll
              params: { kind: melee, bonus: 5, reach_ft: 5 }
            - primitive: damage
              params: { dice: "1d12", modifier: 3, type: slashing }
              when: { event: damage_roll, condition: "combat.attack_state == hit" }

  - instance_id: orc_b
    name: Orc B (out of the chokepoint)
    side: enemy
    position: [10, 5]            # not adjacent to orc_a
    template:
      id: m_orc_cod_b
      name: Orc
      source: user_authored
      combat:
        armor_class: 13
        hit_points: { average: 30, dice: "4d8", con_contribution: 12 }
        speed: { walk: 30 }
        initiative: { modifier: 1, score: 10 }
      abilities:
        str: { score: 16, save: 3 }
        dex: { score: 12, save: 1 }
        con: { score: 16, save: 3 }
        int: { score: 7, save: -2 }
        wis: { score: 11, save: 0 }
        cha: { score: 10, save: 0 }
      cr: { value: 0.5, xp: 100, proficiency_bonus: 2 }
      behavior_profile:
        presets:
          retreat: ftd
      actions:
        - id: a_greataxe
          name: Greataxe
          type: weapon_attack
          pipeline:
            - primitive: attack_roll
              params: { kind: melee, bonus: 5, reach_ft: 5 }
            - primitive: damage
              params: { dice: "1d12", modifier: 3, type: slashing }
              when: { event: damage_roll, condition: "combat.attack_state == hit" }
