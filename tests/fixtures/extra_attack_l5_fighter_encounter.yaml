# Extra Attack at L5 demo — fighter swings twice per turn vs ogre.
#
# Setup:
#   - L5 Fighter (PC, via `pc:` schema, no manual multiattack action
#     declaration). pc_schema.derive_pc_resources auto-wires Action
#     Surge + Second Wind counters; pc_schema._build_feature_actions
#     auto-generates the multiattack action from the L5 feature
#     f_extra_attack.
#   - Ogre (enemy, AC 14, 100 HP) — survivable target so we see
#     multiple rounds of the multiattack pattern.
#
# Expected behavior (round 1+):
#   - Fighter's main slot picks the multiattack candidate (its eHP
#     beats the single longsword attack because count=2).
#   - Each turn: TWO `attack_roll` events from `fighter` against
#     `ogre` per main action.
#   - Action Surge fires round 1 (charges available) → main slot
#     runs twice, so round 1 has 4 `attack_roll` events from fighter
#     (2 from initial multiattack + 2 from Action Surge's bonus
#     main slot).
#
# This is the "L5 fighter feels like a real L5 fighter" demo.

id: extra_attack_l5_fighter_encounter

environment:
  template: open_battlefield

actors:
  - instance_id: fighter
    name: Fighter L5
    side: pc
    position: [0, 0]
    pc:
      class: c_fighter
      level: 5
      fighting_style: dueling
      ability_scores:
        str: 18
        dex: 12
        con: 14
        int: 10
        wis: 12
        cha: 10
      armor:
        base_ac: 18              # plate
        max_dex_bonus: 0
      weapons:
        - id: a_longsword
          name: Longsword
          attack_ability: str
          damage_dice: 1d8
          damage_type: slashing
          reach_ft: 5
      behavior_profile:
        presets:
          retreat: ftd

  - instance_id: ogre
    name: Ogre
    side: enemy
    position: [0, 1]
    template:
      id: m_ogre_l5_demo
      name: Ogre
      source: user_authored
      combat:
        armor_class: 14
        hit_points:
          average: 100
          dice: "12d10"
          con_contribution: 30
        speed:
          walk: 30
        initiative:
          modifier: -5
          score: 0       # ensure fighter goes first
      abilities:
        str: { score: 19, save: 4 }
        dex: { score: 8, save: -1 }
        con: { score: 16, save: 3 }
        int: { score: 5, save: -3 }
        wis: { score: 10, save: 0 }
        cha: { score: 7, save: -2 }
      cr: { value: 2.0, xp: 450, proficiency_bonus: 2 }
      behavior_profile:
        presets:
          retreat: ftd
      actions:
        - id: a_greatclub
          name: Greatclub
          type: weapon_attack
          pipeline:
            - primitive: attack_roll
              params: { kind: melee, bonus: 6, reach_ft: 5 }
            - primitive: damage
              params: { dice: "2d8", modifier: 4, type: bludgeoning }
              when: { event: damage_roll, condition: "combat.attack_state == hit" }
