# Two-PC encounter — one wounded, one healthy
# Used to test the Targeting dial: a Goblin (cowardly_skirmisher, weakest_target)
# should attack the wounded PC first.

id: two_pc_encounter

environment:
  template: open_battlefield

actors:
  - instance_id: goblin_1
    name: Goblin Warrior
    side: enemy
    template_ref:
      entity_type: monster
      id: m_goblin_warrior

  # Wounded fighter — low HP, should be picked by weakest_target preset
  - instance_id: fighter_wounded
    name: Wounded Fighter
    side: pc
    template:
      id: pc_wounded_fighter
      name: Wounded Fighter
      source: user_authored
      combat:
        armor_class: 18
        hit_points:
          average: 5             # already wounded (originally 28)
          dice: "3d10"
          con_contribution: 6
        speed:
          walk: 30
        initiative:
          modifier: 0
          score: 8               # low initiative — turn order: goblin first
      abilities:
        str: { score: 16, save: 5 }
        dex: { score: 14, save: 2 }
        con: { score: 14, save: 4 }
        int: { score: 10, save: 0 }
        wis: { score: 12, save: 1 }
        cha: { score: 10, save: 0 }
      cr: { value: 0.0, xp: 0, proficiency_bonus: 2 }
      actions:
        - id: a_longsword
          name: Longsword
          type: weapon_attack
          pipeline:
            - primitive: attack_roll
              params: { kind: melee, bonus: 5, reach_ft: 5 }
            - primitive: damage
              params: { dice: "1d8", modifier: 3, type: slashing }
              when: { event: damage_roll, condition: "combat.attack_state == hit" }

  # Healthy fighter — full HP, NOT preferred by weakest_target
  - instance_id: fighter_healthy
    name: Healthy Fighter
    side: pc
    template:
      id: pc_healthy_fighter
      name: Healthy Fighter
      source: user_authored
      combat:
        armor_class: 18
        hit_points:
          average: 28
          dice: "3d10"
          con_contribution: 6
        speed:
          walk: 30
        initiative:
          modifier: 0
          score: 9
      abilities:
        str: { score: 16, save: 5 }
        dex: { score: 14, save: 2 }
        con: { score: 14, save: 4 }
        int: { score: 10, save: 0 }
        wis: { score: 12, save: 1 }
        cha: { score: 10, save: 0 }
      cr: { value: 0.0, xp: 0, proficiency_bonus: 2 }
      actions:
        - id: a_longsword
          name: Longsword
          type: weapon_attack
          pipeline:
            - primitive: attack_roll
              params: { kind: melee, bonus: 5, reach_ft: 5 }
            - primitive: damage
              params: { dice: "1d8", modifier: 3, type: slashing }
              when: { event: damage_roll, condition: "combat.attack_state == hit" }
