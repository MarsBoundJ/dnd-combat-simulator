# Multiattack test fixture — a custom dual-attack creature vs Fighter L3
# Validates that pipeline.execute() loops attacks correctly for type=multiattack.

id: test_multiattack_encounter

environment:
  template: open_battlefield

actors:
  - instance_id: dual_wielder_1
    name: Test Dual Wielder
    side: enemy
    template:
      id: test_dual_wielder
      name: Test Dual Wielder
      source: user_authored
      combat:
        armor_class: 12
        hit_points:
          average: 40
          dice: "8d6"
          con_contribution: 8
        speed:
          walk: 30
        initiative:
          modifier: 1
          score: 11
      abilities:
        str: { score: 14, save: 2 }
        dex: { score: 12, save: 1 }
        con: { score: 14, save: 2 }
        int: { score: 10, save: 0 }
        wis: { score: 10, save: 0 }
        cha: { score: 10, save: 0 }
      cr:
        value: 1
        xp: 200
        proficiency_bonus: 2
      actions:
        - id: a_multiattack
          name: Multiattack
          type: multiattack
          count: 2
          sub_actions: [a_scimitar_a, a_scimitar_b]
        - id: a_scimitar_a
          name: Scimitar A
          type: weapon_attack
          pipeline:
            - primitive: attack_roll
              params: { kind: melee, bonus: 4, reach_ft: 5 }
            - primitive: damage
              params: { dice: "1d6", modifier: 2, type: slashing }
              when:
                event: damage_roll
                condition: "combat.attack_state == hit"
        - id: a_scimitar_b
          name: Scimitar B
          type: weapon_attack
          pipeline:
            - primitive: attack_roll
              params: { kind: melee, bonus: 4, reach_ft: 5 }
            - primitive: damage
              params: { dice: "1d6", modifier: 2, type: slashing }
              when:
                event: damage_roll
                condition: "combat.attack_state == hit"
      behavior_profile:
        archetype: pack_hunter

  - instance_id: fighter_target
    name: Test Fighter (target dummy)
    side: pc
    template:
      id: pc_test_fighter_target
      name: Test Fighter (target dummy)
      source: user_authored
      combat:
        armor_class: 18
        hit_points:
          average: 28
          dice: "3d10"
          con_contribution: 6
        speed:
          walk: 30
        initiative:
          modifier: 0
          score: 10
      abilities:
        str: { score: 16, save: 5 }
        dex: { score: 14, save: 2 }
        con: { score: 14, save: 4 }
        int: { score: 10, save: 0 }
        wis: { score: 12, save: 1 }
        cha: { score: 10, save: 0 }
      cr:
        value: 0.0
        xp: 0
        proficiency_bonus: 2
      actions:
        - id: a_longsword
          name: Longsword
          type: weapon_attack
          pipeline:
            - primitive: attack_roll
              params: { kind: melee, bonus: 5, reach_ft: 5 }
            - primitive: damage
              params: { dice: "1d8", modifier: 3, type: slashing }
              when:
                event: damage_roll
                condition: "combat.attack_state == hit"
      behavior_profile:
        archetype: pack_hunter
